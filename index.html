<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRIS AI PRO</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
    --primary:#00bfff;
    --bg:#050510;
    --card:#0c0c1a;
}

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:var(--bg);
    color:white;
}

.app{
    max-width:1200px;
    margin:auto;
    padding:15px;
}

.card{
    background:var(--card);
    border-radius:15px;
    padding:20px;
    margin-bottom:15px;
    box-shadow:0 0 20px rgba(0,191,255,.1);
}

input,select{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border-radius:8px;
    border:1px solid #222;
    background:#000;
    color:#fff;
}

button{
    background:var(--primary);
    border:none;
    padding:14px;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{opacity:.85}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.hidden{display:none}

.status{
    font-size:12px;
    color:#00ffcc;
}

.loader{
    border:3px solid #111;
    border-top:3px solid var(--primary);
    border-radius:50%;
    width:20px;height:20px;
    animation:spin 1s linear infinite;
    display:inline-block;
}

@keyframes spin{
    to{transform:rotate(360deg)}
}
</style>
</head>

<body>

<div id="loginBox" class="app" style="max-width:350px;margin-top:100px;">
    <div class="card">
        <h2 style="color:var(--primary)">IRIS AI LOGIN</h2>
        <input id="u" placeholder="Correo">
        <input id="p" type="password" placeholder="Contraseña">
        <button onclick="login()">Entrar</button>
        <div id="loginStatus" class="status"></div>
    </div>
</div>

<div id="appBox" class="app hidden">

    <div class="card">
        <h3>🧠 IRIS Sistema Activo</h3>
        <div id="iaSpeech" class="status"></div>
    </div>

    <div class="grid">

        <div class="card">
            <h3>📊 Rendimiento</h3>
            <canvas id="graficaTiendas"></canvas>
            <div id="iaAnalisis" class="status"></div>
        </div>

        <div class="card">
            <form id="fReg">

                <select id="tipo">
                    <option>PORTABILIDAD</option>
                    <option>RENUEVA</option>
                    <option>KIT</option>
                    <option>CHIP</option>
                    <option>PAYJOY</option>
                </select>

                <input id="promotor" placeholder="Promotor">
                <input id="tienda" placeholder="Tienda">

                <input id="tel" placeholder="Celular">

                <input id="codigo" placeholder="IMEI o ICCID">

                <button type="submit">
                    Guardar Registro
                </button>

                <div id="status" class="status"></div>

            </form>
        </div>

    </div>

</div>

<script>
const firebaseConfig={
    apiKey:"AIzaSyD4UK...",
    authDomain:"ventastelcel4029.firebaseapp.com",
    projectId:"ventastelcel4029"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const auth=firebase.auth();

let chart;

// VOZ
function hablar(t){
    const u=new SpeechSynthesisUtterance(t);
    u.lang='es-MX';
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
}

// LOGIN
function login(){
    loginStatus.innerHTML='<span class="loader"></span> Conectando...';
    auth.signInWithEmailAndPassword(u.value,p.value)
    .catch(e=>{
        loginStatus.innerText="Error: "+e.message;
    });
}

auth.onAuthStateChanged(user=>{
    loginBox.classList.toggle("hidden",!!user);
    appBox.classList.toggle("hidden",!user);

    if(user){
        hablar("Sistema activado");
        iniciar();
    }
});

// DETECTOR IMEI / ICCID
function detectarCodigo(valor){
    if(!valor) return "VACIO";

    if(valor.length===15) return "IMEI";
    if(valor.length>=18 && valor.length<=22) return "ICCID";

    return "DESCONOCIDO";
}

// DATA
function iniciar(){
    db.collection("ventas").onSnapshot(snap=>{

        let tiendas={};
        let stats={};

        snap.forEach(doc=>{
            let v=doc.data();

            tiendas[v.tienda]=(tiendas[v.tienda]||0)+1;

            if(!stats[v.promotor]) stats[v.promotor]={total:0};
            stats[v.promotor].total++;
        });

        renderChart(tiendas);
        analizar(stats);
    });
}

// ANALISIS
function analizar(stats){
    let top=Object.entries(stats)
        .sort((a,b)=>b[1].total-a[1].total)[0];

    if(!top) return;

    let texto=`Top actual: ${top[0]} con ${top[1].total} ventas`;
    iaAnalisis.innerText=texto;
    iaSpeech.innerText=texto;
}

// CHART
function renderChart(data){
    const ctx=document.getElementById("graficaTiendas");

    if(chart) chart.destroy();

    chart=new Chart(ctx,{
        type:"bar",
        data:{
            labels:Object.keys(data),
            datasets:[{
                data:Object.values(data)
            }]
        }
    });
}

// SUBMIT
fReg.onsubmit=async e=>{
    e.preventDefault();

    status.innerHTML='<span class="loader"></span> Guardando...';

    let tipoCodigo=detectarCodigo(codigo.value);

    try{
        await db.collection("ventas").add({
            promotor:promotor.value,
            tienda:tienda.value,
            cel:tel.value,
            codigo:codigo.value,
            tipoCodigo:tipoCodigo,
            tipo:tipo.value,
            ts:Date.now()
        });

        status.innerText="Guardado ✔ ("+tipoCodigo+")";
        hablar("Registro guardado correctamente");

        fReg.reset();

    }catch(err){
        status.innerText="Error: "+err.message;
    }
}
</script>

</body>
</html>
