<script>

const firebaseConfig = {
apiKey: "AIzaSyD4UK_j8UxMwOCtrtXlYftBe_wCLE7psMc",
authDomain: "ventastelcel4029.firebaseapp.com",
databaseURL: "https://ventastelcel4029-default-rtdb.firebaseio.com",
projectId: "ventastelcel4029",
storageBucket: "ventastelcel4029.firebasestorage.app",
messagingSenderId: "480758010888",
appId: "1:480758010888:web:e948c54f0217536aa9adbd"
};

let auth, isLogin = true, cRes = 0, stream = null;

/* INICIO */

function inicio(){

if (!firebase.apps.length){
firebase.initializeApp(firebaseConfig);
}

auth = firebase.auth();

genCaptcha();
obtenerGps();

/* LOGIN ACTIVO */

auth.onAuthStateChanged(user => {

if(user){

document.getElementById('loginBox').classList.add("hidden");
document.getElementById('appBox').classList.remove("hidden");

cargarLocal();

}else{

document.getElementById('loginBox').classList.remove("hidden");
document.getElementById('appBox').classList.add("hidden");

}

});

/* FECHA AUTOMATICA */

const hoy = new Date();

document.getElementById('iFec').value =
`${String(hoy.getDate()).padStart(2,'0')}/${String(hoy.getMonth()+1).padStart(2,'0')}/${hoy.getFullYear()}`;

}

/* CAPTCHA */

function genCaptcha(){

const n1 = Math.floor(Math.random()*9)+1;
const n2 = Math.floor(Math.random()*9)+1;

cRes = n1 + n2;

document.getElementById('txtCaptcha').innerText = `${n1} + ${n2} =`;

}

/* LOGIN */

function manejarAuth(){

const u = document.getElementById('u').value;
const p = document.getElementById('p').value;
const a = parseInt(document.getElementById('iCaptchaAns').value);

if(a !== cRes){

alert("Captcha incorrecto");
genCaptcha();
return;

}

if(isLogin){

auth.signInWithEmailAndPassword(u,p)
.catch(()=> alert("Correo o contraseña incorrectos"));

}else{

auth.createUserWithEmailAndPassword(u,p)
.then(()=>{
alert("Usuario registrado");
isLogin=true;
})
.catch(e=>alert(e.message));

}

}

/* GPS */

function obtenerGps(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(pos=>{

fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`)
.then(r=>r.json())
.then(d=>{

const a=d.address;

document.getElementById('txtGps').innerText =
`${a.road || ''} ${a.house_number || ''}, ${a.suburb || a.neighbourhood || ''}`;

});

});

}

}

/* CERRAR SESION */

function cerrarSesion(){

if(confirm("¿Cerrar sesión?")){
auth.signOut();
}

}

/* GUARDAR VENTA */

document.getElementById('fReg').onsubmit = e => {

e.preventDefault();

const v = {

id: Date.now(),

"NUM. CELULAR": document.getElementById('iTel').value,

"IMEI": document.getElementById('iIme').value || "N/A",

"ICCID": document.getElementById('iIcc').value,

"Renuevate/ Kit/Chip/Porta": document.getElementById('iTipo').value,

"#TIENDA / Determinante": document.getElementById('iTiendaNum').value,

"SOLO NOMBRE DE LA CADENA": document.getElementById('iCadena').value,

"SOLO NOMBRE DE TIENDA SIN CADENA": document.getElementById('iTiendaNombre').value,

"NOMBRE COMPLETO PROMOTOR": document.getElementById('iProm').value,

"FECHA DE ACTIVACION": document.getElementById('iFec').value,

"MARCA": document.getElementById('iMarca').value || "N/A",

"MODELO": document.getElementById('iMod').value || "N/A"

};

let l = JSON.parse(localStorage.getItem("ventas_omar") || "[]");

l.unshift(v);

localStorage.setItem("ventas_omar", JSON.stringify(l));

cargarLocal();

e.target.reset();

inicio();

};

/* CARGAR TABLA */

function cargarLocal(){

let l = JSON.parse(localStorage.getItem("ventas_omar") || "[]");

document.getElementById('bodyVentas').innerHTML = l.map(v => `

<tr>

<td>${v["NUM. CELULAR"]}</td>
<td>${v.IMEI}</td>
<td>${v.ICCID}</td>
<td>${v["Renuevate/ Kit/Chip/Porta"]}</td>
<td>${v["SOLO NOMBRE DE TIENDA SIN CADENA"]}</td>
<td>${v["NOMBRE COMPLETO PROMOTOR"]}</td>
<td>${v["FECHA DE ACTIVACION"]}</td>

<td>
<i class="fa fa-trash" style="color:red;cursor:pointer" onclick="eliminar(${v.id})"></i>
</td>

</tr>

`).join("");

}

/* ELIMINAR */

function eliminar(id){

if(confirm("¿Eliminar registro?")){

let l = JSON.parse(localStorage.getItem("ventas_omar") || "[]")
.filter(x => x.id !== id);

localStorage.setItem("ventas_omar", JSON.stringify(l));

cargarLocal();

}

}

/* EXCEL */

function exportarExcel(){

let l = JSON.parse(localStorage.getItem("ventas_omar") || "[]");

if(l.length === 0) return alert("No hay datos");

const ws = XLSX.utils.json_to_sheet(l);
const wb = XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb, ws, "Ventas");

XLSX.writeFile(wb,
`Ventas_OmarOrtega_${new Date().toLocaleDateString().replace(/\//g,'-')}.xlsx`
);

}

/* REGISTRO / LOGIN */

function toggleAuth(){

isLogin = !isLogin;

document.getElementById('authTitle').innerText =
isLogin ? "Acceso Promotores" : "Registro de Usuario";

}

</script>
