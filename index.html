<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventas Telcel PRO - v1.5</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <style>
        :root {--amarillo:#ffc300; --azul:#003566; --morado:#8338ec; --rojo:#d90429;}
        body { margin:0; font-family:'Segoe UI',sans-serif; background:#000814; color:white; }
        .app { max-width:600px; margin:auto; padding:15px; }
        .card { background:rgba(255,255,255,.08); border-radius:15px; padding:15px; margin-bottom:12px; border:1px solid rgba(255,255,255,0.1); }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .gps-badge { background: #000; border: 1px solid #00b4d8; padding: 5px 10px; border-radius: 20px; font-size: 11px; color: #00b4d8; }
        label { font-size:10px; font-weight:bold; color:var(--amarillo); display: block; margin-bottom: 4px; }
        input, select, textarea { width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:none; background:rgba(255,255,255,.12); color:white; box-sizing: border-box; }
        .btn { padding:12px; border:none; border-radius:10px; font-weight:bold; cursor:pointer; width:100%; display:flex; align-items:center; justify-content:center; gap:8px; }
        .btn-save { background:var(--amarillo); color:#001d3d; }
        .btn-ia { background:var(--morado); color:white; }
        .ia-resp { background:rgba(0,0,0,.4); padding:12px; border-radius:8px; border-left: 4px solid var(--morado); font-size:13px; min-height:40px; }
        .hidden { display: none; }
    </style>
</head>
<body onload="inicio()">

    <div id="loginBox" class="app" style="text-align:center; margin-top:50px;">
        <h2 style="color:var(--amarillo)">Acceso Telcel PRO</h2>
        <input id="u" type="email" placeholder="Usuario">
        <input id="p" type="password" placeholder="Contraseña">
        <button class="btn btn-save" onclick="manejarAuth()">ENTRAR</button>
    </div>

    <div id="appBox" class="app hidden">
        <div class="top-bar">
            <div class="gps-badge" id="txtGps">Localizando...</div>
            <div style="color:var(--amarillo); font-weight:bold" id="txtReloj">00:00</div>
            <button onclick="auth.signOut()" style="background:none; border:none; color:var(--rojo); font-size:20px"><i class="fa-solid fa-power-off"></i></button>
        </div>

        <div class="card" style="border: 1px solid var(--morado)">
            <label><i class="fa-solid fa-robot"></i> ASISTENTE IA</label>
            <textarea id="iaPregunta" rows="2" placeholder="Pregunta algo o dicta la venta..."></textarea>
            <div style="display:flex; gap:10px">
                <button class="btn btn-ia" onclick="iaChat()">Preguntar</button>
                <button class="btn btn-ia" onclick="iaSugerir()">Tips Venta</button>
            </div>
            <div id="iaRespuesta" class="ia-resp">Listo para ayudarte...</div>
        </div>

        <form id="fReg">
            <div class="card">
                <label>TIPO DE VENTA</label>
                <select id="iTipo"><option>KIT</option><option>CHIP</option><option>PORTA</option><option>RENUEVATE</option></select>
                <label>FECHA (DD/MM/YYYY)</label>
                <input id="iFec" readonly>
                <label>NÚMERO TELCEL</label>
                <input id="iTel" type="tel" maxlength="10" required>
                <label>ICCID</label>
                <input id="iIcc" required>
                <label>MARCA Y MODELO</label>
                <div style="display:flex; gap:5px">
                    <input id="iMarca" placeholder="Marca">
                    <input id="iMod" placeholder="Modelo">
                </div>
                <button type="submit" class="btn btn-save"><i class="fa-solid fa-floppy-disk"></i> GUARDAR REGISTRO</button>
            </div>
        </form>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD4UK_j8UxMwOCtrtXlYftBe_wCLE7psMc",
        authDomain: "ventastelcel4029.firebaseapp.com",
        databaseURL: "https://ventastelcel4029-default-rtdb.firebaseio.com",
        projectId: "ventastelcel4029",
        storageBucket: "ventastelcel4029.firebasestorage.app",
        appId: "1:480758010888:web:e948c54f0217536aa9adbd"
    };

    // TU CLAVE NUEVA GENERADA EL 12/04/2026
    const GEMINI_API_KEY = "AIzaSyBayQhTBchml9-uewg0fLFKO99Z8tD0R00"; 

    let db, auth;

    function inicio() {
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        db = firebase.database();
        auth = firebase.auth();

        // Reloj y Fecha (Formato DD/MM/YYYY)
        setInterval(() => document.getElementById('txtReloj').innerText = new Date().toLocaleTimeString(), 1000);
        const hoy = new Date();
        document.getElementById('iFec').value = `${String(hoy.getDate()).padStart(2,'0')}/${String(hoy.getMonth()+1).padStart(2,'0')}/${hoy.getFullYear()}`;

        // GPS
        navigator.geolocation.getCurrentPosition(p => {
            document.getElementById('txtGps').innerText = `${p.coords.latitude.toFixed(4)}, ${p.coords.longitude.toFixed(4)}`;
        });

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('loginBox').classList.add("hidden");
                document.getElementById('appBox').classList.remove("hidden");
            } else {
                document.getElementById('loginBox').classList.remove("hidden");
                document.getElementById('appBox').classList.add("hidden");
            }
        });
    }

    function manejarAuth() {
        const u = document.getElementById('u').value, p = document.getElementById('p').value;
        auth.signInWithEmailAndPassword(u, p).catch(e => alert("Error: " + e.message));
    }

    // FUNCIÓN IA CORREGIDA CON ENDPOINT v1beta
    async function llamarIA(prompt) {
        const respDiv = document.getElementById('iaRespuesta');
        respDiv.innerText = "Pensando...";
        try {
            // Se usa v1beta y gemini-1.5-flash para máxima compatibilidad
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await response.json();

            if (data.candidates && data.candidates[0].content.parts[0].text) {
                const txt = data.candidates[0].content.parts[0].text;
                respDiv.innerText = txt;
                return txt;
            } else {
                throw new Error(data.error?.message || "Error en respuesta");
            }
        } catch (e) {
            respDiv.innerText = "Error: " + e.message;
            console.error(e);
        }
    }

    async function iaChat() {
        const q = document.getElementById('iaPregunta').value;
        if(q) llamarIA(q);
    }

    async function iaSugerir() {
        const tipo = document.getElementById('iTipo').value;
        llamarIA(`Dame un tip de 2 renglones para vender un ${tipo} de Telcel hoy.`);
    }

    document.getElementById('fReg').onsubmit = e => {
        e.preventDefault();
        const venta = {
            tel: document.getElementById('iTel').value,
            iccid: document.getElementById('iIcc').value,
            tipo: document.getElementById('iTipo').value,
            fecha: document.getElementById('iFec').value,
            timestamp: Date.now()
        };

        // Guardar Localmente (Persistencia)
        let locales = JSON.parse(localStorage.getItem('ventas_omar') || "[]");
        locales.unshift(venta);
        localStorage.setItem('ventas_omar', JSON.stringify(locales));

        // Enviar a Firebase
        if(navigator.onLine) db.ref("ventas/" + auth.currentUser.uid).push(venta);

        alert("Venta registrada con éxito");
        e.target.reset();
        inicio(); // Reset fecha
    };
</script>
</body>
</html>
