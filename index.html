<!DOCTYPE html><html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema Ventas Telcel Pro</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg,#001d3d,#003566,#000814);
      color: white;
    }
    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(14px);
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    }
    h1 {
      text-align: center;
      color: #ffc300;
    }
    input, select, button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-bottom: 12px;
      box-sizing: border-box;
    }
    button {
      background: #ffc300;
      color: #001d3d;
      font-weight: bold;
      cursor: pointer;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      color: black;
      border-radius: 10px;
      overflow: hidden;
    }
    th {
      background: black;
      color: white;
      padding: 12px;
    }
    td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Sistema Ventas Telcel Pro</h1><div class="card">
  <h3>Registro rápido de ventas</h3>
  <input placeholder="Número celular" />
  <input placeholder="ICCID" />
  <input placeholder="IMEI" />
  <select>
    <option>KIT</option>
    <option>CHIP</option>
    <option>PORTA</option>
    <option>RENUEVATE</option>
  </select>
  <button>Guardar venta</button>
</div>

<div class="card">
  <h3>Reporte</h3>
  <table>
    <thead>
      <tr>
        <th>Número</th>
        <th>ICCID</th>
        <th>IMEI</th>
        <th>Tipo</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>5512345678</td>
        <td>8952...</td>
        <td>3567...</td>
        <td>KIT</td>
      </tr>
    </tbody>
  </table>
</div>

  </div>
</body>
</html>
