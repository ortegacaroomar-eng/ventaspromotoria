<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teledata Ventas</title>

<!-- Firebase SDK (Modular v10) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, push } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_AUTH_DOMAIN",
  databaseURL: "TU_DATABASE_URL",
  projectId: "TU_PROJECT_ID",
  storageBucket: "TU_STORAGE_BUCKET",
  messagingSenderId: "TU_MESSAGING_ID",
  appId: "TU_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

window.registrar = async function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    await createUserWithEmailAndPassword(auth, email, password);
    alert("Usuario registrado ✅");
  } catch (error) {
    alert(error.message);
  }
};

window.login = async function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(auth, email, password);
    alert("Sesión iniciada 🔓");
  } catch (error) {
    alert(error.message);
  }
};

window.logout = async function () {
  await signOut(auth);
};

window.guardarVenta = async function () {
  const user = auth.currentUser;
  if (!user) return alert("Debes iniciar sesión");

  const cliente = document.getElementById("cliente").value;
  const monto = document.getElementById("monto").value;

  const venta = {
    cliente,
    monto,
    fecha: new Date().toISOString()
  };

  try {
    await push(ref(db, "ventas/" + user.uid), venta);
    alert("Venta guardada 💰");
  } catch (error) {
    alert(error.message);
  }
};

onAuthStateChanged(auth, (user) => {
  document.getElementById("userStatus").innerText =
    user ? "Conectado como: " + user.email : "No conectado";
});
</script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #4e73df, #1cc88a);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: white;
  padding: 30px;
  width: 350px;
  border-radius: 15px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.2);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

.btn-primary {
  background: #4e73df;
  color: white;
}

.btn-success {
  background: #1cc88a;
  color: white;
}

.btn-danger {
  background: #e74a3b;
  color: white;
}

button:hover {
  opacity: 0.85;
}

.status {
  text-align: center;
  margin-top: 10px;
  font-size: 14px;
  color: #555;
}
</style>
</head>

<body>

<div class="container">
  <h2>🔐 Teledata Ventas</h2>

  <input type="email" id="email" placeholder="Correo">
  <input type="password" id="password" placeholder="Contraseña">

  <button class="btn-primary" onclick="login()">Iniciar sesión</button>
  <button class="btn-success" onclick="registrar()">Registrarse</button>
  <button class="btn-danger" onclick="logout()">Cerrar sesión</button>

  <hr>

  <input type="text" id="cliente" placeholder="Nombre del cliente">
  <input type="number" id="monto" placeholder="Monto">

  <button class="btn-success" onclick="guardarVenta()">Guardar Venta</button>

  <div class="status" id="userStatus">No conectado</div>
</div>

</body>
</html>
