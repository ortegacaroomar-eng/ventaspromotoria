<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Auditor PRO - Telcel</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --gold: #ffd60a;
            --blue-dark: #000814;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #001d3d, var(--blue-dark));
            color: white;
            min-height: 100vh;
        }

        .app { max-width: 1200px; margin: auto; padding: 20px; }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }

        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: white;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        button {
            background: linear-gradient(135deg, var(--gold), #ffc300);
            color: #000;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        .table-container { background: white; border-radius: 15px; overflow: hidden; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; color: #333; font-size: 0.85em; }
        th { background: #eee; padding: 10px; }
        td { padding: 8px 10px; border-bottom: 1px solid #ddd; }

        .hidden { display: none; }
        .label-gold { color: var(--gold); font-weight: bold; font-size: 0.9em; display: block; margin-bottom: 5px; }
    </style>
</head>
<body onload="inicio()">

<div class="app">
    <div class="grid">
        <div class="card">
            <h2 style="color:var(--gold); margin-top:0;">📱 Nueva Venta</h2>
            
            <span class="label-gold">Fecha Operación</span>
            <input type="date" id="fechaIn">

            <span class="label-gold">Compañía</span>
            <select id="compIn" onchange="alternarCampos()">
                <option value="TELCEL">TELCEL</option>
                <option value="ATT">AT&T</option>
                <option value="BAIT">BAIT</option>
            </select>

            <input id="numIn" type="tel" placeholder="Número (10 dígitos)">
            <input id="marcaIn" placeholder="Marca (Ej: Samsung)">
            <input id="modeloIn" placeholder="Modelo (Ej: Galaxy A54)">

            <div id="boxTelcel">
                <span class="label-gold">Tipo Telcel</span>
                <select id="tipoTelcel">
                    <option value="PORTA">PORTA</option>
                    <option value="RENUEVATE">RENUEVATE</option>
                    <option value="CHIP">CHIP</option>
                </select>
            </div>

            <div id="boxOtras" class="hidden">
                <span class="label-gold">¿Se entregó con Chip Telcel?</span>
                <select id="chipTelcelPregunta">
                    <option value="SI">SÍ</option>
                    <option value="NO">NO</option>
                </select>
            </div>

            <button onclick="guardar()">💾 Registrar Localmente</button>
        </div>

        <div class="card">
            <h2 style="color:var(--gold); margin-top:0;">📊 Detalle de Inventario</h2>
            <p style="font-size: 0.8em;">Desglose por Marcas y Modelos</p>
            <canvas id="chartDetallado"></canvas>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <h3 style="color:var(--gold);">📋 Historial Telcel (Aparte)</h3>
            <div class="table-container">
                <table>
                    <thead>
                        <tr><th>Fecha</th><th>Tipo</th><th>Número</th><th>Marca/Mod</th></tr>
                    </thead>
                    <tbody id="tablaTelcel"></tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <h3 style="color:var(--gold);">📋 Historial Competencia</h3>
            <div class="table-container">
                <table>
                    <thead>
                        <tr><th>Fecha</th><th>Comp</th><th>Chip Tel</th><th>Número</th></tr>
                    </thead>
                    <tbody id="tablaOtras"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    let chartObj;

    function inicio() {
        document.getElementById('fechaIn').value = new Date().toISOString().split('T')[0];
        actualizarTodo();
    }

    function alternarCampos() {
        const c = document.getElementById('compIn').value;
        document.getElementById('boxTelcel').classList.toggle('hidden', c !== 'TELCEL');
        document.getElementById('boxOtras').classList.toggle('hidden', c === 'TELCEL');
    }

    function formatFecha(f) {
        const [y, m, d] = f.split('-');
        return `${d}/${m}/${y}`;
    }

    function guardar() {
        const comp = document.getElementById('compIn').value;
        const num = document.getElementById('numIn').value;
        const fRaw = document.getElementById('fechaIn').value;
        const marca = document.getElementById('marcaIn').value || "Genérico";
        const modelo = document.getElementById('modeloIn').value || "S/M";

        if(!num) return alert("Número requerido");

        const item = {
            fecha: formatFecha(fRaw),
            num, marca, modelo, comp,
            detalle: comp === 'TELCEL' ? tipoTelcel.value : chipTelcelPregunta.value
        };

        // GUARDADO APARTE
        if(comp === 'TELCEL') {
            let tel = JSON.parse(localStorage.getItem('db_telcel') || '[]');
            tel.unshift(item);
            localStorage.setItem('db_telcel', JSON.stringify(tel));
        } else {
            let otr = JSON.parse(localStorage.getItem('db_otras') || '[]');
            otr.unshift(item);
            localStorage.setItem('db_otras', JSON.stringify(otr));
        }

        // Guardar para la gráfica (general)
        let gen = JSON.parse(localStorage.getItem('db_grafica') || '[]');
        gen.unshift(item);
        localStorage.setItem('db_grafica', JSON.stringify(gen));

        // Limpiar campos
        document.getElementById('numIn').value = "";
        document.getElementById('marcaIn').value = "";
        document.getElementById('modeloIn').value = "";
        
        actualizarTodo();
    }

    function actualizarTodo() {
        const tel = JSON.parse(localStorage.getItem('db_telcel') || '[]');
        const otr = JSON.parse(localStorage.getItem('db_otras') || '[]');
        const gen = JSON.parse(localStorage.getItem('db_grafica') || '[]');

        // Llenar Tablas
        tablaTelcel.innerHTML = tel.map(i => `<tr><td>${i.fecha}</td><td>${i.detalle}</td><td>${i.num}</td><td>${i.marca} ${i.modelo}</td></tr>`).join('');
        tablaOtras.innerHTML = otr.map(i => `<tr><td>${i.fecha}</td><td>${i.comp}</td><td>${i.detalle}</td><td>${i.num}</td></tr>`).join('');

        renderGrafica(gen);
    }

    function renderGrafica(datos) {
        const ctx = document.getElementById('chartDetallado').getContext('2d');
        if(chartObj) chartObj.destroy();

        // Procesar datos para detalle de marcas y modelos
        const etiquetas = [...new Set(datos.map(d => `${d.marca} ${d.modelo}`))].slice(0, 8); // Top 8 modelos
        
        const dataTelcel = etiquetas.map(label => datos.filter(d => `${d.marca} ${d.modelo}` === label && d.comp === 'TELCEL').length);
        const dataATT = etiquetas.map(label => datos.filter(d => `${d.marca} ${d.modelo}` === label && d.comp === 'ATT').length);
        const dataBAIT = etiquetas.map(label => datos.filter(d => `${d.marca} ${d.modelo}` === label && d.comp === 'BAIT').length);

        chartObj = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: etiquetas,
                datasets: [
                    { label: 'Telcel', data: dataTelcel, backgroundColor: '#ffd60a' },
                    { label: 'AT&T', data: dataATT, backgroundColor: '#00b4d8' },
                    { label: 'BAIT', data: dataBAIT, backgroundColor: '#ef233c' }
                ]
            },
            options: {
                responsive: true,
                plugins: { legend: { labels: { color: 'white' } } },
                scales: {
                    x: { stacked: true, ticks: { color: 'white', font: { size: 10 } } },
                    y: { stacked: true, ticks: { color: 'white' } }
                }
            }
        });
    }
</script>
</body>
</html>
