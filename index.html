<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Ventas Telcel - Omar Ortega</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:'Segoe UI'; background:#001d3d; color:white; }
.app { max-width:900px; margin:auto; padding:20px; }
.card { background:#003566; padding:15px; border-radius:10px; margin-bottom:10px; }
input, select { width:100%; padding:10px; margin:5px 0; }
button { padding:10px; width:100%; }
table { width:100%; background:white; color:black; }
.hidden { display:none; }
</style>
</head>

<body onload="inicio()">

<div id="loginBox">
<input id="u" placeholder="Correo">
<input id="p" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
</div>

<div id="appBox" class="hidden app">

<form id="fReg">
<div class="card">
<select id="iTipo">
<option>KIT</option>
<option>CHIP</option>
<option>PORTA</option>
</select>

<select id="iCompania">
<option value="TELCEL">TELCEL</option>
<option value="ATT">AT&T</option>
<option value="BAIT">BAIT</option>
</select>

<input id="iFec">
<input id="iTel">
</div>

<button>Guardar</button>
</form>

<div class="card">
<select id="filtro" onchange="grafica()">
<option value="hoy">Hoy</option>
<option value="todo">Todo</option>
</select>
<canvas id="c"></canvas>
</div>

<table>
<tbody id="body"></tbody>
</table>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyD4UK_j8UxMwOCtrtXlYftBe_wCLE7psMc",
authDomain: "ventastelcel4029.firebaseapp.com"
};

let chart;

function inicio(){
firebase.initializeApp(firebaseConfig);
firebase.auth().onAuthStateChanged(u=>{
if(u){
loginBox.classList.add("hidden");
appBox.classList.remove("hidden");
cargar();
grafica();
}
});
iFec.value = new Date().toLocaleDateString('es-MX');
}

function login(){
firebase.auth().signInWithEmailAndPassword(u.value,p.value)
.catch(()=>alert("Error login"));
}

fReg.onsubmit=e=>{
e.preventDefault();

let v={
id:Date.now(),
num:iTel.value,
tipo:iTipo.value,
comp:iCompania.value,
fecha:iFec.value
};

let l=JSON.parse(localStorage.getItem("ventas_omar")||"[]");
l.unshift(v);
localStorage.setItem("ventas_omar",JSON.stringify(l));

cargar();
grafica();
};

function cargar(){
let l=JSON.parse(localStorage.getItem("ventas_omar")||"[]");
body.innerHTML=l.map(v=>`
<tr>
<td>${v.num}</td>
<td>${v.tipo}</td>
<td>${v.comp}</td>
<td>${v.fecha}</td>
<td onclick="del(${v.id})">X</td>
</tr>
`).join("");
}

function del(id){
let l=JSON.parse(localStorage.getItem("ventas_omar"));
l=l.filter(v=>v.id!==id);
localStorage.setItem("ventas_omar",JSON.stringify(l));
cargar();grafica();
}

function grafica(){

let l=JSON.parse(localStorage.getItem("ventas_omar")||"[]");
let hoy=new Date().toLocaleDateString('es-MX');

let t=0,a=0,b=0;

l.forEach(v=>{
if(filtro.value==="hoy" && v.fecha!==hoy) return;

if(v.comp==="TELCEL") t++;
if(v.comp==="ATT") a++;
if(v.comp==="BAIT") b++;
});

let data={labels:["Telcel","AT&T","BAIT"],datasets:[{data:[t,a,b]}]};

if(chart){chart.data=data;chart.update();}
else{chart=new Chart(c,{type:"bar",data:data});}

}

</script>

</body>
</html>
