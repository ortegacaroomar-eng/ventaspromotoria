<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventas PRO IA - Core Central</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <style>
        :root { --primary: #00f2ff; --pink: #ff007a; --bg: #030303; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; color: white; background: var(--bg); overflow-x: hidden; }
        body::before { content: ""; position: fixed; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #0a0a1a 0%, #030303 100%); z-index: -1; }

        .app { max-width:1000px; margin:auto; padding:15px; }
        .card { background: var(--glass); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); padding:20px; border-radius:20px; margin-bottom:15px; border: 1px solid rgba(0,242,255,0.1); }

        /* CYBER-ANGEL "IRIS" AVATAR */
        .cyber-avatar-container { position: relative; width: 140px; height: 140px; margin: 0 auto; display: flex; align-items: center; justify-content: center; }
        .cyber-face { 
            position: absolute; width: 100%; height: 100%; border-radius: 50%;
            border: 2px solid var(--primary); background: rgba(0,242,255,0.05);
            box-shadow: 0 0 15px rgba(0,242,255,0.3); animation: neural-glow 2s infinite; 
        }
        .cyber-logo { font-size: 50px; color: var(--pink); text-shadow: 0 0 15px var(--pink); }
        
        @keyframes neural-glow { 0% { box-shadow: 0 0 10px transparent; } 50% { box-shadow: 0 0 25px var(--primary); } 100% { box-shadow: 0 0 10px transparent; } }

        .ia-speech { font-size: 16px; font-style: italic; color: #b3f7ff; text-align: center; margin-top: 15px; min-height: 40px; }

        /* UI ELEMENTS */
        .btn-logout { background: transparent; color: #ff4d4d; border: 1px solid #ff4d4d; padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-logout:hover { background: #ff4d4d; color: #fff; }

        input, select { width:100%; padding:14px; margin-bottom:12px; border-radius:12px; border:1px solid #333; background:rgba(0,0,0,0.3); color:white; outline: none; }
        input:focus { border-color: var(--primary); }

        .btn-register { padding:15px; border:none; border-radius:15px; cursor:pointer; font-weight:bold; width:100%; background: var(--primary); color:#000; font-size: 16px; transition: 0.3s; }
        .btn-register:active { transform: scale(0.97); }

        .chat-box { height: 180px; overflow-y: auto; background: rgba(0,0,0,0.5); border-radius: 12px; padding: 10px; font-size: 13px; border: 1px solid #222; }
        .hidden { display:none; }
    </style>
</head>
<body>

<div id="loginBox" class="app" style="max-width: 380px; margin-top: 100px;">
    <div class="card" style="text-align: center;">
        <h2 style="color:var(--primary); margin-bottom: 5px;">IA NEURAL - 2026</h2>
        <p style="font-size: 11px; color: #aaa; margin-bottom: 25px;">Sincronizando flujos de datos corporativos</p>
        <input id="u" type="email" placeholder="Usuario Corporativo">
        <input id="p" type="password" placeholder="Pass-Key">
        <button class="btn-register" onclick="login()">ACTIVAR CEREBRO</button>
    </div>
</div>

<div id="appBox" class="app hidden">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <span style="color:var(--primary); font-size:12px;"><i class="fas fa-satellite-dish"></i> Nodo: Telcel-EDMX</span>
        <button class="btn-logout" onclick="logout()">CERRAR SESIÓN</button>
    </div>

    <div class="card" style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px;">
        <div class="cyber-avatar-container">
            <div id="neuralGlow" class="cyber-face"></div>
            <i class="fas fa-angel cyber-logo"></i>
        </div>
        <div id="iaSpeech" class="ia-speech">"Sincronizando con la red regional..."</div>
    </div>

    <div style="display: grid; grid-template-columns: 1.2fr 1fr; gap: 15px;">
        <form id="fReg" class="card">
            <select id="tipo">
                <option value="">-- Tipo de Trámite --</option>
                <option>KIT</option>
                <option>CHIP</option>
                <option>PORTABILIDAD</option>
                <option>RENUEVA</option>
            </select>
            <input id="promotor" placeholder="Tu Nombre Real">
            <input id="tel" type="number" placeholder="Número del Cliente">
            <input id="tienda" placeholder="ID Sucursal">
            <input id="imei" placeholder="IMEI / ICCID (Opcional)">
            <button type="submit" class="btn-register">SINC. VENTA <i class="fas fa-bolt"></i></button>
        </form>

        <div class="card">
            <h3><i class="fas fa-comments"></i> Chat Neural</h3>
            <div id="chatBox" class="chat-box"></div>
            <div style="display:flex; gap:5px; margin-top:10px;">
                <input id="chatMsg" placeholder="Escribe al equipo..." style="margin:0; font-size:12px;">
                <button class="btn-register" style="padding:10px 15px; width:auto;" onclick="enviarChat()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
</div>

<script>
const firebaseConfig={apiKey:"AIzaSyD4UK_j8UxMwOCtrtXlYftBe_wCLE7psMc",authDomain:"ventastelcel4029.firebaseapp.com",projectId:"ventastelcel4029"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

// --- SISTEMA DE VOZ ---
function hablar(texto) {
    const s = window.speechSynthesis;
    const u = new SpeechSynthesisUtterance(texto);
    u.lang = 'es-MX'; u.pitch = 1.3; u.rate = 1.0;
    s.speak(u);
}

// --- AUTH ---
function login(){ auth.signInWithEmailAndPassword(u.value,p.value); }
function logout(){ auth.signOut(); }

auth.onAuthStateChanged(user => {
    loginBox.classList.toggle("hidden", !!user);
    appBox.classList.toggle("hidden", !user);
    if(user) iniciarCerebro();
});

function iniciarCerebro() {
    // 1. Detección Horaria
    const h = new Date().getHours();
    let msg = "";
    if(h < 12) msg = "Buenos días, equipo Telcel. Hoy tenemos la meta de cerrar 15 portabilidades.";
    else if(h < 19) msg = "Buenas tardes. El sistema está sincronizado y listo para tus registros.";
    else msg = "Es tarde, pero aún podemos lograr ese último PayJoy del día.";
    
    iaSpeech.innerText = msg;
    hablar(msg);

    // 2. Escuchar Chat y Ventas
    db.collection("chat").orderBy("ts", "desc").limit(12).onSnapshot(snap => {
        chatBox.innerHTML = snap.docs.map(d => `<div><b style="color:var(--primary)">${d.data().user}:</b> ${d.data().msg}</div>`).reverse().join('');
        chatBox.scrollTop = chatBox.scrollHeight;
    });
}

// --- REGISTRO ---
fReg.onsubmit = async e => {
    e.preventDefault();
    await db.collection("ventas").add({
        uid: auth.currentUser.uid, promotor: promotor.value,
        tipo: tipo.value, cel: tel.value, tienda: tienda.value, 
        imei: imei.value, ts: Date.now()
    });
    
    // Notificar al chat global
    db.collection("chat").add({ 
        user: "IRIS", msg: `🚀 ${promotor.value} subió una venta de ${tipo.value}!`, ts: Date.now() 
    });

    hablar("Venta registrada. He aprendido este nuevo registro, " + promotor.value);
    fReg.reset();
};

function enviarChat(){
    if(!chatMsg.value) return;
    db.collection("chat").add({ 
        user: promotor.value || 'Promotor', 
        msg: chatMsg.value, ts: Date.now() 
    });
    chatMsg.value = "";
}
</script>
</body>
</html>
