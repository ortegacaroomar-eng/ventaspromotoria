<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema Ventas Telcel</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#003566,#001d3d);
color:white;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

/* HEADER */

.header{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:20px;
}

.logo{
font-size:22px;
font-weight:bold;
color:#ffc300;
}

/* CARD */

.card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
border-radius:15px;
padding:20px;
margin-bottom:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

/* INPUTS */

label{
font-size:11px;
color:#ffc300;
font-weight:bold;
}

input,select{

width:100%;
padding:12px;
margin-top:5px;
margin-bottom:10px;

border-radius:8px;
border:none;

background:rgba(255,255,255,0.15);
color:white;

}

/* SCAN INPUT */

.scan-box{
display:flex;
gap:8px;
}

.scan-btn{

background:#00b4d8;
border:none;
border-radius:8px;
padding:10px;
color:white;
cursor:pointer;

}

/* BUTTON */

.btn-main{

background:#ffc300;
color:#001d3d;
padding:14px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
width:100%;

}

/* TABLE */

.table-box{

background:white;
border-radius:10px;
overflow:auto;
color:black;

}

table{

width:100%;
border-collapse:collapse;
font-size:12px;

}

th{

background:#003566;
color:white;
padding:10px;

}

td{

padding:8px;
border-bottom:1px solid #eee;

}

/* SCANNER */

#scanner{

display:none;
background:black;
padding:10px;
border-radius:10px;
margin-top:15px;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="logo">
<i class="fa-solid fa-signal"></i> Ventas Telcel
</div>

</div>

<form id="fReg">

<div class="card">

<label>Tipo venta</label>

<select id="iTipo">
<option>KIT</option>
<option>CHIP</option>
<option>PORTA</option>
<option>RENUEVATE</option>
</select>

<label>Número celular</label>

<div class="scan-box">
<input id="iTel">
<button type="button" class="scan-btn" onclick="abrirScanner('iTel')">
<i class="fa-solid fa-camera"></i>
</button>
</div>

<label>ICCID</label>

<div class="scan-box">
<input id="iIcc">
<button type="button" class="scan-btn" onclick="abrirScanner('iIcc')">
<i class="fa-solid fa-camera"></i>
</button>
</div>

<label>IMEI</label>

<div class="scan-box">
<input id="iIme">
<button type="button" class="scan-btn" onclick="abrirScanner('iIme')">
<i class="fa-solid fa-camera"></i>
</button>
</div>

<label>Marca</label>
<input id="iMarca">

<label>Modelo</label>
<input id="iMod">

<label>Tienda</label>
<input id="iTienda">

<label>Promotor</label>
<input id="iProm">

<button class="btn-main">
Guardar Venta
</button>

</div>

</form>

<div id="scanner">
<div id="reader"></div>
<button class="btn-main" onclick="cerrarScanner()">Cerrar escáner</button>
</div>

<div class="card">

<h3>Ventas registradas</h3>

<div class="table-box">

<table>

<thead>

<tr>
<th>Cel</th>
<th>IMEI</th>
<th>Marca</th>
<th>Modelo</th>
<th>ICCID</th>
<th>Tipo</th>
<th>Tienda</th>
<th></th>
</tr>

</thead>

<tbody id="bodyVentas"></tbody>

</table>

</div>

<button class="btn-main" style="margin-top:10px;" onclick="exportarExcel()">
<i class="fa-solid fa-file-excel"></i> Descargar Excel
</button>

</div>

</div>

<script>

let html5QrCode;
let campoActual=null;

function abrirScanner(campo){

campoActual=campo;

document.getElementById("scanner").style.display="block";

html5QrCode=new Html5Qrcode("reader");

html5QrCode.start(
{facingMode:"environment"},
{fps:10,qrbox:250},

(decodedText)=>{

document.getElementById(campoActual).value=decodedText;

cerrarScanner();

}

);

}

function cerrarScanner(){

if(html5QrCode){

html5QrCode.stop().then(()=>{

document.getElementById("scanner").style.display="none";

});

}

}

document.getElementById("fReg").onsubmit=(e)=>{

e.preventDefault();

const venta={

id:Date.now(),

cel:document.getElementById("iTel").value,
imei:document.getElementById("iIme").value,
marca:document.getElementById("iMarca").value,
modelo:document.getElementById("iMod").value,
iccid:document.getElementById("iIcc").value,
tipo:document.getElementById("iTipo").value,
tienda:document.getElementById("iTienda").value,
promotor:document.getElementById("iProm").value

};

let l=JSON.parse(localStorage.getItem("ventas")||"[]");

l.unshift(venta);

localStorage.setItem("ventas",JSON.stringify(l));

cargar();

e.target.reset();

};

function cargar(){

let l=JSON.parse(localStorage.getItem("ventas")||"[]");

document.getElementById("bodyVentas").innerHTML=l.map(v=>`

<tr>

<td>${v.cel}</td>
<td>${v.imei}</td>
<td>${v.marca}</td>
<td>${v.modelo}</td>
<td>${v.iccid}</td>
<td>${v.tipo}</td>
<td>${v.tienda}</td>

<td>
<button onclick="eliminar(${v.id})">
❌
</button>
</td>

</tr>

`).join("");

}

function eliminar(id){

let l=JSON.parse(localStorage.getItem("ventas")||"[]");

l=l.filter(x=>x.id!==id);

localStorage.setItem("ventas",JSON.stringify(l));

cargar();

}

function exportarExcel(){

let l=JSON.parse(localStorage.getItem("ventas")||"[]");

const ws=XLSX.utils.json_to_sheet(l);
const wb=XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb,ws,"Ventas");

XLSX.writeFile(wb,"ventas_telcel.xlsx");

}

cargar();

</script>

</body>
</html>
