<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Player Local</title>

<style>
body{
    margin:0;
    background:#0f0f0f;
    font-family:Arial,sans-serif;
    color:white;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.player{
    background:black;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 0 20px rgba(0,0,0,.5);
}

video{
    width:100%;
    max-height:550px;
    background:black;
}

.controls{
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px;
    background:#181818;
}

button{
    background:#ff0000;
    border:none;
    color:white;
    padding:10px 14px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#cc0000;
}

input[type="range"]{
    flex:1;
}

.playlist{
    margin-top:20px;
    background:#181818;
    padding:15px;
    border-radius:12px;
}

.video-item{
    padding:10px;
    border-bottom:1px solid #333;
    cursor:pointer;
}

.video-item:hover{
    background:#252525;
}
</style>
</head>
<body>

<div class="container">
    <h1>MiTube Player</h1>

    <input type="file" id="fileInput" accept="video/*" multiple>

    <div class="player">
        <video id="video" controls></video>

        <div class="controls">
            <button onclick="togglePlay()">▶ / ⏸</button>
            <input type="range" id="progress" value="0" min="0" max="100">
            <input type="range" id="volume" min="0" max="1" step="0.1" value="1">
            <button onclick="fullscreen()">⛶</button>
        </div>
    </div>

    <div class="playlist" id="playlist">
        <h3>Videos cargados</h3>
    </div>
</div>

<script>
const video = document.getElementById("video");
const fileInput = document.getElementById("fileInput");
const playlist = document.getElementById("playlist");
const progress = document.getElementById("progress");
const volume = document.getElementById("volume");

let videos = [];

fileInput.addEventListener("change", function(e){
    const files = Array.from(e.target.files);

    files.forEach(file=>{
        const url = URL.createObjectURL(file);

        videos.push({
            name:file.name,
            url:url
        });

        renderPlaylist();
    });

    if(!video.src && videos.length > 0){
        loadVideo(0);
    }
});

function renderPlaylist(){
    playlist.innerHTML = "<h3>Videos cargados</h3>";

    videos.forEach((item,index)=>{
        const div = document.createElement("div");
        div.className = "video-item";
        div.innerText = item.name;
        div.onclick = ()=>loadVideo(index);
        playlist.appendChild(div);
    });
}

function loadVideo(index){
    video.src = videos[index].url;
    video.play();
}

function togglePlay(){
    if(video.paused){
        video.play();
    }else{
        video.pause();
    }
}

video.addEventListener("timeupdate", ()=>{
    progress.value = (video.currentTime / video.duration) * 100 || 0;
});

progress.addEventListener("input", ()=>{
    video.currentTime = (progress.value / 100) * video.duration;
});

volume.addEventListener("input", ()=>{
    video.volume = volume.value;
});

function fullscreen(){
    video.requestFullscreen();
}
</script>

</body>
</html>
