<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventas Telcel PRO</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#003566">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {--amarillo:#ffc300; --azul:#003566; --morado:#8338ec; --rojo:#d90429; --verde:#25D366;}
        body { margin:0; font-family:'Segoe UI',sans-serif; background:linear-gradient(135deg,#001d3d,#003566,#000814); min-height:100vh; color:white; }
        .app { max-width:1200px; margin:auto; padding:15px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap:wrap; gap:10px }
        .gps-card { background: #000; border: 1px solid #00b4d8; padding: 8px 12px; border-radius: 12px; color: #00b4d8; font-size: 11px; display: flex; align-items: center; }
        .reloj-digital { font-family: monospace; font-size: 22px; color: var(--amarillo); font-weight: bold; }
        .card { background:rgba(255,255,255,.08); backdrop-filter:blur(10px); border-radius:15px; padding:15px; margin-bottom:12px; border:1px solid rgba(255,255,255,0.1); }
        label { font-size:10px; font-weight:bold; color:var(--amarillo); text-transform: uppercase; display: block; margin-bottom: 4px; }
        input, select, textarea { width:100%; padding:9px; margin-bottom:8px; border-radius:8px; border:none; background:rgba(255,255,255,.12); color:white; box-sizing: border-box; }
        .btn { padding:12px; border:none; border-radius:10px; font-weight:bold; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; }
        .btn-save { background:var(--amarillo); color:#001d3d; width:100%; }
        .btn-ia { background:var(--morado); color:white; margin:4px 0; width:100%; }
        .hidden { display: none!important; }
        .login-box { max-width: 350px; margin: 80px auto; background: white; padding: 30px; border-radius: 20px; text-align: center; color: #000; }
        .ia-resp { background:rgba(0,0,0,.3); padding:10px; border-radius:8px; margin-top:8px; font-size:13px; white-space:pre-wrap; }
        .badge { background:var(--amarillo); color:#001d3d; padding:3px 8px; border-radius:12px; font-size:11px; }
    </style>
</head>
<body onload="inicio()">

    <div id="loginBox" class="login-box">
        <h3 style="color:#003566;">Acceso Promotores PRO</h3>
        <input id="u" type="email" placeholder="Correo" style="color:black; background:#eee">
        <input id="p" type="password" placeholder="Contraseña" style="color:black; background:#eee">
        <button class="btn btn-save" onclick="manejarAuth()">ENTRAR</button>
    </div>

    <div id="appBox" class="app hidden">
        <div class="top-bar">
            <div class="gps-card"><i class="fa-solid fa-location-dot"></i> <span id="txtGps">Localizando...</span></div>
            <div class="reloj-digital" id="txtReloj">00:00:00</div>
            <button class="badge" onclick="auth.signOut()">Salir</button>
        </div>

        <div class="card" style="border: 1px solid var(--morado)">
            <label><i class="fa-solid fa-robot"></i> ASISTENTE IA TELCEL</label>
            <textarea id="iaPregunta" rows="2" placeholder="Pregunta algo o dicta la venta..."></textarea>
            <div style="display:flex; gap:5px">
                <button class="btn btn-ia" onclick="iaChat()">Preguntar</button>
                <button class="btn btn-ia" onclick="iaSugerirVenta()">Tips Venta</button>
            </div>
            <div id="iaRespuesta" class="ia-resp">Listo para ayudarte...</div>
        </div>

        <form id="fReg">
            <div class="card">
                <label>Tipo de Venta</label>
                <select id="iTipo"><option>KIT</option><option>CHIP</option><option>PORTA</option><option>RENUEVATE</option></select>
                <label>FECHA (DD/MM/YYYY)</label>
                <input id="iFec" readonly>
                <label>NÚMERO TELCEL</label>
                <input id="iTel" type="tel" maxlength="10" required>
                <label>ICCID</label>
                <input id="iIcc" required>
                <label>MARCA/MODELO</label>
                <div style="display:flex; gap:5px">
                    <input id="iMarca" placeholder="Marca">
                    <input id="iMod" placeholder="Modelo">
                </div>
                <button type="submit" class="btn btn-save">💾 GUARDAR REGISTRO</button>
            </div>
        </form>

        <div class="card">
            <label>Ventas del Día</label>
            <div id="listaVentas"></div>
        </div>
    </div>

<script>
    // CONFIGURACIÓN ACTUALIZADA 2026
    const firebaseConfig = {
        apiKey: "AIzaSyD4UK_j8UxMwOCtrtXlYftBe_wCLE7psMc",
        authDomain: "ventastelcel4029.firebaseapp.com",
        databaseURL: "https://ventastelcel4029-default-rtdb.firebaseio.com",
        projectId: "ventastelcel4029",
        storageBucket: "ventastelcel4029.firebasestorage.app",
        messagingSenderId: "480758010888",
        appId: "1:480758010888:web:e948c54f0217536aa9adbd"
    };

    // CLAVE ACTIVA DETECTADA EN CAPTURA 4401.JPG
    const GEMINI_API_KEY = "AIzaSyBayQhTBchml9-uewg0fLFKO99Z8tD0R00"; 

    let db, auth;

    function inicio() {
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        db = firebase.database();
        auth = firebase.auth();

        // Reloj y GPS
        setInterval(() => document.getElementById('txtReloj').innerText = new Date().toLocaleTimeString(), 1000);
        navigator.geolocation.getCurrentPosition(p => {
            document.getElementById('txtGps').innerText = `${p.coords.latitude.toFixed(4)}, ${p.coords.longitude.toFixed(4)}`;
        });

        // Formato DD/MM/YYYY solicitado
        const hoy = new Date();
        document.getElementById('iFec').value = `${String(hoy.getDate()).padStart(2,'0')}/${String(hoy.getMonth()+1).padStart(2,'0')}/${hoy.getFullYear()}`;

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('loginBox').classList.add("hidden");
                document.getElementById('appBox').classList.remove("hidden");
                cargarVentas();
            } else {
                document.getElementById('loginBox').classList.remove("hidden");
                document.getElementById('appBox').classList.add("hidden");
            }
        });
    }

    function manejarAuth() {
        const u = document.getElementById('u').value, p = document.getElementById('p').value;
        auth.signInWithEmailAndPassword(u, p).catch(e => alert("Error: " + e.message));
    }

    // CORRECCIÓN V1BETA PARA EVITAR ERROR "MODEL NOT FOUND"
    async function llamarIA(prompt) {
        const respDiv = document.getElementById('iaRespuesta');
        respDiv.innerText = "Consultando...";
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await res.json();
            const texto = data.candidates[0].content.parts[0].text;
            respDiv.innerText = texto;
            return texto;
        } catch (e) {
            respDiv.innerText = "Error: Verifica tu conexión o clave.";
            return null;
        }
    }

    async function iaChat() {
        const p = document.getElementById('iaPregunta').value;
        if(p) llamarIA(p);
    }

    async function iaSugerirVenta() {
        const tipo = document.getElementById('iTipo').value;
        llamarIA(`Dame un argumento rápido y matón para vender un ${tipo} de Telcel hoy.`);
    }

    document.getElementById('fReg').onsubmit = e => {
        e.preventDefault();
        const venta = {
            id: Date.now(),
            fecha: document.getElementById('iFec').value,
            tel: document.getElementById('iTel').value,
            iccid: document.getElementById('iIcc').value,
            tipo: document.getElementById('iTipo').value,
            marca: document.getElementById('iMarca').value,
            modelo: document.getElementById('iMod').value
        };

        // Guardar Local (Requisito de persistencia)
        let locales = JSON.parse(localStorage.getItem('ventas_locales') || "[]");
        locales.unshift(venta);
        localStorage.setItem('ventas_locales', JSON.stringify(locales));

        // Guardar en Firebase (Nube)
        if(navigator.onLine) db.ref("ventas/" + auth.currentUser.uid).push(venta);

        alert("✓ Guardado correctamente");
        e.target.reset();
        inicio(); // Reset fecha
        cargarVentas();
    };

    function cargarVentas() {
        const lista = document.getElementById('listaVentas');
        const locales = JSON.parse(localStorage.getItem('ventas_locales') || "[]");
        lista.innerHTML = locales.slice(0,5).map(v => `
            <div style="background:rgba(0,0,0,0.2); padding:8px; border-radius:8px; margin-bottom:5px; font-size:12px">
                <b>${v.tel}</b> - ${v.tipo} <br> <small>${v.fecha} | ${v.marca} ${v.modelo}</small>
            </div>
        `).join('');
    }
</script>
</body>
</html>
