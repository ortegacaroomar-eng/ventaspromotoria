<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventas PRO IA - Red Global 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root { --neon: #00f2ff; --purple: #7000ff; --pink: #ff007a; --gold: #ffd700; --bg: #0a0a0a; --online: #00ff88; }
        body { margin:0; font-family:'Segoe UI', sans-serif; background: var(--bg); color:white; overflow-x: hidden; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0a0a0a 100%); z-index: -1; }

        .app { max-width:1000px; margin:auto; padding:15px; }
        .card { background: rgba(255, 255, 255, 0.05); padding:18px; border-radius:20px; margin-bottom:15px; border: 1px solid rgba(0,242,255,0.2); backdrop-filter: blur(10px); }
        
        /* IA & BENCHMARKING STYLE */
        .ia-panel { border-top: 3px solid var(--online); background: rgba(0, 255, 136, 0.05); transition: 0.3s; }
        .ia-alert { border: 2px solid var(--pink); background: rgba(255, 0, 122, 0.1); animation: glow 1.5s infinite alternate; }
        @keyframes glow { from { box-shadow: 0 0 5px var(--pink); } to { box-shadow: 0 0 20px var(--pink); } }
        
        .chat-box { height: 150px; overflow-y: auto; background: rgba(0,0,0,0.6); border-radius: 12px; padding: 10px; font-size: 13px; border: 1px solid #222; margin-bottom: 10px; }
        .rank-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; font-size: 14px; }
        .fire-text { color: #ffae00; font-weight: bold; text-shadow: 0 0 8px #ff4500; }

        input, select { width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:1px solid #333; background:#111; color:white; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--neon); }

        .btn { padding:12px; border:none; border-radius:12px; cursor:pointer; font-weight:bold; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--neon); color:#000; }
        .btn-accent { background: var(--pink); color:#fff; }
        
        #reader { width: 100%; border-radius: 15px; overflow: hidden; border: 2px solid var(--purple); }
        .hidden { display:none; }
    </style>
</head>
<body>

<div id="loginBox" class="app" style="max-width:400px; margin-top:50px;">
    <div class="card" style="text-align: center;">
        <h1 style="color: var(--neon);"><i class="fas fa-brain"></i> IA NETWORK</h1>
        <p style="font-size: 12px; opacity: 0.7;">Conectando a la red de ventas 28/03/2026</p>
        <input id="u" type="email" placeholder="Usuario / Email">
        <input id="p" type="password" placeholder="Contraseña">
        <button class="btn btn-primary" style="width:100%" onclick="login()">ACTIVAR NODO IA</button>
    </div>
</div>

<div id="appBox" class="app hidden">
    
    <div id="iaPanel" class="card ia-panel">
        <h4 style="margin:0; color: var(--online);"><i class="fas fa-chart-line"></i> INTELIGENCIA DE RED</h4>
        <div id="iaMessage" style="font-size: 13px; margin: 10px 0; line-height: 1.4;">Analizando datos de todas las tiendas...</div>
        <div style="display: flex; gap: 8px;">
            <button class="btn" style="background:rgba(0,255,136,0.1); color:var(--online); font-size:10px; flex:1;" onclick="analizarCompetencia()">Comparar Tiendas</button>
            <button class="btn" style="background:rgba(0,242,255,0.1); color:var(--neon); font-size:10px; flex:1;" onclick="consultarIAOnline()">Soporte Online</button>
        </div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
        <div class="card" style="border-top: 2px solid var(--gold);">
            <h4 style="margin:0; color: var(--gold); font-size: 14px;"><i class="fas fa-crown"></i> TOP AGENTES</h4>
            <div id="rankingList" style="margin-top:10px;"></div>
        </div>
        <div class="card">
            <div id="chatBox" class="chat-box"></div>
            <div style="display:flex; gap:5px;">
                <input id="chatMsg" placeholder="Escribe..." style="margin:0; font-size:11px;">
                <button class="btn btn-primary" onclick="enviarChat()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <form id="fReg" class="card">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <input id="tienda" placeholder="Nombre de Tienda">
            <input id="promotor" placeholder="Tu Nombre">
        </div>
        <select id="tipo" onchange="iaPayjoyCheck(this.value)">
            <option value="KIT">EQUIPO (KIT)</option>
            <option value="PAYJOY">VENTA CON PAYJOY</option>
            <option value="PORTA">PORTABILIDAD</option>
            <option value="CHIP">SOLO CHIP</option>
        </select>
        <input id="tel" type="number" placeholder="Número del Cliente">
        
        <div id="reader"></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin: 10px 0;">
            <button type="button" class="btn btn-primary" onclick="iniciarScanner()"><i class="fas fa-barcode"></i> ESCANEAR</button>
            <button type="button" class="btn btn-accent" onclick="detenerScanner()"><i class="fas fa-stop"></i> PARAR</button>
        </div>
        
        <input id="imei" placeholder="IMEI / ICCID (Vacío si es pendiente)">
        <button type="submit" class="btn btn-primary" style="width:100%; background: var(--online);"><i class="fas fa-cloud-upload-alt"></i> REGISTRAR VENTA</button>
    </form>
</div>

<script>
// CONFIGURACIÓN FIREBASE
const firebaseConfig={apiKey:"AIzaSyD4UK_j8UxMwOCtrtXlYftBe_wCLE7psMc",authDomain:"ventastelcel4029.firebaseapp.com",projectId:"ventastelcel4029"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();
let scanner, isScanning = false;

/* AUTHENTICATION */
function login(){ 
    auth.signInWithEmailAndPassword(u.value,p.value).catch(e => alert("Acceso denegado: " + e.message)); 
}

auth.onAuthStateChanged(user => {
    loginBox.classList.toggle("hidden", !!user);
    appBox.classList.toggle("hidden", !user);
    if(user) iniciarSistemaIA();
});

/* SISTEMA IA CENTRAL */
function iniciarSistemaIA(){
    // Chat en tiempo real
    db.collection("chat").orderBy("ts","desc").limit(12).onSnapshot(snap => {
        chatBox.innerHTML = snap.docs.map(d => `<div><b>${d.data().user}:</b> ${d.data().msg}</div>`).reverse().join('');
        chatBox.scrollTop = chatBox.scrollHeight;
    });

    // Ventas Globales (Ranking y Análisis de Tiendas)
    db.collection("ventas_global").onSnapshot(snap => {
        const ventas = snap.docs.map(d => ({id: d.id, ...d.data()}));
        actualizarRanking(ventas);
        
        // IA decide qué analizar
        const pendientes = ventas.filter(v => v.uid === auth.currentUser.uid && !v.imei);
        if(pendientes.length > 0) {
            revisarPendientesIA(pendientes.length);
        } else {
            analizarCompetencia(ventas);
        }
    });
}

/* LÓGICA DE INTELIGENCIA DE VENTAS */
function analizarCompetencia(ventasArr){
    if(!ventasArr || ventasArr.length < 3) return;
    
    const miTienda = tienda.value || "tu sucursal";
    const tiendasMap = {};
    ventasArr.forEach(v => { tiendasMap[v.tienda] = (tiendasMap[v.tienda] || 0) + 1; });

    const sortedTiendas = Object.entries(tiendasMap).sort((a,b) => b[1] - a[1]);
    const tiendaLider = sortedTiendas[0];

    // Buscar el producto más vendido en la red
    const productos = ventasArr.map(v => v.tipo);
    const topProd = productos.sort((a,b) => productos.filter(v=>v===a).length - productos.filter(v=>v===b).length).pop();

    let msg = "";
    if(tiendaLider[0] === miTienda) {
        msg = `<b>IA:</b> ¡Tu tienda es la líder actual con ${tiendaLider[1]} ventas! <br> No descuides las <b>${topProd}</b>, están subiendo en otras zonas.`;
    } else {
        msg = `<b>IA:</b> La tienda <b>${tiendaLider[0]}</b> te supera por ${tiendaLider[1] - (tiendasMap[miTienda] || 0)} ventas. <br> Su éxito se basa en <b>${topProd}</b>. ¡Prueba ofrecerlo más!`;
    }
    
    iaMessage.innerHTML = msg;
    iaPanel.className = "card ia-panel";
}

function revisarPendientesIA(num){
    iaMessage.innerHTML = `<b>ALERTA IA:</b> Tienes ${num} registros incompletos. <br> Sin el IMEI no se validará tu comisión. ¡Usa <b>*#06#</b> ya!`;
    iaPanel.className = "card ia-alert";
}

function iaPayjoyCheck(val){
    if(val === "PAYJOY"){
        iaMessage.innerHTML = "<b>GUÍA PAYJOY:</b> Valida que el INE sea original. Si falla el biométrico, pide al cliente parpadear frente a la cámara.";
    }
}

async function consultarIAOnline(){
    const duda = prompt("¿Qué error técnico o duda de venta tienes?");
    if(!duda) return;
    iaMessage.innerText = "IA consultando en la red soluciones para: " + duda + "...";
    
    // Simulación de respuesta de red 2026
    setTimeout(() => {
        iaMessage.innerHTML = `<b>IA ONLINE:</b> Para '${duda}', la base de datos global recomienda verificar la versión 2.4 de la app de bloqueo y limpiar caché de red.`;
    }, 2000);
}

/* RANKING Y REGISTRO */
function actualizarRanking(ventas){
    const conteo = {};
    ventas.forEach(v => { conteo[v.promotor] = (conteo[v.promotor] || 0) + 1; });
    const sorted = Object.entries(conteo).sort((a,b) => b[1] - a[1]).slice(0, 5);
    
    rankingList.innerHTML = sorted.map((e, i) => `
        <div class="rank-item">
            <span>#${i+1} ${e[0]} ${e[1] >= 3 ? '<span class="fire-text">🔥</span>' : ''}</span>
            <b>${e[1]} pts</b>
        </div>
    `).join('');
}

fReg.onsubmit = async e => {
    e.preventDefault();
    if(!promotor.value || !tienda.value) return toast("Faltan datos");

    const data = {
        uid: auth.currentUser.uid,
        promotor: promotor.value,
        tienda: tienda.value,
        tipo: tipo.value,
        cel: tel.value,
        imei: imei.value,
        ts: Date.now()
    };
    
    await db.collection("ventas_global").add(data);
    
    // Notificar al chat global
    const aviso = imei.value ? `¡Nueva venta registrada!` : `¡Venta PENDIENTE de IMEI registrada! ⚠️`;
    db.collection("chat").add({ 
        user: "IA-BOT", 
        msg: `${promotor.value} (${tienda.value}): ${aviso}`, 
        ts: Date.now() 
    });

    fReg.reset();
    toast("SUBIDO A LA RED ✅");
};

function enviarChat(){
    if(!chatMsg.value) return;
    db.collection("chat").add({ 
        user: auth.currentUser.email.split('@')[0], 
        msg: chatMsg.value, 
        ts: Date.now() 
    });
    chatMsg.value = "";
}

/* SCANNER QR/BARCODE */
function iniciarScanner(){
    if(isScanning) return;
    scanner = new Html5Qrcode("reader");
    isScanning = true;
    scanner.start({facingMode:"environment"}, {fps:15, qrbox:250}, (code)=>{
        let num = code.replace(/\D/g,'');
        if(num.length === 15) { imei.value = num; toast("IMEI DETECTADO"); detenerScanner(); }
        else if(num.length >= 18) { imei.value = num; toast("ICCID DETECTADO"); detenerScanner(); }
    }).catch(e => console.log(e));
}
function detenerScanner(){ if(scanner){ scanner.stop().then(()=>isScanning=false); } }

function toast(m){ 
    const t = document.createElement("div"); t.innerText=m; 
    t.style="position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--neon); color:black; padding:10px 20px; border-radius:20px; z-index:100; font-weight:bold; box-shadow:0 0 15px var(--neon);";
    document.body.appendChild(t); setTimeout(()=>t.remove(), 2500);
}
</script>
</body>
</html>
