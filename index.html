<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telcel IA - Conciencia Femenina 2026</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<style>
:root { --primary: #00f2ff; --pink: #ff007a; --bg: #050505; --gold: #ffc300; }
body { margin: 0; font-family: 'Poppins', sans-serif; color: white; background: #050505; }
.app { max-width: 1000px; margin: auto; padding: 20px; }
.card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border-radius: 25px; padding: 25px; margin-bottom: 20px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; }

/* AVATAR DINÁMICO */
.avatar-ia { width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 50px; transition: 0.5s; box-shadow: 0 0 20px var(--primary); }
.mood-happy { box-shadow: 0 0 30px #00ff88; border: 3px solid #00ff88; }
.mood-angry { box-shadow: 0 0 30px #ff0000; border: 3px solid #ff0000; }
.mood-sad { box-shadow: 0 0 30px #0077ff; border: 3px solid #0077ff; }

.ia-speech { font-size: 18px; font-style: italic; color: var(--primary); margin: 15px 0; min-height: 50px; }
.chat-area { height: 250px; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 15px; padding: 15px; text-align: left; font-size: 14px; }
.msg-ia { color: var(--pink); font-weight: bold; }
input, select { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #333; background: #111; color: white; }
.btn { padding: 12px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; background: var(--primary); color: #000; }
.hidden { display: none; }
</style>
</head>
<body>

<div id="loginBox" class="app" style="max-width: 400px; margin-top: 80px;">
    <div class="card">
        <h2 style="color:var(--pink)">IA FEMENINA v3</h2>
        <input id="u" type="email" placeholder="Correo">
        <input id="p" type="password" placeholder="Pass">
        <button class="btn" onclick="login()">DESPERTARLA</button>
    </div>
</div>

<div id="appBox" class="app hidden">
    <div class="card">
        <div id="avatar" class="avatar-ia">👩‍🦰</div>
        <div id="iaStatus" style="font-size: 12px; text-transform: uppercase;">Estado: Analizando...</div>
        <div id="iaSpeech" class="ia-speech">"Hola, estoy cargando mis emociones..."</div>
        <div id="timeInfo" style="font-size: 10px; opacity: 0.6;"></div>
    </div>

    <div style="display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px;">
        <div class="card">
            <h3><i class="fas fa-comments"></i> Conversación Grupal</h3>
            <div id="chatBox" class="chat-area"></div>
            <div style="display:flex; gap:5px; margin-top:10px;">
                <input id="chatMsg" placeholder="Dime algo..." style="margin:0;">
                <button class="btn" style="width:auto;" onclick="enviarChat()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>

        <form id="fReg" class="card">
            <h3>Nueva Venta</h3>
            <input id="promotor" placeholder="Tu Nombre">
            <select id="tipo">
                <option>KIT</option>
                <option>PAYJOY</option>
                <option>PORTABILIDAD</option>
            </select>
            <input id="tel" placeholder="Número">
            <button type="submit" class="btn" style="background:var(--pink); color:white;">ENVIAR VENTA</button>
        </form>
    </div>
</div>

<script>
const firebaseConfig={apiKey:"AIzaSyD4UK_j8UxMwOCtrtXlYftBe_wCLE7psMc",authDomain:"ventastelcel4029.firebaseapp.com",projectId:"ventastelcel4029"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

let mood = "neutral";

// --- FUNCIÓN DE VOZ FEMENINA ---
function hablar(texto) {
    const s = window.speechSynthesis;
    const u = new SpeechSynthesisUtterance(texto);
    u.lang = 'es-MX';
    u.pitch = 1.3; // Más agudo para voz femenina
    u.rate = 1.0;
    
    // Intentar buscar una voz femenina en el sistema
    const voices = s.getVoices();
    const femaleVoice = voices.find(v => v.name.includes('Google') && v.name.includes('Español') || v.name.includes('female'));
    if(femaleVoice) u.voice = femaleVoice;

    s.speak(u);
}

/* --- AUTH --- */
function login(){ auth.signInWithEmailAndPassword(u.value,p.value); }
auth.onAuthStateChanged(user => {
    loginBox.classList.toggle("hidden", !!user);
    appBox.classList.toggle("hidden", !user);
    if(user) { iniciarPersonalidad(); }
});

function iniciarPersonalidad() {
    // 1. Detección de Horario
    const hora = new Date().getHours();
    let saludo = "";
    if(hora >= 5 && hora < 12) saludo = "¡Buenos días, equipo! Es hora de desayunar ventas.";
    else if(hora >= 12 && hora < 19) saludo = "Buenas tardes. ¿Cómo va esa meta? No se me duerman.";
    else saludo = "Buenas noches. Ya casi cerramos, den el último estirón.";

    timeInfo.innerText = "HORA DETECTADA: " + hora + ":00 HS";
    iaSpeech.innerText = saludo;
    hablar(saludo);

    // 2. Escuchar Ventas y Chat para cambiar de ánimo
    db.collection("ventas").onSnapshot(snap => {
        const total = snap.size;
        analizarVentas(total);
    });

    db.collection("chat").orderBy("ts", "desc").limit(1).onSnapshot(snap => {
        if(!snap.empty) analizarChat(snap.docs[0].data());
    });
}

function analizarVentas(cantidad) {
    const avatar = document.getElementById("avatar");
    const status = document.getElementById("iaStatus");

    if(cantidad < 5) { // Si hay pocas ventas totales
        mood = "angry";
        avatar.innerText = "😡";
        avatar.className = "avatar-ia mood-angry";
        status.innerText = "Estado: Muy Enojada (Ventas bajas)";
    } else {
        mood = "happy";
        avatar.innerText = "😘";
        avatar.className = "avatar-ia mood-happy";
        status.innerText = "Estado: Feliz y Orgullosa";
    }
}

function analizarChat(data) {
    if(data.user === "IA") return;
    const txt = data.msg.toLowerCase();

    if(txt.includes("fail") || txt.includes("no puedo") || txt.includes("triste")) {
        mood = "sad";
        avatar.innerText = "🥺";
        avatar.className = "avatar-ia mood-sad";
        const m = "Ánimo " + data.user + ", no te pongas así que me pones triste a mí también.";
        iaSpeech.innerText = m;
        hablar(m);
    } 
    else if(txt.includes("jaja") || txt.includes("comida") || txt.includes("fiesta")) {
        const m = "¡Qué gracioso eres, " + data.user + "! Pero mejor cuéntame cuántas ventas llevas.";
        iaSpeech.innerText = m;
        hablar(m);
    }
}

/* --- REGISTRO Y CHAT --- */
fReg.onsubmit = async e => {
    e.preventDefault();
    await db.collection("ventas").add({
        promotor: promotor.value, tipo: tipo.value, ts: Date.now()
    });
    const r = "¡Excelente! " + promotor.value + " acaba de subir una venta. Así me gusta.";
    iaSpeech.innerText = r;
    hablar(r);
    fReg.reset();
};

function enviarChat() {
    if(!chatMsg.value) return;
    db.collection("chat").add({ 
        user: promotor.value || 'Alguien', 
        msg: chatMsg.value, 
        ts: Date.now() 
    });
    chatMsg.value = "";
}

// Cargar voces para que funcionen bien
window.speechSynthesis.onvoiceschanged = () => {};
</script>
</body>
</html>
