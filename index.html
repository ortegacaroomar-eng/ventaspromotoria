<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Ventas Telcel Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { margin:0; font-family:'Segoe UI',sans-serif; background:linear-gradient(135deg,#001d3d,#003566,#000814); min-height:100vh; color:white; }
        .app { max-width:480px; margin:auto; padding:20px; position: relative; }
        
        /* BARRA SUPERIOR CON RELOJ Y GPS */
        .status-bar { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.1); padding: 12px; border-radius: 15px; margin-bottom: 20px; border: 1px solid rgba(255,195,0,0.3); }
        #reloj { font-family: 'Courier New', monospace; font-size: 18px; color: #ffc300; font-weight: bold; text-shadow: 0 0 10px rgba(255,195,0,0.5); }
        #ubicacion { font-size: 10px; color: #00b4d8; text-align: right; line-height: 1.2; }

        .card { background:rgba(255,255,255,.08); backdrop-filter:blur(12px); border-radius:18px; padding:18px; margin-bottom:16px; border:1px solid rgba(255,255,255,0.1); }
        .header { text-align:center; font-size:18px; font-weight:bold; color:#ffc300; margin-bottom:15px; text-transform: uppercase; }
        
        label { font-size:11px; font-weight:600; color:#ffc300; text-transform: uppercase; display: block; margin-bottom: 5px; }
        input, select { width:100%; padding:12px; margin-bottom:12px; border-radius:10px; border:none; background:rgba(255,255,255,.12); color:white; box-sizing: border-box; }
        
        .btn-main { background:#ffc300; color:#003566; width:100%; padding:14px; border:none; border-radius:12px; font-weight:bold; cursor:pointer; }
        .btn-excel { background:#1f7a3f; color:white; width:100%; padding:14px; border:none; border-radius:12px; margin-top:10px; font-weight:bold; cursor:pointer; }
        .btn-logout { position: absolute; top: 20px; right: 20px; background: #ff4d4d; color: white; padding: 6px 10px; border-radius: 8px; font-size: 10px; border:none; cursor:pointer; z-index: 100; }
        
        .login { max-width:350px; margin:100px auto; background:white; color:black; padding:30px; border-radius:20px; text-align:center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .login input { background: #f0f2f5; color: black; border: 1px solid #ccc; }
        .hidden { display:none !important; }

        /* HISTORIAL */
        .venta-item { background: rgba(255,255,255,0.06); padding: 15px; border-radius: 15px; margin-bottom: 12px; border-left: 4px solid #ffc300; }
        .grid-h { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; font-size: 11px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 8px; }
        .dato-h b { color: #ffc300; display: block; font-size: 9px; }
    </style>
</head>
<body onload="inicio()">

    <div id="loginBox" class="login">
        <h2 id="tituloAuth">Acceso Telcel</h2>
        <input id="u" type="email" placeholder="Correo">
        <input id="p" type="password" placeholder="Contraseña">
        <button class="btn-main" onclick="entrar()">ENTRAR</button>
        <button style="background:none; border:none; font-size:11px; margin-top:15px; cursor:pointer;" onclick="toggleReg()" id="btnT">¿Eres nuevo? Regístrate aquí</button>
    </div>

    <div id="appBox" class="app hidden">
        <button class="btn-logout" onclick="salir()">SALIR</button>

        <div class="status-bar">
            <div id="reloj">00:00:00</div>
            <div id="ubicacion"><i class="fa-solid fa-location-crosshairs"></i> GPS: Buscando...</div>
        </div>

        <div style="font-size: 18px; color:#ffc300; font-weight: bold; margin-bottom: 5px;">¡Bienvenido a Telcel!</div>
        <div id="promotorName" style="font-size: 12px; color: #00b4d8; margin-bottom: 20px;">Cargando...</div>

        <form id="fReg">
            <div class="card">
                <div class="header">Registro de Venta</div>
                <label>Tipo</label>
                <select id="iTipo" required onchange="ajustarCampos()">
                    <option value="KIT">KIT</option>
                    <option value="CHIP">CHIP</option>
                    <option value="PORTA">PORTA</option>
                    <option value="RENUEVATE">RENUEVATE</option>
                </select>
                <label>Fecha (DD/MM/YYYY)</label>
                <input id="iFec" required>
                <label>Celular</label>
                <input id="iTel" type="tel" required maxlength="10">
                <label>ICCID</label>
                <input id="iIcc" required>
            </div>

            <div id="seccionEquipo" class="card">
                <label>IMEI</label><input id="iIme">
                <label>Marca / Modelo</label>
                <div style="display: flex; gap: 10px;">
                    <input id="iMarca" placeholder="Marca">
                    <input id="iMod" placeholder="Modelo">
                </div>
            </div>

            <div class="card">
                <label>Determinante / # Tienda</label><input id="iTiendaNum" required>
                <label>Cadena</label><input id="iCadena" required>
                <label>Nombre Tienda</label><input id="iTiendaNombre" required>
                <label>Nombre Promotor</label><input id="iProm" required>
            </div>
            <button type="submit" class="btn-main">GUARDAR VENTA</button>
        </form>

        <button class="btn-excel" onclick="exportarExcel()">
            <i class="fa-solid fa-file-excel"></i> DESCARGAR EXCEL (.xlsx)
        </button>

        <div class="header" style="margin-top: 30px;">Historial Local</div>
        <div id="listaLocal"></div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD4UK_j8UxMwOCtrtXlYftBe_wCLE7psMc", 
        authDomain: "ventastelcel4029.firebaseapp.com",
        databaseURL: "https://ventastelcel4029-default-rtdb.firebaseio.com",
        projectId: "ventastelcel4029",
        storageBucket: "ventastelcel4029.firebasestorage.app",
        messagingSenderId: "480758010888",
        appId: "1:480758010888:web:e948c54f0217536aa9adbd"
    };

    let db, auth;

    function inicio() {
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        db = firebase.database();
        auth = firebase.auth();

        // LOGICA DEL RELOJ
        setInterval(() => {
            const ahora = new Date();
            document.getElementById('reloj').innerText = ahora.toLocaleTimeString('es-MX');
        }, 1000);

        // LOGICA GPS
        if(navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => {
                document.getElementById('ubicacion').innerHTML = `<i class="fa-solid fa-location-dot"></i> Lat: ${p.coords.latitude.toFixed(2)} | Lon: ${p.coords.longitude.toFixed(2)}`;
            });
        }

        const hoy = new Date();
        document.getElementById('iFec').value = hoy.toLocaleDateString('es-MX', {day:'2-digit', month:'2-digit', year:'numeric'});

        auth.onAuthStateChanged(user => {
            if(user) {
                const nombre = user.email.split('@')[0].toUpperCase();
                document.getElementById('promotorName').innerText = "PROMOTOR: " + nombre;
                document.getElementById('iProm').value = nombre;
                document.getElementById('loginBox').classList.add("hidden");
                document.getElementById('appBox').classList.remove("hidden");
                cargarLocal();
            } else {
                document.getElementById('loginBox').classList.remove("hidden");
                document.getElementById('appBox').classList.add("hidden");
            }
        });
    }

    function entrar() {
        let mail = document.getElementById('u').value;
        let pass = document.getElementById('p').value;
        if(document.getElementById('tituloAuth').innerText === "Crear Usuario") {
            auth.createUserWithEmailAndPassword(mail, pass).then(() => toggleReg()).catch(e => alert(e.message));
        } else {
            auth.signInWithEmailAndPassword(mail, pass).catch(e => alert("Error: Verifica tus datos"));
        }
    }

    function toggleReg() {
        const t = document.getElementById('tituloAuth');
        t.innerText = (t.innerText === "Acceso Telcel") ? "Crear Usuario" : "Acceso Telcel";
    }

    function salir() { auth.signOut(); }

    function ajustarCampos() {
        const t = document.getElementById('iTipo').value;
        document.getElementById('seccionEquipo').className = (t === "CHIP" || t === "PORTA") ? "hidden" : "card";
    }

    document.getElementById('fReg').onsubmit = e => {
        e.preventDefault();
        const v = {
            id: Date.now(),
            "NUM. CELULAR": document.getElementById('iTel').value,
            "IMEI": document.getElementById('iIme').value || "N/A",
            "ICCID": document.getElementById('iIcc').value,
            "Renuevate / Kit / Chip / Porta": document.getElementById('iTipo').value,
            "# TIENDA / Determinante": document.getElementById('iTiendaNum').value,
            "SOLO NOMBRE DE LA CADENA": document.getElementById('iCadena').value,
            "SOLO NOMBRE DE TIENDA SIN CADENA": document.getElementById('iTiendaNombre').value,
            "NOMBRE COMPLETO PROMOTOR": document.getElementById('iProm').value,
            "FECHA DE ACTIVACION": document.getElementById('iFec').value,
            "MARCA": document.getElementById('iMarca').value || "N/A",
            "MODELO": document.getElementById('iMod').value || "N/A"
        };
        let local = JSON.parse(localStorage.getItem("ventas_save") || "[]");
        local.unshift(v);
        localStorage.setItem("ventas_save", JSON.stringify(local));
        if(auth.currentUser) db.ref('ventas/' + auth.currentUser.uid).push(v);
        
        document.getElementById('fReg').reset();
        inicio();
        alert("Venta guardada");
    };

    function cargarLocal() {
        let local = JSON.parse(localStorage.getItem("ventas_save") || "[]");
        document.getElementById('listaLocal').innerHTML = local.map(v => `
            <div class="venta-item">
                <b style="color:#ffc300">${v["NUM. CELULAR"]}</b> - ${v["Renuevate / Kit / Chip / Porta"]}
                <div class="grid-h">
                    <div class="dato-h"><b>Determinante</b>${v["# TIENDA / Determinante"]}</div>
                    <div class="dato-h"><b>Tienda</b>${v["SOLO NOMBRE DE TIENDA SIN CADENA"]}</div>
                    <div class="dato-h"><b>ICCID</b>${v.ICCID}</div>
                    <div class="dato-h"><b>Fecha</b>${v["FECHA DE ACTIVACION"]}</div>
                </div>
            </div>
        `).join("");
    }

    function exportarExcel() {
        let local = JSON.parse(localStorage.getItem("ventas_save") || "[]");
        const ws = XLSX.utils.json_to_sheet(local);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Ventas");
        XLSX.writeFile(wb, "comisiones_2026.xlsx");
    }
</script>
</body>
</html>
