<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRIS NEXUS PRIME</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root { --iris: #00d4ff; --gold: #ffc300; --bg: #00050a; --alert: #ff2222; }
        body { margin:0; background:var(--bg); color:white; font-family:'Segoe UI', sans-serif; overflow-x:hidden; }
        .app-container { max-width:420px; margin:auto; min-height:100vh; display:flex; flex-direction:column; padding:15px; box-sizing:border-box; }
        
        /* DISEÑO DE ACCESO SIMPLIFICADO */
        .card { background:rgba(255,255,255,0.06); backdrop-filter:blur(15px); border-radius:24px; padding:20px; border:1px solid rgba(255,255,255,0.1); }
        input { width:100%; padding:15px; margin-top:10px; border-radius:12px; border:1px solid #333; background:#000; color:white; box-sizing:border-box; }
        button { width:100%; padding:16px; border:none; border-radius:12px; font-weight:bold; cursor:pointer; text-transform:uppercase; margin-top:15px; }
        .btn-main { background:var(--iris); color:#000; box-shadow: 0 4px 15px rgba(0,212,255,0.3); }
        
        /* EL ÁNGEL ANIMADO */
        .angel-stage { position: relative; width: 100%; height: 250px; display: flex; justify-content: center; align-items: center; margin: 10px 0; }
        .angel-svg { width: 180px; filter: drop-shadow(0 0 15px var(--iris)); animation: float 4s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        
        #pointingArm { opacity: 0; transform: rotate(-90deg); transform-origin: 50px 75px; transition: 0.6s; stroke: var(--iris); stroke-width: 3; fill:none; }
        .crisis #pointingArm { opacity: 1; transform: rotate(15deg); stroke: var(--alert); }
        .crisis .angel-svg { filter: drop-shadow(0 0 25px var(--alert)); }

        .hidden { display:none !important; }
        #stMsg { font-size:12px; text-align:center; color:var(--iris); margin-top:15px; }
    </style>
</head>
<body>

<div class="app-container">
    
    <div id="loginSection">
        <div class="card" style="margin-top:50px; text-align:center;">
            <h1 style="color:var(--gold); margin:0;">NEXUS PRIME</h1>
            <p style="font-size:10px; color:var(--iris); letter-spacing:1px;">V280 • ACCESO DIRECTO</p>
            
            <input id="email" type="email" placeholder="Correo Electrónico">
            <input id="pass" type="password" placeholder="Contraseña">
            
            <button class="btn-main" onclick="doLogin()">VINCULAR CEREBRO</button>
            <div id="stMsg">Listo para conectar</div>
        </div>
    </div>

    <div id="mainSection" class="hidden">
        <div class="angel-stage" id="angelStage" onclick="touchIris()">
            <svg class="angel-svg" viewBox="0 0 100 150">
                <circle cx="50" cy="20" r="12" fill="none" stroke="var(--iris)" stroke-width="1" />
                <path d="M30 50 Q 0 20 10 70 Z" fill="rgba(0,212,255,0.1)" stroke="var(--iris)" />
                <path d="M70 50 Q 100 20 90 70 Z" fill="rgba(0,212,255,0.1)" stroke="var(--iris)" />
                <path d="M50 35 L35 70 L50 105 L65 70 Z" fill="none" stroke="var(--iris)" stroke-width="2" />
                <circle cx="50" cy="25" r="8" fill="none" stroke="var(--iris)" stroke-width="2" />
                <g id="pointingArm"><path d="M55 65 L85 85 L110 85" /><circle cx="112" cy="85" r="3" fill="var(--alert)" /></g>
            </svg>
        </div>
        
        <div id="irisTalk" style="text-align:center; font-size:13px; color:var(--iris); margin-bottom:20px;">Sincronizado</div>

        <div class="card" id="shameZone" style="border-color:var(--alert); text-align:center; margin-bottom:15px;">
            <div id="shameTitle" style="color:var(--alert); font-weight:bold;">RED OPERATIVA</div>
            <div id="shameDetail" style="font-size:11px; opacity:0.6;">Sin alertas de IMEI.</div>
        </div>

        <form id="vForm" class="card">
            <input id="vTel" placeholder="Número de Teléfono" maxlength="10">
            <select id="vTipo" style="margin-top:10px; width:100%; padding:12px; border-radius:10px; background:#000; color:white;">
                <option>KIT</option><option>PORTA</option><option>CHIP</option>
            </select>
            <select id="vImei" style="margin-top:10px; width:100%; padding:12px; border-radius:10px; background:#000; color:white;">
                <option value="no">IMEI OK</option><option value="si">IMEI PENDIENTE</option>
            </select>
            <button class="btn-main" type="submit">GUARDAR VENTA</button>
        </form>
    </div>
</div>

<script>
const config = {
    apiKey: "AIzaSyD4UK_j8UxMwOCtrtXlYftBe_wCLE7psMc",
    authDomain: "ventastelcel4029.firebaseapp.com",
    databaseURL: "https://ventastelcel4029-default-rtdb.firebaseio.com"
};

let db, auth;

function inicio() {
    firebase.initializeApp(config);
    db = firebase.database();
    auth = firebase.auth();
    auth.onAuthStateChanged(u => { if(u) showApp(); });
}

function doLogin() {
    stMsg.innerText = "Entrando...";
    auth.signInWithEmailAndPassword(email.value, pass.value).catch(e => {
        // Si no existe, intenta registrarlo automáticamente
        auth.createUserWithEmailAndPassword(email.value, pass.value).catch(err => stMsg.innerText = "Error de acceso");
    });
}

function showApp() {
    loginSection.classList.add("hidden");
    mainSection.classList.remove("hidden");
    hablar("Acceso concedido Omar. El Ángel está contigo.", "sexy");
    setInterval(scan, 30000);
}

function hablar(t, modo) {
    speechSynthesis.cancel();
    const m = new SpeechSynthesisUtterance(t);
    m.lang = "es-MX";
    m.pitch = (modo === "sexy") ? 1.3 : 0.8;
    speechSynthesis.speak(m);
    irisTalk.innerText = t;
}

function scan() {
    db.ref("ventas").once("value", s => {
        const pen = Object.values(s.val() || {}).filter(v => v.imei === "si");
        if(pen.length > 0) {
            const inf = pen[0];
            document.getElementById("angelStage").classList.add("crisis");
            shameTitle.innerText = "¡ALERTA DE IMEI!";
            shameDetail.innerText = "Revisa el registro de " + inf.tel;
            hablar("Omar, detecto un fallo. Mira hacia donde señalo.", "alert");
        } else {
            document.getElementById("angelStage").classList.remove("crisis");
            shameTitle.innerText = "RED LIMPIA";
        }
    });
}

vForm.onsubmit = e => {
    e.preventDefault();
    db.ref("ventas").push({ tel: vTel.value, tipo: vTipo.value, imei: vImei.value, ts: Date.now() });
    vTel.value = "";
    hablar("Venta registrada perfectamente.", "sexy");
};

inicio();
</script>
</body>
</html>
