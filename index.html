<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA VENTAS INTEGRAL - OMAR ORTEGA 2026</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { margin:0; font-family:'Segoe UI',sans-serif; background:linear-gradient(135deg,#001d3d,#003566,#000814); min-height:100vh; color:white; padding-bottom: 150px; }
        .app { max-width:1100px; margin:auto; padding:20px; }
        .card { background:rgba(255,255,255,.08); border-radius:15px; padding:20px; margin-bottom:15px; border:1px solid rgba(255,255,255,0.1); }
        input, select { width:100%; padding:10px; margin:5px 0; border-radius:8px; border:none; background:rgba(255,255,255,.1); color:white; box-sizing:border-box; }
        .btn-save { background:#ffc300; color:#001d3d; width:100%; padding:15px; border:none; border-radius:10px; font-weight:bold; cursor:pointer; }
        .table-container { overflow-x:auto; background:white; padding:10px; border-radius:10px; color:#333; }
        table { width:100%; border-collapse:collapse; font-size:12px; }
        th { background:#000; color:#fff; padding:10px; text-align:left; }
        td { padding:8px; border:1px solid #ddd; }
        /* Asistente IA */
        .ai-bar { position:fixed; bottom:0; left:0; right:0; background:#000d1a; border-top:3px solid #00b4d8; padding:15px; z-index:9999; }
    </style>
</head>
<body>

<div class="app">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <div id="txtGps"><i class="fa-solid fa-location-dot"></i> Localizando...</div>
        <div id="txtReloj" style="font-size:20px; font-weight:bold; color:#ffc300;">00:00:00</div>
    </div>

    <form id="fReg" onsubmit="guardarVenta(event)">
        <div class="card">
            <label>IMEI</label><input type="text" id="iIme" required>
            <label>MODELO</label><input type="text" id="iMod" required>
            <label>NUM. CELULAR</label><input type="text" id="iTel" required>
            <button type="submit" class="btn-save">GUARDAR VENTA</button>
        </div>
    </form>

    <div class="table-container">
        <table>
            <thead><tr><th>OPERADOR</th><th>MODELO</th><th>CELULAR</th><th>IMEI</th><th>X</th></tr></thead>
            <tbody id="bodyVentas"></tbody>
        </table>
    </div>
</div>

<div class="ai-bar">
    <div id="aiRes" style="margin-bottom:10px; font-size:13px; color:#00b4d8;"></div>
    <div style="display:flex; gap:10px;">
        <input type="text" id="aiIn" placeholder="Consulta IA o busca local (IMEI/Cel)...">
        <button onclick="ejecutarIA()" style="background:#00b4d8; border:none; padding:10px 20px; color:white; border-radius:10px;">CONSULTAR</button>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyDgpNfgkD4BLbJma-0JjAs-fsfxi1f-wdE";
    let ventas = JSON.parse(localStorage.getItem('ventasOmar')) || [];

    // Funciones base
    function guardarVenta(e) {
        e.preventDefault();
        ventas.push({
            IMEI: document.getElementById('iIme').value,
            MODELO: document.getElementById('iMod').value,
            CELULAR: document.getElementById('iTel').value,
            OPERADOR: 'TELCEL'
        });
        localStorage.setItem('ventasOmar', JSON.stringify(ventas));
        renderizar();
        e.target.reset();
    }

    function renderizar() {
        document.getElementById('bodyVentas').innerHTML = ventas.map((v, i) => `
            <tr><td>${v.OPERADOR}</td><td>${v.MODELO}</td><td>${v.CELULAR}</td><td>${v.IMEI}</td>
            <td><button onclick="borrar(${i})">X</button></td></tr>
        `).join('');
    }

    function borrar(i) { ventas.splice(i,1); localStorage.setItem('ventasOmar', JSON.stringify(ventas)); renderizar(); }

    // Motor IA Híbrido
    async function ejecutarIA() {
        const query = document.getElementById('aiIn').value;
        const resDiv = document.getElementById('aiRes');
        
        // Búsqueda Local primero
        const local = ventas.find(v => v.IMEI.includes(query) || v.CELULAR.includes(query));
        if(local) {
            resDiv.innerHTML = `<b>Local:</b> Encontré ${local.MODELO} con IMEI ${local.IMEI}`;
            return;
        }

        // Búsqueda en Nube
        resDiv.innerHTML = "Consultando a la nube...";
        try {
            const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: query }] }] })
            });
            const d = await r.json();
            resDiv.innerHTML = d.candidates[0].content.parts[0].text;
        } catch(e) { resDiv.innerHTML = "Error al conectar con la IA."; }
    }

    // Inicialización
    renderizar();
    setInterval(() => document.getElementById('txtReloj').innerText = new Date().toLocaleTimeString(), 1000);
    navigator.geolocation.getCurrentPosition(p => document.getElementById('txtGps').innerText = `Ubicación activa`);
</script>
</body>
</html>
