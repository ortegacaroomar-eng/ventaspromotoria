<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Ventas PRO</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{font-family:Arial;margin:0;background:#001d3d;color:#fff}
.login{max-width:350px;margin:80px auto;background:#fff;color:#000;padding:20px;border-radius:15px}
input,button{width:100%;padding:10px;margin:5px 0}
.app{padding:20px}
.hidden{display:none}
table{width:100%;background:#fff;color:#000}
th{background:#000;color:#fff}
</style>
</head>

<body onload="inicio()">

<!-- LOGIN -->
<div id="login" class="login">
<h3>Bienvenido</h3>

<button onclick="show('loginForm')">🔑 Ingresar</button>
<button onclick="show('regForm')">🆕 Registrar</button>
<button onclick="show('adminForm')">🔒 Admin</button>

<div id="loginForm" class="hidden">
<input id="u" placeholder="Correo">
<input id="p" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
</div>

<div id="regForm" class="hidden">
<input id="ru" placeholder="Correo">
<input id="rp" type="password" placeholder="Contraseña">
<button onclick="registro()">Crear</button>
</div>

<div id="adminForm" class="hidden">
<input id="au" placeholder="Usuario">
<input id="ap" type="password" placeholder="Pass">
<button onclick="admin()">Entrar Admin</button>
</div>
</div>

<!-- APP -->
<div id="app" class="app hidden">

<h3 id="reloj"></h3>
<div id="direccion"></div>

<form id="fReg">
<input id="iTel" placeholder="Teléfono" required>
<input id="iIcc" placeholder="ICCID" required>
<input id="iProm" placeholder="Promotor" required>
<button>Guardar Venta</button>
</form>

<table>
<thead>
<tr>
<th>Teléfono</th>
<th>ICCID</th>
<th>Promotor</th>
<th>Usuario</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>

</div>

<script>

const config={
apiKey:"TU_API_KEY",
authDomain:"ventastelcel4029.firebaseapp.com",
databaseURL:"https://ventastelcel4029-default-rtdb.firebaseio.com"
};

let auth;
let esAdmin=false;

function inicio(){
firebase.initializeApp(config);
auth=firebase.auth();

// reloj
setInterval(()=>{reloj.innerText=new Date().toLocaleTimeString();},1000);

// GPS + dirección
navigator.geolocation.getCurrentPosition(async p=>{
let lat=p.coords.latitude;
let lon=p.coords.longitude;
try{
let r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
let d=await r.json();
direccion.innerText=d.display_name;
}catch{direccion.innerText=lat+","+lon;}
});

// sesión
auth.onAuthStateChanged(u=>{
if(u){
app.classList.remove("hidden");
login.classList.add("hidden");
cargar();
}else{
login.classList.remove("hidden");
app.classList.add("hidden");
}
});
}

// UI
function show(x){
loginForm.classList.add("hidden");
regForm.classList.add("hidden");
adminForm.classList.add("hidden");
document.getElementById(x).classList.remove("hidden");
}

// AUTH
function login(){auth.signInWithEmailAndPassword(u.value,p.value).catch(e=>alert(e.message));}
function registro(){auth.createUserWithEmailAndPassword(ru.value,rp.value).catch(e=>alert(e.message));}

function admin(){
if(au.value=="admin" && ap.value=="admin123"){
esAdmin=true;
app.classList.remove("hidden");
login.classList.add("hidden");
cargar();
}else{
alert("Error admin");
}
}

// GUARDAR EN FIREBASE
fReg.onsubmit=e=>{
e.preventDefault();
let user=auth.currentUser;
if(!user)return alert("No autenticado");

let v={
tel:iTel.value,
icc:iIcc.value,
prom:iProm.value,
uid:user.uid,
fecha:Date.now()
};

firebase.database().ref("ventas/"+user.uid).push(v);

alert("Venta guardada ☁️");
cargar();
};

// CARGAR DATOS
function cargar(){

// 👑 ADMIN VE TODO
if(esAdmin){

firebase.database().ref("ventas")
.on("value",snap=>{

let data=snap.val()||{};
let total=[];

Object.keys(data).forEach(uid=>{
let ventas=data[uid];

Object.values(ventas).forEach(v=>{
total.push({...v,usuario:uid});
});
});

pintar(total);

});

}else{

// 👤 USUARIO NORMAL
let user=auth.currentUser;
if(!user)return;

firebase.database().ref("ventas/"+user.uid)
.on("value",snap=>{

let data=Object.values(snap.val()||{});
pintar(data);

});

}
}

// PINTAR TABLA
function pintar(lista){
body.innerHTML=lista.map(v=>`
<tr>
<td>${v.tel}</td>
<td>${v.icc}</td>
<td>${v.prom}</td>
<td>${v.usuario||"—"}</td>
</tr>
`).join("");
}

</script>

</body>
</html>
