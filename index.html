<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRIS TELEdata</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;background:#000814;color:white;font-family:'Segoe UI';}
.app{max-width:420px;margin:auto;padding:15px;}
.card{background:rgba(255,255,255,.08);padding:15px;border-radius:15px;margin-bottom:12px;text-align:center;}
input,select{width:100%;padding:10px;margin-top:6px;border-radius:8px;border:none;background:#111;color:white;}
button{width:100%;padding:12px;margin-top:8px;border:none;border-radius:10px;background:#ffc300;font-weight:bold;}
.hidden{display:none;}
#angel{width:120px;animation:float 4s infinite;}
@keyframes float{50%{transform:translateY(-10px);}}
#chatBox{max-height:120px;overflow:auto;font-size:12px;}
</style>
</head>

<body onload="inicio()">

<!-- LOGIN -->
<div id="loginBox" class="app">
<div class="card">
<h2 style="color:#ffc300;">TELEDATA</h2>
<p style="font-size:12px;">Acceso IRIS</p>

<input id="email" placeholder="Correo">
<input id="pass" type="password" placeholder="Contraseña">

<button onclick="authUser()">INICIAR</button>

<div id="status"></div>
</div>
</div>

<!-- APP -->
<div id="appBox" class="app hidden">

<div class="card">
<img id="angel" src="https://i.ibb.co/Xf8X0vV/angel-blue-animated.png">
<div id="status2">IRIS activa</div>
</div>

<div class="card">
<canvas id="grafica"></canvas>
<div id="top"></div>
</div>

<form id="fReg" class="card">
<select id="tipo">
<option>KIT</option>
<option>CHIP</option>
<option>PORTA</option>
<option>RENUEVATE</option>
</select>

<input id="tel" placeholder="Teléfono">

<select id="imei">
<option value="no">IMEI OK</option>
<option value="si">IMEI PENDIENTE</option>
</select>

<button>Guardar Venta</button>
</form>

<div class="card">
<input id="msg" placeholder="Habla con IRIS..." onkeyup="if(event.key==='Enter') enviarChat()">
<div id="chatBox"></div>
</div>

<div id="lista"></div>

</div>

<script>

// CONFIG
const firebaseConfig={
apiKey:"AIzaSyD4UK_j8UxMwOCtrtXlYftBe_wCLE7psMc",
authDomain:"ventastelcel4029.firebaseapp.com",
databaseURL:"https://ventastelcel4029-default-rtdb.firebaseio.com"
};

let auth,db,usuario={},chart;

// MEMORIA
let memoriaIA=JSON.parse(localStorage.getItem("iris_memoria")||"[]");
let ventasOffline=JSON.parse(localStorage.getItem("ventas_offline")||"[]");

// INICIO
function inicio(){
firebase.initializeApp(firebaseConfig);
auth=firebase.auth();
db=firebase.database();

auth.onAuthStateChanged(u=>{
if(u) cargarUsuario(u);
});
}

// LOGIN FUNCIONAL
function authUser(){

let e=email.value.trim();
let p=pass.value.trim();

if(!e||!p){
status.innerText="Ingresa datos";
hablar("Necesito tus datos");
return;
}

status.innerText="Conectando...";
hablar("Conectando al sistema Teledata");

auth.signInWithEmailAndPassword(e,p)
.then(()=>{
status.innerText="Acceso correcto";
hablar("Bienvenido a Teledata");
})
.catch(err=>{

if(err.code==="auth/user-not-found"){

status.innerText="Creando usuario...";
auth.createUserWithEmailAndPassword(e,p)
.then(()=>{
hablar("Bienvenido a Teledata");
});

}else if(err.code==="auth/wrong-password"){

status.innerText="Contraseña incorrecta";
hablar("Contraseña incorrecta");

}else{
status.innerText=err.message;
}

});
}

// CARGAR USUARIO
function cargarUsuario(u){
loginBox.classList.add("hidden");
appBox.classList.remove("hidden");
hablar("Sistema activo");
cargarVentas();
}

// VOZ
function hablar(t){
let m=new SpeechSynthesisUtterance(t);
m.lang="es-MX";
m.rate=0.9;
m.pitch=1.1;
speechSynthesis.speak(m);
status2.innerText=t;
}

// GUARDAR
fReg.onsubmit=e=>{
e.preventDefault();

let v={
tel:tel.value,
tipo:tipo.value,
imei:imei.value,
promotor:email.value,
offline:!navigator.onLine
};

ventasOffline.unshift(v);
localStorage.setItem("ventas_offline",JSON.stringify(ventasOffline));

if(navigator.onLine){
db.ref("ventas").push(v);
hablar("Venta guardada");
}else{
hablar("Guardado sin internet");
}

cargarVentas();
};

// SINCRONIZAR
function sincronizar(){
if(!navigator.onLine)return;

ventasOffline.forEach(v=>{
db.ref("ventas").push(v);
});

ventasOffline=[];
localStorage.removeItem("ventas_offline");

hablar("Datos sincronizados");
}

// CARGAR
function cargarVentas(){

db.ref("ventas").once("value",snap=>{
let online=Object.values(snap.val()||{});
let total=[...ventasOffline,...online];

lista.innerHTML=total.map(v=>`
<div class="card">
${v.tel} - ${v.tipo} ${v.offline?"📡":"☁️"}
</div>`).join("");

grafica(total);
});
}

// GRAFICA
function grafica(l){
let c={KIT:0,CHIP:0,PORTA:0,RENUEVATE:0};
l.forEach(v=>c[v.tipo]++);
if(chart)chart.destroy();
chart=new Chart(document.getElementById("grafica"),{
type:"bar",
data:{labels:Object.keys(c),datasets:[{data:Object.values(c)}]}
});
}

// CHAT IA
function enviarChat(){

let t=msg.value;

memoriaIA.push(t);
localStorage.setItem("iris_memoria",JSON.stringify(memoriaIA));

chatBox.innerHTML+=`<div><b>Tú:</b> ${t}</div>`;

if(navigator.onLine){
hablar("Te escucho");
}else{
let r=memoriaIA[Math.floor(Math.random()*memoriaIA.length)];
hablar("Sin internet recuerdo: "+r);
}

msg.value="";
}

// INTERNET
window.addEventListener("online",()=>{
hablar("Conexión restaurada");
sincronizar();
});

window.addEventListener("offline",()=>{
hablar("Modo sin internet");
});

</script>
</body>
</html>
