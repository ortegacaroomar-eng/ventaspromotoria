<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auditor Telcel PRO | GPS</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body { margin:0; font-family:'Segoe UI', sans-serif; background: #000814; color:white; }
.app { max-width:1100px; margin:auto; padding:20px; }
.card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius:15px; padding:20px; margin-bottom:15px; border: 1px solid rgba(255,255,255,0.1); }
input, select { width:100%; padding:12px; border-radius:10px; border:none; background:rgba(255,255,255,0.2); color:white; margin-bottom:10px; box-sizing: border-box; }
button { background: #ffc300; color:#001d3d; padding:14px; border:none; border-radius:12px; font-weight:bold; cursor:pointer; width:100%; margin-bottom:10px; transition: 0.3s; }
button:hover { opacity: 0.9; transform: scale(1.01); }
.hidden { display:none; }
table { width:100%; background:white; color:black; border-collapse: collapse; border-radius: 10px; overflow: hidden; font-size: 13px; }
td, th { border:1px solid #ddd; padding:10px; text-align: left; }
th { background: #eee; }
.btn-salir { background: #d00000; color: white; width: auto; padding: 5px 15px; float: right; margin-bottom: 10px; }
.btn-del { background: #ff4d4d; color: white; padding: 5px 8px; border-radius: 5px; cursor: pointer; border: none; font-size: 12px; }
.loc-text { font-size: 11px; color: #ffc300; margin-bottom: 10px; display: block; }
</style>
</head>

<body onload="inicio()">

<div id="loginBox" class="card" style="max-width:400px;margin:80px auto;text-align:center;">
    <h2 style="color:#ffc300;">🗂️ Acceso Auditor</h2>
    <input id="correo" type="email" placeholder="Tu Correo">
    <input id="pass" type="password" placeholder="Tu Contraseña">
    <button onclick="login()">ENTRAR</button>
</div>

<div id="appBox" class="app hidden">
    <button class="btn-salir" onclick="salir()">Cerrar Sesión</button>
    <h2 id="saludo" style="color:#ffc300; margin: 0 0 20px 0;">Panel de Ventas</h2>

<div class="card">
    <label>📅 Fecha</label>
    <input type="date" id="fecha">
    <label>📡 Compañía</label>
    <select id="tipo" onchange="mostrarCampos()">
        <option value="TELCEL">TELCEL</option>
        <option value="ATT">AT&T</option>
        <option value="BAIT">BAIT</option>
    </select>
    <span id="ubicacionStatus" class="loc-text">📍 Ubicación lista para registrar</span>
</div>

<div id="telcelBox" class="card">
    <label>Tipo de Proceso</label>
    <select id="tTipo">
        <option value="PORTA">PORTA</option>
        <option value="RENUEVATE">RENUEVATE</option>
        <option value="CHIP">CHIP</option>
        <option value="AK">AK</option>
    </select>
    <input id="tNum" placeholder="Número">
    <input id="tMarca" placeholder="Marca">
    <input id="tModelo" placeholder="Modelo">
    <input id="tIMEI" placeholder="IMEI">
    <input id="tICCID" placeholder="ICCID">
</div>

<div id="attBox" class="card hidden">
    <input id="aNum" placeholder="Número AT&T">
    <input id="aMarca" placeholder="Marca/Modelo">
</div>

<div id="baitBox" class="card hidden">
    <input id="bNum" placeholder="Número BAIT">
    <input id="bMarca" placeholder="Marca/Modelo">
</div>

<button onclick="obtenerUbicacionYGuardar()">💾 REGISTRAR VENTA CON GPS</button>

<div class="card">
    <h3>📋 Historial con Ubicación</h3>
    <div style="overflow-x:auto;">
        <table>
            <thead>
                <tr><th>Fecha</th><th>Número</th><th>Compañía</th><th>Calle/Dirección</th><th>Acción</th></tr>
            </thead>
            <tbody id="cuerpoGral"></tbody>
        </table>
    </div>
</div>

</div>

<script>
const firebaseConfig = { 
    apiKey: "AIzaSyD4UK_j8UxMwOCtrtXlYftBe_wCLE7psMc", 
    authDomain: "ventastelcel4029.firebaseapp.com",
    databaseURL: "https://ventastelcel4029-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
let auth = firebase.auth();
let db = firebase.database();
let todasVentasRaw = {};

function inicio(){
    fecha.value = new Date().toISOString().split("T")[0];
    auth.onAuthStateChanged(user => {
        if(user){
            loginBox.classList.add("hidden");
            appBox.classList.remove("hidden");
            escucharDatos();
        }
    });
}

function escucharDatos() {
    db.ref('ventas').on('value', (snapshot) => {
        todasVentasRaw = snapshot.val() || {};
        cargarTablas();
    });
}

function mostrarCampos(){
    telcelBox.classList.toggle("hidden", tipo.value !== "TELCEL");
    attBox.classList.toggle("hidden", tipo.value !== "ATT");
    baitBox.classList.toggle("hidden", tipo.value !== "BAIT");
}

function login(){ auth.signInWithEmailAndPassword(correo.value, pass.value); }
function salir(){ auth.signOut().then(()=>window.location.reload()); }

// FUNCIÓN PARA OBTENER CALLE REAL
async function obtenerDireccion(lat, lon) {
    try {
        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`);
        const data = await response.json();
        return data.display_name || "Dirección no encontrada";
    } catch (error) {
        return "Error al obtener calle";
    }
}

function obtenerUbicacionYGuardar() {
    if (!navigator.geolocation) {
        alert("Tu navegador no soporta GPS.");
        guardarAlFinal("Ubicación no soportada");
        return;
    }

    document.getElementById("ubicacionStatus").innerText = "Wait... Obteniendo calle real 📍";

    navigator.geolocation.getCurrentPosition(async (position) => {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        const calleReal = await obtenerDireccion(lat, lon);
        guardarAlFinal(calleReal);
    }, () => {
        alert("No se pudo acceder al GPS. Se guardará sin dirección.");
        guardarAlFinal("GPS Desactivado");
    });
}

function guardarAlFinal(direccion) {
    let f = fecha.value;
    let nuevaVenta = {
        comp: tipo.value,
        fecha: f,
        ubicacion: direccion,
        num: (tipo.value === "TELCEL" ? tNum.value : (tipo.value === "ATT" ? aNum.value : bNum.value))
    };

    if(tipo.value === "TELCEL") {
        nuevaVenta.proceso = tTipo.value;
        nuevaVenta.marca = tMarca.value;
        nuevaVenta.modelo = tModelo.value;
        nuevaVenta.imei = tIMEI.value;
        nuevaVenta.iccid = tICCID.value || "N/A";
    }

    db.ref('ventas').push(nuevaVenta).then(() => {
        alert("Venta guardada en: " + direccion);
        document.getElementById("ubicacionStatus").innerText = "📍 Última: " + direccion;
    });
}

function eliminarVenta(id) {
    if(confirm("¿Eliminar?")) db.ref('ventas/' + id).remove();
}

function cargarTablas(){
    cuerpoGral.innerHTML = "";
    const ids = Object.keys(todasVentasRaw).reverse();
    ids.forEach(id => {
        const v = todasVentasRaw[id];
        cuerpoGral.innerHTML += `
            <tr>
                <td>${v.fecha}</td>
                <td>${v.num}</td>
                <td>${v.comp}</td>
                <td style="font-size:10px;">${v.ubicacion || 'Sin dirección'}</td>
                <td><button class="btn-del" onclick="eliminarVenta('${id}')">🗑️</button></td>
            </tr>
        `;
    });
}
</script>
</body>
</html>
