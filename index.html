<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Ventas PRO</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#001d3d">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icon-192.png">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {--amarillo:#ffc300; --azul:#003566; --cyan:#00b4d8; --rojo:#d90429;}
body {
margin:0;
font-family:'Segoe UI', sans-serif;
background: linear-gradient(135deg,#000814,#001d3d,#003566);
color:white;
min-height:100vh;
}
.app { max-width:1100px; margin:auto; padding:20px; }
.card {
background: rgba(255,255,255,0.08);
backdrop-filter: blur(12px);
border-radius:16px;
padding:20px;
margin-bottom:15px;
border:1px solid rgba(255,255,255,.1);
box-shadow:0 8px 32px rgba(0,0,0,.3);
}
input, select {
width:100%;
padding:12px;
border-radius:10px;
border:none;
background:rgba(255,255,255,0.12);
color:white;
margin-bottom:10px;
box-sizing:border-box;
}
input::placeholder{color:#ccc;}
button {
background: linear-gradient(135deg,#ffd60a,#ffc300);
color:#000814;
padding:14px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
width:100%;
margin-top:5px;
transition:.3s;
}
button:hover{transform:scale(1.02); box-shadow:0 5px 20px rgba(255,195,0,.4);}
.hidden { display:none; }
table { width:100%; background:white; color:black; border-radius:10px; overflow:hidden;}
td, th { border-bottom:1px solid #eee; padding:10px; text-align:left;}
th{background:#003566; color:white;}
.header { text-align:center; font-size:26px; color:var(--amarillo); font-weight:900; text-shadow:0 0 15px rgba(255,195,0,.5);}
.lider{
background:linear-gradient(135deg,rgba(255,195,0,.25),rgba(255,195,0,.1));
border:2px solid var(--amarillo);
padding:16px;
border-radius:16px;
text-align:center;
animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,195,0,.4)}50%{box-shadow:0 0 0 10px rgba(255,195,0,0)}}
.corona{font-size:32px; animation:bounce 1s infinite;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.barra-compania{display:flex; align-items:center; margin:8px 0; gap:10px;}
.barra-fondo{flex:1; background:rgba(255,255,255,.1); height:24px; border-radius:12px; overflow:hidden;}
.barra-progreso{height:100%; transition:width.8s ease; display:flex; align-items:center; justify-content:flex-end; padding-right:8px; font-size:11px; font-weight:bold;}
.label-comp{width:65px; font-weight:bold; font-size:13px;}
#captchaText{background:#000; color:var(--amarillo); padding:8px; border-radius:8px; letter-spacing:3px; font-weight:bold; display:inline-block; margin:5px 0;}
.install-banner{background:var(--amarillo); color:#000814; padding:12px; text-align:center; font-weight:bold; cursor:pointer; display:none; position:sticky; top:0; z-index:100;}
.msg { margin:10px 0; color:#ff4d4d; font-size:12px; min-height:16px; text-align:center; }
</style>
</head>

<body onload="inicio()">

<div id="installBanner" class="install-banner" onclick="instalarApp()">
    📲 INSTALAR APP EN TU CELULAR
</div>

<!-- LOGIN -->
<div id="loginBox" class="card" style="max-width:400px;margin:80px auto;text-align:center;">
<h2>🔐 Acceso PRO</h2>
<input id="correo" type="email" placeholder="Correo">
<input id="pass" type="password" placeholder="Contraseña">
<div style="background:#f1f1f1; padding:10px; border-radius:10px; margin:10px 0; color:black;">
<div>Captcha: <span id="captchaText"></span></div>
<input id="captchaInput" placeholder="Escribe el código" style="background:white; color:black;">
</div>
<button onclick="login()">Entrar</button>
<button onclick="registro()">Registrar</button>
<button onclick="recuperar()">¿Olvidaste contraseña?</button>
<div id="msgLogin" class="msg"></div>
</div>

<!-- APP -->
<div id="appBox" class="app hidden">

<div class="header">🔥 SISTEMA VENTAS PRO</div>

<!-- COMPAÑÍA LÍDER -->
<div id="liderCompania"></div>

<div class="card">
<label>📅 Fecha de filtro</label>
<input type="date" id="fecha" onchange="actualizarTodo()">
</div>

<div class="card">
<select id="tipo" onchange="mostrar()">
<option value="TELCEL">TELCEL</option>
<option value="ATT">AT&T</option>
<option value="BAIT">BAIT</option>
</select>
</div>

<!-- TELCEL -->
<div id="telcelBox" class="card">
<select id="tTipo">
<option>RENUEVATE</option>
<option>CHIP</option>
<option>PORTA</option>
</select>
<input id="tNum" placeholder="Número" maxlength="10">
<input id="tICCID" placeholder="ICCID">
<input id="tIMEI" placeholder="IMEI">
<input id="tMarca" placeholder="Marca">
</div>

<!-- ATT -->
<div id="attBox" class="card hidden">
<select id="aChip">
<option value="NO">NO CHIP TELCEL</option>
<option value="SI">SI CHIP TELCEL</option>
</select>
<input id="aNum" placeholder="Número" maxlength="10">
<input id="aICCID" placeholder="ICCID">
<input id="aMarca" placeholder="Marca">
</div>

<!-- BAIT -->
<div id="baitBox" class="card hidden">
<select id="bChip">
<option value="NO">NO CHIP TELCEL</option>
<option value="SI">SI CHIP TELCEL</option>
</select>
<input id="bNum" placeholder="Número" maxlength="10">
<input id="bICCID" placeholder="ICCID">
<input id="bMarca" placeholder="Marca">
</div>

<button onclick="guardar()">💾 Guardar Venta</button>

<div class="card">
<h3 style="margin-top:0; color:var(--amarillo)">📊 Resumen por Compañía</h3>
<div id="resumenCompanias"></div>
</div>

<div class="card">
<canvas id="grafica"></canvas>
</div>

<button onclick="reporte()">📄 Generar Reporte Word</button>
<button onclick="salir()" style="background:linear-gradient(135deg,#d90429,#9d0208); color:white;">🚪 Cerrar Sesión</button>

<div class="card">
<table>
<thead>
<tr><th>Comp</th><th>Número</th><th>Marca</th><th>Chip</th><th>Fecha</th></tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

</div>

<audio id="sonidoGuardar" src="https://cdn.pixabay.com/audio/2022/03/15/audio_2b28c3e4a8.mp3"></audio>

<script>

/* FIREBASE COMPLETO - YA NO FALLA */
const firebaseConfig = {
apiKey: "AIzaSyD4UK_j8UxMwOCtrtXlYftBe_wCLE7psMc",
authDomain: "ventastelcel4029.firebaseapp.com",
databaseURL: "https://ventastelcel4029-default-rtdb.firebaseio.com",
projectId: "ventastelcel4029",
storageBucket: "ventastelcel4029.firebasestorage.app",
messagingSenderId: "480758010888",
appId: "1:480758010888:web:e948c54f0217536aa9adbd"
};

firebase.initializeApp(firebaseConfig);
let auth = firebase.auth();
let db = firebase.database();
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

let chart;
let deferredPrompt;

/* PWA */
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBanner').style.display = 'block';
});

function instalarApp(){
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
        document.getElementById('installBanner').style.display = 'none';
    });
}

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}

/* CAPTCHA */
let captcha="";
function generarCaptcha(){
let chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
captcha="";
for(let i=0;i<5;i++){
captcha+=chars[Math.floor(Math.random()*chars.length)];
}
document.getElementById('captchaText').innerText=captcha;
}

/* INICIO */
function inicio(){
generarCaptcha();
document.getElementById('fecha').value=new Date().toISOString().split("T")[0];

auth.onAuthStateChanged(user=>{
if(user){
document.getElementById('loginBox').classList.add("hidden");
document.getElementById('appBox').classList.remove("hidden");
actualizarTodo();
}else{
document.getElementById('loginBox').classList.remove("hidden");
document.getElementById('appBox').classList.add("hidden");
}
});
}

/* LOGIN */
function login(){
if(document.getElementById('captchaInput').value!==captcha){
document.getElementById('msgLogin').innerText="Captcha incorrecto";
generarCaptcha();
return;
}
auth.signInWithEmailAndPassword(document.getElementById('correo').value.trim(),document.getElementById('pass').value)
.catch(e=>{
document.getElementById('msgLogin').innerText = e.code==="auth/user-not-found"? "Usuario no registrado" :
e.code==="auth/wrong-password"? "Contraseña incorrecta" : e.message;
generarCaptcha();
});
}

/* REGISTRO */
function registro(){
auth.createUserWithEmailAndPassword(document.getElementById('correo').value.trim(),document.getElementById('pass').value)
.then(()=> {
    document.getElementById('msgLogin').style.color='#2a9d8f';
    document.getElementById('msgLogin').innerText="Registrado. Ahora da clic en Entrar";
})
.catch(e=>document.getElementById('msgLogin').innerText=e.message);
}

/* RECUPERAR */
function recuperar(){
auth.sendPasswordResetEmail(document.getElementById('correo').value)
.then(()=>alert("Correo de recuperación enviado"))
.catch(e=>alert(e.message));
}

function salir(){
    auth.signOut();
}

/* UI */
function mostrar(){
document.getElementById('telcelBox').classList.add("hidden");
document.getElementById('attBox').classList.add("hidden");
document.getElementById('baitBox').classList.add("hidden");

if(document.getElementById('tipo').value==="TELCEL") document.getElementById('telcelBox').classList.remove("hidden");
if(document.getElementById('tipo').value==="ATT") document.getElementById('attBox').classList.remove("hidden");
if(document.getElementById('tipo').value==="BAIT") document.getElementById('baitBox').classList.remove("hidden");
}

/* FORMATO FECHA CORREGIDO */
function formatoFecha(f){
    const fecha = new Date(f + 'T00:00:00');
    return fecha.toLocaleDateString('es-MX', {day:'2-digit', month:'2-digit', year:'numeric'});
}

/* GUARDAR */
function guardar(){
let f=formatoFecha(document.getElementById('fecha').value);
let data=JSON.parse(localStorage.getItem("gen")||"[]");
let tipo = document.getElementById('tipo').value;

let venta = {comp:tipo, fecha:f, id:Date.now()};

if(tipo==="TELCEL"){
    if(!document.getElementById('tNum').value){alert("Falta número"); return;}
    venta.tipo=document.getElementById('tTipo').value;
    venta.num=document.getElementById('tNum').value;
    venta.iccid=document.getElementById('tICCID').value;
    venta.imei=document.getElementById('tIMEI').value;
    venta.marca=document.getElementById('tMarca').value || "N/A";
    venta.chip="N/A";
}

if(tipo==="ATT"){
    if(!document.getElementById('aNum').value){alert("Falta número"); return;}
    venta.num=document.getElementById('aNum').value;
    venta.iccid=document.getElementById('aICCID').value;
    venta.marca=document.getElementById('aMarca').value || "N/A";
    venta.chip=document.getElementById('aChip').value;
}

if(tipo==="BAIT"){
    if(!document.getElementById('bNum').value){alert("Falta número"); return;}
    venta.num=document.getElementById('bNum').value;
    venta.iccid=document.getElementById('bICCID').value;
    venta.marca=document.getElementById('bMarca').value || "N/A";
    venta.chip=document.getElementById('bChip').value;
}

data.unshift(venta);
localStorage.setItem("gen",JSON.stringify(data));

// Sonido
document.getElementById('sonidoGuardar').play();

// Limpiar campos
if(tipo==="TELCEL"){document.getElementById('tNum').value='';document.getElementById('tICCID').value='';document.getElementById('tIMEI').value='';document.getElementById('tMarca').value='';}
if(tipo==="ATT"){document.getElementById('aNum').value='';document.getElementById('aICCID').value='';document.getElementById('aMarca').value='';}
if(tipo==="BAIT"){document.getElementById('bNum').value='';document.getElementById('bICCID').value='';document.getElementById('bMarca').value='';}

actualizarTodo();
}

/* ACTUALIZAR TODO */
function actualizarTodo(){
    cargar();
    actualizarGrafica();
    mostrarLider();
    resumenCompanias();
}

/* TABLA */
function cargar(){
let data=JSON.parse(localStorage.getItem("gen")||"[]");
let fechaFiltro = formatoFecha(document.getElementById('fecha').value);
let dataFiltrada = data.filter(v => v.fecha === fechaFiltro);

document.getElementById('tabla').innerHTML=dataFiltrada.slice(0,20).map(v=>`
<tr>
<td><b>${v.comp}</b></td>
<td>${v.num}</td>
<td>${v.marca}</td>
<td>${v.chip}</td>
<td>${v.fecha}</td>
</tr>
`).join("");
}

/* COMPAÑÍA LÍDER */
function mostrarLider(){
    let data=JSON.parse(localStorage.getItem("gen")||"[]");
    let fechaFiltro = formatoFecha(document.getElementById('fecha').value);
    let dataDia = data.filter(v => v.fecha === fechaFiltro);

    if(dataDia.length === 0){
        document.getElementById('liderCompania').innerHTML = '<div class="card" style="text-align:center;">No hay ventas en esta fecha</div>';
        return;
    }

    let conteo = {TELCEL:0, ATT:0, BAIT:0};
    dataDia.forEach(v => conteo[v.comp]++);

    let total = dataDia.length;
    let ordenado = Object.entries(conteo).sort((a,b) => b[1] - a[1]);
    let lider = ordenado[0];

    let porcLider = ((lider[1]/total)*100).toFixed(1);
    let colorLider = lider[0] === 'TELCEL'? '#003566' : lider[0] === 'ATT'? '#00b4d8' : '#ffc300';
    let emojiLider = lider[0] === 'TELCEL'? '📱' : lider[0] === 'ATT'? '📶' : '🚀';

    let html = `
        <div class="lider" style="border-color:${colorLider}">
            <div class="corona">👑</div>
            <div style="color:${colorLider}; font-size:20px;">${emojiLider} ${lider[0]} ES LÍDER</div>
            <div style="font-size:16px; margin-top:6px;">${lider[1]} ventas - ${porcLider}% del día</div>
        </div>
    `;

    document.getElementById('liderCompania').innerHTML = html;
}

/* RESUMEN CON BARRAS */
function resumenCompanias(){
    let data=JSON.parse(localStorage.getItem("gen")||"[]");
    let fechaFiltro = formatoFecha(document.getElementById('fecha').value);
    let dataDia = data.filter(v => v.fecha === fechaFiltro);

    let t=0,a=0,b=0;
    dataDia.forEach(v=>{
        if(v.comp==="TELCEL") t++;
        if(v.comp==="ATT") a++;
        if(v.comp==="BAIT") b++;
    });

    let total = dataDia.length || 1;

    document.getElementById('resumenCompanias').innerHTML = `
        <div class="barra-compania">
            <div class="label-comp" style="color:#003566;">TELCEL</div>
            <div class="barra-fondo">
                <div class="barra-progreso" style="background:#003566; width:${(t/total)*100}%">${t}</div>
            </div>
            <b>${(t/total*100).toFixed(0)}%</b>
        </div>
        <div class="barra-compania">
            <div class="label-comp" style="color:#00b4d8;">ATT</div>
            <div class="barra-fondo">
                <div class="barra-progreso" style="background:#00b4d8; width:${(a/total)*100}%">${a}</div>
            </div>
            <b>${(a/total*100).toFixed(0)}%</b>
        </div>
        <div class="barra-compania">
            <div class="label-comp" style="color:#ffc300;">BAIT</div>
            <div class="barra-fondo">
                <div class="barra-progreso" style="background:#ffc300; width:${(b/total)*100}%">${b}</div>
            </div>
            <b>${(b/total*100).toFixed(0)}%</b>
        </div>
        <div style="margin-top:10px; text-align:center; font-size:18px;">
            <b>Total del día: ${dataDia.length} ventas</b>
        </div>
    `;
}

/* GRAFICA CORREGIDA */
function actualizarGrafica(){
let data=JSON.parse(localStorage.getItem("gen")||"[]");
let f=formatoFecha(document.getElementById('fecha').value);

let t=0,a=0,b=0;
data.forEach(v=>{
if(v.fecha!==f) return;
if(v.comp==="TELCEL") t++;
if(v.comp==="ATT") a++;
if(v.comp==="BAIT") b++;
});

let maxValor = Math.max(t,a,b);
const ctx=document.getElementById("grafica").getContext("2d");

let datos={
labels:["Telcel","AT&T","BAIT"],
datasets:[{
    label:`Ventas ${f}`,
    data:[t,a,b],
    backgroundColor:[
        t === maxValor && t > 0? '#ffd60a' : '#003566',
        a === maxValor && a > 0? '#ffd60a' : '#00b4d8',
        b === maxValor && b > 0? '#ffd60a' : '#ffc300'
    ],
    borderWidth:2,
    borderColor:'#000814'
}]
};

if(chart){
chart.data=datos;
chart.update();
}else{
chart=new Chart(ctx,{
    type:"bar",
    data:datos,
    options:{
        responsive:true,
        plugins:{legend:{display:false}},
        scales:{
            y:{beginAtZero:true, ticks:{color:'white'}, grid:{color:'rgba(255,255,255,.1)'}},
            x:{ticks:{color:'white'}, grid:{display:false}}
        }
    }
});
}
}

/* REPORTE */
function reporte(){
let data=JSON.parse(localStorage.getItem("gen")||"[]");
let f=formatoFecha(document.getElementById('fecha').value);
let dataDia = data.filter(v => v.fecha === f);

if(dataDia.length===0){
alert("No hay datos para esta fecha");
return;
}

let t=0,a=0,b=0;
dataDia.forEach(v=>{
if(v.comp==="TELCEL") t++;
if(v.comp==="ATT") a++;
if(v.comp==="BAIT") b++;
});

let lider = t>a && t>b? 'TELCEL' : a>b? 'AT&T' : 'BAIT';

let contenido=`
<!DOCTYPE html>
<html>
<body style="font-family:Arial; padding:20px;">
<h1>REPORTE DE VENTAS PRO</h1>
<h2>Fecha: ${f}</h2>
<h3>🏆 Compañía Líder: ${lider}</h3>
<table border="1" cellpadding="10" style="border-collapse:collapse; width:100%; margin:20px 0;">
<tr style="background:#003566; color:white;"><th>Compañía</th><th>Ventas</th><th>Porcentaje</th></tr>
<tr><td><b>Telcel</b></td><td>${t}</td><td>${(t/dataDia.length*100).toFixed(1)}%</td></tr>
<tr><td><b>AT&T</b></td><td>${a}</td><td>${(a/dataDia.length*100).toFixed(1)}%</td></tr>
<tr><td><b>BAIT</b></td><td>${b}</td><td>${(b/dataDia.length*100).toFixed(1)}%</td></tr>
<tr style="background:#ffc300; color:#000814;"><td><b>TOTAL</b></td><td><b>${dataDia.length}</b></td><td><b>100%</b></td></tr>
</table>
<h3>Detalle de Ventas</h3>
<table border="1" cellpadding="8" style="border-collapse:collapse; width:100%;">
<tr style="background:#003566; color:white;"><th>Comp</th><th>Número</th><th>Marca</th><th>Chip</th></tr>
${dataDia.map(v=>`
<tr>
<td><b>${v.comp}</b></td>
<td>${v.num}</td>
<td>${v.marca}</td>
<td>${v.chip}</td>
</tr>`).join("")}
</table>
<p style="margin-top:30px; color:#666;">Generado: ${new Date().toLocaleString('es-MX')}</p>
</body>
</html>
`;

let blob=new Blob(['\ufeff',contenido],{type:"application/msword"});
let url=URL.createObjectURL(blob);
let link=document.createElement("a");
link.href=url;
link.download=`Reporte_Ventas_${f.replace(/\//g,'-')}.doc`;
document.body.appendChild(link);
link.click();
document.body.removeChild(link);
}

</script>

</body>
</html>
