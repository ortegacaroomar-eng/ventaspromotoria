<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SISTEMA VENTAS 4029</title>
<style>
body { font-family: Arial; margin:0; background:#f4f7f6; }
.header { background:#003566; color:#fff; padding:15px; text-align:center; }
.container { max-width:450px; margin:auto; background:#fff; padding:20px; }
input, select, button { width:100%; padding:12px; margin:6px 0; }

</head>
<body onload="inicio()"><div id="login">
<h3>Login</h3>
<input id="u" placeholder="Correo">
<input id="p" placeholder="Contraseña">
<button onclick="entrar()">Entrar</button>
</div><div id="panel" class="hidden">
<div class="header">SISTEMA 4029</div>
<div class="container"><input id="iProm" placeholder="Promotor">
<input id="iTel" placeholder="Teléfono">
<button onclick="guardar()">Guardar</button><div id="lista"></div><!-- ADMIN PRO --><div class="admin-box">
<h4>🔒 Panel Administrador PRO</h4>
<input id="adminPass" placeholder="Contraseña admin">
<select id="filtroTiempo">
<option value="todos">Todo</option>
<option value="mes">Este mes</option>
<option value="anio">Este año</option>
</select>
<button onclick="verAdmin()">Ver análisis</button><div id="adminStats"></div>
<div id="adminData"></div>
</div></div>
</div><script>
let uA="";

function inicio(){
const s=localStorage.getItem('ses');
if(s){uA=s; mostrar();}
}

function entrar(){
const u=document.getElementById('u').value;
const p=document.getElementById('p').value;
let db=JSON.parse(localStorage.getItem('users')||"{}");
if(db[u]&&db[u]==p){
uA=u;
localStorage.setItem('ses',u);
mostrar();
}else alert("Error");
}

function mostrar(){
document.getElementById('login').classList.add('hidden');
document.getElementById('panel').classList.remove('hidden');
pintar();
}

function guardar(){
let d=JSON.parse(localStorage.getItem('ventas_'+uA)||"[]");
d.push({
prom: iProm.value,
tel: iTel.value,
fecha: new Date().toISOString()
});
localStorage.setItem('ventas_'+uA,JSON.stringify(d));
pintar();
}

function pintar(){
let d=JSON.parse(localStorage.getItem('ventas_'+uA)||"[]");
let html="";
d.forEach(x=>{
html+=`<div>${x.prom} - ${x.tel}</div>`;
});
document.getElementById('lista').innerHTML=html;
}

// ADMIN PRO
function verAdmin(){
const pass=document.getElementById('adminPass').value;
const filtro=document.getElementById('filtroTiempo').value;

if(pass!=="admin123"){
alert("Acceso denegado"); return;
}

let total=0;
let promotores={};
let html="";

for(let key in localStorage){
if(key.startsWith('ventas_')){
let user=key.replace('ventas_','');
let data=JSON.parse(localStorage.getItem(key));

html+=`<h5>${user}</h5>`;

data.forEach(v=>{
let f=new Date(v.fecha);
let ahora=new Date();

let incluir=true;
if(filtro==="mes"){
incluir = f.getMonth()===ahora.getMonth() && f.getFullYear()===ahora.getFullYear();
}
if(filtro==="anio"){
incluir = f.getFullYear()===ahora.getFullYear();
}

if(incluir){

if(!promotores[v.prom]) promotores[v.prom]=0;

// ranking
let ranking = Object.entries(promotores).sort((a,b)=>b[1]-a[1]);

</script></body>
</html>
