<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Ventas PRO</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
margin:0;
font-family:'Segoe UI', sans-serif;
background: linear-gradient(135deg,#001d3d,#003566,#000814);
color:white;
}

.app { max-width:1100px; margin:auto; padding:20px; }

.card {
background: rgba(255,255,255,0.08);
backdrop-filter: blur(12px);
border-radius:16px;
padding:20px;
margin-bottom:15px;
}

input, select {
width:100%;
padding:12px;
border-radius:10px;
border:none;
background:rgba(255,255,255,0.12);
color:white;
margin-bottom:10px;
}

button {
background: linear-gradient(135deg,#ffc300,#ffd60a);
color:#001d3d;
padding:14px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

.hidden { display:none; }

table { width:100%; background:white; color:black; }
td, th { border:1px solid #ddd; padding:8px; }
</style>
</head>

<body onload="inicio()">

<!-- LOGIN -->
<div id="loginBox" class="card" style="max-width:400px;margin:80px auto;text-align:center;">
<h2>🔐 Acceso</h2>

<input id="correo" type="email" placeholder="Correo">
<input id="pass" type="password" placeholder="Contraseña">

<div style="background:#000;padding:10px;border-radius:10px;">
<span id="captchaText"></span>
<input id="captchaInput" placeholder="Escribe el código">
</div>

<button onclick="login()">Entrar</button>
<button onclick="registro()">Registrar</button>
<button onclick="recuperar()">¿Olvidaste contraseña?</button>
</div>

<!-- APP -->
<div id="appBox" class="app hidden">

<div class="card">
<label>📅 Fecha</label>
<input type="date" id="fecha">
</div>

<div class="card">
<select id="tipo" onchange="mostrar()">
<option value="TELCEL">TELCEL</option>
<option value="ATT">AT&T</option>
<option value="BAIT">BAIT</option>
</select>
</div>

<!-- TELCEL -->
<div id="telcelBox" class="card">
<select id="tTipo">
<option>RENUEVATE</option>
<option>CHIP</option>
<option>PORTA</option>
</select>
<input id="tNum" placeholder="Número">
<input id="tICCID" placeholder="ICCID">
<input id="tIMEI" placeholder="IMEI">
<input id="tMarca" placeholder="Marca">
</div>

<!-- ATT -->
<div id="attBox" class="card hidden">
<select id="aChip">
<option value="NO">NO CHIP TELCEL</option>
<option value="SI">SI CHIP TELCEL</option>
</select>
<input id="aNum" placeholder="Número">
<input id="aICCID" placeholder="ICCID">
<input id="aMarca" placeholder="Marca">
</div>

<!-- BAIT -->
<div id="baitBox" class="card hidden">
<select id="bChip">
<option value="NO">NO CHIP TELCEL</option>
<option value="SI">SI CHIP TELCEL</option>
</select>
<input id="bNum" placeholder="Número">
<input id="bICCID" placeholder="ICCID">
<input id="bMarca" placeholder="Marca">
</div>

<button onclick="guardar()">💾 Guardar Venta</button>

<div class="card">
<canvas id="grafica"></canvas>
</div>

<button onclick="reporte()">📄 Generar Reporte Word</button>

<div class="card">
<table>
<thead>
<tr>
<th>Comp</th>
<th>Número</th>
<th>Marca</th>
<th>Chip</th>
<th>Fecha</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

</div>

<script>

/* FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyD4UK_j8UxMwOCtrtXlYftBe_wCLE7psMc",
authDomain: "ventastelcel4029.firebaseapp.com"
};

firebase.initializeApp(firebaseConfig);
let auth = firebase.auth();

/* CAPTCHA */
let captcha="";
function generarCaptcha(){
let chars="ABCDEFG123456789";
captcha="";
for(let i=0;i<5;i++){
captcha+=chars[Math.floor(Math.random()*chars.length)];
}
captchaText.innerText=captcha;
}

/* INICIO */
function inicio(){
generarCaptcha();
let hoy=new Date();
fecha.value=hoy.toISOString().split("T")[0];

auth.onAuthStateChanged(user=>{
if(user){
loginBox.classList.add("hidden");
appBox.classList.remove("hidden");
cargar();
actualizarGrafica();
}
});
}

/* LOGIN */
function login(){
if(captchaInput.value!==captcha){
alert("Captcha incorrecto");
generarCaptcha();
return;
}
auth.signInWithEmailAndPassword(correo.value,pass.value)
.catch(e=>alert(e.message));
}

/* REGISTRO */
function registro(){
auth.createUserWithEmailAndPassword(correo.value,pass.value)
.then(()=>alert("Registrado"))
.catch(e=>alert(e.message));
}

/* RECUPERAR */
function recuperar(){
auth.sendPasswordResetEmail(correo.value)
.then(()=>alert("Correo enviado"))
.catch(e=>alert(e.message));
}

/* UI */
function mostrar(){
telcelBox.classList.add("hidden");
attBox.classList.add("hidden");
baitBox.classList.add("hidden");

if(tipo.value==="TELCEL") telcelBox.classList.remove("hidden");
if(tipo.value==="ATT") attBox.classList.remove("hidden");
if(tipo.value==="BAIT") baitBox.classList.remove("hidden");
}

/* FORMATO */
function formatoFecha(f){
return new Date(f).toLocaleDateString('es-MX');
}

/* GUARDAR */
function guardar(){

let f=formatoFecha(fecha.value);

let gen=JSON.parse(localStorage.getItem("gen")||"[]");
let tel=JSON.parse(localStorage.getItem("telcel")||"[]");

if(tipo.value==="TELCEL"){
let v={
tipo:tTipo.value,
num:tNum.value,
iccid:tICCID.value,
imei:tIMEI.value,
marca:tMarca.value,
fecha:f
};
tel.unshift(v);
localStorage.setItem("telcel",JSON.stringify(tel));
gen.unshift({comp:"TELCEL",num:v.num,marca:v.marca,chip:"N/A",fecha:f});
}

if(tipo.value==="ATT"){
gen.unshift({
comp:"ATT",
num:aNum.value,
marca:aMarca.value,
chip:aChip.value,
fecha:f
});
}

if(tipo.value==="BAIT"){
gen.unshift({
comp:"BAIT",
num:bNum.value,
marca:bMarca.value,
chip:bChip.value,
fecha:f
});
}

localStorage.setItem("gen",JSON.stringify(gen));

cargar();
actualizarGrafica();
}

/* TABLA */
function cargar(){
let gen=JSON.parse(localStorage.getItem("gen")||"[]");
tabla.innerHTML=gen.map(v=>`
<tr>
<td>${v.comp}</td>
<td>${v.num}</td>
<td>${v.marca}</td>
<td>${v.chip}</td>
<td>${v.fecha}</td>
</tr>
`).join("");
}

/* GRAFICA CORRECTA */
let chart;

function actualizarGrafica(){

let gen=JSON.parse(localStorage.getItem("gen")||"[]");
let f=formatoFecha(fecha.value);

let t=0,a=0,b=0;

gen.forEach(v=>{
if(v.fecha!==f) return;
if(v.comp==="TELCEL") t++;
if(v.comp==="ATT") a++;
if(v.comp==="BAIT") b++;
});

const ctx=document.getElementById("grafica").getContext("2d");

let data={
labels:["Telcel","AT&T","BAIT"],
datasets:[{
label:`Ventas ${f}`,
data:[t,a,b],
borderWidth:1
}]
};

if(chart){
chart.data=data;
chart.update();
}else{
chart=new Chart(ctx,{
type:"bar",
data:data,
options:{responsive:true}
});
}
}

/* REPORTE FUNCIONAL */
function reporte(){

let gen=JSON.parse(localStorage.getItem("gen")||"[]");

if(gen.length===0){
alert("No hay datos");
return;
}

let f=formatoFecha(fecha.value);

let t=0,a=0,b=0;

gen.forEach(v=>{
if(v.fecha!==f) return;
if(v.comp==="TELCEL") t++;
if(v.comp==="ATT") a++;
if(v.comp==="BAIT") b++;
});

let total=t+a+b;

let contenido=`
<!DOCTYPE html>
<html>
<body style="font-family:Arial;">
<h1>REPORTE DE VENTAS</h1>
<p>Fecha: ${f}</p>

<table border="1" style="border-collapse:collapse;">
<tr><th>Compañía</th><th>Ventas</th></tr>
<tr><td>Telcel</td><td>${t}</td></tr>
<tr><td>AT&T</td><td>${a}</td></tr>
<tr><td>BAIT</td><td>${b}</td></tr>
</table>

<h3>Total: ${total}</h3>
</body>
</html>
`;

let blob=new Blob(['\ufeff',contenido],{type:"application/msword"});
let url=URL.createObjectURL(blob);

let link=document.createElement("a");
link.href=url;
link.download=`Reporte_${f}.doc`;

document.body.appendChild(link);
link.click();
document.body.removeChild(link);
}

</script>

</body>
</html>
