<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Auditor | Omar</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root { --gold: #ffc300; --blue: #00f5ff; --bg: #05070a; --card: rgba(255,255,255,0.07); }
        body { margin:0; font-family:'Segoe UI', sans-serif; background: var(--bg); color:white; }
        .app { max-width:480px; margin:auto; padding:20px; }
        
        /* Reloj Neón */
        .reloj-container { text-align: center; margin-bottom: 15px; background: var(--card); padding: 10px; border-radius: 12px; border: 1px solid rgba(0,245,255,0.2); }
        #reloj { font-size: 24px; font-weight: bold; color: var(--blue); text-shadow: 0 0 10px var(--blue); }

        .card { background: var(--card); backdrop-filter: blur(10px); border-radius: 16px; padding: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .btn-salir { background: #e63946; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: bold; }
        
        .tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab { flex: 1; padding: 12px; border-radius: 10px; background: rgba(255,255,255,0.1); text-align: center; cursor: pointer; font-size: 11px; font-weight: bold; transition: 0.3s; }
        .tab.active { background: var(--gold); color: #000; box-shadow: 0 0 15px rgba(255,195,0,0.3); }

        input, select { width: 100%; padding: 12px; border-radius: 10px; border: none; background: rgba(255,255,255,0.12); color: white; margin-top: 8px; box-sizing: border-box; outline: none; border: 1px solid rgba(255,255,255,0.05); }
        .main-btn { background: var(--gold); color: #000; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; font-size: 14px; }
        
        .listado { max-height: 200px; overflow-y: auto; font-size: 11px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { color: var(--gold); text-align: left; padding: 8px; font-size: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .hidden { display: none !important; }
        .fade { animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body onload="inicio()">

<div class="app">
    <div id="loginBox" class="fade">
        <div class="card" style="text-align: center; margin-top: 50px;">
            <h2 style="color:var(--gold)">AUDITOR PRO</h2>
            <p style="opacity: 0.6; font-size: 12px;">Sincronización de Ventas Omar</p>
            <button class="main-btn" style="background:white;" onclick="loginGoogle()">Continuar con Google</button>
        </div>
    </div>

    <div id="appBox" class="hidden fade">
        <div class="nav-header">
            <span id="txtUser" style="color: var(--gold); font-weight: bold; font-size: 13px;"></span>
            <button class="btn-salir" onclick="salir()">Salir</button>
        </div>

        <div class="reloj-container">
            <div id="reloj">00:00:00</div>
            <div style="font-size: 10px; opacity: 0.5; margin-top: 5px;" id="fechaTexto"></div>
        </div>

        <div class="card">
            <input type="date" id="fechaFiltro" onchange="cargarTodo()">
        </div>

        <div class="tabs">
            <div id="tabTELCEL" class="tab active" onclick="setComp('TELCEL')">TELCEL</div>
            <div id="tabATT" class="tab" onclick="setComp('ATT')">AT&T</div>
            <div id="tabBAIT" class="tab" onclick="setComp('BAIT')">BAIT</div>
        </div>

        <div class="card">
            <div id="telcelOptions">
                <select id="tipoProceso" onchange="renderForm()">
                    <option value="CHIP">CHIP EXPRESS / 0</option>
                    <option value="PORTA">PORTABILIDAD</option>
                    <option value="RENUEVATE">RENUÉVATE</option>
                    <option value="AK">EQUIPO / AK</option>
                </select>
            </div>
            <div id="formContainer"></div>
        </div>

        <button class="main-btn" onclick="obtenerUbicacionYGuardar()">💾 GUARDAR EN NUBE</button>

        <div class="card">
            <h3 style="color:var(--gold); font-size: 12px; margin:0;">HISTORIAL RECIENTE</h3>
            <div class="listado">
                <table>
                    <thead><tr><th>Número</th><th>Proceso</th><th>Compañía</th></tr></thead>
                    <tbody id="cuerpoSincro"></tbody>
                </table>
            </div>
        </div>

        <div class="card"><canvas id="grafica"></canvas></div>
        <button style="background:#1b4332; color:#74c69d;" class="main-btn" onclick="descargarExcel()">📊 EXPORTAR REPORTE</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD4UK_j8UxMwOCtrtXlYftBe_wCLE7psMc",
        authDomain: "ventastelcel4029.firebaseapp.com",
        databaseURL: "https://ventastelcel4029-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let compActiva = "TELCEL";
    let chart;
    let todasVentas = {};

    function inicio() {
        actualizarReloj();
        setInterval(actualizarReloj, 1000);
        document.getElementById("fechaFiltro").value = new Date().toISOString().split("T")[0];
        
        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById("loginBox").classList.add("hidden");
                document.getElementById("appBox").classList.remove("hidden");
                document.getElementById("txtUser").innerText = "👤 " + (user.displayName || "Omar");
                escucharDatos();
                renderForm();
            }
        });
    }

    function actualizarReloj() {
        const ahora = new Date();
        const h = ahora.getHours().toString().padStart(2, '0');
        const m = ahora.getMinutes().toString().padStart(2, '0');
        const s = ahora.getSeconds().toString().padStart(2, '0');
        document.getElementById("reloj").innerText = `${h}:${m}:${s}`;
        document.getElementById("fechaTexto").innerText = ahora.toLocaleDateString('es-MX', { weekday: 'long', day: 'numeric', month: 'long' });
    }

    function renderForm() {
        let html = "";
        if (compActiva === "TELCEL") {
            const tp = document.getElementById("tipoProceso").value;
            document.getElementById("telcelOptions").classList.remove("hidden");
            
            html = `<input id="f_num" placeholder="Número">`;
            html += `<input id="f_icc" placeholder="ICCID">`;
            if (tp === "AK" || tp === "RENUEVATE") {
                html += `<input id="f_marca" placeholder="Marca"><input id="f_mod" placeholder="Modelo"><input id="f_imei" placeholder="IMEI">`;
            }
        } else {
            // Estructura para ATT y BAIT (Marca, Modelo, ICCID, Número)
            document.getElementById("telcelOptions").classList.add("hidden");
            html = `
                <input id="f_marca" placeholder="Marca">
                <input id="f_mod" placeholder="Modelo">
                <input id="f_icc" placeholder="ICCID">
                <input id="f_num" placeholder="Número">
            `;
        }
        document.getElementById("formContainer").innerHTML = html;
    }

    function setComp(c) {
        compActiva = c;
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        document.getElementById("tab" + c).classList.add("active");
        renderForm();
    }

    async function obtenerUbicacionYGuardar() {
        navigator.geolocation.getCurrentPosition(pos => {
            guardar("Ubicación GPS");
        }, () => guardar("Sin GPS"));
    }

    function guardar(loc) {
        const f = document.getElementById("fechaFiltro").value.split('-');
        const data = {
            comp: compActiva,
            proceso: (compActiva === "TELCEL") ? document.getElementById("tipoProceso").value : "EXTERNA",
            fecha: document.getElementById("fechaFiltro").value,
            fechaExcel: `${f[2]}/${f[1]}/${f[0]}`,
            num: document.getElementById("f_num")?.value || "",
            icc: document.getElementById("f_icc")?.value || "",
            marca: document.getElementById("f_marca")?.value || "",
            modelo: document.getElementById("f_mod")?.value || "",
            imei: document.getElementById("f_imei")?.value || "",
            ubicacion: loc
        };

        db.ref('ventas').push(data).then(() => {
            alert("Sincronizado");
            renderForm();
        });
    }

    function escucharDatos() {
        db.ref('ventas').on('value', snap => {
            todasVentas = snap.val() || {};
            cargarTodo();
        });
    }

    function cargarTodo() {
        const filtro = document.getElementById("fechaFiltro").value;
        const cuerpo = document.getElementById("cuerpoSincro");
        cuerpo.innerHTML = "";
        let s = { TELCEL:0, ATT:0, BAIT:0 };

        Object.keys(todasVentas).reverse().forEach(id => {
            const v = todasVentas[id];
            if(v.fecha === filtro) {
                cuerpo.innerHTML += `<tr><td>${v.num}</td><td>${v.proceso}</td><td>${v.comp}</td></tr>`;
                if(s[v.comp] !== undefined) s[v.comp]++;
            }
        });
        actualizarGrafica(s);
    }

    function actualizarGrafica(s) {
        const ctx = document.getElementById('grafica').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['TELCEL', 'AT&T', 'BAIT'],
                datasets: [{
                    label: 'Ventas Hoy',
                    data: [s.TELCEL, s.ATT, s.BAIT],
                    backgroundColor: ['#ffc300', '#00f5ff', '#ef233c'],
                    borderRadius: 5
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: 'white' } }, x: { ticks: { color: 'white' } } }
            }
        });
    }

    function loginGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function salir() { auth.signOut().then(() => window.location.reload()); }

    function descargarExcel() {
        const data = Object.values(todasVentas).map(v => ({
            "FECHA": v.fechaExcel, "COMPAÑÍA": v.comp, "NÚMERO": v.num, "TIPO": v.proceso, "ICCID": v.icc, "MARCA": v.marca, "MODELO": v.modelo, "IMEI": v.imei
        }));
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Reporte");
        XLSX.writeFile(wb, `Ventas_Omar_${new Date().toLocaleDateString()}.xlsx`);
    }
</script>
</body>
</html>
