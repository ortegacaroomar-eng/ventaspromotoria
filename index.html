<script>

let html5QrCode;
let campoActual=null;

function abrirScanner(campo){

campoActual=campo;

document.getElementById("scannerBox").style.display="block";

html5QrCode=new Html5Qrcode("reader");

html5QrCode.start(
{facingMode:"environment"},
{fps:10,qrbox:250},

(decodedText)=>{

document.getElementById(campoActual).value=decodedText;

cerrarScanner();

});

}

function cerrarScanner(){

if(html5QrCode){

html5QrCode.stop().then(()=>{

document.getElementById("scannerBox").style.display="none";

});

}

}

</script>
