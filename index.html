<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Ventas Telcel - GPS Activo</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { margin:0; font-family:'Segoe UI',sans-serif; background:linear-gradient(135deg,#001d3d,#003566,#000814); min-height:100vh; color:white; }
        .app { max-width:480px; margin:auto; padding:20px; position: relative; }
        
        /* BOTÓN SALIR DISCRETO */
        .btn-logout-mini { 
            position: absolute; top: 20px; right: 20px; background: rgba(255, 77, 77, 0.2); 
            color: #ff4d4d; width: 35px; height: 35px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            border: 1px solid #ff4d4d; cursor: pointer; z-index: 100;
        }

        /* DISEÑO GPS Y RELOJ MEJORADO */
        .status-container { margin-bottom: 20px; width: 85%; }
        .reloj-grande { font-family: monospace; font-size: 28px; color: #ffc300; font-weight: bold; }
        .gps-box { 
            display: flex; align-items: center; background: rgba(0, 180, 216, 0.15); 
            padding: 8px 12px; border-radius: 10px; border: 1px solid #00b4d8; 
            margin-top: 5px; font-size: 11px; color: #90e0ef;
        }
        .gps-box i { margin-right: 8px; color: #00b4d8; font-size: 14px; }

        .card { background:rgba(255,255,255,.08); backdrop-filter:blur(12px); border-radius:18px; padding:18px; margin-bottom:16px; border:1px solid rgba(255,255,255,0.1); }
        .header { text-align:center; font-size:15px; font-weight:bold; color:#ffc300; margin-bottom:15px; text-transform: uppercase; border-bottom: 1px solid rgba(255,195,0,0.2); padding-bottom: 10px; }
        
        label { font-size:10px; font-weight:600; color:#ffc300; text-transform: uppercase; display: block; margin-bottom: 4px; }
        input, select { width:100%; padding:10px; margin-bottom:10px; border-radius:10px; border:none; background:rgba(255,255,255,.12); color:white; box-sizing: border-box; }
        
        button { width:100%; padding:14px; border:none; border-radius:12px; font-weight:bold; cursor:pointer; }
        .btn-main { background:#ffc300; color:#003566; }
        .btn-excel { background:#1f7a3f; color:white; margin-top:10px; border: 1px solid #2ecc71; }
        
        .external-links { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .btn-link { text-decoration: none; display: flex; align-items: center; justify-content: center; border-radius: 12px; height: 45px; font-weight: bold; font-size: 11px; color: white; text-align: center; border: 1px solid rgba(255,255,255,0.2); }
        .bg-payjoy { background: #00a8e8; }
        .bg-vincula { background: #003566; border-color: #ffc300; }
        .bg-docs { background: #7248b9; grid-column: span 2; }

        .login { max-width:350px; margin:80px auto; background:white; color:black; padding:30px; border-radius:20px; text-align:center; }
        .hidden { display:none !important; }

        /* HISTORIAL CON FORMATO EXCEL */
        .venta-item { position: relative; background: rgba(255,255,255,0.06); padding: 15px; border-radius: 15px; margin-bottom: 15px; border-left: 5px solid #ffc300; }
        .btn-del { position: absolute; top: 12px; right: 12px; color: #ff4d4d; cursor: pointer; background:none; border:none; width:auto; font-size: 16px; }
        
        .grid-detalles { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; font-size: 11px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 8px; }
        .dato-h { display: flex; flex-direction: column; }
        .dato-h span { color: #888; font-size: 9px; font-weight: bold; }
        .full-row { grid-column: span 2; }
    </style>
</head>
<body onload="inicio()">

    <div id="loginBox" class="login">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/13/Logo_Telcel.svg/1200px-Logo_Telcel.svg.png" width="100" style="margin-bottom:15px">
        <h2>Acceso Oficial</h2>
        <input id="u" type="email" placeholder="Correo">
        <input id="p" type="password" placeholder="Contraseña">
        <button class="btn-main" onclick="entrar()">ENTRAR</button>
    </div>

    <div id="appBox" class="app hidden">
        <div class="btn-logout-mini" onclick="salir()"><i class="fa-solid fa-power-off"></i></div>

        <div class="status-container">
            <div id="relojApp" class="reloj-grande">00:00:00</div>
            <div class="gps-box">
                <i class="fa-solid fa-location-crosshairs fa-spin"></i>
                <span id="ubicacion">Localizando señal GPS...</span>
            </div>
        </div>

        <div id="promotorName" style="font-size: 14px; color: #ffc300; font-weight: bold;">PROMOTOR</div>
        <div style="font-size: 10px; color: #aaa; margin-bottom: 15px;">Omar Ortega Caro - Formato Excel 2026</div>

        <div class="external-links">
            <a href="https://app.payjoy.com/accounts/login?afterLogin=https://app.payjoy.com/merchant3?merchantId=199557" target="_blank" class="btn-link bg-payjoy">PORTAL PAYJOY</a>
            <a href="https://registro.telcel.com/vinculatulinea/#/" target="_blank" class="btn-link bg-vincula">VINCULAR LÍNEA</a>
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSfQMT1FUeOLNJUzB8DeGhKNTqiU_DS7wr7y2p_Ab7xgHHjYbw/viewform?pli=1" target="_blank" class="btn-link bg-docs">FORMULARIO GOOGLE</a>
        </div>

        <form id="fReg">
            <div class="card">
                <div class="header">Nueva Entrada de Venta</div>
                <label>Renuevate/ Kit/Chip/Porta</label>
                <select id="iTipo" required onchange="ajustarCampos()">
                    <option value="KIT">KIT</option>
                    <option value="CHIP">CHIP</option>
                    <option value="PORTA">PORTA</option>
                    <option value="RENUEVATE">RENUEVATE</option>
                </select>
                <label>FECHA DE ACTIVACION</label>
                <input id="iFec" required placeholder="DD/MM/YYYY">
                <label>NUM. CELULAR</label>
                <input id="iTel" type="tel" required maxlength="10">
                <label>ICCID</label>
                <input id="iIcc" required>
            </div>

            <div id="seccionEquipo" class="card">
                <label>IMEI</label><input id="iIme">
                <label>MARCA</label><input id="iMarca">
                <label>MODELO</label><input id="iMod">
            </div>

            <div class="card">
                <label>#TIENDA / Determinante</label><input id="iTiendaNum" required>
                <label>SOLO NOMBRE DE LA CADENA</label><input id="iCadena" required>
                <label>SOLO NOMBRE DE TIENDA SIN CADENA</label><input id="iTiendaNombre" required>
                <label>NOMBRE COMPLETO PROMOTOR</label><input id="iProm" required>
            </div>
            <button type="submit" class="btn-main">GUARDAR EN BASE DE DATOS</button>
        </form>

        <button class="btn-excel" onclick="exportarExcel()">
            <i class="fa-solid fa-file-excel"></i> DESCARGAR EXCEL OFICIAL
        </button>

        <div class="header" style="margin-top: 30px;">Registros Locales</div>
        <div id="listaLocal"></div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD4UK_j8UxMwOCtrtXlYftBe_wCLE7psMc", 
        authDomain: "ventastelcel4029.firebaseapp.com",
        databaseURL: "https://ventastelcel4029-default-rtdb.firebaseio.com",
        projectId: "ventastelcel4029",
        storageBucket: "ventastelcel4029.firebasestorage.app",
        messagingSenderId: "480758010888",
        appId: "1:480758010888:web:e948c54f0217536aa9adbd"
    };

    let db, auth;

    function inicio() {
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        db = firebase.database();
        auth = firebase.auth();

        setInterval(() => {
            document.getElementById('relojApp').innerText = new Date().toLocaleTimeString('es-MX');
        }, 1000);

        // GPS MEJORADO
        if(navigator.geolocation) {
            navigator.geolocation.watchPosition(p => {
                document.getElementById('ubicacion').innerHTML = `COORD: ${p.coords.latitude.toFixed(5)}, ${p.coords.longitude.toFixed(5)}`;
            }, e => {
                document.getElementById('ubicacion').innerText = "GPS: Sin acceso a ubicación";
            }, { enableHighAccuracy: true });
        }

        document.getElementById('iFec').value = new Date().toLocaleDateString('es-MX', {day:'2-digit', month:'2-digit', year:'numeric'});

        auth.onAuthStateChanged(user => {
            if(user) {
                const nombre = user.email.split('@')[0].toUpperCase();
                document.getElementById('promotorName').innerText = "PROMOTOR: " + nombre;
                document.getElementById('iProm').value = nombre;
                document.getElementById('loginBox').classList.add("hidden");
                document.getElementById('appBox').classList.remove("hidden");
                cargarLocal();
            } else {
                document.getElementById('loginBox').classList.remove("hidden");
                document.getElementById('appBox').classList.add("hidden");
            }
        });
    }

    function entrar() {
        let m = document.getElementById('u').value, p = document.getElementById('p').value;
        auth.signInWithEmailAndPassword(m, p).catch(e => alert("Acceso Incorrecto"));
    }

    function salir() { auth.signOut(); }

    function ajustarCampos() {
        const t = document.getElementById('iTipo').value;
        document.getElementById('seccionEquipo').className = (t === "CHIP" || t === "PORTA") ? "hidden" : "card";
    }

    document.getElementById('fReg').onsubmit = e => {
        e.preventDefault();
        const v = {
            id: Date.now(),
            "NUM. CELULAR": document.getElementById('iTel').value,
            "IMEI": document.getElementById('iIme').value || "N/A",
            "ICCID": document.getElementById('iIcc').value,
            "Renuevate/ Kit/Chip/Porta": document.getElementById('iTipo').value,
            "#TIENDA / Determinante": document.getElementById('iTiendaNum').value,
            "SOLO NOMBRE DE LA CADENA": document.getElementById('iCadena').value,
            "SOLO NOMBRE DE TIENDA SIN CADENA": document.getElementById('iTiendaNombre').value,
            "NOMBRE COMPLETO PROMOTOR": document.getElementById('iProm').value,
            "FECHA DE ACTIVACION": document.getElementById('iFec').value,
            "MARCA": document.getElementById('iMarca').value || "N/A",
            "MODELO": document.getElementById('iMod').value || "N/A"
        };
        let l = JSON.parse(localStorage.getItem("ventas_save") || "[]");
        l.unshift(v);
        localStorage.setItem("ventas_save", JSON.stringify(l));
        if(auth.currentUser) db.ref('ventas/' + auth.currentUser.uid).push(v);
        document.getElementById('fReg').reset();
        document.getElementById('iFec').value = new Date().toLocaleDateString('es-MX', {day:'2-digit', month:'2-digit', year:'numeric'});
        cargarLocal();
        alert("¡Venta Guardada!");
    };

    function eliminarVenta(id) {
        if(confirm("¿Desea eliminar este registro?")) {
            let l = JSON.parse(localStorage.getItem("ventas_save") || "[]");
            l = l.filter(v => v.id !== id);
            localStorage.setItem("ventas_save", JSON.stringify(l));
            cargarLocal();
        }
    }

    function cargarLocal() {
        let l = JSON.parse(localStorage.getItem("ventas_save") || "[]");
        document.getElementById('listaLocal').innerHTML = l.map(v => `
            <div class="venta-item">
                <button class="btn-del" onclick="eliminarVenta(${v.id})"><i class="fa-solid fa-trash"></i></button>
                <div style="font-size: 15px; color:#ffc300;">📞 <b>${v["NUM. CELULAR"]}</b></div>
                <div class="grid-detalles">
                    <div class="dato-h"><span>#TIENDA</span>${v["#TIENDA / Determinante"]}</div>
                    <div class="dato-h"><span>MODELO</span>${v.MODELO}</div>
                    <div class="dato-h full-row"><span>IMEI</span>${v.IMEI}</div>
                    <div class="dato-h full-row"><span>ICCID</span>${v.ICCID}</div>
                </div>
            </div>
        `).join("");
    }

    function exportarExcel() {
        let l = JSON.parse(localStorage.getItem("ventas_save") || "[]");
        if(l.length === 0) return alert("Nada que exportar");
        const limpio = l.map(({id, ...resto}) => resto);
        const ws = XLSX.utils.json_to_sheet(limpio);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Hoja1");
        XLSX.writeFile(wb, "comisiones_Omar_Ortega.xlsx");
    }
</script>
</body>
</html>
