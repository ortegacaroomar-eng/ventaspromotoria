<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teledata IA PRO</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <style>
        :root {
            --primary: #ffc300;
            --secondary: #003566;
            --bg: #001d3d;
            --accent: #00b4d8;
            --danger: #ff4d4d;
            --success: #00ff88;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: white;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .hidden { display: none !important; }

        /* --- LOGIN & REGISTRO --- */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 350px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            text-align: center;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: none;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: var(--primary);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-secondary { background: var(--secondary); color: white; }

        /* --- DASHBOARD --- */
        .container { padding: 10px; max-width: 800px; margin: auto; width: 100%; box-sizing: border-box; }
        
        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 12px;
            border-left: 4px solid var(--accent);
        }

        .status-bar { display: flex; justify-content: space-between; font-size: 0.9em; }

        /* --- TABLA --- */
        .table-wrapper { overflow-x: auto; background: white; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; color: #333; }
        th { background: #222; color: white; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #ddd; font-size: 0.9em; }
        .pendiente { color: var(--danger); font-weight: bold; }

        /* --- IA HALO --- */
        #halo {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 4px solid var(--accent);
            box-shadow: 0 0 15px var(--accent);
            cursor: pointer;
            z-index: 100;
            animation: breathe 3s infinite ease-in-out;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); box-shadow: 0 0 15px var(--accent); }
            50% { transform: scale(1.1); box-shadow: 0 0 25px var(--accent); }
        }

        .hablando { border-color: var(--success) !important; box-shadow: 0 0 25px var(--success) !important; }
        .alerta { border-color: var(--danger) !important; box-shadow: 0 0 25px var(--danger) !important; }
        .ventas { border-color: #00ffff !important; box-shadow: 0 0 30px #00ffff !important; }

    </style>
</head>
<body>

    <div id="authBox" class="auth-container">
        <div class="auth-card">
            <h2 style="color: var(--primary);">TELEDATA IA</h2>
            <input id="userEmail" type="email" placeholder="Correo electrónico">
            <input id="userPass" type="password" placeholder="Contraseña">
            
            <button onclick="handleLogin()">Iniciar Sesión</button>
            <button class="btn-secondary" onclick="handleRegister()">Registrar Usuario Local</button>
        </div>
    </div>

    <div id="appBox" class="container hidden">
        <div class="status-bar card">
            <span>📍 <span id="gpsDisplay">Ubicación...</span></span>
            <button onclick="handleLogout()" style="width: auto; margin: 0; padding: 5px 10px;">Salir</button>
        </div>

        <div class="card">
            <h3>⚠️ Pendientes de IMEI</h3>
            <div id="pendientesLista" style="display: flex; gap: 10px; flex-wrap: wrap;"></div>
        </div>

        <div class="card">
            <h3>Registrar Nueva Venta</h3>
            <select id="fTipo">
                <option value="KIT">KIT</option>
                <option value="CHIP">CHIP</option>
                <option value="PORTA">PORTA</option>
                <option value="RENUEVATE">RENUEVATE</option>
            </select>
            <input id="fTel" type="number" placeholder="Teléfono (10 dígitos)">
            <input id="fIme" type="text" placeholder="IMEI (Dejar vacío si es pendiente)">
            <input id="fProm" type="text" placeholder="Nombre del Promotor">
            <button onclick="saveSale()">Guardar Venta</button>
        </div>

        <div class="card">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Teléfono</th>
                            <th>Tipo</th>
                            <th>IMEI</th>
                            <th>Promotor</th>
                        </tr>
                    </thead>
                    <tbody id="salesTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="halo" onclick="iaGreet()"></div>
    <video id="cam" autoplay playsinline style="display:none;"></video>

    <script>
        // --- CONFIGURACIÓN Y ESTADO ---
        let currentUser = null;
        let lastSalesCount = 0;

        // --- MANEJO DE FECHAS (DD/MM/YYYY) ---
        function getFormattedDate() {
            const d = new Date();
            const day = String(d.getDate()).padStart(2, '0');
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const year = d.getFullYear();
            return `${day}/${month}/${year}`;
        }

        // --- AUTENTICACIÓN LOCAL ---
        function handleRegister() {
            const email = document.getElementById('userEmail').value;
            const pass = document.getElementById('userPass').value;

            if(!email || !pass) return alert("Completa los campos");

            let users = JSON.parse(localStorage.getItem('teledata_users') || "[]");
            if(users.find(u => u.email === email)) return alert("El usuario ya existe");

            users.push({ email, pass });
            localStorage.setItem('teledata_users', JSON.stringify(users));
            alert("Usuario registrado localmente con éxito.");
        }

        function handleLogin() {
            const email = document.getElementById('userEmail').value;
            const pass = document.getElementById('userPass').value;

            let users = JSON.parse(localStorage.getItem('teledata_users') || "[]");
            const user = users.find(u => u.email === email && u.pass === pass);

            if(user) {
                currentUser = user;
                showApp();
            } else {
                alert("Credenciales incorrectas");
            }
        }

        function handleLogout() {
            currentUser = null;
            document.getElementById('authBox').classList.remove('hidden');
            document.getElementById('appBox').classList.add('hidden');
        }

        function showApp() {
            document.getElementById('authBox').classList.add('hidden');
            document.getElementById('appBox').classList.remove('hidden');
            startGPS();
            loadSales();
        }

        // --- LÓGICA DE VENTAS ---
        function saveSale() {
            const tel = document.getElementById('fTel').value;
            const tipo = document.getElementById('fTipo').value;
            const imei = document.getElementById('fIme').value.trim() || "N/A";
            const prom = document.getElementById('fProm').value;

            if(!tel || !prom) return alert("Teléfono y Promotor son obligatorios");

            const newSale = {
                id: Date.now(),
                fecha: getFormattedDate(),
                tel,
                tipo,
                imei,
                prom
            };

            let sales = JSON.parse(localStorage.getItem('ventas_omar') || "[]");
            sales.unshift(newSale);
            localStorage.setItem('ventas_omar', JSON.stringify(sales));

            // Limpiar campos
            document.getElementById('fTel').value = "";
            document.getElementById('fIme').value = "";
            
            loadSales();
        }

        function loadSales() {
            const sales = JSON.parse(localStorage.getItem('ventas_omar') || "[]");
            const tbody = document.getElementById('salesTableBody');
            const pendientesDiv = document.getElementById('pendientesLista');
            const halo = document.getElementById('halo');

            // Render Tabla
            tbody.innerHTML = sales.map(s => `
                <tr>
                    <td>${s.fecha}</td>
                    <td>${s.tel}</td>
                    <td>${s.tipo}</td>
                    <td class="${s.imei === 'N/A' ? 'pendiente' : ''}">${s.imei}</td>
                    <td>${s.prom}</td>
                </tr>
            `).join('');

            // Lógica de Pendientes
            const pendientes = sales.filter(s => s.imei === "N/A");
            pendientesDiv.innerHTML = pendientes.length 
                ? pendientes.map(p => `<span class="pendiente" style="background:rgba(255,0,0,0.1); padding:4px 8px; border-radius:5px;">${p.prom}</span>`).join('')
                : "No hay pendientes";

            // Efectos de IA
            halo.classList.remove('alerta', 'ventas');
            
            if(pendientes.length > 0) halo.classList.add('alerta');

            if(sales.length > lastSalesCount && lastSalesCount !== 0) {
                halo.classList.add('ventas');
                speakIA("Venta guardada correctamente.");
                setTimeout(() => halo.classList.remove('ventas'), 2000);
            }

            lastSalesCount = sales.length;
        }

        // --- FUNCIONES EXTRA (GPS / VOZ) ---
        function startGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(p => {
                    document.getElementById('gpsDisplay').innerText = 
                        `${p.coords.latitude.toFixed(4)}, ${p.coords.longitude.toFixed(4)}`;
                });
            }
        }

        function speakIA(text) {
            const halo = document.getElementById('halo');
            halo.classList.add('hablando');
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = "es-MX";
            msg.onend = () => halo.classList.remove('hablando');
            window.speechSynthesis.speak(msg);
        }

        function iaGreet() {
            speakIA("Sistema Teledata en línea. ¿En qué puedo ayudarte?");
        }

    </script>
</body>
</html>
