<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auditor PRO | Omar</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body { margin:0; font-family:'Segoe UI', sans-serif; background: #000814; color:white; }
.app { max-width:480px; margin:auto; padding:20px; }
.card { background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); border-radius: 16px; padding: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }
.nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
.btn-salir { background: #d00000; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 12px; }
.tabs { display: flex; gap: 8px; margin-bottom: 15px; }
.tab { flex: 1; padding: 10px; border-radius: 10px; background: rgba(255,255,255,0.1); text-align: center; cursor: pointer; font-size: 13px; }
.tab.active { background: #ffc300; color: #003566; font-weight: bold; }
input, select { width: 100%; padding: 12px; border-radius: 10px; border: none; background: rgba(255,255,255,0.2); color: white; margin-top: 8px; box-sizing: border-box; }
button { background: #ffc300; color: #003566; padding: 14px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
.btn-del { background: #ff4d4d; color: white; border: none; padding: 4px 8px; border-radius: 5px; font-size: 10px; }
.hidden { display: none !important; }
table { width: 100%; font-size: 10px; border-collapse: collapse; margin-top: 10px; color: #eee; }
th, td { border: 1px solid rgba(255,255,255,0.1); padding: 6px; text-align: left; }
th { background: rgba(255,195,0,0.2); color: #ffc300; }
.fade { animation: fade 0.3s ease; }
@keyframes fade { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }
</style>
</head>

<body onload="inicio()">

<div id="loginBox" class="app">
    <div class="card" style="margin-top: 50px; text-align: center;">
        <h2 style="color:#ffc300;">🗂️ Auditoría Sincro</h2>
        <input id="correo" type="email" placeholder="Correo">
        <input id="pass" type="password" placeholder="Contraseña">
        <button onclick="loginEmail()">ENTRAR</button>
        <button onclick="loginGoogle()" style="background:white; color:#444; font-size:12px;">Google Login</button>
    </div>
</div>

<div id="appBox" class="app hidden">
    <div class="nav-header">
        <span id="txtUser" style="font-size: 11px; color: #ffc300;">...</span>
        <button class="btn-salir" onclick="salir()">Cerrar Sesión</button>
    </div>
    
    <div class="card">
        <label style="font-size: 11px; color: #ffc300;">📅 FECHA SELECCIONADA:</label>
        <input type="date" id="fechaFiltro" onchange="cargarTodo()">
    </div>

    <div class="tabs">
        <div id="tabTELCEL" class="tab active" onclick="setComp('TELCEL')">TELCEL</div>
        <div id="tabATT" class="tab" onclick="setComp('ATT')">AT&T</div>
        <div id="tabBAIT" class="tab" onclick="setComp('BAIT')">BAIT</div>
    </div>

    <div id="cardProceso" class="card">
        <select id="tipoProceso" onchange="renderForm()">
            <option value="VENTA">SELECCIONA PROCESO...</option>
            <option value="PORTA">PORTA</option>
            <option value="RENUEVATE">RENUEVATE</option>
            <option value="CHIP">CHIP</option>
            <option value="AK">AK / EQUIPO</option>
        </select>
        <div id="formContainer"></div>
    </div>

    <button onclick="obtenerUbicacionYGuardar()">💾 REGISTRAR VENTA</button>
    
    <div class="card" style="border: 1px solid #ffc300;">
        <h3 style="color:#ffc300; margin:0 0 10px 0; font-size: 14px;">📁 Reporte Técnico (Nube)</h3>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Número</th>
                        <th>ICCID</th>
                        <th>Compañía</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="cuerpoSincro"></tbody>
            </table>
        </div>
    </div>

    <div class="card"><canvas id="grafica"></canvas></div>

    <button style="background:#2b9348; color:white;" onclick="descargarExcel()">📊 GENERAR EXCEL ORDENADO</button>
</div>

<script>
const firebaseConfig = { 
    apiKey: "AIzaSyD4UK_j8UxMwOCtrtXlYftBe_wCLE7psMc", 
    authDomain: "ventastelcel4029.firebaseapp.com",
    databaseURL: "https://ventastelcel4029-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let compActiva = "TELCEL";
let chart;
let todasVentas = {};

function inicio() {
    document.getElementById("fechaFiltro").value = new Date().toISOString().split("T")[0];
    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById("loginBox").classList.add("hidden");
            document.getElementById("appBox").classList.remove("hidden");
            document.getElementById("txtUser").innerText = "👤 " + (user.displayName || user.email);
            escucharDatos();
            renderForm();
        }
    });
}

function loginEmail() { auth.signInWithEmailAndPassword(correo.value, pass.value).catch(e => alert(e.message)); }
function loginGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
function salir() { if(confirm("¿Cerrar sesión?")) auth.signOut().then(() => window.location.reload()); }

function setComp(c) {
    compActiva = c;
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.getElementById("tab" + c).classList.add("active");
    document.getElementById("tipoProceso").style.display = (c === "TELCEL") ? "block" : "none";
    renderForm();
}

function renderForm() {
    let html = "";
    const tp = document.getElementById("tipoProceso").value;

    if(compActiva === "TELCEL") {
        if(tp === "PORTA") {
            html = `<div class="fade"><input id="f_num" placeholder="Número"><input id="f_icc" placeholder="ICCID"><input id="f_nip" placeholder="NIP"></div>`;
        } 
        else if(tp === "RENUEVATE") {
            // AJUSTE: Número, Marca, Modelo, ICCID, IMEI
            html = `<div class="fade">
                <input id="f_num" placeholder="Número">
                <input id="f_marca" placeholder="Marca">
                <input id="f_mod" placeholder="Modelo">
                <input id="f_icc" placeholder="ICCID">
                <input id="f_imei" placeholder="IMEI">
            </div>`;
        }
        else if(tp === "AK") {
            html = `<div class="fade"><input id="f_num" placeholder="Número"><input id="f_marca" placeholder="Marca"><input id="f_mod" placeholder="Modelo"><input id="f_imei" placeholder="IMEI"></div>`;
        }
        else {
            html = `<div class="fade"><input id="f_num" placeholder="Número"><input id="f_icc" placeholder="ICCID"></div>`;
        }
    } else {
        // Formulario para ATT y BAIT (Número, Marca, Modelo e ICCID)
        html = `<div class="fade">
            <input id="f_num" placeholder="Número">
            <input id="f_marca" placeholder="Marca">
            <input id="f_mod" placeholder="Modelo">
            <input id="f_icc" placeholder="ICCID">
        </div>`;
    }
    document.getElementById("formContainer").innerHTML = html;
}

async function obtenerUbicacionYGuardar() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(async (pos) => {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
                const data = await res.json();
                guardar(data.display_name || "Dirección manual");
            } catch { guardar("Ubicación por GPS"); }
        }, () => guardar("Sin acceso GPS"));
    } else { guardar("GPS no soportado"); }
}

function guardar(calle) {
    const data = {
        comp: compActiva,
        proceso: (compActiva === "TELCEL") ? document.getElementById("tipoProceso").value : "VENTA EXT",
        fecha: document.getElementById("fechaFiltro").value,
        ubicacion: calle,
        num: document.getElementById("f_num")?.value || "",
        icc: document.getElementById("f_icc")?.value || "",
        marca: document.getElementById("f_marca")?.value || "",
        modelo: document.getElementById("f_mod")?.value || "",
        imei: document.getElementById("f_imei")?.value || "",
        nip: document.getElementById("f_nip")?.value || ""
    };
    db.ref('ventas').push(data).then(() => {
        alert("¡Venta Sincronizada con éxito!");
        renderForm();
    });
}

function escucharDatos() {
    db.ref('ventas').on('value', snap => {
        todasVentas = snap.val() || {};
        cargarTodo();
    });
}

function cargarTodo() {
    const filtro = document.getElementById("fechaFiltro").value;
    const cuerpo = document.getElementById("cuerpoSincro");
    cuerpo.innerHTML = "";
    let s = { TELCEL:0, ATT:0, BAIT:0 };
    Object.keys(todasVentas).reverse().forEach(id => {
        const v = todasVentas[id];
        if(v.fecha === filtro) {
            cuerpo.innerHTML += `<tr><td>${v.num}</td><td>${v.icc||'-'}</td><td>${v.comp}</td><td><button class="btn-del" onclick="eliminar('${id}')">🗑️</button></td></tr>`;
            if(s[v.comp] !== undefined) s[v.comp]++;
        }
    });
    if(chart) chart.destroy();
    chart = new Chart(document.getElementById("grafica"), {
        type: 'doughnut',
        data: { labels: ["TELCEL", "ATT", "BAIT"], datasets: [{ data: [s.TELCEL, s.ATT, s.BAIT], backgroundColor: ['#ffc300', '#00b4d8', '#ef233c'], borderWidth: 0 }] },
        options: { plugins: { legend: { labels: { color: "white" } } } }
    });
}

function eliminar(id) { if(confirm("¿Eliminar registro permanentemente?")) db.ref('ventas/' + id).remove(); }

function descargarExcel() {
    const rawData = Object.values(todasVentas);
    const excelData = rawData.map(v => ({
        "FECHA": v.fecha,
        "COMPAÑÍA": v.comp,
        "NÚMERO": v.num,
        "PROCESO": v.proceso,
        "ICCID": v.icc || "N/A",
        "MARCA": v.marca || "N/A",
        "MODELO": v.modelo || "N/A",
        "IMEI": v.imei || "N/A",
        "NIP (PORTA)": v.nip || "N/A",
        "LUGAR": v.ubicacion.split(',').slice(0, 2).join(',')
    }));

    const wb = XLSX.utils.book_new();
    const meses = [...new Set(excelData.map(v => v.FECHA.substring(0, 7)))].sort().reverse();
    
    meses.forEach(mes => {
        const porMes = excelData.filter(v => v.FECHA.startsWith(mes));
        const ws = XLSX.utils.json_to_sheet(porMes);
        ws['!cols'] = [{wch:12}, {wch:12}, {wch:12}, {wch:12}, {wch:20}, {wch:15}, {wch:15}, {wch:18}, {wch:12}, {wch:30}];
        XLSX.utils.book_append_sheet(wb, ws, mes);
    });

    XLSX.writeFile(wb, "Reporte_Auditoria_Omar.xlsx");
}
</script>
</body>
</html>
