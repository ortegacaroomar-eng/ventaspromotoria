<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teledata IA PRO</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<style>
body{margin:0;font-family:'Segoe UI';background:#001d3d;color:white;}
.hidden{display:none;}

/* LOGIN */
.login-box{display:flex;justify-content:center;align-items:center;height:100vh;}
.login-card{background:rgba(255,255,255,.08);padding:30px;border-radius:15px;width:300px;text-align:center;}

input,select{width:100%;padding:10px;margin-bottom:10px;border-radius:8px;border:none;}
button{width:100%;padding:12px;border:none;border-radius:10px;background:#ffc300;font-weight:bold;cursor:pointer;margin-top:5px;}

.card{background:rgba(255,255,255,.08);padding:15px;margin:15px;border-radius:12px;}

table{width:100%;background:white;color:black;}
th{background:black;color:white;}
td{border:1px solid #ccc;padding:6px;}

.pendiente{color:red;font-weight:bold;}

/* 🔵 HALO */
#halo{
position:fixed;
bottom:20px;
right:20px;
width:90px;
height:90px;
border-radius:50%;
border:4px solid #00b4d8;
box-shadow:0 0 20px #00b4d8;
animation:respirar 3s infinite;
transition:.3s;
}

@keyframes respirar{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

.hablando{border-color:#00ff88 !important;box-shadow:0 0 30px #00ff88;}
.alerta{border-color:#ff4d4d !important;box-shadow:0 0 30px #ff4d4d;}
.ventas{border-color:#00ffff !important;box-shadow:0 0 30px #00ffff;}

</style>
</head>

<body onload="inicio()">

<!-- LOGIN -->
<div id="loginBox" class="login-box">
<div class="login-card">

<h2>TELEDATA IA</h2>

<input id="u" placeholder="Correo">
<input id="p" type="password" placeholder="Contraseña">

<button onclick="login()">Entrar</button>
<button onclick="registrar()" style="background:#003566;color:white;">
Registrar usuario
</button>

</div>
</div>

<!-- APP -->
<div id="appBox" class="hidden">

<div class="card">
📍 <span id="gps">Detectando ubicación...</span>
</div>

<div class="card">
<h3>⚠️ IMEIs Pendientes</h3>
<div id="imeiPendientes"></div>
</div>

<div class="card">
<select id="iTipo">
<option>KIT</option>
<option>CHIP</option>
<option>PORTA</option>
<option>RENUEVATE</option>
</select>

<input id="iTel" placeholder="Teléfono">
<input id="iIme" placeholder="IMEI">
<input id="iProm" placeholder="Promotor">

<button onclick="guardar()">Guardar</button>
</div>

<div class="card">
<table>
<thead><tr><th>Tel</th><th>Tipo</th><th>IMEI</th><th>Promotor</th></tr></thead>
<tbody id="tabla"></tbody>
</table>
</div>

</div>

<!-- HALO -->
<div id="halo" onclick="activarIA()"></div>

<!-- CAMARA -->
<video id="cam" autoplay style="display:none;"></video>

<script>

// FIREBASE
const firebaseConfig={
apiKey:"AIzaSyD4UK_j8UxMwOCtrtXlYftBe_wCLE7psMc",
authDomain:"ventastelcel4029.firebaseapp.com"
};

let auth;
let ventasPrevias=0;

function inicio(){

firebase.initializeApp(firebaseConfig);
auth=firebase.auth();

auth.onAuthStateChanged(user=>{
if(user){
loginBox.classList.add("hidden");
appBox.classList.remove("hidden");
gps();
camara();
cargar();
}else{
loginBox.classList.remove("hidden");
appBox.classList.add("hidden");
}
});
}

// LOGIN
function login(){
auth.signInWithEmailAndPassword(u.value,p.value)
.catch(e=>alert(e.message));
}

// REGISTRO
function registrar(){
auth.createUserWithEmailAndPassword(u.value,p.value)
.then(()=>alert("Usuario creado"))
.catch(e=>alert(e.message));
}

// GPS
function gps(){
navigator.geolocation.watchPosition(p=>{
gps.innerText=`${p.coords.latitude.toFixed(5)}, ${p.coords.longitude.toFixed(5)}`;
});
}

// CAMARA + MOVIMIENTO
function camara(){
navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
cam.srcObject=stream;

// movimiento suave tipo seguimiento
setInterval(()=>{
let x=(Math.random()*40)-20;
let y=(Math.random()*40)-20;
halo.style.transform=`translate(${x}px,${y}px)`;
},800);

});
}

// GUARDAR
function guardar(){

let v={
id:Date.now(),
tel:iTel.value,
tipo:iTipo.value,
imei:iIme.value||"N/A",
prom:iProm.value
};

let l=JSON.parse(localStorage.getItem("ventas_omar")||"[]");
l.unshift(v);
localStorage.setItem("ventas_omar",JSON.stringify(l));

cargar();
}

// CARGAR
function cargar(){

let l=JSON.parse(localStorage.getItem("ventas_omar")||"[]");

tabla.innerHTML=l.map(v=>`
<tr>
<td>${v.tel}</td>
<td>${v.tipo}</td>
<td class="${v.imei==='N/A'?'pendiente':''}">${v.imei}</td>
<td>${v.prom}</td>
</tr>
`).join("");

let pendientes=l.filter(v=>v.imei==="N/A");

imeiPendientes.innerHTML=pendientes.length
? pendientes.map(v=>`<div class="pendiente">${v.prom}</div>`).join("")
:"Sin pendientes";

// 🎨 COLORES IA
halo.classList.remove("alerta","ventas");

if(pendientes.length>0){
halo.classList.add("alerta");
}

if(l.length>ventasPrevias){
halo.classList.add("ventas");
hablar("Nueva venta registrada");
setTimeout(()=>halo.classList.remove("ventas"),1500);
}

ventasPrevias=l.length;
}

// VOZ
function hablar(t){
halo.classList.add("hablando");

let m=new SpeechSynthesisUtterance(t);
m.lang="es-MX";

m.onend=()=>halo.classList.remove("hablando");

speechSynthesis.speak(m);
}

// ACTIVAR IA
function activarIA(){
hablar("Hola, estoy lista para ayudarte.");
}

</script>

</body>
</html>
