<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRIS Enterprise</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;background:#000814;color:white;font-family:'Segoe UI';}
.app{max-width:420px;margin:auto;padding:15px;}
.card{background:rgba(255,255,255,.08);padding:15px;border-radius:15px;margin-bottom:12px;}
.header{text-align:center;color:#ffc300;font-weight:bold;}

input,select{width:100%;padding:10px;margin-top:6px;border-radius:8px;border:none;background:#111;color:white;}
button{width:100%;padding:12px;margin-top:8px;border:none;border-radius:10px;background:#ffc300;font-weight:bold;}

.hidden{display:none;}

#angel{width:120px;animation:float 4s infinite;}
@keyframes float{50%{transform:translateY(-10px);}}

.alerta{animation:pulse .4s infinite alternate;}
@keyframes pulse{100%{filter:drop-shadow(0 0 25px red);}}

#mano{display:none;font-size:40px;text-align:center;}
#chatBox{max-height:120px;overflow:auto;font-size:12px;}
</style>
</head>

<body onload="inicio()">

<!-- LOGIN -->
<div id="loginBox" class="app">
<div class="card">
<div class="header" id="titulo">Acceso IRIS</div>

<input id="email" placeholder="Correo">
<input id="pass" type="password" placeholder="Contraseña">
<input id="tienda" placeholder="Tienda">

<select id="rol">
<option value="promotor">Promotor</option>
<option value="supervisor">Supervisor</option>
</select>

<button onclick="authUser()">Entrar / Registrar</button>

</div>
</div>

<!-- APP -->
<div id="appBox" class="app hidden">

<div class="card" style="text-align:center;">
<img id="angel" src="https://i.ibb.co/Xf8X0vV/angel-blue-animated.png">
<div id="mano">👉</div>
<div id="status">IRIS activa</div>
<video id="cam" autoplay playsinline style="width:100%;border-radius:10px;margin-top:10px;"></video>
</div>

<div class="card">
<input id="webInput" placeholder="Buscar...">
<button onclick="buscarWeb()">Buscar</button>
</div>

<div class="card">
<div id="topProm"></div>
<div id="topTienda"></div>
</div>

<div class="card">
<canvas id="grafica"></canvas>
</div>

<form id="fReg" class="card">

<select id="tipo">
<option>KIT</option>
<option>CHIP</option>
<option>PORTA</option>
<option>RENUEVATE</option>
</select>

<input id="tel" placeholder="Teléfono">

<select id="imei">
<option value="no">IMEI OK</option>
<option value="si">IMEI PENDIENTE</option>
</select>

<button>Guardar Venta</button>

</form>

<div class="card">
<input id="msg" placeholder="Mensaje..." onkeyup="if(event.key==='Enter') enviarChat()">
<div id="chatBox"></div>
</div>

<div id="lista"></div>

</div>

<script>

// CONFIG REAL
const firebaseConfig = {
apiKey: "AIzaSyD4UK_j8UxMwOCtrtXlYftBe_wCLE7psMc",
authDomain: "ventastelcel4029.firebaseapp.com",
databaseURL: "https://ventastelcel4029-default-rtdb.firebaseio.com",
projectId: "ventastelcel4029"
};

let db,auth,usuario={},chart;

// INICIO
function inicio(){
firebase.initializeApp(firebaseConfig);
auth=firebase.auth();
db=firebase.database();

auth.onAuthStateChanged(u=>{
if(u){
cargarUsuario(u.uid);
}
});
}

// LOGIN / REGISTRO
function authUser(){

let e=email.value.trim();
let p=pass.value.trim();

if(!e || !p) return alert("Completa datos");

auth.signInWithEmailAndPassword(e,p)
.then(()=>{})
.catch(()=>{

// REGISTRO AUTOMATICO
auth.createUserWithEmailAndPassword(e,p)
.then(res=>{

db.ref("usuarios/"+res.user.uid).set({
email:e,
tienda:tienda.value,
rol:rol.value
});

})
.catch(err=>alert(err.message));

});

}

// CARGAR USUARIO
function cargarUsuario(uid){

db.ref("usuarios/"+uid).once("value",snap=>{
usuario=snap.val();

loginBox.classList.add("hidden");
appBox.classList.remove("hidden");

iniciarCamara();
hablar("Bienvenido "+usuario.rol);

cargar();
escucharChat();
escucharAlertas();
escucharVentas();

setInterval(cerebroIRIS,60000);
});
}

// VOZ
function hablar(t,modo="normal"){
let m=new SpeechSynthesisUtterance(t);
m.lang="es-MX";
m.pitch=modo==="serio"?0.9:1.2;
speechSynthesis.speak(m);
status.innerText=t;
}

// GUARDAR VENTA
fReg.onsubmit=e=>{
e.preventDefault();

let v={
tel:tel.value,
tipo:tipo.value,
imei:imei.value,
promotor:usuario.email,
tienda:usuario.tienda
};

db.ref("ventas").push(v);

anunciarVenta(v);
cargar();
}

// CARGAR DATOS
function cargar(){

db.ref("ventas").once("value",snap=>{
let data=snap.val()||{};
let arr=Object.values(data);

lista.innerHTML=arr.map(v=>`<div class="card">${v.tel} - ${v.tipo}</div>`).join("");

dashboard(arr);
grafica(arr);
});
}

// DASHBOARD
function dashboard(l){

let prom={},tienda={};

l.forEach(v=>{
prom[v.promotor]=(prom[v.promotor]||0)+1;
tienda[v.tienda]=(tienda[v.tienda]||0)+1;
});

function top(o){return Object.entries(o).sort((a,b)=>b[1]-a[1])[0];}

let p=top(prom);
let t=top(tienda);

topProm.innerText=p?`Top Promotor: ${p[0]}`:"";
topTienda.innerText=t?`Top Tienda: ${t[0]}`:"";
}

// GRAFICA
function grafica(l){

let c={KIT:0,CHIP:0,PORTA:0,RENUEVATE:0};

l.forEach(v=>c[v.tipo]++);

let ctx=document.getElementById("grafica");

if(chart) chart.destroy();

chart=new Chart(ctx,{
type:"bar",
data:{labels:Object.keys(c),datasets:[{data:Object.values(c)}]}
});
}

// IA
function cerebroIRIS(){

db.ref("ventas").once("value",snap=>{
let l=Object.values(snap.val()||{});
let pendientes=l.filter(v=>v.imei==="si");

if(pendientes.length>0){
let p=pendientes[Math.floor(Math.random()*pendientes.length)];
reganarGlobal(p.promotor);
}
});
}

// REGAÑO
function reganarGlobal(nombre){

let msg=`${nombre} debe IMEIs pendientes`;

hablar(msg,"serio");

angel.classList.add("alerta");
mano.style.display="block";

setTimeout(()=>{
angel.classList.remove("alerta");
mano.style.display="none";
},5000);

db.ref("alertas").push({msg});
}

// CHAT
function enviarChat(){
db.ref("chat").push({u:usuario.email,m:msg.value});
msg.value="";
}

function escucharChat(){
db.ref("chat").on("child_added",s=>{
let d=s.val();
chatBox.innerHTML+=`<div><b>${d.u}:</b> ${d.m}</div>`;
});
}

// ALERTAS
function escucharAlertas(){
db.ref("alertas").on("child_added",s=>{
hablar(s.val().msg,"serio");
});
}

// VENTAS
function anunciarVenta(v){
let msg=`${v.promotor} hizo venta`;
hablar(msg);
db.ref("ventas_alertas").push({msg});
}

function escucharVentas(){
db.ref("ventas_alertas").on("child_added",s=>{
hablar(s.val().msg);
});
}

// CAMARA
async function iniciarCamara(){
try{
let stream=await navigator.mediaDevices.getUserMedia({video:true});
cam.srcObject=stream;
}catch(e){}
}

// BUSCAR
function buscarWeb(){
window.open("https://google.com/search?q="+webInput.value);
}

</script>
</body>
</html>
