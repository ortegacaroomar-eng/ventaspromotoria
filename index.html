<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ventas PRO</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:'Segoe UI';
background:linear-gradient(135deg,#001d3d,#003566,#000814);
color:white;
}
.card{
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:15px;
margin:10px;
}
input,select{
width:100%;
padding:12px;
margin:5px 0;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.15);
color:white;
}
button{
background:#ffd60a;
border:none;
padding:12px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}
.hidden{display:none;}
table{width:100%;background:white;color:black;}
td,th{padding:8px;border:1px solid #ddd;}
</style>
</head>

<body onload="inicio()">

<!-- LOGIN -->
<div id="loginBox" class="card" style="max-width:400px;margin:auto;margin-top:80px;text-align:center;">
<h2>🔐 Acceso</h2>

<input id="correo" type="email" placeholder="Correo">
<input id="pass" type="password" placeholder="Contraseña">

<div style="background:black;padding:10px;border-radius:10px;">
<span id="captchaText"></span>
<input id="captchaInput" placeholder="Captcha">
</div>

<button onclick="login()">Entrar</button>
<button onclick="registro()">Registrar</button>
<button onclick="recuperar()">Recuperar</button>
</div>

<!-- APP -->
<div id="appBox" class="hidden">

<div class="card">
<input type="date" id="fecha">
<input id="meta" type="number" placeholder="Meta mensual (ej: 129000)">
</div>

<div class="card">
<select id="tipo">
<option value="TELCEL">TELCEL</option>
<option value="ATT">AT&T</option>
<option value="BAIT">BAIT</option>
</select>

<input id="numero" placeholder="Número">
<input id="marca" placeholder="Marca">

<button onclick="guardar()">Guardar Venta</button>
</div>

<div class="card">
<h3 id="resumen"></h3>
<canvas id="grafica"></canvas>
</div>

<button onclick="reporte()">📄 Reporte Word</button>

<div class="card">
<table>
<thead>
<tr>
<th>Comp</th>
<th>Número</th>
<th>Marca</th>
<th>Fecha</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

</div>

<script>

/* FIREBASE CONFIG */
const firebaseConfig = {
apiKey: "TU_API_KEY",
authDomain: "ventastelcel4029.firebaseapp.com",
projectId: "ventastelcel4029",
appId: "TU_APP_ID"
};

firebase.initializeApp(firebaseConfig);

let auth = firebase.auth();
let db = firebase.firestore();

auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

/* CAPTCHA */
let captcha="";
function generarCaptcha(){
let c="ABCDEFG123456789";
captcha="";
for(let i=0;i<5;i++){
captcha+=c[Math.floor(Math.random()*c.length)];
}
captchaText.innerText=captcha;
}

/* INICIO */
function inicio(){
generarCaptcha();
fecha.value=new Date().toISOString().split("T")[0];

auth.onAuthStateChanged(user=>{
if(user){
loginBox.classList.add("hidden");
appBox.classList.remove("hidden");
cargar();
}
});
}

/* LOGIN */
function login(){

if(captchaInput.value!==captcha){
alert("Captcha incorrecto");
generarCaptcha();
return;
}

auth.signInWithEmailAndPassword(correo.value.trim(),pass.value)
.catch(e=>{
if(e.code==="auth/user-not-found") alert("Usuario no existe");
else if(e.code==="auth/wrong-password") alert("Contraseña incorrecta");
else alert(e.message);
generarCaptcha();
});
}

/* REGISTRO */
function registro(){
auth.createUserWithEmailAndPassword(correo.value.trim(),pass.value)
.then(()=>alert("Registrado"))
.catch(e=>alert(e.message));
}

/* RECUPERAR */
function recuperar(){
auth.sendPasswordResetEmail(correo.value)
.then(()=>alert("Correo enviado"))
.catch(e=>alert(e.message));
}

/* GUARDAR */
function guardar(){

let user=auth.currentUser;
if(!user){ alert("No autenticado"); return; }

let venta={
uid:user.uid,
comp:tipo.value,
num:numero.value,
marca:marca.value,
fecha:fecha.value,
timestamp:new Date()
};

db.collection("ventas").add(venta)
.then(()=>{
alert("Guardado 🔥");
cargar();
});
}

/* CARGAR */
let chart;

function cargar(){

let user=auth.currentUser;

db.collection("ventas")
.where("uid","==",user.uid)
.orderBy("timestamp","desc")
.onSnapshot(snap=>{

let data=[];
snap.forEach(doc=>data.push(doc.data()));

tabla.innerHTML=data.map(v=>`
<tr>
<td>${v.comp}</td>
<td>${v.num}</td>
<td>${v.marca}</td>
<td>${v.fecha}</td>
</tr>
`).join("");

grafica(data);
metaCalculo(data);

});
}

/* GRAFICA */
function grafica(data){

let t=0,a=0,b=0;

data.forEach(v=>{
if(v.comp==="TELCEL") t++;
if(v.comp==="ATT") a++;
if(v.comp==="BAIT") b++;
});

let ctx=document.getElementById("grafica").getContext("2d");

let datos={
labels:["Telcel","AT&T","BAIT"],
datasets:[{label:"Ventas",data:[t,a,b]}]
};

if(chart){
chart.data=datos;
chart.update();
}else{
chart=new Chart(ctx,{type:"bar",data:datos});
}
}

/* META */
function metaCalculo(data){

let metaVal=parseInt(meta.value)||0;

let total=data.length;

let hoy=new Date();
let diasRest=30-hoy.getDate();

let faltante=metaVal-total;
let diario=Math.ceil(faltante/diasRest);

resumen.innerHTML=`
Total ventas: ${total} <br>
Meta: ${metaVal} <br>
Faltan: ${faltante} <br>
Debes vender diario: ${diario}
`;
}

/* REPORTE */
function reporte(){

db.collection("ventas").get().then(snap=>{

let html=`<table border="1">
<tr><th>Comp</th><th>Número</th><th>Marca</th><th>Fecha</th></tr>`;

snap.forEach(doc=>{
let v=doc.data();
html+=`<tr>
<td>${v.comp}</td>
<td>${v.num}</td>
<td>${v.marca}</td>
<td>${v.fecha}</td>
</tr>`;
});

html+="</table>";

let blob=new Blob(['\ufeff',html],{type:"application/msword"});
let url=URL.createObjectURL(blob);

let a=document.createElement("a");
a.href=url;
a.download="reporte.doc";
a.click();

});

}

</script>

</body>
</html>
