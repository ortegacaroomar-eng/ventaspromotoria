<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditor PRO | Omar</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --bg-grad: linear-gradient(135deg, #0b0d17, #1e293b);
            --card-bg: rgba(255, 255, 255, 0.08);
            --accent: #ffc300;
        }

        /* Modo Oscuro Automático (Noche) */
        .night-mode {
            --bg-grad: linear-gradient(135deg, #020617, #0f172a);
            --card-bg: rgba(0, 0, 0, 0.4);
            --accent: #ffd60a;
        }

        body { margin:0; font-family:'Segoe UI', sans-serif; background: var(--bg-grad); color:white; transition: 0.5s; }
        .app { max-width:480px; margin:auto; padding:20px; }
        .card { background: var(--card-bg); backdrop-filter: blur(12px); border-radius: 16px; padding: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }
        
        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .btn-salir { background: #e63946; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 11px; }
        
        .tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab { flex: 1; padding: 10px; border-radius: 10px; background: rgba(255,255,255,0.1); text-align: center; cursor: pointer; font-size: 12px; font-weight: 600; }
        .tab.active { background: var(--accent); color: #003566; }

        .input-group { position: relative; margin-top: 8px; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: none; background: rgba(255,255,255,0.15); color: white; box-sizing: border-box; outline: none; }
        
        /* Botón de Scan dentro del input */
        .btn-scan { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: var(--accent); border: none; border-radius: 6px; padding: 5px 8px; cursor: pointer; font-size: 14px; }

        button.main-btn { background: var(--accent); color: #003566; padding: 14px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; font-size: 14px; box-shadow: 0 4px 15px rgba(255,195,0,0.2); }
        
        /* Scanner Overlay */
        #reader { width: 100%; border-radius: 12px; overflow: hidden; display: none; margin-bottom: 10px; }

        /* Notification Toast */
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1b4332; color: #74c69d; padding: 12px 25px; border-radius: 50px; font-size: 13px; font-weight: bold; display: none; z-index: 100; border: 1px solid #74c69d; }

        .hidden { display: none !important; }
        table { width: 100%; font-size: 11px; border-collapse: collapse; margin-top: 10px; }
        th, td { border-bottom: 1px solid rgba(255,255,255,0.1); padding: 10px 5px; }
        th { color: var(--accent); font-size: 9px; text-transform: uppercase; }
        .fade { animation: fade 0.3s ease; }
        @keyframes fade { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }
    </style>
</head>
<body onload="inicio()">

<div id="toast">✅ REGISTRO SINCRONIZADO</div>

<div class="app">
    <div id="loginBox" class="fade">
        <div class="card" style="text-align: center; margin-top: 40px;">
            <h2 style="color:var(--accent)">AUDITOR PRO</h2>
            <input type="email" id="correo" placeholder="Email">
            <input type="password" id="pass" placeholder="Contraseña">
            <button class="main-btn" onclick="loginEmail()">INGRESAR</button>
            <button onclick="loginGoogle()" style="background:transparent; color:white; border:1px solid rgba(255,255,255,0.3); margin-top:10px; padding:10px; border-radius:10px; width:100%;">G Google Login</button>
        </div>
    </div>

    <div id="appBox" class="hidden fade">
        <div class="nav-header">
            <span id="txtUser" style="color:var(--accent); font-weight:bold;"></span>
            <button class="btn-salir" onclick="salir()">Salir</button>
        </div>

        <div class="card">
            <input type="date" id="fechaFiltro" onchange="cargarTodo()">
        </div>

        <div class="tabs">
            <div id="tabTELCEL" class="tab active" onclick="setComp('TELCEL')">TELCEL</div>
            <div id="tabATT" class="tab" onclick="setComp('ATT')">AT&T</div>
            <div id="tabBAIT" class="tab" onclick="setComp('BAIT')">BAIT</div>
        </div>

        <div id="reader"></div>

        <div class="card">
            <select id="tipoProceso" onchange="renderForm()">
                <option value="VENTA">TIPO DE PROCESO</option>
                <option value="PORTA">PORTABILIDAD</option>
                <option value="RENUEVATE">RENUÉVATE</option>
                <option value="AK">EQUIPO / AK</option>
            </select>
            <div id="formContainer"></div>
        </div>

        <button class="main-btn" onclick="obtenerUbicacionYGuardar()">💾 GUARDAR Y SINCRONIZAR</button>

        <div class="card">
            <h3 style="font-size:12px; color:var(--accent)">HISTORIAL DEL DÍA</h3>
            <table id="tabla">
                <thead>
                    <tr><th>Número</th><th>Proceso</th><th>Compañía</th><th></th></tr>
                </thead>
                <tbody id="cuerpoSincro"></tbody>
            </table>
        </div>

        <div class="card"><canvas id="grafica"></canvas></div>
        <button onclick="descargarExcel()" style="background:#064e3b; color:#34d399; border:none; padding:12px; border-radius:10px; width:100%; font-weight:bold;">📊 EXPORTAR EXCEL</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD4UK_j8UxMwOCtrtXlYftBe_wCLE7psMc",
        authDomain: "ventastelcel4029.firebaseapp.com",
        databaseURL: "https://ventastelcel4029-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let compActiva = "TELCEL";
    let todasVentas = {};
    let html5QrCode;

    function inicio() {
        checkTimeMode();
        document.getElementById("fechaFiltro").value = new Date().toISOString().split("T")[0];
        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById("loginBox").classList.add("hidden");
                document.getElementById("appBox").classList.remove("hidden");
                document.getElementById("txtUser").innerText = "👤 " + (user.displayName || "Promotor");
                escucharDatos();
                renderForm();
            }
        });
    }

    // MODO OSCURO AUTOMÁTICO
    function checkTimeMode() {
        const hora = new Date().getHours();
        if (hora >= 19 || hora <= 7) {
            document.body.classList.add('night-mode');
        }
    }

    // NOTIFICACIÓN IN-APP
    function showNotify(msg) {
        const t = document.getElementById("toast");
        t.innerText = msg;
        t.style.display = "block";
        setTimeout(() => { t.style.display = "none"; }, 3000);
    }

    // SCANNER LOGIC
    function startScan(targetId) {
        const reader = document.getElementById("reader");
        reader.style.display = "block";
        html5QrCode = new Html5Qrcode("reader");
        
        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: { width: 250, height: 150 } },
            (decodedText) => {
                document.getElementById(targetId).value = decodedText;
                stopScan();
                showNotify("📷 CÓDIGO LEÍDO");
            }
        ).catch(err => alert("Error de cámara"));
    }

    function stopScan() {
        if(html5QrCode) {
            html5QrCode.stop().then(() => {
                document.getElementById("reader").style.display = "none";
            });
        }
    }

    function renderForm() {
        let html = "";
        const tp = document.getElementById("tipoProceso").value;
        const needsScan = ["f_icc", "f_imei"];

        const fields = {
            PORTA: ["f_num", "f_icc", "f_nip"],
            RENUEVATE: ["f_num", "f_marca", "f_mod", "f_icc", "f_imei"],
            AK: ["f_num", "f_marca", "f_mod", "f_imei", "f_icc"]
        };

        const currentFields = fields[tp] || ["f_num", "f_icc"];
        
        currentFields.forEach(f => {
            const placeholder = f.replace("f_", "").toUpperCase();
            html += `<div class="input-group">
                <input id="${f}" placeholder="${placeholder}">
                ${needsScan.includes(f) ? `<button class="btn-scan" onclick="startScan('${f}')">📷</button>` : ''}
            </div>`;
        });
        document.getElementById("formContainer").innerHTML = html;
    }

    // FIREBASE & UTILS (Se mantienen de tu versión pero con el Toast)
    async function obtenerUbicacionYGuardar() {
        showNotify("📡 UBICANDO GPS...");
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                guardar("Ubicación GPS");
            }, () => guardar("Sin GPS"));
        } else { guardar("No disponible"); }
    }

    function guardar(loc) {
        const inputFecha = document.getElementById("fechaFiltro").value;
        const partes = inputFecha.split('-');
        const data = {
            comp: compActiva,
            proceso: document.getElementById("tipoProceso").value,
            fecha: inputFecha,
            fechaExcel: `${partes[2]}/${partes[1]}/${partes[0]}`,
            num: document.getElementById("f_num")?.value || "",
            icc: document.getElementById("f_icc")?.value || "",
            imei: document.getElementById("f_imei")?.value || "",
            ubicacion: loc
        };

        db.ref('ventas').push(data).then(() => {
            showNotify("✅ SINCRONIZADO");
            renderForm();
        });
    }

    function escucharDatos() {
        db.ref('ventas').on('value', snap => {
            todasVentas = snap.val() || {};
            cargarTodo();
        });
    }

    function cargarTodo() {
        const filtro = document.getElementById("fechaFiltro").value;
        const cuerpo = document.getElementById("cuerpoSincro");
        cuerpo.innerHTML = "";
        Object.keys(todasVentas).reverse().forEach(id => {
            const v = todasVentas[id];
            if(v.fecha === filtro) {
                cuerpo.innerHTML += `<tr><td>${v.num}</td><td>${v.proceso}</td><td>${v.comp}</td><td><button class="btn-del" onclick="eliminar('${id}')">🗑️</button></td></tr>`;
            }
        });
    }

    function eliminar(id) {
        if(confirm("¿Borrar?")) db.ref('ventas/' + id).remove().then(() => showNotify("🗑️ ELIMINADO"));
    }

    function loginEmail() {
        auth.signInWithEmailAndPassword(correo.value, pass.value).catch(e => alert(e.message));
    }
    function loginGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function salir() { auth.signOut().then(() => window.location.reload()); }
    function setComp(c) {
        compActiva = c;
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        document.getElementById("tab"+c).classList.add("active");
        renderForm();
    }
</script>
</body>
</html>
