<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auditor Telcel PRO | Privacidad Excel</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body { margin:0; font-family:'Segoe UI', sans-serif; background: #000814; color:white; }
.app { max-width:1100px; margin:auto; padding:20px; }
.card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius:15px; padding:20px; margin-bottom:15px; border: 1px solid rgba(255,255,255,0.1); }
input, select { width:100%; padding:12px; border-radius:10px; border:none; background:rgba(255,255,255,0.2); color:white; margin-bottom:10px; box-sizing: border-box; }
button { background: #ffc300; color:#001d3d; padding:14px; border:none; border-radius:12px; font-weight:bold; cursor:pointer; width:100%; margin-bottom:10px; transition: 0.3s; }
button:hover { opacity: 0.9; transform: scale(1.01); }
.hidden { display:none; }
table { width:100%; background:white; color:black; border-collapse: collapse; border-radius: 10px; overflow: hidden; font-size: 13px; }
td, th { border:1px solid #ddd; padding:10px; text-align: left; }
th { background: #eee; }
.btn-salir { background: #d00000; color: white; width: auto; padding: 5px 15px; float: right; margin-bottom: 10px; }
.btn-del { background: #ff4d4d; color: white; padding: 5px 8px; border-radius: 5px; cursor: pointer; border: none; font-size: 12px; }
label { display: block; margin-bottom: 5px; font-size: 12px; color: #ffc300; font-weight: bold; }
</style>
</head>

<body onload="inicio()">

<div id="loginBox" class="card" style="max-width:400px;margin:80px auto;text-align:center;">
    <h2 style="color:#ffc300;">🗂️ Acceso Auditor</h2>
    <input id="correo" type="email" placeholder="Tu Correo">
    <input id="pass" type="password" placeholder="Tu Contraseña">
    <button onclick="login()">ENTRAR</button>
</div>

<div id="appBox" class="app hidden">
    <button class="btn-salir" onclick="salir()">Cerrar Sesión</button>
    <h2 id="saludo" style="color:#ffc300; margin: 0 0 20px 0;">Panel de Ventas</h2>

<div class="card">
    <label>📅 Fecha</label>
    <input type="date" id="fecha">
    <label>📡 Compañía</label>
    <select id="tipo" onchange="mostrarCampos()">
        <option value="TELCEL">TELCEL</option>
        <option value="ATT">AT&T</option>
        <option value="BAIT">BAIT</option>
    </select>
</div>

<div id="telcelBox" class="card">
    <label>Tipo de Proceso</label>
    <select id="tTipo" onchange="ajustarFormularioTelcel()">
        <option value="AK">AK</option>
        <option value="CHIP">CHIP</option>
        <option value="PORTA">PORTA</option>
        <option value="RENUEVATE">RENUEVATE</option>
    </select>
    <div id="f_num"><input id="tNum" placeholder="Número Telefónico"></div>
    <div id="f_marca"><input id="tMarca" placeholder="Marca"></div>
    <div id="f_modelo"><input id="tModelo" placeholder="Modelo"></div>
    <div id="f_iccid"><input id="tICCID" placeholder="ICCID Nuevo / Chip"></div>
    <div id="f_iccid_ant"><input id="tICCID_ant" placeholder="ICCID Antiguo"></div>
    <div id="f_imei"><input id="tIMEI" placeholder="IMEI"></div>
    <div id="f_nip"><input id="tNip" placeholder="NIP"></div>
    <div id="f_ak_nuevo"><input id="tAkNuevo" placeholder="AK Nuevo"></div>
</div>

<button onclick="guardar()">💾 GUARDAR VENTA</button>

<div class="card"><canvas id="grafica"></canvas></div>

<div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <h3 style="color:#ffc300;">🔍 Detalle Técnico Telcel</h3>
        <button onclick="descargarExcel()" style="width:auto; background:#2b9348; color:white; padding: 8px 15px;">📊 EXCEL (SIN NIP/AK)</button>
    </div>
    <div style="overflow-x:auto;">
        <table>
            <thead>
                <tr><th>Fecha</th><th>Número</th><th>Proceso</th><th>Detalles Técnicos</th><th>Borrar</th></tr>
            </thead>
            <tbody id="cuerpoTel"></tbody>
        </table>
    </div>
</div>

</div>

<script>
const firebaseConfig = { 
    apiKey: "AIzaSyD4UK_j8UxMwOCtrtXlYftBe_wCLE7psMc", 
    authDomain: "ventastelcel4029.firebaseapp.com",
    databaseURL: "https://ventastelcel4029-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
let auth = firebase.auth();
let db = firebase.database();
let chart;
let todasVentasRaw = {};

function inicio(){
    fecha.value = new Date().toISOString().split("T")[0];
    ajustarFormularioTelcel();
    auth.onAuthStateChanged(user => {
        if(user){
            loginBox.classList.add("hidden");
            appBox.classList.remove("hidden");
            escucharDatos();
        }
    });
}

function escucharDatos() {
    db.ref('ventas').on('value', (snapshot) => {
        todasVentasRaw = snapshot.val() || {};
        cargarTablas();
        actualizarGrafica();
    });
}

function ajustarFormularioTelcel() {
    const p = tTipo.value;
    const campos = ["f_num", "f_marca", "f_modelo", "f_iccid", "f_iccid_ant", "f_imei", "f_nip", "f_ak_nuevo"];
    campos.forEach(c => document.getElementById(c).classList.add("hidden"));

    if(p === "AK") ["f_num", "f_marca", "f_modelo", "f_iccid", "f_imei"].forEach(c => document.getElementById(c).classList.remove("hidden"));
    else if(p === "CHIP") ["f_num", "f_iccid"].forEach(c => document.getElementById(c).classList.remove("hidden"));
    else if(p === "PORTA") ["f_num", "f_iccid", "f_nip"].forEach(c => document.getElementById(c).classList.remove("hidden"));
    else if(p === "RENUEVATE") ["f_num", "f_iccid", "f_iccid_ant", "f_imei", "f_ak_nuevo"].forEach(c => document.getElementById(c).classList.remove("hidden"));
}

function login(){ auth.signInWithEmailAndPassword(correo.value, pass.value); }
function salir(){ auth.signOut().then(()=>window.location.reload()); }

function guardar(){
    let v = { 
        comp: tipo.value, 
        fecha: fecha.value, 
        num: tNum.value,
        proceso: tTipo.value,
        marca: tMarca.value, 
        modelo: tModelo.value,
        iccid: tICCID.value, 
        iccid_ant: tICCID_ant.value,
        imei: tIMEI.value, 
        nip: tNip.value, 
        ak_nuevo: tAkNuevo.value 
    };
    db.ref('ventas').push(v).then(() => alert("Guardado"));
}

function eliminarVenta(id) { if(confirm("¿Borrar?")) db.ref('ventas/' + id).remove(); }

function cargarTablas(){
    cuerpoTel.innerHTML = "";
    Object.keys(todasVentasRaw).reverse().forEach(id => {
        const v = todasVentasRaw[id];
        if(v.comp === "TELCEL") {
            let detalles = `<b>ICCID:</b> ${v.iccid || '--'}`;
            if(v.imei) detalles += ` | <b>IMEI:</b> ${v.imei}`;
            if(v.nip) detalles += ` | <b>NIP:</b> ${v.nip}`;
            if(v.ak_nuevo) detalles += ` | <b>AK:</b> ${v.ak_nuevo}`;

            cuerpoTel.innerHTML += `<tr><td>${v.fecha}</td><td>${v.num}</td><td>${v.proceso}</td><td>${detalles}</td><td><button class="btn-del" onclick="eliminarVenta('${id}')">🗑️</button></td></tr>`;
        }
    });
}

function descargarExcel(){
    const ventasArray = Object.values(todasVentasRaw);
    const wb = XLSX.utils.book_new();
    const meses = [...new Set(ventasArray.map(v => v.fecha.substring(0, 7)))].sort().reverse();
    
    meses.forEach(mes => {
        let datos = ventasArray.filter(v => v.fecha.startsWith(mes)).map(v => ({
            "FECHA": v.fecha, 
            "COMPAÑÍA": v.comp, 
            "PROCESO": v.proceso, 
            "NÚMERO": v.num,
            "MARCA/MOD": `${v.marca || ''} ${v.modelo || ''}`, 
            "ICCID": v.iccid, 
            "ICCID ANT": v.iccid_ant,
            "IMEI": v.imei
            // El NIP y AK han sido eliminados de aquí para que no salgan en el Excel
        }));
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(datos), mes);
    });
    XLSX.writeFile(wb, "Reporte_Auditoria_Ventas.xlsx");
}

function actualizarGrafica() {
    let counts = { TELCEL: 0, ATT: 0, BAIT: 0 };
    Object.values(todasVentasRaw).forEach(v => { if(v.fecha === fecha.value) counts[v.comp]++; });
    const ctx = document.getElementById("grafica").getContext("2d");
    if(chart) chart.destroy();
    chart = new Chart(ctx, {
        type: "bar",
        data: { labels: ["Telcel", "AT&T", "BAIT"], datasets: [{ label: 'Hoy', data: [counts.TELCEL, counts.ATT, counts.BAIT], backgroundColor: ['#ffc300', '#00b4d8', '#ef233c'] }] }
    });
}
</script>
</body>
</html>
