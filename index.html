<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teledata PRO</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<style>
body { margin:0; font-family:'Segoe UI'; background:#001d3d; color:white; }
.app { max-width:1000px; margin:auto; padding:20px; }
.card { background:rgba(255,255,255,.08); padding:15px; border-radius:12px; margin-bottom:15px; }
input,select { width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:none; }
button { width:100%; padding:12px; border:none; border-radius:10px; background:#ffc300; }
.login { max-width:300px; margin:100px auto; background:white; color:black; padding:20px; }

table { width:100%; border-collapse: collapse; background:white; color:black; font-size:12px; }
th { background:black; color:white; padding:8px; }
td { padding:8px; border:1px solid #ccc; }

.pendiente { color:#ff4d4d; font-weight:bold; }
</style>
</head>

<body onload="inicio()">

<div id="loginBox" class="login">
<h3>Login</h3>
<input id="u" placeholder="Correo">
<input id="p" type="password" placeholder="Pass">
<button onclick="login()">Entrar</button>
</div>

<div id="appBox" class="app" style="display:none;">

<!-- ⚠️ IMEIs PENDIENTES -->
<div class="card">
<h3>⚠️ IMEIs Pendientes</h3>
<div id="imeiPendientes"></div>
</div>

<!-- FORM -->
<div class="card">
<select id="tipo">
<option>KIT</option>
<option>CHIP</option>
<option>PORTA</option>
<option>RENUEVATE</option>
</select>

<input id="tel" placeholder="Teléfono">
<input id="imei" placeholder="IMEI (opcional)">
<input id="prom" placeholder="Promotor">

<button onclick="guardar()">Guardar</button>
</div>

<!-- TABLA -->
<div class="card">
<table>
<thead>
<tr>
<th>Teléfono</th>
<th>Tipo</th>
<th>IMEI</th>
<th>Promotor</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSy...",
authDomain:"ventastelcel4029.firebaseapp.com"
};

let auth;

function inicio(){
firebase.initializeApp(firebaseConfig);
auth=firebase.auth();

auth.onAuthStateChanged(u=>{
if(u){
loginBox.style.display="none";
appBox.style.display="block";
cargar();
}else{
loginBox.style.display="block";
appBox.style.display="none";
}
});
}

function login(){
auth.signInWithEmailAndPassword(u.value,p.value)
.catch(()=>{
auth.createUserWithEmailAndPassword(u.value,p.value);
});
}

function guardar(){

let v={
id:Date.now(),
tel:tel.value,
tipo:tipo.value,
imei:imei.value || "N/A",
prom:prom.value
};

let l=JSON.parse(localStorage.getItem("ventas_omar")||"[]");
l.unshift(v);
localStorage.setItem("ventas_omar",JSON.stringify(l));

cargar();
}

// 🔥 CARGA COMPLETA
function cargar(){

let l=JSON.parse(localStorage.getItem("ventas_omar")||"[]");

// TABLA ORDENADA
tabla.innerHTML=l.map(v=>`
<tr>
<td>${v.tel}</td>
<td>${v.tipo}</td>
<td class="${v.imei==="N/A"?'pendiente':''}">${v.imei}</td>
<td>${v.prom}</td>
</tr>
`).join("");

// IMEIs PENDIENTES
let pendientes=l.filter(v=>v.imei==="N/A");

imeiPendientes.innerHTML=pendientes.length
? pendientes.map(v=>`<div class="pendiente">${v.prom} - ${v.tel}</div>`).join("")
: "Sin pendientes";

// VOZ SUPERVISOR
if(pendientes.length){
hablar(`Atención equipo, hay ${pendientes.length} IMEIs pendientes.`);
}

}

// VOZ
function hablar(t){
let m=new SpeechSynthesisUtterance(t);
m.lang="es-MX";
speechSynthesis.speak(m);
}

</script>

</body>
</html>
