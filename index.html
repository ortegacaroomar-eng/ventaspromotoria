<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Telcel Cloud - Sincronizado</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root { --gold: #ffd60a; --dark: #000814; --glass: rgba(255, 255, 255, 0.1); }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle at top, #001d3d, var(--dark)); color: white; min-height: 100vh; }
        .app { max-width: 1200px; margin: auto; padding: 20px; }
        .card { background: var(--glass); backdrop-filter: blur(15px); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: white; margin-bottom: 12px; box-sizing: border-box; }
        .btn { background: var(--gold); color: #000; padding: 14px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; margin-bottom: 5px; }
        .btn-excel { background: #2b9348; color: white; }
        .table-container { background: white; border-radius: 15px; overflow: hidden; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; color: #222; font-size: 0.8em; }
        th { background: #f1f1f1; padding: 10px; text-align: left; }
        td { padding: 8px 10px; border-bottom: 1px solid #eee; }
        .hidden { display: none; }
        .status-online { color: #00ff00; font-size: 0.8em; text-align: right; }
    </style>
</head>
<body onload="inicio()">

<div id="loginBox" class="card" style="max-width:400px; margin: 100px auto; text-align: center;">
    <h2 style="color: var(--gold);">☁️ Acceso en la Nube</h2>
    <input id="correo" type="email" placeholder="Correo">
    <input id="pass" type="password" placeholder="Contraseña">
    <button class="btn" onclick="login()">Entrar</button>
    <button class="btn" style="background:transparent; color:white; border:1px solid white;" onclick="registro()">Crear Cuenta</button>
</div>

<div id="appBox" class="app hidden">
    <div style="display:flex; justify-content: space-between; align-items:center;">
        <h2 style="color:var(--gold);">Panel Telcel <span style="font-size: 0.5em; color:white;">(Sincronizado)</span></h2>
        <button onclick="logout()" style="background:red; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">Salir</button>
    </div>

    <div class="grid">
        <div class="card">
            <label>Fecha Operación</label>
            <input type="date" id="fechaIn">
            <select id="compIn" onchange="alternar()">
                <option value="TELCEL">TELCEL</option>
                <option value="ATT">AT&T</option>
                <option value="BAIT">BAIT</option>
            </select>
            <input id="numIn" placeholder="Número">
            <input id="marcaIn" placeholder="Marca">
            <input id="modeloIn" placeholder="Modelo">

            <div id="boxTelcel">
                <select id="tipoTelcel"><option>PORTA</option><option>RENUEVATE</option><option>CHIP</option></select>
                <input id="imeiIn" placeholder="IMEI">
                <input id="iccidIn" placeholder="ICCID">
            </div>

            <div id="boxOtras" class="hidden">
                <label>¿Chip Telcel?</label>
                <select id="chipPregunta"><option value="NO">NO</option><option value="SI">SÍ</option></select>
            </div>

            <button class="btn" onclick="guardarFirebase()">🚀 Subir a la Nube</button>
            <button class="btn btn-excel" onclick="exportarExcel()">📊 Descargar Excel</button>
        </div>

        <div class="card">
            <canvas id="chartCloud"></canvas>
        </div>
    </div>

    <div class="card">
        <h3>📋 Historial en Tiempo Real</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr><th>Fecha</th><th>Comp.</th><th>Detalle</th><th>Número</th><th>Modelo</th><th>IMEI/ICCID</th></tr>
                </thead>
                <tbody id="tablaCuerpo"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Configuración de Firebase (Se usa la tuya de Telcel)
    const firebaseConfig = {
        apiKey: "AIzaSyD4UK_j8UxMwOCtrtXlYftBe_wCLE7psMc",
        authDomain: "ventastelcel4029.firebaseapp.com",
        projectId: "ventastelcel4029",
        storageBucket: "ventastelcel4029.appspot.com",
        messagingSenderId: "542284923420",
        appId: "1:542284923420:web:4887352d12e86095690623"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore(); // Base de datos en la nube
    let chart;

    function inicio() {
        document.getElementById('fechaIn').value = new Date().toISOString().split('T')[0];
        
        auth.onAuthStateChanged(user => {
            if (user) {
                loginBox.classList.add('hidden');
                appBox.classList.remove('hidden');
                escucharDatos(); // Activa la sincronización en vivo
            } else {
                loginBox.classList.remove('hidden');
                appBox.classList.add('hidden');
            }
        });
    }

    function alternar() {
        const c = document.getElementById('compIn').value;
        document.getElementById('boxTelcel').classList.toggle('hidden', c !== 'TELCEL');
        document.getElementById('boxOtras').classList.toggle('hidden', c === 'TELCEL');
    }

    // --- ACCIONES DE NUBE ---

    function login() {
        auth.signInWithEmailAndPassword(correo.value, pass.value).catch(e => alert(e.message));
    }

    function registro() {
        auth.createUserWithEmailAndPassword(correo.value, pass.value).then(() => alert("Cuenta creada")).catch(e => alert(e.message));
    }

    function logout() { auth.signOut(); }

    function guardarFirebase() {
        const user = auth.currentUser;
        const comp = document.getElementById('compIn').value;
        
        const venta = {
            userId: user.uid,
            fecha: document.getElementById('fechaIn').value,
            compania: comp,
            numero: document.getElementById('numIn').value,
            marca: document.getElementById('marcaIn').value,
            modelo: document.getElementById('modeloIn').value,
            imei: document.getElementById('imeiIn').value || "N/A",
            iccid: document.getElementById('iccidIn').value || "N/A",
            detalle: comp === 'TELCEL' ? tipoTelcel.value : chipPregunta.value,
            timestamp: firebase.firestore.FieldValue.serverTimestamp() // Para orden exacto
        };

        db.collection("ventas").add(venta).then(() => {
            alert("Sincronizado con todos los dispositivos");
            document.querySelectorAll('input:not([type="date"])').forEach(i => i.value = "");
        });
    }

    // Esta función "escucha" la nube. Si alguien agrega algo desde otro cel, esto se actualiza solo.
    function escucharDatos() {
        db.collection("ventas")
          .orderBy("timestamp", "desc")
          .onSnapshot(snapshot => {
            let datos = [];
            let html = "";
            let t = 0, a = 0, b = 0;

            snapshot.forEach(doc => {
                const v = doc.data();
                datos.push(v);
                if(v.compania === 'TELCEL') t++;
                if(v.compania === 'ATT') a++;
                if(v.compania === 'BAIT') b++;

                html += `<tr>
                    <td>${v.fecha}</td>
                    <td><b>${v.compania}</b></td>
                    <td>${v.detalle}</td>
                    <td>${v.numero}</td>
                    <td>${v.modelo}</td>
                    <td>${v.imei} / ${v.iccid}</td>
                </tr>`;
            });

            document.getElementById('tablaCuerpo').innerHTML = html;
            window.datosActuales = datos; // Para el excel
            actualizarGrafica(t, a, b);
        });
    }

    function actualizarGrafica(t, a, b) {
        const ctx = document.getElementById('chartCloud').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: ['Telcel', 'AT&T', 'BAIT'],
                datasets: [{ data: [t, a, b], backgroundColor: ['#ffd60a', '#00b4d8', '#ef233c'] }]
            },
            options: { plugins: { legend: { labels: { color: 'white' } } } }
        });
    }

    function exportarExcel() {
        if(!window.datosActuales) return;
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.json_to_sheet(window.datosActuales);
        XLSX.utils.book_append_sheet(wb, ws, "Ventas_Sincronizadas");
        XLSX.writeFile(wb, "Reporte_Cloud_Ventas.xlsx");
    }
</script>
</body>
</html>
