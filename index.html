<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Ventas PRO</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js">/* ===== IA PREDICCIÓN SIMPLE ===== */ function predecirVentas(data){ // predicción básica por promedio de últimos días let dias={};

data.forEach(v=>{ if(!v.fecha) return; dias[v.fecha]=(dias[v.fecha]||0)+1; });

let valores=Object.values(dias); if(valores.length===0) return 0;

let promedio=valores.reduce((a,b)=>a+b,0)/valores.length; return Math.round(promedio); }

async function mostrarPrediccion(){ const snap=await db.collection("ventas") .where("uid","==",auth.currentUser.uid) .get();

let l=snap.docs.map(d=>d.data()); let pred=predecirVentas(l);

let box=document.getElementById("prediccion"); if(box) box.innerText=pred+" ventas estimadas mañana"; }

// llamar predicción después de render const oldRender=render; render=async function(){ await oldRender(); mostrarPrediccion(); }

</script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>
body{margin:0;font-family:sans-serif;background:#0a0f1f;color:white}
.hidden{display:none}
.app{padding:20px;max-width:1200px;margin:auto}
.card{background:#111a33;padding:15px;border-radius:15px;margin-bottom:15px}
input,select{width:100%;padding:10px;margin-bottom:10px;border-radius:8px;border:none}
button{padding:10px;border:none;border-radius:10px;cursor:pointer}
.btn-primary{background:#ffc300}
.btn-danger{background:#ff4d4d;color:white}
table{width:100%;background:white;color:black;border-collapse:collapse}
td,th{padding:6px;border:1px solid #ddd}
th{background:#000;color:#fff;position:relative}
th::after{content:"⬍";position:absolute;right:6px;font-size:10px;opacity:.7}
.login{max-width:300px;margin:100px auto;background:white;color:black;padding:20px;border-radius:15px}
</style></head>
<body><div id="loginBox" class="login">
<h3>Login</h3>
<input id="u" placeholder="Correo">
<input id="p" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
</div><div id="appBox" class="app hidden">
<h2>Dashboard Ventas</h2><div class="card">
<h3>Total Ventas: <span id="total">0</span></h3>
</div><div class="card">
<canvas id="grafica"></canvas>
</div><div class="card">
<input id="buscar" placeholder="Buscar..." onkeyup="buscarTabla()">
</div><form id="fReg" class="card">
<select id="tipo">
<option>KIT</option>
<option>CHIP</option>
<option>PORTA</option>
</select>
<input id="tel" placeholder="Celular">
<input id="icc" placeholder="ICCID">
<button class="btn-primary">Guardar</button>
</form><table>
<thead><tr><th>Cel</th><th>Tipo</th><th>ICCID</th><th></th></tr></thead>
<tbody id="tabla"></tbody>
</table><button onclick="excel()" class="btn-primary">Exportar Excel</button>

</div><script>
const firebaseConfig={
apiKey:"AIzaSyD4UK_j8UxMwOCtrtXlYftBe_wCLE7psMc",
authDomain:"ventastelcel4029.firebaseapp.com",
projectId:"ventastelcel4029"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();
let chart;

function login(){
auth.signInWithEmailAndPassword(u.value,p.value);
}

auth.onAuthStateChanged(user=>{
loginBox.classList.toggle("hidden",!!user);
appBox.classList.toggle("hidden",!user);
if(user) render();
});

fReg.onsubmit=async e=>{
e.preventDefault();
await db.collection("ventas").add({
uid:auth.currentUser.uid,
tipo:tipo.value,
cel:tel.value,
icc:icc.value,
timestamp:Date.now(),
fecha:new Date().toLocaleDateString()
});
fReg.reset();
render();
};

async function render(){
const snap=await db.collection("ventas")
.where("uid","==",auth.currentUser.uid)
.get();

let data=[];
let tipos={KIT:0,CHIP:0,PORTA:0};

tabla.innerHTML=snap.docs.map(d=>{
let v=d.data();
tipos[v.tipo]++;
data.push(v);
return `<tr>
<td>${v.cel}</td>
<td>${v.tipo}</td>
<td>${v.icc}</td>
<td><button onclick="del('${d.id}')">X</button></td>
</tr>`;
}).join('');

total.innerText=data.length;

if(chart) chart.destroy();
chart=new Chart(grafica,{
type:'bar',
data:{
labels:Object.keys(tipos),
datasets:[{data:Object.values(tipos)}]
}
});
}

async function del(id){
await db.collection("ventas").doc(id).delete();
render();
}

function buscarTabla(){
let txt=buscar.value.toLowerCase();
document.querySelectorAll("#tabla tr").forEach(f=>{
f.style.display=f.innerText.toLowerCase().includes(txt)?"":"none";
});
}

/* EXCEL PRO */
async function excel(){
const snap=await db.collection("ventas")
.where("uid","==",auth.currentUser.uid)
.get();

let l=snap.docs.map(d=>d.data());
if(!l.length) return alert("Sin datos");

const headers=["CELULAR","TIPO","ICCID","FECHA"];
let data=[headers];

l.forEach(v=>{
data.push([v.cel,v.tipo,v.icc,v.fecha]);
});

const ws=XLSX.utils.aoa_to_sheet(data);

// ancho columnas
ws["!cols"]=[{wch:18},{wch:12},{wch:25},{wch:15}];

// autofiltro con flechas
ws["!autofilter"]={ref:"A1:D"+(l.length+1)};

// congelar encabezado
ws["!freeze"]={xSplit:0,ySplit:1};

// estilo encabezado
for(let c=0;c<headers.length;c++){
const cell=XLSX.utils.encode_cell({r:0,c:c});
ws[cell].s={
fill:{patternType:"solid",fgColor:{rgb:"000000"}},
font:{color:{rgb:"FFFFFF"},bold:true,sz:13},
alignment:{horizontal:"center",vertical:"center"}
};
}

const wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"VENTAS");
XLSX.writeFile(wb,"ventas_pro.xlsx");
}
</script></body>
</html>
