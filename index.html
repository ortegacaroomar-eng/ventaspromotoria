<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auditor PRO | Acceso Total</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body { margin:0; font-family:'Segoe UI', sans-serif; background: #000814; color:white; }
.app { max-width:480px; margin:auto; padding:20px; }
.card { background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); border-radius: 16px; padding: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }
.tabs { display: flex; gap: 8px; margin-bottom: 15px; }
.tab { flex: 1; padding: 10px; border-radius: 10px; background: rgba(255,255,255,0.1); text-align: center; cursor: pointer; font-size: 13px; transition: 0.3s; }
.tab.active { background: #ffc300; color: #003566; font-weight: bold; }
input, select { width: 100%; padding: 12px; border-radius: 10px; border: none; background: rgba(255,255,255,0.2); color: white; margin-top: 8px; box-sizing: border-box; }
button { background: #ffc300; color: #003566; padding: 14px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
.btn-google { background: white; color: #444; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; }
.btn-reg { background: transparent; color: white; border: 1px solid white; font-size: 12px; }
.hidden { display: none !important; }
.fade { animation: fade 0.3s ease; }
@keyframes fade { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }
</style>
</head>

<body onload="inicio()">

<div id="loginBox" class="app">
    <div class="card" style="margin-top: 50px; text-align: center;">
        <h2 style="color:#ffc300; margin-bottom:20px;">🗂️ Acceso Auditor</h2>
        
        <button class="btn-google" onclick="loginGoogle()">
            <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="18"> Entrar con Google
        </button>

        <div style="margin: 15px 0; opacity: 0.5; font-size: 12px;">— o usa tu cuenta —</div>
        
        <input id="correo" type="email" placeholder="Correo electrónico">
        <input id="pass" type="password" placeholder="Contraseña">
        
        <button onclick="loginEmail()">ENTRAR</button>
        <button class="btn-reg" onclick="registroEmail()">REGISTRAR NUEVO USUARIO</button>
    </div>
</div>

<div id="appBox" class="app hidden">
    <button onclick="salir()" style="background:#d00000; color:white; width:auto; padding:5px 12px; float:right; font-size:11px; margin:0;">Cerrar Sesión</button>
    <h3 id="txtUser" style="font-size:12px; color:#ffc300;">...</h3>

    <div class="card">
        <label style="font-size: 12px; color: #ffc300;">📅 Selecciona día para ver ventas:</label>
        <input type="date" id="fechaFiltro" onchange="cargarLista()">
    </div>

    <div class="tabs">
        <div id="tabTELCEL" class="tab active" onclick="setComp('TELCEL')">TELCEL</div>
        <div id="tabATT" class="tab" onclick="setComp('ATT')">AT&T</div>
        <div id="tabBAIT" class="tab" onclick="setComp('BAIT')">BAIT</div>
    </div>

    <div class="card">
        <select id="tipoProceso" onchange="renderForm()">
            <option value="">Nuevo Registro...</option>
            <option value="PORTA">PORTA</option>
            <option value="RENUEVATE">RENUEVATE</option>
            <option value="CHIP0">CHIP</option>
            <option value="AK">AK</option>
        </select>
        <div id="formContainer"></div>
    </div>

    <button onclick="obtenerUbicacionYGuardar()">💾 GUARDAR VENTA</button>
    
    <div class="card"><canvas id="grafica"></canvas></div>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <h3 style="margin:0; font-size: 16px;">📋 Ventas del día</h3>
        <span id="contadorVentas" style="background:#ffc300; color:#001d3d; padding:2px 8px; border-radius:10px; font-weight:bold; font-size:12px;">0</span>
    </div>
    
    <div id="listaVentas"></div>
    <button style="background:#2b9348; color:white;" onclick="descargarExcel()">📊 EXPORTAR TODO (EXCEL)</button>
</div>

<script>
const firebaseConfig = { 
    apiKey: "AIzaSyD4UK_j8UxMwOCtrtXlYftBe_wCLE7psMc", 
    authDomain: "ventastelcel4029.firebaseapp.com",
    databaseURL: "https://ventastelcel4029-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let compActiva = "TELCEL";
let chart;
let todasVentas = {};

function inicio() {
    document.getElementById("fechaFiltro").value = new Date().toISOString().split("T")[0];
    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById("loginBox").classList.add("hidden");
            document.getElementById("appBox").classList.remove("hidden");
            document.getElementById("txtUser").innerText = "Usuario: " + (user.displayName || user.email);
            escucharDatos();
        } else {
            document.getElementById("loginBox").classList.remove("hidden");
            document.getElementById("appBox").classList.add("hidden");
        }
    });
}

// FUNCIONES DE ACCESO
function loginGoogle() {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).catch(e => alert("Error Google: " + e.message));
}

function loginEmail() {
    auth.signInWithEmailAndPassword(correo.value, pass.value).catch(e => alert("Error: " + e.message));
}

function registroEmail() {
    auth.createUserWithEmailAndPassword(correo.value, pass.value)
        .then(() => alert("¡Usuario creado con éxito! Ya puedes entrar."))
        .catch(e => alert("Error al registrar: " + e.message));
}

function salir() { auth.signOut().then(() => window.location.reload()); }

// LÓGICA DE VENTAS
function setComp(c) {
    compActiva = c;
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.getElementById("tab" + c).classList.add("active");
    tipoProceso.style.display = (c === "TELCEL") ? "block" : "none";
    tipoProceso.value = "";
    renderForm();
}

function renderForm() {
    const tp = tipoProceso.value;
    let html = "";
    if(compActiva === "TELCEL") {
        if(tp === "PORTA") html = `<div class="fade"><input id="f_num" placeholder="Número"><input id="f_icc" placeholder="ICCID"><input id="f_nip" placeholder="NIP"></div>`;
        else if(tp === "RENUEVATE") html = `<div class="fade"><input id="f_num" placeholder="Número"><input id="f_imei" placeholder="IMEI"><input id="f_icc" placeholder="ICCID Nuevo"><input id="f_icc_ant" placeholder="ICCID Antiguo"><input id="f_ak" placeholder="AK Nuevo"></div>`;
        else if(tp === "CHIP0") html = `<div class="fade"><input id="f_num" placeholder="Número"><input id="f_icc" placeholder="ICCID"></div>`;
        else if(tp === "AK") html = `<div class="fade"><input id="f_num" placeholder="Número"><input id="f_marca" placeholder="Marca"><input id="f_mod" placeholder="Modelo"><input id="f_imei" placeholder="IMEI"><input id="f_icc" placeholder="ICCID"></div>`;
    } else {
        html = `<div class="fade"><input id="f_num" placeholder="Número"><input id="f_marca" placeholder="Marca/Modelo"></div>`;
    }
    formContainer.innerHTML = html;
}

async function obtenerUbicacionYGuardar() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(async (pos) => {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
                const data = await res.json();
                guardar(data.display_name || "Ubicación detectada");
            } catch { guardar("Ubicación GPS"); }
        }, () => guardar("Sin acceso GPS"));
    } else { guardar("GPS no soportado"); }
}

function guardar(calle) {
    const data = {
        comp: compActiva,
        proceso: tipoProceso.value || "VENTA EXT",
        fecha: document.getElementById("fechaFiltro").value,
        ubicacion: calle,
        num: document.getElementById("f_num")?.value || "",
        icc: document.getElementById("f_icc")?.value || "",
        imei: document.getElementById("f_imei")?.value || "",
        marca: document.getElementById("f_marca")?.value || document.getElementById("f_mod")?.value || ""
    };
    db.ref('ventas').push(data).then(() => {
        alert("Guardado");
        formContainer.innerHTML = "";
        tipoProceso.value = "";
    });
}

function escucharDatos() {
    db.ref('ventas').on('value', snap => {
        todasVentas = snap.val() || {};
        cargarLista();
    });
}

function cargarLista() {
    const lista = document.getElementById("listaVentas");
    const filtro = document.getElementById("fechaFiltro").value;
    lista.innerHTML = "";
    let contador = 0;
    Object.keys(todasVentas).reverse().forEach(id => {
        const v = todasVentas[id];
        if(v.fecha === filtro) {
            contador++;
            lista.innerHTML += `<div class="card fade"><b>${v.comp}</b> - ${v.num}<br><small>${v.ubicacion.split(',')[0]}</small></div>`;
        }
    });
    document.getElementById("contadorVentas").innerText = contador;
    graficaGen(filtro);
}

function graficaGen(f) {
    let s = { TELCEL:0, ATT:0, BAIT:0 };
    Object.values(todasVentas).forEach(v => { if(v.fecha === f && s[v.comp] !== undefined) s[v.comp]++; });
    if(chart) chart.destroy();
    chart = new Chart(document.getElementById("grafica"), {
        type: 'doughnut',
        data: { labels: ["TELCEL", "ATT", "BAIT"], datasets: [{ data: [s.TELCEL, s.ATT, s.BAIT], backgroundColor: ['#ffc300', '#00b4d8', '#ef233c'], borderWidth: 0 }] },
        options: { plugins: { legend: { labels: { color: "white" } } } }
    });
}

function descargarExcel() {
    const array = Object.values(todasVentas);
    const wb = XLSX.utils.book_new();
    const meses = [...new Set(array.map(v => v.fecha.substring(0, 7)))].sort().reverse();
    meses.forEach(mes => {
        const datos = array.filter(v => v.fecha.startsWith(mes));
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(datos), mes);
    });
    XLSX.writeFile(wb, "Reporte_Auditoria.xlsx");
}
</script>
</body>
</html>
