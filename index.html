<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditoría Elite - Sincronizado</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root { --gold: #ffd60a; --dark: #000814; --glass: rgba(255, 255, 255, 0.1); }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle at top, #001d3d, var(--dark)); color: white; min-height: 100vh; }
        .app { max-width: 1200px; margin: auto; padding: 20px; }
        .card { background: var(--glass); backdrop-filter: blur(15px); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        label { color: var(--gold); font-size: 0.85em; font-weight: bold; margin-bottom: 5px; display: block; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: white; margin-bottom: 12px; box-sizing: border-box; }
        .btn { background: var(--gold); color: #000; padding: 14px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; transition: 0.3s; }
        .btn-excel { background: #2b9348; color: white; margin-top: 10px; }
        .btn-logout { background: #d00000; color: white; width: auto; padding: 8px 15px; font-size: 0.8em; }
        .table-container { background: white; border-radius: 15px; overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; color: #222; font-size: 0.8em; min-width: 800px; }
        th { background: #eee; padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #ddd; }
        .hidden { display: none; }
    </style>
</head>
<body onload="inicio()">

<div id="loginBox" class="card" style="max-width:400px; margin: 100px auto; text-align: center;">
    <h2 style="color: var(--gold);">☁️ Acceso Auditor</h2>
    <input id="correo" type="email" placeholder="Correo">
    <input id="pass" type="password" placeholder="Contraseña">
    <button class="btn" onclick="login()">Entrar</button>
</div>

<div id="appBox" class="app hidden">
    <header>
        <h2 style="color:var(--gold); margin:0;">Panel Auditor Pro</h2>
        <button class="btn btn-logout" onclick="logout()">Cerrar Sesión</button>
    </header>

    <div class="grid">
        <div class="card">
            <label>Fecha Operación</label>
            <input type="date" id="fechaIn">
            <label>Compañía</label>
            <select id="compIn" onchange="alternar()">
                <option value="TELCEL">TELCEL</option>
                <option value="ATT">AT&T</option>
                <option value="BAIT">BAIT</option>
            </select>
            <input id="numIn" placeholder="Número Telefónico">
            <input id="marcaIn" placeholder="Marca">
            <input id="modeloIn" placeholder="Modelo">

            <div id="boxTelcel">
                <select id="tipoTelcel"><option>PORTA</option><option>RENUEVATE</option><option>CHIP</option></select>
                <input id="imeiIn" placeholder="IMEI">
                <input id="iccidIn" placeholder="ICCID Telcel">
            </div>

            <div id="boxOtras" class="hidden">
                <input id="iccOtras" placeholder="ICC (Chip Original ATT/BAIT)">
                <label>¿Se entregó con Chip Telcel aparte?</label>
                <select id="chipTelcelPregunta">
                    <option value="NO">NO</option>
                    <option value="SI">SÍ (Chip Telcel Aparte)</option>
                </select>
            </div>

            <button class="btn" onclick="guardarFirebase()">🚀 Sincronizar Venta</button>
            <button class="btn btn-excel" onclick="exportarExcel()">📊 Generar Excel Élite</button>
        </div>

        <div class="card">
            <canvas id="chartCloud"></canvas>
        </div>
    </div>

    <div class="card">
        <h3 style="color:var(--gold);">📋 Historial Telcel</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr><th>Fecha</th><th>Tipo</th><th>Número</th><th>Equipo</th><th>IMEI</th><th>ICCID</th></tr>
                </thead>
                <tbody id="tablaTelcel"></tbody>
            </table>
        </div>
    </div>

    <div class="card" style="border-top: 3px solid #ef233c;">
        <h3 style="color:var(--gold);">📋 Historial Competencia (ATT / BAIT)</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr><th>Fecha</th><th>Comp.</th><th>Número</th><th>Equipo</th><th>ICC Orig.</th><th>¿Chip Telcel?</th></tr>
                </thead>
                <tbody id="tablaOtras"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD4UK_j8UxMwOCtrtXlYftBe_wCLE7psMc",
        authDomain: "ventastelcel4029.firebaseapp.com",
        projectId: "ventastelcel4029",
        storageBucket: "ventastelcel4029.appspot.com",
        messagingSenderId: "542284923420",
        appId: "1:542284923420:web:4887352d12e86095690623"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    let chart;

    function inicio() {
        document.getElementById('fechaIn').value = new Date().toISOString().split('T')[0];
        auth.onAuthStateChanged(user => {
            if (user) {
                loginBox.classList.add('hidden');
                appBox.classList.remove('hidden');
                escucharDatos();
            } else {
                loginBox.classList.remove('hidden');
                appBox.classList.add('hidden');
            }
        });
    }

    function alternar() {
        const c = document.getElementById('compIn').value;
        document.getElementById('boxTelcel').classList.toggle('hidden', c !== 'TELCEL');
        document.getElementById('boxOtras').classList.toggle('hidden', c === 'TELCEL');
    }

    function login() { auth.signInWithEmailAndPassword(correo.value, pass.value).catch(e => alert(e.message)); }
    function logout() { auth.signOut(); }

    function guardarFirebase() {
        const comp = document.getElementById('compIn').value;
        const venta = {
            fecha: document.getElementById('fechaIn').value,
            compania: comp,
            numero: document.getElementById('numIn').value,
            marca: document.getElementById('marcaIn').value,
            modelo: document.getElementById('modeloIn').value,
            imei: document.getElementById('imeiIn').value || "N/A",
            iccid: comp === 'TELCEL' ? iccidIn.value : iccOtras.value,
            chip_telcel_aparte: comp !== 'TELCEL' ? chipTelcelPregunta.value : "N/A",
            detalle_telcel: comp === 'TELCEL' ? tipoTelcel.value : "N/A",
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };

        db.collection("ventas").add(venta).then(() => {
            alert("Venta sincronizada");
            document.querySelectorAll('input:not([type="date"])').forEach(i => i.value = "");
        });
    }

    function escucharDatos() {
        db.collection("ventas").orderBy("timestamp", "desc").onSnapshot(snapshot => {
            let htmlTel = ""; let htmlOtr = "";
            let data = [];
            let counts = { TELCEL: 0, ATT: 0, BAIT: 0 };

            snapshot.forEach(doc => {
                const v = doc.data();
                data.push(v);
                counts[v.compania]++;

                if(v.compania === 'TELCEL') {
                    htmlTel += `<tr><td>${v.fecha}</td><td>${v.detalle_telcel}</td><td>${v.numero}</td><td>${v.marca} ${v.modelo}</td><td>${v.imei}</td><td>${v.iccid}</td></tr>`;
                } else {
                    htmlOtr += `<tr><td>${v.fecha}</td><td>${v.compania}</td><td>${v.numero}</td><td>${v.marca} ${v.modelo}</td><td>${v.iccid}</td><td style="color:${v.chip_telcel_aparte==='SI'?'#2b9348':'#d00000'}; font-weight:bold">${v.chip_telcel_aparte}</td></tr>`;
                }
            });

            document.getElementById('tablaTelcel').innerHTML = htmlTel;
            document.getElementById('tablaOtras').innerHTML = htmlOtr;
            window.datosActuales = data;
            actualizarGrafica(counts);
        });
    }

    function actualizarGrafica(c) {
        const ctx = document.getElementById('chartCloud').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Telcel', 'AT&T', 'BAIT'],
                datasets: [{ data: [c.TELCEL, c.ATT, c.BAIT], backgroundColor: ['#ffd60a', '#00b4d8', '#ef233c'] }]
            },
            options: { plugins: { legend: { display: false } }, scales: { y: { ticks: { color: 'white' } }, x: { ticks: { color: 'white' } } } }
        });
    }

    function exportarExcel() {
        const wb = XLSX.utils.book_new();
        const d = window.datosActuales;

        const tel = d.filter(x => x.compania === 'TELCEL').map(v => ({
            "FECHA": v.fecha, "TIPO": v.detalle_telcel, "NÚMERO": v.numero, "EQUIPO": v.marca + " " + v.modelo, "IMEI": v.imei, "ICCID TELCEL": v.iccid
        }));
        const ws1 = XLSX.utils.json_to_sheet(tel);
        ws1['!cols'] = [{wch:12},{wch:12},{wch:15},{wch:20},{wch:18},{wch:22}];
        XLSX.utils.book_append_sheet(wb, ws1, "TELCEL");

        const otr = d.filter(x => x.compania !== 'TELCEL').map(v => ({
            "FECHA": v.fecha, "COMPAÑÍA": v.compania, "NÚMERO": v.numero, "EQUIPO": v.marca + " " + v.modelo, "ICC ORIGINAL": v.iccid, "CHIP TELCEL APARTE": v.chip_telcel_aparte
        }));
        const ws2 = XLSX.utils.json_to_sheet(otr);
        ws2['!cols'] = [{wch:12},{wch:12},{wch:15},{wch:20},{wch:22},{wch:18}];
        XLSX.utils.book_append_sheet(wb, ws2, "COMPETENCIA");

        XLSX.writeFile(wb, "Reporte_Ventas_Sincronizado.xlsx");
    }
</script>
</body>
</html>
