<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Ventas Telcel - Omar Ortega</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
background:#001d3d;
color:white;
margin:0;
padding:20px;
}

.app{
max-width:900px;
margin:auto;
}

.card{
background:rgba(255,255,255,.1);
padding:20px;
border-radius:10px;
margin-bottom:15px;
}

input,select{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:none;
}

button{
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.btn{
background:#ffc300;
font-weight:bold;
}

.scan{
background:#00b4d8;
color:white;
margin-left:5px;
}

table{
width:100%;
background:white;
color:black;
font-size:12px;
border-collapse:collapse;
}

th{
background:#001d3d;
color:white;
padding:8px;
}

td{
padding:6px;
border:1px solid #ccc;
}

#scanner{
display:none;
background:black;
padding:10px;
margin-top:10px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="app">

<h2>Sistema Ventas Telcel</h2>

<form id="fReg">

<div class="card">

<label>Tipo Venta</label>
<select id="iTipo">
<option>KIT</option>
<option>CHIP</option>
<option>PORTA</option>
<option>RENUEVATE</option>
</select>

<label>Fecha</label>
<input id="iFec">

<label>Número celular</label>
<div style="display:flex">
<input id="iTel">
<button type="button" class="scan" onclick="abrirScanner('iTel')">📷</button>
</div>

<label>ICCID</label>
<div style="display:flex">
<input id="iIcc">
<button type="button" class="scan" onclick="abrirScanner('iIcc')">📷</button>
</div>

<label>¿Tienes IMEI?</label>
<select id="imeiStatus" onchange="toggleImei()">
<option value="si">SI</option>
<option value="pendiente">IMEI PENDIENTE</option>
</select>

<div id="imeiBox">

<label>IMEI</label>
<div style="display:flex">
<input id="iIme">
<button type="button" class="scan" onclick="abrirScanner('iIme')">📷</button>
</div>

</div>

<label>Marca</label>
<input id="iMarca">

<label>Modelo</label>
<input id="iMod">

<label>Tienda</label>
<input id="iTiendaNombre">

<label>Promotor</label>
<input id="iProm">

</div>

<button class="btn" type="submit">GUARDAR VENTA</button>

</form>

<div id="scanner">
<div id="reader"></div>
<button onclick="cerrarScanner()" class="btn">Cerrar escáner</button>
</div>

<h3>Registros</h3>

<table>

<thead>

<tr>
<th>Celular</th>
<th>IMEI</th>
<th>Marca</th>
<th>Modelo</th>
<th>ICCID</th>
<th>Tipo</th>
<th>Tienda</th>
<th>Promotor</th>
<th>Fecha</th>
<th></th>
</tr>

</thead>

<tbody id="bodyVentas"></tbody>

</table>

<button class="btn" onclick="exportarExcel()" style="margin-top:10px">
Descargar Excel
</button>

</div>

<script>

let html5QrCode;
let campoActual=null;

function abrirScanner(campo){

campoActual=campo;

document.getElementById("scanner").style.display="block";

html5QrCode=new Html5Qrcode("reader");

html5QrCode.start(
{facingMode:"environment"},
{fps:10,qrbox:250},

(decodedText)=>{

document.getElementById(campoActual).value=decodedText;

cerrarScanner();

}

);

}

function cerrarScanner(){

if(html5QrCode){

html5QrCode.stop().then(()=>{
document.getElementById("scanner").style.display="none";
});

}

}

function toggleImei(){

const status=document.getElementById("imeiStatus").value;
const box=document.getElementById("imeiBox");

if(status==="pendiente"){
box.style.display="none";
}else{
box.style.display="block";
}

}

const hoy=new Date();

document.getElementById("iFec").value=
hoy.getDate()+"/"+(hoy.getMonth()+1)+"/"+hoy.getFullYear();

document.getElementById("fReg").onsubmit=(e)=>{

e.preventDefault();

const imeiStatus=document.getElementById("imeiStatus").value;

const venta={

id:Date.now(),

celular:document.getElementById("iTel").value,

imei:imeiStatus==="pendiente"
?"IMEI PENDIENTE"
:document.getElementById("iIme").value,

marca:document.getElementById("iMarca").value,

modelo:document.getElementById("iMod").value,

iccid:document.getElementById("iIcc").value,

tipo:document.getElementById("iTipo").value,

tienda:document.getElementById("iTiendaNombre").value,

promotor:document.getElementById("iProm").value,

fecha:document.getElementById("iFec").value

};

let l=JSON.parse(localStorage.getItem("ventas_omar")||"[]");

l.unshift(venta);

localStorage.setItem("ventas_omar",JSON.stringify(l));

cargar();

e.target.reset();

};

function cargar(){

let l=JSON.parse(localStorage.getItem("ventas_omar")||"[]");

document.getElementById("bodyVentas").innerHTML=l.map(v=>`

<tr>

<td>${v.celular}</td>

<td style="color:${v.imei==="IMEI PENDIENTE"?"red":"black"}">
${v.imei}
</td>

<td>${v.marca}</td>

<td>${v.modelo}</td>

<td>${v.iccid}</td>

<td>${v.tipo}</td>

<td>${v.tienda}</td>

<td>${v.promotor}</td>

<td>${v.fecha}</td>

<td>
<button onclick="eliminar(${v.id})">❌</button>
</td>

</tr>

`).join("");

}

function eliminar(id){

let l=JSON.parse(localStorage.getItem("ventas_omar")||"[]");

l=l.filter(x=>x.id!==id);

localStorage.setItem("ventas_omar",JSON.stringify(l));

cargar();

}

function exportarExcel(){

let l=JSON.parse(localStorage.getItem("ventas_omar")||"[]");

if(l.length===0){
alert("No hay datos");
return;
}

const ws=XLSX.utils.json_to_sheet(l);

const wb=XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb,ws,"Ventas");

XLSX.writeFile(wb,"ventas_telcel_omar.xlsx");

}

cargar();

</script>

</body>
</html>
