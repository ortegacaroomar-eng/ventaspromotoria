<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ventas PRO Elite</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:'Segoe UI'; background:linear-gradient(135deg,#001d3d,#003566,#000814); color:white;}
.app { max-width:480px; margin:auto; padding:20px;}
.card { background:rgba(255,255,255,.08); backdrop-filter:blur(10px); border-radius:15px; padding:15px; margin-bottom:15px;}
input,select,button { width:100%; padding:12px; border-radius:10px; border:none; margin-top:8px;}
button { background:#ffc300; font-weight:bold; color:#003566;}
.btn-google { background:#db4437; color:white; }
.login { max-width:350px; margin:100px auto; background:white; color:black; padding:25px; border-radius:15px;}
.hidden { display:none;}
</style>
</head>

<body onload="inicio()">

<div id="loginBox" class="login">
<h2>Acceso</h2>
<input id="u" placeholder="Correo">
<input id="p" type="password" placeholder="Contraseña">
<button onclick="loginEmail()">Entrar con correo</button>
<button class="btn-google" onclick="loginGoogle()">Entrar con Google</button>
<p id="estado"></p>
</div>

<div id="appBox" class="app hidden">

<div class="card">
<input id="meta" placeholder="Meta mensual">
</div>

<div class="card" id="dashboard"></div>

<div class="card">
<canvas id="grafica"></canvas>
</div>

<div class="card" id="ranking"></div>

<form id="fReg">
<div class="card">

<select id="comp">
<option>TELCEL</option>
<option>ATT</option>
<option>BAIT</option>
</select>

<select id="tipo" onchange="cambiarFormulario()">
<option value="">Tipo</option>
<option value="PORTA">PORTA</option>
<option value="AK">AK</option>
<option value="CHIP">CHIP</option>
<option value="RENUEVATE">RENUEVATE</option>
</select>

<input id="fecha" placeholder="Fecha">
<input id="numero" placeholder="Número">

<div id="camposExtra"></div>

<input id="prom" placeholder="Promotor">

</div>

<button>Guardar</button>
</form>

<div id="lista"></div>

</div>

<script>

let db, auth, chart, online=false;

const firebaseConfig={
apiKey:"TU_API",
authDomain:"TU_AUTH",
databaseURL:"TU_DB",
projectId:"TU_ID"
};

function inicio(){
try{
firebase.initializeApp(firebaseConfig);
auth=firebase.auth();
db=firebase.database();
online=true;

auth.onAuthStateChanged(user=>{
if(user){
mostrarApp();
estado.innerText="Conectado ☁️";
}
});

// 🔥 LOGIN GOOGLE REDIRECT (SOLUCIÓN)
auth.getRedirectResult()
.then(result=>{
if(result.user){
console.log("Google login correcto");
}
})
.catch(err=>{
alert("Error Google: "+err.message);
});

}catch(e){
estado.innerText="Modo offline";
}
}

function loginEmail(){
auth.signInWithEmailAndPassword(u.value,p.value)
.catch(err=>{
if(err.code==="auth/user-not-found"){
auth.createUserWithEmailAndPassword(u.value,p.value);
}else{
alert(err.message);
}
});
}

// 🔥 GOOGLE FUNCIONANDO EN CELULAR
function loginGoogle(){
let provider=new firebase.auth.GoogleAuthProvider();
auth.signInWithRedirect(provider);
}

function mostrarApp(){
loginBox.classList.add("hidden");
appBox.classList.remove("hidden");
cargar();
}

function cambiarFormulario(){
let t=tipo.value;

if(t==="PORTA"){
camposExtra.innerHTML=`
<input id="cliente" placeholder="Nombre cliente">
<input id="nip" placeholder="NIP">
`;
}
else if(t==="AK"){
camposExtra.innerHTML=`
<input id="icc" placeholder="ICCID">
<input id="imei" placeholder="IMEI">
<input id="marca" placeholder="Marca">
<input id="modelo" placeholder="Modelo">
`;
}
else if(t==="CHIP"){
camposExtra.innerHTML=`
<input id="icc" placeholder="ICCID">
<input id="recarga" placeholder="Recarga">
`;
}
else if(t==="RENUEVATE"){
camposExtra.innerHTML=`
<input id="icc" placeholder="ICCID">
<input id="imei" placeholder="IMEI">
<input id="modelo" placeholder="Modelo">
`;
}
else{
camposExtra.innerHTML="";
}
}

fReg.onsubmit=e=>{
e.preventDefault();

let v={
id:Date.now(),
comp:comp.value,
tipo:tipo.value,
fecha:fecha.value,
numero:numero.value,
prom:prom.value,

cliente:document.getElementById("cliente")?.value||"",
nip:document.getElementById("nip")?.value||"",
icc:document.getElementById("icc")?.value||"",
imei:document.getElementById("imei")?.value||"",
marca:document.getElementById("marca")?.value||"",
modelo:document.getElementById("modelo")?.value||"",
recarga:document.getElementById("recarga")?.value||""
};

let local=JSON.parse(localStorage.getItem("ventas")||"[]");
local.unshift(v);
localStorage.setItem("ventas",JSON.stringify(local));

if(online && auth.currentUser){
db.ref("ventas").push(v);
}

cargar();
fReg.reset();
camposExtra.innerHTML="";
};

function cargar(){
let local=JSON.parse(localStorage.getItem("ventas")||"[]");

lista.innerHTML=local.map(v=>`
<div class="card">
<b>${v.comp} - ${v.tipo}</b><br>
📅 ${v.fecha}<br>
📱 ${v.numero}<br>
${v.cliente?"👤 "+v.cliente+"<br>":""}
${v.nip?"🔑 "+v.nip+"<br>":""}
${v.icc?"ICCID: "+v.icc+"<br>":""}
${v.imei?"IMEI: "+v.imei+"<br>":""}
${v.marca?"Marca: "+v.marca+"<br>":""}
${v.modelo?"Modelo: "+v.modelo+"<br>":""}
${v.recarga?"💰 "+v.recarga+"<br>":""}
👤 ${v.prom}
</div>
`).join("");

dashboardGen(local);
graficaGen(local);
rankingGen(local);
}

function dashboardGen(local){
let t=0,a=0,b=0;

local.forEach(v=>{
if(v.comp==="TELCEL")t++;
if(v.comp==="ATT")a++;
if(v.comp==="BAIT")b++;
});

dashboard.innerHTML=`
Total:${local.length}<br>
Telcel:${t}<br>
ATT:${a}<br>
BAIT:${b}
`;
}

function graficaGen(local){
let data={TELCEL:0,ATT:0,BAIT:0};
local.forEach(v=>data[v.comp]++);

if(chart)chart.destroy();

chart=new Chart(grafica,{
type:"bar",
data:{
labels:["Telcel","ATT","BAIT"],
datasets:[{data:[data.TELCEL,data.ATT,data.BAIT]}]
}
});
}

function rankingGen(local){
let map={};
local.forEach(v=>{
map[v.prom]=(map[v.prom]||0)+1;
});

let orden=Object.entries(map).sort((a,b)=>b[1]-a[1]);

ranking.innerHTML="<b>Ranking</b><br>"+
orden.map((p,i)=>`${i+1}. ${p[0]} (${p[1]})`).join("<br>");
}

</script>

</body>
</html>
