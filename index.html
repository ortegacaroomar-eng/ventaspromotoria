<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ventas PRO Telcel</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:'Segoe UI'; background:linear-gradient(135deg,#001d3d,#003566,#000814); color:white;}
.app { max-width:480px; margin:auto; padding:20px;}
.card { background:rgba(255,255,255,.08); backdrop-filter:blur(10px); border-radius:15px; padding:15px; margin-bottom:15px;}
input,select,button { width:100%; padding:12px; border-radius:10px; border:none; margin-top:8px;}
button { background:#ffc300; font-weight:bold; color:#003566;}
</style>
</head>

<body>

<div class="app">

<div class="card">
<select id="comp" onchange="cambiarComp()">
<option value="TELCEL">TELCEL</option>
<option value="ATT">ATT</option>
<option value="BAIT">BAIT</option>
</select>

<select id="tipo" onchange="cambiarFormulario()">
<option value="">Tipo</option>
<option value="PORTA">PORTA</option>
<option value="RENUEVATE">RENUEVATE</option>
<option value="CHIP0">CHIP0</option>
<option value="AK">AK</option>
</select>

<div id="form"></div>
</div>

<button onclick="guardar()">Guardar</button>

<div class="card">
<canvas id="grafica"></canvas>
</div>

<div id="lista"></div>

</div>

<script>

let chart;

function cambiarComp(){
form.innerHTML="";
tipo.value="";
}

function cambiarFormulario(){
let c=comp.value;
let t=tipo.value;

if(c==="TELCEL"){

if(t==="PORTA"){
form.innerHTML=`
<input id="compa" placeholder="Compañía anterior">
<input id="numero" placeholder="Número">
<input id="icc" placeholder="ICCD">
<input id="fpro" placeholder="Fecha proceso">
<input id="fent" placeholder="Fecha entrega">
<input id="recarga" placeholder="Recarga">
`;
}

if(t==="RENUEVATE"){
form.innerHTML=`
<input id="numero" placeholder="Número a renovar">
<input id="imei" placeholder="IMEI">
<input id="marca" placeholder="Marca">
<input id="modelo" placeholder="Modelo">
<input id="icc" placeholder="ICCD">
<input id="recarga" placeholder="Recarga">
`;
}

if(t==="CHIP0"){
form.innerHTML=`
<input id="numero" placeholder="Número">
<input id="icc" placeholder="ICCD">
<input id="recarga" placeholder="Monto recarga">
`;
}

if(t==="AK"){
form.innerHTML=`
<input id="numero" placeholder="Número">
<input id="marca" placeholder="Marca">
<input id="modelo" placeholder="Modelo">
<input id="imei" placeholder="IMEI">
<input id="icc" placeholder="ICCD">
<input id="recarga" placeholder="Monto recarga">
`;
}

}

if(c==="ATT"){
form.innerHTML=`
<input id="numero" placeholder="Número con chip Telcel">
<input id="icc" placeholder="ICCD">
<input id="modelo" placeholder="Modelo">
<input id="marca" placeholder="Marca">
`;
}

if(c==="BAIT"){
form.innerHTML=`
<input id="icc" placeholder="ICCD">
<input id="modelo" placeholder="Modelo">
<input id="marca" placeholder="Marca">
`;
}

}

function guardar(){

let data={
comp:comp.value,
tipo:tipo.value,

numero:document.getElementById("numero")?.value||"",
icc:document.getElementById("icc")?.value||"",
marca:document.getElementById("marca")?.value||"",
modelo:document.getElementById("modelo")?.value||"",
imei:document.getElementById("imei")?.value||"",
recarga:document.getElementById("recarga")?.value||"",

compa:document.getElementById("compa")?.value||"",
fpro:document.getElementById("fpro")?.value||"",
fent:document.getElementById("fent")?.value||""
};

let all=JSON.parse(localStorage.getItem("ventas_all")||"[]");
all.unshift(data);
localStorage.setItem("ventas_all",JSON.stringify(all));

if(data.comp==="TELCEL"){
let telcel=JSON.parse(localStorage.getItem("telcel_full")||"[]");
telcel.unshift(data);
localStorage.setItem("telcel_full",JSON.stringify(telcel));
}

if(data.comp==="ATT"||data.comp==="BAIT"){
let otros=JSON.parse(localStorage.getItem("otros")||"[]");
otros.unshift(data);
localStorage.setItem("otros",JSON.stringify(otros));
}

cargar();
}

function cargar(){

let all=JSON.parse(localStorage.getItem("ventas_all")||"[]");

lista.innerHTML=all.map(v=>`
<div class="card">
<b>${v.comp} - ${v.tipo}</b><br>
📱 ${v.numero||"-"}<br>
ICCD: ${v.icc||"-"}<br>
Marca: ${v.marca||"-"}<br>
Modelo: ${v.modelo||"-"}<br>
IMEI: ${v.imei||"-"}<br>
💰 ${v.recarga||"-"}
</div>
`).join("");

graficaGen(all);
}

function graficaGen(all){

let data={TELCEL:0,ATT:0,BAIT:0};

all.forEach(v=>{
if(v.comp==="TELCEL")data.TELCEL++;
if(v.comp==="ATT")data.ATT++;
if(v.comp==="BAIT")data.BAIT++;
});

if(chart)chart.destroy();

chart=new Chart(grafica,{
type:"bar",
data:{
labels:["TELCEL","ATT","BAIT"],
datasets:[{data:[data.TELCEL,data.ATT,data.BAIT]}]
}
});
}

cargar();

</script>

</body>
</html>
