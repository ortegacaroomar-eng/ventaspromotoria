<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Ventas</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:'Segoe UI',sans-serif;color:white;
background:linear-gradient(135deg,#001d3d,#003566,#000814);animation:fade .5s ease;}
@keyframes fade{from{opacity:0}to{opacity:1}}
.hidden{display:none}
.app{max-width:1000px;margin:auto;padding:20px}
.card{background:rgba(255,255,255,.08);backdrop-filter:blur(10px);
border-radius:15px;padding:20px;margin-bottom:15px;
border:1px solid rgba(255,255,255,.1);animation:up .4s ease;}
@keyframes up{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
input,select{width:100%;padding:10px;margin-bottom:10px;border-radius:8px;border:none;
background:rgba(255,255,255,.12);color:white;}
.btn{width:100%;padding:12px;border:none;border-radius:10px;font-weight:bold;
cursor:pointer;margin-bottom:10px;transition:.2s;}
.btn:hover{transform:scale(1.03)}
.btn-primary{background:#ffc300;color:#001d3d}
.btn-secondary{background:#00b4d8;color:white}
.btn-danger{background:#ff4d4d;color:white}
.topbar{display:flex;justify-content:space-between;align-items:center;
gap:10px;margin-bottom:15px;flex-wrap:wrap;}
.gps{flex:1;background:#000;border:1px solid #00b4d8;padding:10px;
border-radius:10px;color:#00b4d8;font-size:12px;}
.quick{display:flex;gap:10px;flex-wrap:wrap}
table{width:100%;border-collapse:collapse;background:white;color:black;font-size:12px;}
th{background:#001d3d;color:white;padding:8px}
td{padding:6px;border:1px solid #ddd}
.login{max-width:350px;margin:60px auto;background:white;color:black;
padding:30px;border-radius:20px;box-shadow:0 10px 25px rgba(0,0,0,.4);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginBox" class="login">
<h2 style="text-align:center;color:#003566">Acceso</h2>
<input id="u" type="email" placeholder="Correo">
<input id="p" type="password" placeholder="Contraseña">
<button class="btn btn-primary" onclick="login()">
<i class="fa-solid fa-right-to-bracket"></i> Iniciar Sesión
</button>
<button class="btn btn-secondary" onclick="registrar()">
<i class="fa-solid fa-user-plus"></i> Crear Cuenta Nueva
</button>
</div>

<!-- APP -->
<div id="appBox" class="app hidden">

<div class="topbar">
<div class="gps">
<i class="fa-solid fa-location-dot"></i>
<b>Ubicación:</b> <span id="gpsTxt">Detectando...</span>
</div>

<div class="quick">
<a href="https://app.payjoy.com/accounts/login?afterLogin=https://app.payjoy.com/merchant3?merchantId=199557" target="_blank">
<button class="btn btn-secondary" style="width:auto">PayJoy</button>
</a>
<a href="https://registro.telcel.com/vinculatulinea/#/" target="_blank">
<button class="btn btn-primary" style="width:auto">Vincular Línea</button>
</a>
<button class="btn btn-danger" style="width:auto" onclick="logout()">⏻</button>
</div>
</div>

<form id="fReg">
<div class="card">
<label>Tipo de Venta</label>
<select id="tipo" required>
<option value="">Selecciona tipo...</option>
<option>KIT</option>
<option>CHIP</option>
<option>PORTABILIDAD</option>
<option>RENUEVA</option>
</select>
<label>Número Celular</label><input id="tel" required>
<label>ICCID</label><input id="icc" required>
<label>IMEI</label><input id="imei">
</div>

<div class="card">
<label>Marca</label><input id="marca">
<label>Modelo</label><input id="modelo">
</div>

<div class="card">
<label># Tienda</label><input id="tienda" required>
<label>Cadena</label><input id="cadena" required>
<label>Nombre Tienda</label><input id="tiendaNombre" required>
<label>Promotor</label><input id="promotor" required>
</div>

<button class="btn btn-primary">Guardar Venta</button>
</form>

<h3>Registros</h3>
<table>
<thead>
<tr>
<th>Cel</th><th>Tipo</th><th>ICCID</th>
<th>IMEI</th><th>Modelo</th>
<th>Tienda</th><th>Promotor</th><th></th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

<button class="btn btn-secondary" onclick="excel()">
<i class="fa-solid fa-file-excel"></i> Exportar Excel
</button>

</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyD4UK_j8UxMwOCtrtXlYftBe_wCLE7psMc",
authDomain:"ventastelcel4029.firebaseapp.com",
projectId:"ventastelcel4029"
};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();

auth.onAuthStateChanged(user=>{
loginBox.classList.toggle("hidden",!!user);
appBox.classList.toggle("hidden",!user);
if(user) gps();
});

function login(){
auth.signInWithEmailAndPassword(u.value,p.value)
.catch(()=>alert("Datos incorrectos"));
}
function registrar(){
auth.createUserWithEmailAndPassword(u.value,p.value)
.then(()=>alert("Cuenta creada"))
.catch(e=>alert(e.message));
}
function logout(){auth.signOut()}

/* GPS */
function gps(){
if(!navigator.geolocation) return;
navigator.geolocation.getCurrentPosition(async pos=>{
const {latitude,longitude}=pos.coords;
const r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
const d=await r.json();
gpsTxt.innerText=d.display_name;
});
}

/* Guardar */
fReg.onsubmit=e=>{
e.preventDefault();
const v={
id:Date.now(),
cel:tel.value,
tipo:tipo.value,
icc:icc.value,
imei:imei.value,
marca:marca.value,
modelo:modelo.value,
tiendaNum:tienda.value,
cadena:cadena.value,
tienda:tiendaNombre.value,
promotor:promotor.value,
fecha:new Date().toLocaleDateString()
};
let l=JSON.parse(localStorage.ventas||"[]");
l.unshift(v);
localStorage.ventas=JSON.stringify(l);
render();
fReg.reset();
};

/* Render tabla */
function render(){
let l=JSON.parse(localStorage.ventas||"[]");
tabla.innerHTML=l.map(v=>`
<tr>
<td>${v.cel}</td><td>${v.tipo}</td>
<td>${v.icc}</td><td>${v.imei||''}</td>
<td>${v.modelo||''}</td>
<td>${v.tienda}</td><td>${v.promotor}</td>
<td><button onclick="del(${v.id})">🗑️</button></td>
</tr>`).join('');
}
render();

function del(id){
let l=JSON.parse(localStorage.ventas||"[]").filter(x=>x.id!=id);
localStorage.ventas=JSON.stringify(l);
render();
}

/* EXCEL FORMATO OFICIAL */
function excel(){
let l = JSON.parse(localStorage.ventas || "[]");
if(!l.length) return alert("Sin datos");

const headers = [
"NUM. CELULAR",
"IMEI",
"ICCID",
"Renuevate/ Kit/ Chip/Porta",
"#TIENDA / Determinante",
"SOLO NOMBRE DE LA CADENA",
"SOLO NOMBRE DE TIENDA SIN CADENA",
"NOMBRE COMPLETO PROMOTOR",
"FECHA DE ACTIVACION",
"MARCA",
"MODELO"
];

let data = [headers];

for(let i=0;i<300;i++){
const v = l[i] || {};
data.push([
v.cel || "",
v.imei || "",
v.icc || "",
v.tipo || "",
v.tiendaNum || "",
v.cadena || "",
v.tienda || "",
v.promotor || "",
v.fecha || "",
v.marca || "",
v.modelo || ""
]);
}

const ws = XLSX.utils.aoa_to_sheet(data);
const wb = XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb, ws, "FORMATO DIARIO");
XLSX.writeFile(wb, "FORMATO_DIARIO_COMISIONES.xlsx");
}
</script>

</body>
</html>
