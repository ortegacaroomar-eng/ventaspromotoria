<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teledata Ventas</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{
margin:0;
background:#0a0f1c;
font-family:Arial;
color:white;
}

.container{
max-width:400px;
margin:auto;
padding:20px;
}

.card{
background:#111827;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

input,select{
width:100%;
padding:12px;
margin-top:8px;
border-radius:8px;
border:none;
background:#1f2937;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#ffc300;
font-weight:bold;
}

.hidden{display:none;}

.status{
text-align:center;
margin-top:10px;
font-size:12px;
color:#ccc;
}
</style>
</head>

<body onload="init()">

<div id="login" class="container">
<div class="card">
<h2 style="text-align:center;">Teledata</h2>

<input id="email" placeholder="Correo">
<input id="pass" type="password" placeholder="Contraseña">

<button onclick="login()">Entrar / Crear</button>

<div id="msg" class="status"></div>
</div>
</div>

<div id="app" class="container hidden">

<div class="card">
<h3>Sistema activo</h3>
<div id="estado"></div>
</div>

<div class="card">
<select id="tipo">
<option>KIT</option>
<option>CHIP</option>
<option>PORTA</option>
<option>RENUEVATE</option>
</select>

<input id="tel" placeholder="Teléfono">

<select id="imei">
<option value="ok">IMEI OK</option>
<option value="pendiente">IMEI Pendiente</option>
</select>

<button onclick="guardar()">Guardar venta</button>
</div>

<div class="card">
<h3>Ventas</h3>
<div id="lista"></div>
</div>

<button onclick="logout()">Cerrar sesión</button>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyD4UK_j8UxMwOCtrtXlYftBe_wCLE7psMc",
authDomain:"ventastelcel4029.firebaseapp.com",
databaseURL:"https://ventastelcel4029-default-rtdb.firebaseio.com"
};

let auth,db;

let offline=JSON.parse(localStorage.getItem("ventas")||"[]");

function init(){
firebase.initializeApp(firebaseConfig);
auth=firebase.auth();
db=firebase.database();

auth.onAuthStateChanged(u=>{
if(u){
login.classList.add("hidden");
app.classList.remove("hidden");
estado.innerText="Bienvenido a Teledata";
cargar();
}else{
login.classList.remove("hidden");
app.classList.add("hidden");
}
});
}

function login(){

let e=email.value.trim();
let p=pass.value.trim();

if(!e||!p){
msg.innerText="Completa datos";
return;
}

msg.innerText="Conectando...";

auth.signInWithEmailAndPassword(e,p)
.catch(err=>{
if(err.code==="auth/user-not-found"){
auth.createUserWithEmailAndPassword(e,p)
.then(()=>msg.innerText="Usuario creado");
}else{
msg.innerText=err.message;
}
});
}

function logout(){
auth.signOut();
}

function guardar(){

let v={
tel:tel.value,
tipo:tipo.value,
imei:imei.value,
fecha:new Date().toLocaleString(),
offline:!navigator.onLine
};

offline.unshift(v);
localStorage.setItem("ventas",JSON.stringify(offline));

if(navigator.onLine){
db.ref("ventas").push(v);
estado.innerText="Venta guardada online";
}else{
estado.innerText="Guardado sin internet";
}

cargar();
}

function cargar(){

db.ref("ventas").once("value",snap=>{
let online=Object.values(snap.val()||{});
let total=[...offline,...online];

lista.innerHTML=total.map(v=>`
<div style="margin-bottom:10px;">
${v.tel} - ${v.tipo} (${v.imei}) <br>
<small>${v.offline?"OFFLINE":"ONLINE"}</small>
</div>
`).join("");
});
}

window.addEventListener("online",()=>{
estado.innerText="Conectado, sincronizando...";

offline.forEach(v=>{
db.ref("ventas").push(v);
});

offline=[];
localStorage.removeItem("ventas");

});

</script>
</body>
</html>
