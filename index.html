<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a1a">
    <title>CRM Cambaceo Piloto</title>
    <style>
        :root {
            --telcel-blue: #003366;
            --ios-gray: #efeff4;
            --divider: #d1d1d6;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--ios-gray);
            color: #000;
            overflow-x: hidden;
        }

        /* Splash Screen / Login Estilo Nativo */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 1000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px;
        }

        .login-input {
            width: 100%; max-width: 300px; padding: 15px; margin: 10px 0;
            border: 1px solid var(--divider); border-radius: 10px; font-size: 16px;
        }

        .btn-primary {
            width: 100%; max-width: 300px; background: var(--telcel-blue);
            color: white; border: none; padding: 15px; border-radius: 10px;
            font-weight: bold; font-size: 16px; cursor: pointer;
        }

        /* App Layout */
        #main-app { display: none; }

        header {
            background: #2d2d2d; color: white; padding: 12px 15px;
            display: flex; align-items: center; position: sticky; top: 0; z-index: 100;
        }

        .header-icon {
            background: var(--telcel-blue); width: 32px; height: 32px;
            border-radius: 6px; display: flex; align-items: center;
            justify-content: center; margin-right: 12px; font-size: 14px;
        }

        /* Lista de Opciones (Simulando ListView de Android) */
        .menu-list { background: white; margin-top: 0; }

        .menu-item {
            display: flex; align-items: center; padding: 16px;
            border-bottom: 0.5px solid var(--divider);
            background: white; transition: background 0.1s;
        }

        .menu-item:active { background: #e5e5ea; }

        .icon-circle {
            width: 55px; height: 55px; border-radius: 50%;
            margin-right: 15px; display: flex; align-items: center;
            justify-content: center; font-size: 24px;
        }

        /* Footer Técnico Nativo */
        footer {
            position: fixed; bottom: 0; width: 100%; background: white;
            border-top: 1.5px solid var(--telcel-blue);
            display: grid; grid-template-columns: repeat(4, 1fr);
            padding: 8px 4px; font-size: 10px; text-align: center;
            color: #0056b3; font-weight: 600;
        }

        /* Colores de Iconos basados en tu imagen */
        .c-orange { background: #fce4d6; color: #e46c0a; }
        .c-blue { background: #daeef3; color: #31859b; }
        .c-yellow { background: #fff2cc; color: #d4a017; }
        .c-grey { background: #eeeeee; color: #7f7f7f; }

    </style>
</head>
<body>

<div id="login-screen">
    <div style="font-size: 40px; margin-bottom: 20px;">📱</div>
    <h3 style="margin-bottom: 30px; color: var(--telcel-blue)">Cambaceo Piloto 5.0</h3>
    <input type="text" id="userInput" class="login-input" placeholder="Usuario">
    <input type="password" id="passInput" class="login-input" placeholder="Password">
    <button class="btn-primary" onclick="app.login()">ENTRAR</button>
</div>

<div id="main-app">
    <header>
        <div class="header-icon">📞</div>
        <div style="font-size: 13px; letter-spacing: 0.5px;">Portabilidad 5 23OECO9711...</div>
    </header>

    <div class="menu-list">
        <div class="menu-item" onclick="app.vibrate()">
            <div class="icon-circle c-orange">🕒</div>
            <div class="label">Check</div>
        </div>

        <div class="menu-item" onclick="app.vibrate()">
            <div class="icon-circle c-orange">📄</div>
            <div class="label">Iniciar Portabilidad</div>
        </div>

        <div class="menu-item" onclick="app.vibrate()">
            <div class="icon-circle c-grey">📟</div>
            <div class="label">Activaciones Prepago BES</div>
        </div>

        <div class="menu-item" onclick="app.vibrate()">
            <div class="icon-circle c-blue">🎁</div>
            <div class="label">Promotoría</div>
        </div>

        <div class="menu-item" onclick="app.registrarVenta()">
            <div class="icon-circle c-yellow">💾</div>
            <div class="label"><b>Registrar Venta Local</b></div>
        </div>

        <div class="menu-item" onclick="app.vibrate()">
            <div class="icon-circle c-blue">🛡️</div>
            <div class="label">Protección Movil</div>
        </div>

        <div class="menu-item" onclick="app.logout()">
            <div class="icon-circle c-orange">🔒</div>
            <div class="label">Cerrar Sesión</div>
        </div>
    </div>

    <div style="height: 60px;"></div> <footer>
        <div>Región 9</div>
        <div>8889</div>
        <div>CBA4029</div>
        <div>v5.0.0</div>
    </footer>
</div>

<script>
    const app = {
        // Manejo de Sesión Nativa
        login: function() {
            const user = document.getElementById('userInput').value;
            if(user) {
                localStorage.setItem('session_active', 'true');
                localStorage.setItem('user_id', user);
                this.init();
            }
        },

        logout: function() {
            if(confirm("¿Cerrar sesión de Cambaceo Piloto?")) {
                localStorage.clear();
                location.reload();
            }
        },

        // Registro de datos para Excel DD/MM/YYYY
        registrarVenta: function() {
            this.vibrate();
            const now = new Date();
            const fechaExcel = `${String(now.getDate()).padStart(2,'0')}/${String(now.getMonth()+1).padStart(2,'0')}/${now.getFullYear()}`;
            
            const datosVenta = {
                fecha: fechaExcel,
                package: "com.telcel.crm.cambaceo.piloto",
                uid: "10286",
                vendedor: "8889"
            };

            let storage = JSON.parse(localStorage.getItem('ventas_locales')) || [];
            storage.push(datosVenta);
            localStorage.setItem('ventas_locales', JSON.stringify(storage));

            alert("Venta guardada localmente.\nFecha: " + fechaExcel);
        },

        // Simulación de feedback háptico (Permiso android.permission.VIBRATE)
        vibrate: function() {
            if (navigator.vibrate) navigator.vibrate(15);
        },

        init: function() {
            if(localStorage.getItem('session_active')) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
            }
        }
    };

    // Al cargar, verificar si hay sesión (como en una app real)
    window.onload = () => app.init();
</script>

</body>
</html>
