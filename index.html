<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditoría Pro - Reporte Excel</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            --gold: #ffd60a;
            --blue-dark: #000814;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #001d3d, var(--blue-dark));
            color: white;
            min-height: 100vh;
        }

        .app { max-width: 1200px; margin: auto; padding: 20px; }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }

        label { color: var(--gold); font-size: 0.85em; font-weight: bold; margin-bottom: 5px; display: block; }

        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: white;
            margin-bottom: 12px;
            box-sizing: border-box;
        }

        .btn-main {
            background: linear-gradient(135deg, var(--gold), #ffc300);
            color: #000;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-excel {
            background: linear-gradient(135deg, #2b9348, #55a630);
            color: white;
            margin-top: 10px;
        }

        .table-container { 
            background: white; 
            border-radius: 15px; 
            overflow: hidden; 
            margin-top: 10px; 
        }

        table { width: 100%; border-collapse: collapse; color: #222; font-size: 0.8em; }
        th { background: #f1f1f1; padding: 10px; text-align: left; }
        td { padding: 8px 10px; border-bottom: 1px solid #eee; }

        .hidden { display: none; }
    </style>
</head>
<body onload="inicio()">

<div class="app">
    <div class="grid">
        <div class="card">
            <h2 style="color:var(--gold); margin:0 0 15px 0;">📱 Registro de Ventas</h2>
            
            <label>Fecha</label>
            <input type="date" id="fechaIn">

            <label>Compañía</label>
            <select id="compIn" onchange="alternarCampos()">
                <option value="TELCEL">TELCEL</option>
                <option value="ATT">AT&T</option>
                <option value="BAIT">BAIT</option>
            </select>

            <input id="numIn" type="tel" placeholder="Número Telefónico">
            <input id="marcaIn" placeholder="Marca">
            <input id="modeloIn" placeholder="Modelo">

            <div id="boxTelcel">
                <label>Movimiento Telcel</label>
                <select id="tipoTelcel">
                    <option value="PORTA">PORTA</option>
                    <option value="RENUEVATE">RENUEVATE</option>
                    <option value="CHIP">CHIP</option>
                </select>
                <input id="imeiIn" placeholder="IMEI">
                <input id="iccidIn" placeholder="ICCID">
            </div>

            <div id="boxOtras" class="hidden">
                <label>¿Chip Telcel incluido?</label>
                <select id="chipTelcelPregunta">
                    <option value="NO">NO</option>
                    <option value="SI">SÍ</option>
                </select>
            </div>

            <button class="btn-main" onclick="guardar()">💾 Guardar Venta</button>
            <button class="btn-main btn-excel" onclick="exportarExcel()">📊 Generar Excel Completo</button>
        </div>

        <div class="card">
            <h2 style="color:var(--gold); margin:0 0 10px 0;">📈 Gráfica de Rendimiento</h2>
            <canvas id="chartDetallado"></canvas>
        </div>
    </div>

    <div class="card">
        <h3 style="color:var(--gold);">📋 Historial Telcel</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr><th>Fecha</th><th>Tipo</th><th>Número</th><th>Marca</th><th>Modelo</th><th>IMEI</th><th>ICCID</th></tr>
                </thead>
                <tbody id="tablaTelcel"></tbody>
            </table>
        </div>
    </div>

    <div class="card">
        <h3 style="color:var(--gold);">📋 Historial Competencia</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr><th>Fecha</th><th>Comp.</th><th>Chip Tel.</th><th>Número</th><th>Marca</th><th>Modelo</th></tr>
                </thead>
                <tbody id="tablaOtras"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let chartObj;

    function inicio() {
        document.getElementById('fechaIn').value = new Date().toISOString().split('T')[0];
        actualizarTodo();
    }

    function alternarCampos() {
        const c = document.getElementById('compIn').value;
        document.getElementById('boxTelcel').classList.toggle('hidden', c !== 'TELCEL');
        document.getElementById('boxOtras').classList.toggle('hidden', c === 'TELCEL');
    }

    function formatFecha(f) {
        const [y, m, d] = f.split('-');
        return `${d}/${m}/${y}`;
    }

    function guardar() {
        const comp = document.getElementById('compIn').value;
        const num = document.getElementById('numIn').value;
        if(!num) return alert("Ingrese el número");

        const item = {
            Fecha: formatFecha(document.getElementById('fechaIn').value),
            Compañia: comp,
            Numero: num,
            Marca: document.getElementById('marcaIn').value || "N/A",
            Modelo: document.getElementById('modeloIn').value || "N/A",
            IMEI: document.getElementById('imeiIn').value || "N/A",
            ICCID: document.getElementById('iccidIn').value || "N/A",
            Detalle: comp === 'TELCEL' ? tipoTelcel.value : chipTelcelPregunta.value
        };

        let db = JSON.parse(localStorage.getItem('ventas_data') || '[]');
        db.unshift(item);
        localStorage.setItem('ventas_data', JSON.stringify(db));

        // Limpiar
        document.getElementById('numIn').value = "";
        document.getElementById('marcaIn').value = "";
        document.getElementById('modeloIn').value = "";
        actualizarTodo();
    }

    function actualizarTodo() {
        const db = JSON.parse(localStorage.getItem('ventas_data') || '[]');
        const tel = db.filter(x => x.Compañia === 'TELCEL');
        const otr = db.filter(x => x.Compañia !== 'TELCEL');

        document.getElementById('tablaTelcel').innerHTML = tel.map(i => `
            <tr><td>${i.Fecha}</td><td>${i.Detalle}</td><td>${i.Numero}</td><td>${i.Marca}</td><td>${i.Modelo}</td><td>${i.IMEI}</td><td>${i.ICCID}</td></tr>
        `).join('');

        document.getElementById('tablaOtras').innerHTML = otr.map(i => `
            <tr><td>${i.Fecha}</td><td>${i.Compañia}</td><td>${i.Detalle}</td><td>${i.Numero}</td><td>${i.Marca}</td><td>${i.Modelo}</td></tr>
        `).join('');

        renderGrafica(db);
    }

    function renderGrafica(db) {
        const ctx = document.getElementById('chartDetallado').getContext('2d');
        if(chartObj) chartObj.destroy();

        const labels = ["Telcel", "AT&T", "BAIT"];
        const counts = labels.map(l => db.filter(x => x.Compañia === l.toUpperCase()).length);

        chartObj = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Ventas por Compañía',
                    data: counts,
                    backgroundColor: ['#ffd60a', '#00b4d8', '#ef233c']
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                scales: { y: { ticks: { color: 'white' } }, x: { ticks: { color: 'white' } } }
            }
        });
    }

    function exportarExcel() {
        const db = JSON.parse(localStorage.getItem('ventas_data') || '[]');
        if(db.length === 0) return alert("No hay datos para exportar");

        const wb = XLSX.utils.book_new();
        
        // Hoja 1: Telcel
        const telData = db.filter(x => x.Compañia === 'TELCEL');
        const wsTel = XLSX.utils.json_to_sheet(telData);
        XLSX.utils.book_append_sheet(wb, wsTel, "TELCEL");

        // Hoja 2: Competencia
        const otrData = db.filter(x => x.Compañia !== 'TELCEL');
        const wsOtr = XLSX.utils.json_to_sheet(otrData);
        XLSX.utils.book_append_sheet(wb, wsOtr, "COMPETENCIA");

        // Hoja 3: Resumen para Gráfica
        const resumen = [
            { Compañía: "Telcel", Total: telData.length },
            { Compañía: "Otras", Total: otrData.length }
        ];
        const wsRes = XLSX.utils.json_to_sheet(resumen);
        XLSX.utils.book_append_sheet(wb, wsRes, "RESUMEN");

        XLSX.writeFile(wb, "Reporte_Auditoria_Ventas.xlsx");
    }
</script>
</body>
</html>
