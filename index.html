<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Ventas - Omar Ortega</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { margin:0; font-family:'Segoe UI',sans-serif; background:linear-gradient(135deg,#001d3d,#003566,#000814); min-height:100vh; color:white; }
        .app { max-width:1100px; margin:auto; padding:20px; }
        .login-box { max-width:380px; margin:80px auto; background:white; padding:30px; border-radius:20px; text-align:center; color:#000; box-shadow:0 15px 35px rgba(0,0,0,0.6); }
        .card { background:rgba(255,255,255,.08); backdrop-filter:blur(12px); border-radius:16px; padding:20px; margin-bottom:18px; border:1px solid rgba(255,255,255,0.1); }
        input, select { width:100%; padding:11px; margin-bottom:12px; border-radius:8px; border:none; background:rgba(255,255,255,.15); color:white; }
        .btn-save { background:#ffc300; color:#001d3d; width:100%; padding:15px; border:none; border-radius:10px; font-weight:bold; cursor:pointer; font-size:16px; }
        .btn-excel { background:#1f7a3f; color:white; width:100%; padding:14px; border:none; border-radius:10px; font-weight:bold; cursor:pointer; margin-top:15px; }
        .table-container { overflow-x:auto; background:white; border-radius:10px; margin-top:20px; }
        table { width:100%; border-collapse:collapse; color:#333; font-size:12px; }
        th { background:#000; color:white; padding:12px; text-align:left; }
        td { padding:10px; border-bottom:1px solid #ddd; }
        .hidden { display:none !important; }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginBox" class="login-box">
    <h2 style="color:#003566;">SISTEMA DE CONTROL</h2>
    <p>Inicia sesión para acceder a tus registros</p>
    
    <button onclick="loginConGoogle()" style="background:white; color:#333; width:100%; padding:12px; border:none; border-radius:10px; margin:15px 0; font-weight:bold; display:flex; align-items:center; justify-content:center; gap:10px;">
        <i class="fa-brands fa-google" style="color:#4285F4;"></i> Iniciar sesión con Google
    </button>
    
    <form onsubmit="iniciarSesion(event)">
        <input type="email" id="email" placeholder="Correo electrónico" required>
        <input type="password" id="password" placeholder="Contraseña" required>
        <button type="submit" class="btn-save">INGRESAR AL PANEL</button>
    </form>
</div>

<!-- APLICACIÓN PRINCIPAL -->
<div id="appBox" class="app hidden">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <div class="gps-card">
            <i class="fa-solid fa-location-dot"></i>
            <div><b>UBICACIÓN</b><br><span id="txtGps">Localizando...</span></div>
        </div>
        <div style="font-family:monospace; font-size:22px; color:#ffc300;" id="txtReloj">00:00:00</div>
        <button onclick="cerrarSesion()" style="background:rgba(255,77,77,0.3); color:#ff4d4d; border:1px solid #ff4d4d; padding:8px 14px; border-radius:8px; cursor:pointer;">Salir</button>
    </div>

    <!-- Formulario de Venta -->
    <div class="card">
        <form id="fReg" onsubmit="guardarVenta(event)">
            <label>Renuevate/ Kit/Chip/Porta</label>
            <select id="iTipo" required>
                <option value="KIT">KIT</option>
                <option value="CHIP">CHIP</option>
                <option value="PORTA">PORTA</option>
                <option value="RENUEVATE">RENUEVATE</option>
            </select>
            
            <label>FECHA DE ACTIVACION</label>
            <input id="iFec" type="date" required>
            
            <label>NUM. CELULAR (10 dígitos)</label>
            <input id="iTel" type="tel" maxlength="10" required>
            
            <label>ICCID</label>
            <input id="iIcc" required>
            
            <label>IMEI</label>
            <input id="iIme">
            
            <label>MARCA</label>
            <input id="iMarca" required>
            
            <label>MODELO</label>
            <input id="iMod" required>
            
            <label>#TIENDA / Determinante</label>
            <input id="iTiendaNum" required>
            
            <label>SOLO NOMBRE DE LA CADENA</label>
            <input id="iCadena" required>
            
            <label>SOLO NOMBRE DE TIENDA</label>
            <input id="iTiendaNombre" required>
            
            <label>NOMBRE COMPLETO PROMOTOR</label>
            <input id="iProm" value="Omar Ortega" required>
            
            <button type="submit" class="btn-save">GUARDAR VENTA LOCALMENTE</button>
        </form>
    </div>

    <button class="btn-excel" onclick="exportarExcelTelcel()">
        <i class="fa-solid fa-file-excel"></i> DESCARGAR EXCEL TELCEL (Formato Oficial)
    </button>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>NUM. CELULAR</th>
                    <th>IMEI</th>
                    <th>ICCID</th>
                    <th>TIPO</th>
                    <th>TIENDA</th>
                    <th>PROMOTOR</th>
                    <th>FECHA</th>
                    <th>MARCA</th>
                    <th>MODELO</th>
                    <th style="background:red; color:white;">X</th>
                </tr>
            </thead>
            <tbody id="bodyVentas"></tbody>
        </table>
    </div>
</div>

<script>
let ventas = [];

function iniciarSesion(e) {
    e.preventDefault();
    // Simulación de login (puedes conectar Firebase después)
    document.getElementById('loginBox').classList.add('hidden');
    document.getElementById('appBox').classList.remove('hidden');
    cargarDatos();
}

function loginConGoogle() {
    alert("Iniciando sesión con Google...");
    document.getElementById('loginBox').classList.add('hidden');
    document.getElementById('appBox').classList.remove('hidden');
    cargarDatos();
}

function cerrarSesion() {
    if(confirm("¿Cerrar sesión?")) location.reload();
}

function guardarVenta(e) {
    e.preventDefault();
    
    const venta = {
        id: Date.now(),
        "NUM. CELULAR": document.getElementById('iTel').value,
        "IMEI": document.getElementById('iIme').value || "N/A",
        "ICCID": document.getElementById('iIcc').value,
        "Renuevate/ Kit/Chip/Porta": document.getElementById('iTipo').value,
        "#TIENDA / Determinante": document.getElementById('iTiendaNum').value,
        "SOLO NOMBRE DE LA CADENA": document.getElementById('iCadena').value,
        "SOLO NOMBRE DE TIENDA SIN CADENA": document.getElementById('iTiendaNombre').value,
        "NOMBRE COMPLETO PROMOTOR": document.getElementById('iProm').value,
        "FECHA DE ACTIVACION": document.getElementById('iFec').value,
        "MARCA": document.getElementById('iMarca').value,
        "MODELO": document.getElementById('iMod').value
    };
    
    ventas.unshift(venta);
    localStorage.setItem('ventas_omar', JSON.stringify(ventas));
    
    alert("✅ Venta guardada correctamente");
    e.target.reset();
    document.getElementById('iFec').value = new Date().toISOString().split('T')[0];
    renderizarTabla();
}

function renderizarTabla() {
    const tbody = document.getElementById('bodyVentas');
    tbody.innerHTML = ventas.map(v => `
        <tr>
            <td>${v["NUM. CELULAR"]}</td>
            <td>${v.IMEI}</td>
            <td>${v.ICCID}</td>
            <td>${v["Renuevate/ Kit/Chip/Porta"]}</td>
            <td>${v["SOLO NOMBRE DE LA CADENA"]}</td>
            <td>${v["NOMBRE COMPLETO PROMOTOR"]}</td>
            <td>${v["FECHA DE ACTIVACION"]}</td>
            <td>${v.MARCA}</td>
            <td>${v.MODELO}</td>
            <td><i class="fa fa-trash" style="color:red; cursor:pointer" onclick="eliminar(${v.id})"></i></td>
        </tr>
    `).join('');
}

function eliminar(id) {
    if(confirm("¿Eliminar esta venta?")) {
        ventas = ventas.filter(v => v.id !== id);
        localStorage.setItem('ventas_omar', JSON.stringify(ventas));
        renderizarTabla();
    }
}

function exportarExcelTelcel() {
    if(ventas.length === 0) return alert("No hay ventas registradas.");
    
    const datos = ventas.map(v => ({
        "NUM. CELULAR": v["NUM. CELULAR"] || "",
        "IMEI": v.IMEI || "",
        "ICCID": v.ICCID || "",
        "Renuevate/ Kit/Chip/Porta": v["Renuevate/ Kit/Chip/Porta"] || "",
        "#TIENDA / Determinante": v["#TIENDA / Determinante"] || "",
        "SOLO NOMBRE DE LA CADENA": v["SOLO NOMBRE DE LA CADENA"] || "",
        "SOLO NOMBRE DE TIENDA SIN CADENA": v["SOLO NOMBRE DE TIENDA SIN CADENA"] || "",
        "NOMBRE COMPLETO PROMOTOR": v["NOMBRE COMPLETO PROMOTOR"] || "",
        "FECHA DE ACTIVACION": v["FECHA DE ACTIVACION"] || "",
        "MARCA": v.MARCA || "",
        "MODELO": v.MODELO || ""
    }));
    
    const ws = XLSX.utils.json_to_sheet(datos);
    ws['!cols'] = [
        {wch:18}, {wch:22}, {wch:24}, {wch:25}, {wch:22}, 
        {wch:30}, {wch:35}, {wch:35}, {wch:18}, {wch:20}, {wch:25}
    ];
    
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Hoja1");
    
    const fecha = new Date().toISOString().slice(0,10);
    XLSX.writeFile(wb, `comíciones_diarias_Omar_${fecha}.xlsx`);
}

function cargarDatos() {
    const guardadas = localStorage.getItem('ventas_omar');
    if(guardadas) {
        ventas = JSON.parse(guardadas);
        renderizarTabla();
    }
    
    // Reloj
    setInterval(() => {
        document.getElementById('txtReloj').innerText = new Date().toLocaleTimeString('es-MX');
    }, 1000);
    
    // Fecha actual
    document.getElementById('iFec').value = new Date().toISOString().split('T')[0];
}

// Iniciar reloj al cargar
window.onload = () => {
    document.getElementById('iFec').value = new Date().toISOString().split('T')[0];
};
</script>
</body>
</html>
