<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRIS AI - Inteligencia de Ventas Regional</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

    <style>
        :root { --cortana: #00bfff; --bg: #010108; --glass: rgba(0, 191, 255, 0.08); }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; }
        .app { max-width: 1200px; margin: auto; padding: 15px; }
        .card { background: var(--glass); backdrop-filter: blur(25px); border-radius: 15px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(0,191,255,0.2); }
        
        /* HALO CORTANA ANIMADO */
        .halo-box { position: relative; width: 100px; height: 100px; margin: 0 auto 10px; display:flex; align-items:center; justify-content:center; }
        .halo-ring { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid transparent; border-top-color: var(--cortana); animation: spin 2s linear infinite; box-shadow: 0 0 15px var(--cortana); }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .ia-speech { font-size: 14px; text-align: center; color: #b3f7ff; min-height: 45px; font-style: italic; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; }
        
        .btn { padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; }
        .btn-cloud { background: var(--cortana); color: #000; }
        .btn-local { background: #333; color: #fff; border: 1px solid var(--cortana); }
        .btn-excel { background: #1D6F42; color: white; margin-top: 10px; }
        
        canvas { max-height: 300px; background: rgba(0,0,0,0.3); border-radius: 10px; padding: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="loginBox" class="app" style="max-width: 380px; margin-top: 100px;">
    <div class="card" style="text-align:center;">
        <h2 style="color:var(--cortana)">ACCESO NEURAL IRIS</h2>
        <input id="u" type="email" placeholder="Usuario Corporativo">
        <input id="p" type="password" placeholder="Pass-Key">
        <button class="btn btn-cloud" onclick="login()">ACTIVAR CORTANA</button>
    </div>
</div>

<div id="appBox" class="app hidden">
    <div class="card" style="text-align: center;">
        <div class="halo-box"><div class="halo-ring"></div><i class="fas fa-satellite-dish" style="color:var(--cortana)"></i></div>
        <div id="iaSpeech" class="ia-speech">"Analizando flujo de ventas en tiempo real..."</div>
    </div>

    <div class="grid">
        <div class="card">
            <h3 style="color:var(--cortana)"><i class="fas fa-trophy"></i> Ranking de Tiendas</h3>
            <canvas id="graficaTiendas"></canvas>
            <div id="iaConsejo" style="font-size: 12px; color: #00ffcc; margin-top: 15px; border-left: 2px solid var(--cortana); padding-left: 10px;"></div>
        </div>

        <div class="card">
            <form id="fReg">
                <select id="tipo">
                    <option>PORTABILIDAD</option><option>RENUEVA</option><option>KIT</option><option>CHIP</option><option>PAYJOY</option>
                </select>
                <div style="display:flex; gap:5px;">
                    <input id="promotor" placeholder="Tu Nombre">
                    <input id="tienda" placeholder="Tienda ID">
                </div>
                <input id="tel" type="number" placeholder="Celular Cliente">
                <input id="imei" placeholder="IMEI / ICCID">
                
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <button type="submit" class="btn btn-cloud">SUBIR NUBE <i class="fas fa-cloud"></i></button>
                    <button type="button" onclick="guardarLocal()" class="btn btn-local">LOCAL <i class="fas fa-hard-drive"></i></button>
                </div>
            </form>
            <button class="btn btn-excel" onclick="exportarExcel()"><i class="fas fa-file-excel"></i> DESCARGAR EXCEL LOCAL</button>
        </div>
    </div>
</div>

<script>
const firebaseConfig={apiKey:"AIzaSyD4UK_j8UxMwOCtrtXlYftBe_wCLE7psMc",authDomain:"ventastelcel4029.firebaseapp.com",projectId:"ventastelcel4029"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const auth=firebase.auth();
let miGrafica;

// --- VOZ DE CORTANA EN TIEMPO REAL ---
function hablar(t) {
    const s = window.speechSynthesis;
    s.cancel(); // Detener voz anterior para evitar traslapes
    const u = new SpeechSynthesisUtterance(t);
    u.lang = 'es-MX'; u.pitch = 0.95; u.rate = 0.95;
    s.speak(u);
}

function login(){ auth.signInWithEmailAndPassword(u.value,p.value); }
auth.onAuthStateChanged(user => {
    loginBox.classList.toggle("hidden", !!user);
    appBox.classList.toggle("hidden", !user);
    if(user) {
        hablar("Hola Jefe. Estoy conectada a la red regional. Iniciando análisis de competencia entre tiendas.");
        iniciarAnalisisRegional();
    }
});

function iniciarAnalisisRegional() {
    // ESCUCHA ACTIVA DE VENTAS (CUALQUIER TIENDA)
    db.collection("ventas").orderBy("ts", "desc").onSnapshot(snap => {
        let rankingTiendas = {};
        let productos = { "PORTABILIDAD":0, "RENUEVA":0, "KIT":0, "CHIP":0, "PAYJOY":0 };

        snap.docs.forEach(d => {
            const v = d.data();
            // Lógica de Ranking
            rankingTiendas[v.tienda] = (rankingTiendas[v.tienda] || 0) + 1;
            // Lógica de Productos para consejos
            if(productos[v.tipo] !== undefined) productos[v.tipo]++;
        });

        actualizarGrafica(rankingTiendas);
        generarConsejosCortana(rankingTiendas, productos);
        
        // Alerta de Voz para Venta Nueva
        if (!snap.empty && (Date.now() - snap.docs[0].data().ts < 5000)) {
            const v = snap.docs[0].data();
            hablar(`Nueva venta detectada. ${v.promotor} de la tienda ${v.tienda} ha registrado un ${v.tipo}. El ranking se está moviendo.`);
        }
    });
}

function generarConsejosCortana(tiendas, productos) {
    const total = Object.values(productos).reduce((a,b)=>a+b, 0);
    const topTienda = Object.entries(tiendas).sort((a,b)=>b[1]-a[1])[0];
    const productoBajo = Object.entries(productos).sort((a,b)=>a[1]-b[1])[0][0];

    let txt = `Jefe, la tienda ${topTienda[0]} lleva la delantera con ${topTienda[1]} ventas. `;
    
    // Consejos dinámicos según el producto más bajo
    let tip = "";
    if(productoBajo === "PORTABILIDAD") tip = "Detecto pocas Portabilidades. Recuerda al equipo que es el cierre más fácil: ¡el cliente no paga nada y se lleva el doble de beneficios!";
    else if(productoBajo === "PAYJOY") tip = "El movimiento de PayJoy es lento. Sugiere ofrecerlo a clientes que buscan gama media con pagos semanales mínimos.";
    else tip = "Buen ritmo general. Sugiero enfocarse en KITs para subir el promedio de comisión por equipo.";

    iaSpeech.innerText = txt + tip;
    iaConsejo.innerHTML = `<b>CONSEJO DE CORTANA:</b><br>${tip}`;
}

function actualizarGrafica(data) {
    const ctx = document.getElementById('graficaTiendas').getContext('2d');
    if(miGrafica) miGrafica.destroy();
    
    miGrafica = new Chart(ctx, {
        type: 'horizontalBar',
        data: {
            labels: Object.keys(data),
            datasets: [{
                label: 'Ventas por Sucursal',
                data: Object.values(data),
                backgroundColor: 'rgba(0, 191, 255, 0.4)',
                borderColor: '#00bfff',
                borderWidth: 2
            }]
        },
        options: { 
            scales: { xAxes: [{ ticks: { beginAtZero: true, fontColor: 'white' } }], yAxes: [{ ticks: { fontColor: 'white' } }] },
            legend: { labels: { fontColor: 'white' } }
        }
    });
}

// --- LOCAL STORAGE & EXCEL (Se mantienen por seguridad) ---
function guardarLocal() {
    const v = { promotor: promotor.value, tipo: tipo.value, cel: tel.value, tienda: tienda.value, imei: imei.value, ts: Date.now() };
    let locales = JSON.parse(localStorage.getItem("ventas_iris") || "[]");
    locales.push(v);
    localStorage.setItem("ventas_iris", JSON.stringify(locales));
    hablar("Registro asegurado localmente, Jefe.");
    alert("Guardado en Memoria Local");
}

function exportarExcel() {
    let locales = JSON.parse(localStorage.getItem("ventas_iris") || "[]");
    if(locales.length === 0) return alert("No hay datos locales");
    const ws = XLSX.utils.json_to_sheet(locales);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Reporte");
    XLSX.writeFile(wb, "Reporte_Tiendas_Iris.xlsx");
}

fReg.onsubmit = async e => {
    e.preventDefault();
    await db.collection("ventas").add({
        promotor: promotor.value, tipo: tipo.value, cel: tel.value,
        tienda: tienda.value, imei: imei.value, ts: Date.now()
    });
    fReg.reset();
};
</script>
</body>
</html>
