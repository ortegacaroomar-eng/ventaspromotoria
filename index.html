<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiTube Pro</title>

<style>
body{
    margin:0;
    background:#0d0d0d;
    color:white;
    font-family:Arial;
}
.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}
video,audio{
    width:100%;
    background:black;
    border-radius:12px;
}
.controls{
    padding:10px;
    display:flex;
    gap:10px;
    align-items:center;
}
button{
    background:red;
    border:none;
    padding:10px 15px;
    color:white;
    border-radius:8px;
}
.playlist{
    margin-top:20px;
    background:#181818;
    padding:15px;
    border-radius:12px;
}
.item{
    padding:12px;
    border-bottom:1px solid #333;
    cursor:pointer;
}
.item:hover{
    background:#222;
}
.info{
    margin-top:10px;
    color:#aaa;
}
</style>
</head>
<body>

<div class="container">
    <h1>MiTube Pro Media Player</h1>

    <input type="file" id="picker" multiple
    accept=".mp4,.mkv,.webm,.mov,.avi,.mp3,.wav,.flac,.aac,.ogg,.m4a,.opus,.alac">

    <video id="videoPlayer" controls></video>
    <audio id="audioPlayer" controls style="display:none;"></audio>

    <div class="info" id="fileInfo">Sin archivo</div>

    <div class="playlist" id="playlist">
        <h3>Biblioteca local</h3>
    </div>
</div>

<script>
const picker = document.getElementById("picker");
const playlist = document.getElementById("playlist");
const videoPlayer = document.getElementById("videoPlayer");
const audioPlayer = document.getElementById("audioPlayer");
const fileInfo = document.getElementById("fileInfo");

let filesList = [];

picker.addEventListener("change", (e)=>{
    const files = Array.from(e.target.files);

    files.forEach(file=>{
        filesList.push({
            name:file.name,
            type:file.type,
            size:(file.size/1024/1024).toFixed(2)+" MB",
            url:URL.createObjectURL(file)
        });
    });

    renderList();

    if(filesList.length > 0){
        openFile(0);
    }
});

function renderList(){
    playlist.innerHTML = "<h3>Biblioteca local</h3>";

    filesList.forEach((file,index)=>{
        const div = document.createElement("div");
        div.className = "item";
        div.innerHTML = file.name;
        div.onclick = ()=>openFile(index);
        playlist.appendChild(div);
    });
}

function openFile(index){
    const file = filesList[index];

    fileInfo.innerHTML = `
        Archivo: ${file.name}<br>
        Tipo: ${file.type || "desconocido"}<br>
        Tamaño: ${file.size}
    `;

    if(file.type.startsWith("audio")){
        videoPlayer.style.display="none";
        audioPlayer.style.display="block";
        audioPlayer.src = file.url;
        audioPlayer.play();
    } else {
        audioPlayer.style.display="none";
        videoPlayer.style.display="block";
        videoPlayer.src = file.url;
        videoPlayer.play();
    }
}
</script>

</body>
</html>
