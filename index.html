<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Comisiones Omar · Login modernizado</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
  :root{
    --azul-950:#001226;
    --azul-900:#001d3d;
    --azul-800:#003566;
    --azul-700:#0a4a85;
    --dorado:#ffc300;
    --dorado-soft:#ffd84d;
    --telcel:#00b4d8;
    --att:#ff7a1a;
    --bait:#9d4edd;
    --ok:#2dd4a7;
    --error:#ff5c7a;
    --vidrio-borde:rgba(255,255,255,.10);
    --texto-tenue:rgba(255,255,255,.55);
    --fuente-display:'Space Grotesk',sans-serif;
    --fuente-cuerpo:'Inter',sans-serif;
    --fuente-mono:'JetBrains Mono',monospace;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    min-height:100vh;
    font-family:var(--fuente-cuerpo);
    background:var(--azul-950);
    color:#f4f6fa;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001s !important; transition-duration:.001s !important;}
  }

  /* ---------- FONDO VIVO ---------- */
  .login-overlay{
    position:fixed;inset:0;
    display:flex;align-items:center;justify-content:center;
    padding:20px;
    background:
      radial-gradient(circle at 18% 8%, rgba(0,180,216,.16), transparent 42%),
      radial-gradient(circle at 88% 22%, rgba(255,195,0,.10), transparent 38%),
      radial-gradient(circle at 50% 100%, rgba(157,78,221,.08), transparent 45%),
      linear-gradient(165deg,var(--azul-950) 0%, var(--azul-900) 45%, #00040c 100%);
  }

  /* Líneas tipo "ticket de venta" flotando muy sutil, conecta con el rubro: comisiones/ventas */
  .malla-ticket{
    position:absolute;inset:0;pointer-events:none;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,.025) 0px, rgba(255,255,255,.025) 1px, transparent 1px, transparent 34px);
    mask-image:radial-gradient(circle at 50% 35%, rgba(0,0,0,.9), transparent 70%);
    animation:derivaTicket 26s linear infinite;
  }
  @keyframes derivaTicket{from{background-position:0 0;}to{background-position:0 340px;}}

  .orbe{
    position:absolute;border-radius:50%;filter:blur(60px);opacity:.35;pointer-events:none;
    animation:flotar 11s ease-in-out infinite;
  }
  .orbe-1{width:260px;height:260px;background:var(--telcel);top:8%;left:8%;animation-delay:0s;}
  .orbe-2{width:220px;height:220px;background:var(--dorado);bottom:10%;right:10%;animation-delay:-4s;}
  @keyframes flotar{
    0%,100%{transform:translate(0,0) scale(1);}
    50%{transform:translate(18px,-22px) scale(1.08);}
  }

  /* ---------- CAJA DE LOGIN ---------- */
  .login-box{
    position:relative;
    z-index:2;
    width:100%;max-width:420px;
    padding:38px 32px;
    border-radius:26px;
    background:linear-gradient(180deg, rgba(255,255,255,.085), rgba(255,255,255,.035));
    border:1px solid var(--vidrio-borde);
    backdrop-filter:blur(28px) saturate(160%);
    -webkit-backdrop-filter:blur(28px) saturate(160%);
    box-shadow:
      0 30px 70px rgba(0,0,0,.55),
      inset 0 1px 0 rgba(255,255,255,.18),
      0 0 0 1px rgba(0,180,216,.06);
    text-align:center;
    animation:entradaCaja .6s cubic-bezier(.16,1,.3,1);
    overflow:hidden;
  }
  .login-box::before{
    content:"";
    position:absolute;top:-2px;left:-2px;right:-2px;height:3px;
    background:linear-gradient(90deg,var(--telcel),var(--dorado),var(--bait),var(--telcel));
    background-size:200% 100%;
    animation:correrBorde 6s linear infinite;
  }
  @keyframes correrBorde{to{background-position:200% 0;}}
  @keyframes entradaCaja{from{opacity:0;transform:translateY(18px) scale(.98);}to{opacity:1;transform:translateY(0) scale(1);}}

  .login-mark{
    width:54px;height:54px;border-radius:15px;margin:0 auto 18px;
    background:linear-gradient(135deg,var(--dorado),var(--telcel));
    display:flex;align-items:center;justify-content:center;
    font-family:var(--fuente-display);font-weight:700;color:var(--azul-950);font-size:21px;
    box-shadow:0 8px 22px rgba(255,195,0,.3);
    position:relative;
  }
  .login-mark::after{
    content:"";position:absolute;inset:-6px;border-radius:19px;
    border:1px solid rgba(255,195,0,.3);
    animation:pulsoAnillo 2.6s ease-out infinite;
  }
  @keyframes pulsoAnillo{
    0%{transform:scale(.92);opacity:.9;}
    100%{transform:scale(1.18);opacity:0;}
  }

  .login-box h2{margin:0 0 5px;font-family:var(--fuente-display);font-weight:700;font-size:22px;letter-spacing:.2px;}
  .login-box p{font-size:12.5px;color:var(--texto-tenue);margin:0 0 28px;line-height:1.5;}

  .login-tabs{
    display:flex;background:rgba(0,0,0,.32);padding:4px;border-radius:13px;margin-bottom:22px;
    border:1px solid var(--vidrio-borde);position:relative;
  }
  .login-tab-btn{
    flex:1;padding:11px;background:transparent;border:none;color:var(--texto-tenue);font-weight:600;
    font-size:13px;cursor:pointer;border-radius:10px;transition:color .25s, transform .15s;font-family:inherit;
    position:relative;z-index:1;
  }
  .login-tab-btn.active{color:var(--azul-950);}
  .login-tab-btn:active{transform:scale(.97);}
  .tab-deslizante{
    position:absolute;top:4px;bottom:4px;left:4px;width:calc(50% - 4px);
    background:var(--dorado);border-radius:10px;
    box-shadow:0 4px 14px rgba(255,195,0,.35);
    transition:transform .3s cubic-bezier(.16,1,.3,1);
  }
  .login-tab-btn[data-tab="REGISTRO"].active ~ .tab-deslizante,
  .login-tabs.modo-registro .tab-deslizante{transform:translateX(100%);}

  .btn-google{
    background:#fff;color:#1f1f1f;width:100%;padding:14px;border:none;border-radius:13px;
    font-weight:600;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;
    gap:10px;box-shadow:0 8px 20px rgba(0,0,0,.28);transition:transform .2s, box-shadow .2s;margin-bottom:22px;
    position:relative;overflow:hidden;
  }
  .btn-google::after{
    content:"";position:absolute;top:0;left:-60%;width:40%;height:100%;
    background:linear-gradient(120deg, transparent, rgba(0,0,0,.06), transparent);
    transform:skewX(-20deg);
  }
  .btn-google:hover{transform:translateY(-2px);box-shadow:0 12px 26px rgba(0,0,0,.34);}
  .btn-google:active{transform:translateY(0) scale(.98);}

  .separator{
    display:flex;align-items:center;text-align:center;color:#5b6577;font-size:10.5px;margin-bottom:22px;
    text-transform:uppercase;font-weight:600;letter-spacing:.06em;
  }
  .separator::before,.separator::after{content:"";flex:1;border-bottom:1px solid rgba(255,255,255,.12);}
  .separator:not(:empty)::before{margin-right:.75em;}
  .separator:not(:empty)::after{margin-left:.75em;}

  .campo-error{
    background:rgba(255,92,122,.12);border:1px solid rgba(255,92,122,.4);color:#ffb3c0;
    font-size:12px;padding:11px 13px;border-radius:11px;margin-bottom:16px;text-align:left;
    display:none;align-items:flex-start;gap:9px;animation:sacudir .35s;
  }
  .campo-error.visible{display:flex;}
  @keyframes sacudir{
    0%,100%{transform:translateX(0);}
    25%{transform:translateX(-5px);}
    75%{transform:translateX(5px);}
  }

  .grupo-campo{position:relative;margin-bottom:16px;text-align:left;}
  .grupo-campo i{
    position:absolute;left:14px;top:50%;transform:translateY(-50%);
    color:var(--texto-tenue);font-size:14px;transition:color .2s;
  }
  .grupo-campo input{
    width:100%;padding:14px 14px 14px 40px;border-radius:12px;border:1px solid transparent;
    background:rgba(255,255,255,.07);color:#fff;box-sizing:border-box;outline:none;
    font-family:inherit;font-size:14px;transition:background .2s, border-color .2s;
  }
  .grupo-campo input::placeholder{color:rgba(255,255,255,.35);}
  .grupo-campo input:focus{background:rgba(255,255,255,.11);border-color:var(--dorado);}
  .grupo-campo input:focus ~ i{color:var(--dorado);}
  .grupo-campo input.campo-invalido{border-color:var(--error) !important;}

  .btn-save{
    background:var(--dorado);color:var(--azul-950);width:100%;padding:16px;border:none;border-radius:13px;
    font-weight:700;cursor:pointer;font-size:15.5px;transition:background .2s, transform .15s, box-shadow .2s;
    font-family:var(--fuente-display);letter-spacing:.02em;box-shadow:0 10px 24px rgba(255,195,0,.22);
  }
  .btn-save:hover{background:var(--dorado-soft);box-shadow:0 14px 30px rgba(255,195,0,.3);transform:translateY(-1px);}
  .btn-save:active{transform:scale(.98);}
  .btn-save:disabled{opacity:.55;cursor:wait;transform:none;}

  .spinner{
    display:inline-block;width:16px;height:16px;border:2px solid rgba(0,0,0,.25);
    border-top-color:#001226;border-radius:50%;animation:girar .7s linear infinite;
  }
  @keyframes girar{to{transform:rotate(360deg);}}

  .login-footer-link{
    font-size:12px;color:var(--telcel);background:none;border:none;cursor:pointer;margin-top:16px;
    font-family:inherit;text-decoration:underline;transition:color .2s;
  }
  .login-footer-link:hover{color:var(--dorado-soft);}

  .hidden{display:none !important;}
</style>
</head>
<body>

<div class="login-overlay" id="seccionLogin">
  <div class="malla-ticket"></div>
  <div class="orbe orbe-1"></div>
  <div class="orbe orbe-2"></div>

  <div class="login-box">
    <div class="login-mark">CO</div>
    <h2>Comisiones Omar</h2>
    <p>Inicia sesión para acceder a tus ventas, sincronizadas en la nube</p>

    <div class="login-tabs" id="tabsAcceso">
      <button id="tabOpLogin" class="login-tab-btn active" data-tab="LOGIN" onclick="alternarFormularioAcceso('LOGIN')" type="button">Entrar</button>
      <button id="tabOpRegistro" class="login-tab-btn" data-tab="REGISTRO" onclick="alternarFormularioAcceso('REGISTRO')" type="button">Crear cuenta</button>
      <div class="tab-deslizante"></div>
    </div>

    <button class="btn-google" onclick="ejecutarLoginGoogle()" type="button" id="btnGoogleLogin">
      <i class="fa-brands fa-google" style="color:#4285F4;"></i> Continuar con Google
    </button>

    <div class="separator">O con tu correo</div>

    <div class="campo-error" id="errorLogin"><i class="fa-solid fa-triangle-exclamation"></i><span id="errorLoginTexto"></span></div>

    <form id="fAcceso" onsubmit="procesarAutenticacion(event)">
      <input type="hidden" id="tipoAccesoActual" value="LOGIN">

      <div class="grupo-campo">
        <input type="email" id="logEmail" placeholder="Correo electrónico" required autocomplete="email">
        <i class="fa-solid fa-envelope"></i>
      </div>

      <div class="grupo-campo">
        <input type="password" id="logPass" placeholder="Contraseña (mínimo 6 caracteres)" required autocomplete="current-password" minlength="6">
        <i class="fa-solid fa-lock"></i>
      </div>

      <button type="submit" id="btnAccesoAccion" class="btn-save">
        <span id="btnAccesoTexto">INGRESAR AL PANEL</span>
      </button>
    </form>
    <button class="login-footer-link hidden" id="btnOlvidoPass" onclick="recuperarPassword()" type="button">¿Olvidaste tu contraseña?</button>

    <div class="login-footer-link" style="margin-top:18px;opacity:.5;font-size:10.5px;text-decoration:none;cursor:default;">
    Conectado a Firebase · proyecto ventastelcel4029
  </div>
</div>

<div class="hidden" id="wrapperSistema" style="position:fixed;inset:0;background:var(--azul-950);display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--fuente-display);text-align:center;padding:20px;">
  <div>
    <i class="fa-solid fa-circle-check" style="font-size:40px;color:var(--ok);margin-bottom:14px;display:block;"></i>
    <h2 style="margin:0 0 8px;">Sesión iniciada</h2>
    <p style="font-family:var(--fuente-cuerpo);color:var(--texto-tenue);margin:0 0 22px;font-size:13px;" id="txtUsuarioActivo"></p>
    <button class="btn-logout" onclick="cerrarSesionSistema()" type="button" style="font-family:var(--fuente-cuerpo);">
      <i class="fa-solid fa-power-off"></i> Cerrar sesión
    </button>
  </div>
</div>

<script>
  // ---------- CONFIGURACIÓN DE FIREBASE ----------
  const firebaseConfig = {
    apiKey: "AIzaSyD4UK_j8UxMwOCtrtXlYftBe_wCLE7psMc",
    authDomain: "ventastelcel4029.firebaseapp.com",
    databaseURL: "https://ventastelcel4029-default-rtdb.firebaseio.com",
    projectId: "ventastelcel4029",
    storageBucket: "ventastelcel4029.firebasestorage.app",
    messagingSenderId: "480758010888",
    appId: "1:480758010888:web:e948c54f0217536aa9adbd"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  // Mantiene la sesión iniciada entre recargas/cierres del navegador
  auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

  // ---------- UI: cambio de pestaña Entrar / Crear cuenta ----------
  function alternarFormularioAcceso(tipo){
    document.getElementById('tipoAccesoActual').value = tipo;
    document.getElementById('tabOpLogin').classList.toggle('active', tipo === 'LOGIN');
    document.getElementById('tabOpRegistro').classList.toggle('active', tipo === 'REGISTRO');
    document.getElementById('tabsAcceso').classList.toggle('modo-registro', tipo === 'REGISTRO');
    document.getElementById('btnAccesoTexto').textContent = tipo === 'LOGIN' ? 'INGRESAR AL PANEL' : 'CREAR CUENTA';
    document.getElementById('btnOlvidoPass').classList.toggle('hidden', tipo !== 'LOGIN');
    ocultarError();
  }

  function ocultarError(){
    document.getElementById('errorLogin').classList.remove('visible');
  }

  function mostrarError(msg){
    document.getElementById('errorLoginTexto').textContent = msg;
    document.getElementById('errorLogin').classList.add('visible');
  }

  // Traduce los códigos de error de Firebase a mensajes claros en español
  function traducirErrorFirebase(codigo){
    const mapa = {
      'auth/invalid-email': 'El correo no tiene un formato válido.',
      'auth/user-disabled': 'Esta cuenta fue deshabilitada.',
      'auth/user-not-found': 'No existe una cuenta con ese correo.',
      'auth/wrong-password': 'Contraseña incorrecta.',
      'auth/invalid-credential': 'Correo o contraseña incorrectos.',
      'auth/email-already-in-use': 'Ya existe una cuenta con ese correo.',
      'auth/weak-password': 'La contraseña debe tener al menos 6 caracteres.',
      'auth/network-request-failed': 'Sin conexión a internet. Intenta de nuevo.',
      'auth/too-many-requests': 'Demasiados intentos. Espera un momento e intenta otra vez.',
      'auth/popup-closed-by-user': 'Cerraste la ventana de Google antes de terminar.'
    };
    return mapa[codigo] || 'Ocurrió un error. Intenta de nuevo.';
  }

  // ---------- LOGIN / REGISTRO con correo y contraseña ----------
  function procesarAutenticacion(e){
    e.preventDefault();
    ocultarError();

    const tipo = document.getElementById('tipoAccesoActual').value;
    const correo = document.getElementById('logEmail').value.trim();
    const clave = document.getElementById('logPass').value;
    const boton = document.getElementById('btnAccesoAccion');
    const textoBoton = document.getElementById('btnAccesoTexto');
    const original = textoBoton.innerHTML;

    boton.disabled = true;
    textoBoton.innerHTML = '<span class="spinner"></span> Procesando...';

    const restaurarBoton = () => {
      boton.disabled = false;
      textoBoton.innerHTML = original;
    };

    if(tipo === 'LOGIN'){
      auth.signInWithEmailAndPassword(correo, clave)
        .then((credencial) => {
          // Login exitoso: Firebase ya guardó la sesión localmente (persistence LOCAL)
          mostrarPanelPrincipal(credencial.user);
        })
        .catch((err) => {
          mostrarError(traducirErrorFirebase(err.code));
        })
        .finally(restaurarBoton);
    } else {
      auth.createUserWithEmailAndPassword(correo, clave)
        .then((credencial) => {
          // Crea el documento de perfil del vendedor en Firestore
          return db.collection('usuarios').doc(credencial.user.uid).set({
            correo: credencial.user.email,
            creadoEn: firebase.firestore.FieldValue.serverTimestamp()
          }).then(() => credencial.user);
        })
        .then((user) => {
          mostrarPanelPrincipal(user);
        })
        .catch((err) => {
          mostrarError(traducirErrorFirebase(err.code));
        })
        .finally(restaurarBoton);
    }
  }

  // ---------- LOGIN con Google ----------
  function ejecutarLoginGoogle(){
    ocultarError();
    const proveedor = new firebase.auth.GoogleAuthProvider();
    const btn = document.getElementById('btnGoogleLogin');
    btn.disabled = true;

    auth.signInWithPopup(proveedor)
      .then((resultado) => {
        const user = resultado.user;
        // Crea el perfil en Firestore solo si es la primera vez que entra
        return db.collection('usuarios').doc(user.uid).set({
          correo: user.email,
          nombre: user.displayName || '',
          foto: user.photoURL || '',
          creadoEn: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true }).then(() => user);
      })
      .then((user) => {
        mostrarPanelPrincipal(user);
      })
      .catch((err) => {
        if(err.code !== 'auth/popup-closed-by-user' && err.code !== 'auth/cancelled-popup-request'){
          mostrarError(traducirErrorFirebase(err.code));
        }
      })
      .finally(() => { btn.disabled = false; });
  }

  // ---------- Recuperar contraseña ----------
  function recuperarPassword(){
    ocultarError();
    const correo = document.getElementById('logEmail').value.trim();
    if(!correo){
      mostrarError('Escribe tu correo arriba primero, y luego toca "¿Olvidaste tu contraseña?".');
      return;
    }
    auth.sendPasswordResetEmail(correo)
      .then(() => {
        mostrarError('Listo: te enviamos un correo para restablecer tu contraseña.');
        document.getElementById('errorLogin').style.borderColor = 'var(--ok)';
        document.getElementById('errorLogin').style.color = '#bdf5e6';
      })
      .catch((err) => {
        mostrarError(traducirErrorFirebase(err.code));
      });
  }

  // ---------- Mantener la sesión activa al recargar la página ----------
  // Si el usuario ya inició sesión antes, Firebase lo detecta solo, sin pedir login otra vez.
  auth.onAuthStateChanged((user) => {
    if(user){
      mostrarPanelPrincipal(user);
    }
  });

  function mostrarPanelPrincipal(user){
    // Aquí se oculta el login y se muestra el panel real de la app (#wrapperSistema en tu archivo completo)
    document.getElementById('seccionLogin').classList.add('hidden');
    document.getElementById('wrapperSistema').classList.remove('hidden');
    document.getElementById('txtUsuarioActivo').textContent = user.email;
    console.log('Sesión activa:', user.email);
  }

  function cerrarSesionSistema(){
    auth.signOut().then(() => {
      document.getElementById('wrapperSistema').classList.add('hidden');
      document.getElementById('seccionLogin').classList.remove('hidden');
    });
  }
</script>

</body>
</html>
