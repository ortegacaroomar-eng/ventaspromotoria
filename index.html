<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Ventas Telcel Pro + IRIS AI</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { margin:0; font-family:'Segoe UI',system-ui; background:linear-gradient(135deg,#001d3d,#003566,#000814); min-height:100vh; color:white; }
        .app { max-width:480px; margin:auto; padding:20px; position: relative; }
        .card { background:rgba(255,255,255,.08); backdrop-filter:blur(12px); border-radius:18px; padding:18px; margin-bottom:16px; box-shadow:0 10px 25px rgba(0,0,0,.3); border:1px solid rgba(255,255,255,0.1); }
        .header { text-align:center; font-size:20px; font-weight:bold; color:#ffc300; margin-bottom:20px; }
        label { font-size:11px; font-weight:600; color:#ffc300; }
        input, select, textarea { width:100%; padding:12px; margin-top:4px; margin-bottom:12px; border-radius:10px; border:none; background:rgba(255,255,255,.12); color:white; box-sizing: border-box; }
        button { width:100%; padding:14px; border:none; border-radius:12px; font-weight:bold; cursor:pointer; transition:.2s; margin-bottom: 10px; }
        .btn-main { background:#ffc300; color:#003566; }
        .btn-iris { background: linear-gradient(45deg, #00e5ff, #008cff); color: white; border: none; }
        .btn-logout { position: absolute; top: 20px; right: 20px; background: #ff4d4d; color: white; padding: 8px 12px; border-radius: 8px; font-size: 12px; z-index: 10; width: auto; border:none; cursor:pointer; }
        .login { max-width:350px; margin:100px auto; background:white; color:black; padding:30px; border-radius:18px; text-align:center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .hidden { display:none !important; }
        .venta-item { background: rgba(255,255,255,0.07); padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 5px solid #ffc300; font-size: 11px; position: relative; }
        .status-icon { position: absolute; top: 15px; right: 45px; font-size: 14px; }
        .btn-del { position: absolute; top: 12px; right: 12px; color: #ff4d4d; cursor: pointer; font-size: 18px; padding: 5px; }
        
        /* ESTILOS IRIS */
        .iris-container { border: 1px solid #00e5ff; background: rgba(0, 229, 255, 0.05); }
        .iris-halo { width: 50px; height: 50px; border: 2px solid #00e5ff; border-radius: 50%; border-top-color: transparent; animation: spin 2s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #irisResponse { font-size: 12px; color: #00e5ff; font-style: italic; margin-top: 10px; border-top: 1px solid rgba(0,229,255,0.2); padding-top: 10px; }
    </style>
</head>
<body onload="inicio()">

    <div id="loginBox" class="login">
        <h2 id="tituloAuth" style="margin-top:0">Acceso Sistema</h2>
        <input id="u" placeholder="Correo Electrónico">
        <input id="p" type="password" placeholder="Contraseña">
        <button class="btn-main" onclick="entrar()">ENTRAR</button>
        <button style="background:none; color:#003566; font-size:12px; margin-top:10px; cursor:pointer;" onclick="toggleRegistro()" id="btnT">¿No tienes cuenta? Regístrate</button>
    </div>

    <div id="appBox" class="app hidden">
        <button class="btn-logout" onclick="salir()"><i class="fa-solid fa-right-from-bracket"></i> Salir</button>
        
        <div class="card iris-container">
            <div class="iris-halo"></div>
            <div style="text-align:center; font-weight:bold; color:#00e5ff; font-size:14px;">IRIS AI: ÁNGEL CIBERNÉTICO</div>
            
            <label style="color:#00e5ff; margin-top:10px; display:block;">CONSULTA O BRAINSTORMING (Internet)</label>
            <input id="irisQuery" placeholder="Ej: Precios Bait vs Telcel o Guión para KIT">
            
            <div style="display:flex; gap:5px;">
                <button class="btn-iris" onclick="generarSpeechIA()">GENERAR GUION</button>
                <button class="btn-iris" style="background:#003566;" onclick="consultarInternet()">CONSULTAR</button>
            </div>
            <div id="irisResponse">"Lista para ayudarte a cerrar esa venta..."</div>
        </div>

        <div class="header">REGISTRO DE VENTAS</div>
        
        <form id="fReg">
            <div class="card">
                <label>TIPO DE PRODUCTO</label>
                <select id="iTipo" required onchange="ajustarCampos()">
                    <option value="">Seleccionar</option>
                    <option value="KIT">KIT</option>
                    <option value="CHIP">CHIP</option>
                    <option value="PORTA">PORTA</option>
                    <option value="RENUEVATE">RENUEVATE</option>
                </select>
                <label>FECHA DE ACTIVACION (DD/MM/YYYY)</label>
                <input id="iFec" required>
                <label>NUM. CELULAR</label>
                <input id="iTel" type="tel" required maxlength="10">
                <label>ICCID</label>
                <input id="iIcc" required>
            </div>

            <div id="seccionEquipo" class="card">
                <label>IMEI</label><input id="iIme">
                <label>MARCA</label><input id="iMarca">
                <label>MODELO</label><input id="iMod">
            </div>

            <div class="card">
                <label># TIENDA / Determinante</label><input id="iTiendaNum" required>
                <label>SOLO NOMBRE DE LA CADENA</label><input id="iCadena" required>
                <label>SOLO NOMBRE DE TIENDA</label><input id="iTiendaNombre" required>
                <label>NOMBRE COMPLETO PROMOTOR</label><input id="iProm" required>
            </div>
            <button type="submit" class="btn-main">GUARDAR VENTA</button>
        </form>

        <div class="header" style="font-size: 16px; margin-top: 25px;">HISTORIAL LOCAL</div>
        <div id="listaLocal"></div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD4UK_j8UxMwOCtrtXlYftBe_wCLE7psMc", 
        authDomain: "ventastelcel4029.firebaseapp.com",
        databaseURL: "https://ventastelcel4029-default-rtdb.firebaseio.com",
        projectId: "ventastelcel4029",
        storageBucket: "ventastelcel4029.firebasestorage.app",
        messagingSenderId: "480758010888",
        appId: "1:480758010888:web:e948c54f0217536aa9adbd"
    };

    let uA = "", db, auth, modoReg = false;

    function inicio() {
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        db = firebase.database();
        auth = firebase.auth();
        const hoy = new Date();
        iFec.value = hoy.toLocaleDateString('es-MX', { day: '2-digit', month: '2-digit', year: 'numeric' });
        auth.onAuthStateChanged(user => {
            if(user) { uA = user.email; mostrarApp(); }
            else { loginBox.classList.remove("hidden"); appBox.classList.add("hidden"); }
        });
    }

    // --- FUNCIONES IRIS AI ---
    function hablar(t) {
        const s = window.speechSynthesis;
        s.cancel();
        const u = new SpeechSynthesisUtterance(t);
        u.lang = 'es-MX'; u.pitch = 0.95; u.rate = 1;
        s.speak(u);
    }

    function generarSpeechIA() {
        const prom = iProm.value || "Compañero";
        const tipo = iTipo.value || "producto";
        const resp = `Atención ${prom}. Para vender este ${tipo}, dile al cliente: "Si lo activas hoy mismo, te garantizo señal en cualquier parte del país y redes sociales ilimitadas. No es solo un equipo, es estar siempre conectado."`;
        irisResponse.innerText = resp;
        hablar(resp);
    }

    function consultarInternet() {
        const query = irisQuery.value;
        if(!query) return alert("Escribe algo para consultar");
        irisResponse.innerText = "Consultando en la red regional...";
        // Simulación de búsqueda externa (en una app real aquí conectarías con una API de búsqueda)
        setTimeout(() => {
            const resp = `Iris: Sobre "${query}", te sugiero revisar las promociones vigentes en el portal de Telcel para asegurar el mejor precio frente a la competencia.`;
            irisResponse.innerText = resp;
            hablar(resp);
        }, 1500);
    }

    // --- RESTO DEL CODIGO ORIGINAL (SIN CAMBIOS) ---
    function toggleRegistro() {
        modoReg = !modoReg;
        tituloAuth.innerText = modoReg ? "Crear Usuario" : "Acceso Sistema";
        btnT.innerText = modoReg ? "Ya tengo cuenta, entrar" : "¿No tienes cuenta? Regístrate";
    }

    function entrar() {
        let userEmail = u.value.trim();
        let pass = p.value.trim();
        if(!userEmail || !pass) return alert("Por favor llena todos los campos");
        if(modoReg) {
            auth.createUserWithEmailAndPassword(userEmail, pass)
            .then(() => { alert("Usuario registrado"); toggleRegistro(); })
            .catch(e => alert("Error: " + e.message));
        } else {
            auth.signInWithEmailAndPassword(userEmail, pass)
            .catch(e => alert("Acceso denegado: " + e.message));
        }
    }

    function mostrarApp() {
        loginBox.classList.add("hidden");
        appBox.classList.remove("hidden");
        cargarVentasLocales();
        hablar("Protocolo Iris iniciado. ¿En qué venta trabajamos hoy?");
    }

    function salir() { auth.signOut(); }

    function ajustarCampos() {
        const t = iTipo.value;
        if(t === "CHIP" || t === "PORTA") { seccionEquipo.classList.add("hidden"); } 
        else { seccionEquipo.classList.remove("hidden"); }
    }

    fReg.onsubmit = e => {
        e.preventDefault();
        const v = {
            id: Date.now(),
            sincronizado: false,
            "NUM. CELULAR": iTel.value,
            "IMEI": iIme.value || "-",
            "ICCID": iIcc.value,
            "Renuevate / Kit / Chip / Porta": iTipo.value,
            "# TIENDA / Determinante": iTiendaNum.value,
            "SOLO NOMBRE DE LA CADENA": iCadena.value,
            "SOLO NOMBRE DE TIENDA SIN CADENA": iTiendaNombre.value,
            "NOMBRE COMPLETO PROMOTOR": iProm.value,
            "FECHA DE ACTIVACION": iFec.value,
            "MARCA": iMarca.value || "-",
            "MODELO": iMod.value || "-"
        };
        let local = JSON.parse(localStorage.getItem("ventas_save") || "[]");
        local.unshift(v);
        localStorage.setItem("ventas_save", JSON.stringify(local));
        if(auth.currentUser) {
            db.ref('ventas/' + auth.currentUser.uid).push(v).then(() => {
                marcarSincronizado(v.id);
                hablar(`Venta sincronizada correctamente, ${iProm.value}`);
            });
        }
        fReg.reset();
        ajustarCampos();
        iFec.value = new Date().toLocaleDateString('es-MX', { day: '2-digit', month: '2-digit', year: 'numeric' });
        cargarVentasLocales();
        alert("Venta guardada localmente");
    }

    function eliminarVenta(id) {
        if(confirm("¿Borrar venta local?")) {
            let local = JSON.parse(localStorage.getItem("ventas_save") || "[]");
            localStorage.setItem("ventas_save", JSON.stringify(local.filter(v => v.id !== id)));
            cargarVentasLocales();
        }
    }

    function marcarSincronizado(id) {
        let local = JSON.parse(localStorage.getItem("ventas_save") || "[]");
        let item = local.find(x => x.id === id);
        if(item) {
            item.sincronizado = true;
            localStorage.setItem("ventas_save", JSON.stringify(local));
            cargarVentasLocales();
        }
    }

    function cargarVentasLocales() {
        const div = document.getElementById("listaLocal");
        let local = JSON.parse(localStorage.getItem("ventas_save") || "[]");
        div.innerHTML = local.length === 0 ? "<p style='text-align:center; opacity:0.5;'>Sin registros.</p>" : 
        local.map(v => `
            <div class="venta-item">
                <div class="status-icon">${v.sincronizado ? '☁️' : '⏳'}</div>
                <div class="btn-del" onclick="eliminarVenta(${v.id})"><i class="fa-solid fa-trash-can"></i></div>
                <div style="color:#ffc300; font-weight:bold; font-size:14px;">${v["NUM. CELULAR"]}</div>
                <div style="opacity:0.8; margin-bottom:5px;">${v["Renuevate / Kit / Chip / Porta"]} - ${v["FECHA DE ACTIVACION"]}</div>
                <div style="font-size:9px; opacity:0.6;">PROMOTOR: ${v["NOMBRE COMPLETO PROMOTOR"]}</div>
            </div>
        `).join("");
    }
</script>
</body>
</html>
