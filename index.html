<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventas PRO IA - Registro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root { --neon: #00f2ff; --purple: #7000ff; --pink: #ff007a; --bg: #0a0a0a; }
        body { margin:0; font-family:'Segoe UI', sans-serif; background: var(--bg); color:white; }
        .app { max-width:1000px; margin:auto; padding:15px; }
        .card { background:rgba(255,255,255,0.07); padding:18px; border-radius:15px; margin-bottom:15px; border-left: 4px solid var(--neon); }
        input, select { width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #333; background:#151515; color:white; box-sizing: border-box; }
        .btn { padding:12px; border:none; border-radius:10px; cursor:pointer; font-weight:bold; transition: 0.3s; }
        .btn-primary { background: var(--neon); color:#000; }
        .btn-secondary { background: var(--purple); color:#fff; }
        .btn-accent { background: var(--pink); color:#fff; }
        .btn:active { transform: scale(0.95); }
        table { width:100%; border-collapse: collapse; margin-top:10px; font-size: 12px; }
        th { color: var(--neon); text-align:left; padding:8px; border-bottom: 1px solid #333; }
        td { padding:8px; border-bottom: 1px solid #222; }
        .hidden { display:none; }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; background: #000; }
        .badge { font-size: 9px; padding: 2px 4px; border-radius: 4px; font-weight: bold; }
        .b-local { border: 1px solid var(--purple); color: var(--purple); }
        .b-nube { border: 1px solid var(--neon); color: var(--neon); }
    </style>
</head>
<body>

<div id="loginBox" class="app" style="max-width:400px; margin-top:50px;">
    <div class="card">
        <h2><i class="fas fa-lock"></i> Acceso Pro</h2>
        <input id="u" type="email" placeholder="Correo">
        <input id="p" type="password" placeholder="Contraseña">
        <button class="btn btn-primary" style="width:100%" onclick="login()">ENTRAR</button>
        <button class="btn btn-secondary" style="width:100%; margin-top:10px;" onclick="registrar()">REGISTRAR</button>
    </div>
</div>

<div id="appBox" class="app hidden">
    <div class="card" style="display:flex; justify-content: space-between; align-items: center;">
        <span>📍 <span id="gpsTxt">Buscando...</span></span>
        <div>
            <button class="btn btn-accent" onclick="descargarExcel()"><i class="fas fa-file-excel"></i></button>
            <button class="btn btn-secondary" onclick="logout()"><i class="fas fa-power-off"></i></button>
        </div>
    </div>

    <div class="card">
        <div id="reader"></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
            <button class="btn btn-secondary" onclick="iniciarScanner()">ESCANEAR</button>
            <button class="btn btn-accent" onclick="detenerScanner()">DETENER</button>
        </div>
    </div>

    <form id="fReg" class="card">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <input id="marca" placeholder="Marca (Ej: Samsung)">
            <input id="modelo" placeholder="Modelo (Ej: A54)">
        </div>
        <select id="tipo">
            <option>KIT</option><option>CHIP</option>
            <option>PORTABILIDAD</option><option>RENUEVA</option>
        </select>
        <input id="tel" type="number" placeholder="Número Telefónico">
        <input id="icc" type="number" placeholder="ICCID (Chip)">
        <input id="imei" type="number" placeholder="IMEI (Equipo)">
        <input id="promotor" placeholder="Nombre del Promotor" required>
        <input id="fechaInput" type="datetime-local">

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <button type="submit" class="btn btn-primary">SUBIR NUBE</button>
            <button type="button" class="btn btn-secondary" onclick="guardarLocal()">GUARDAR LOCAL</button>
        </div>
    </form>

    <div class="card" style="overflow-x:auto;">
        <table>
            <thead><tr><th>Promotor</th><th>Equipo</th><th>Tel</th><th>Origen</th><th>Acción</th></tr></thead>
            <tbody id="tabla"></tbody>
        </table>
    </div>
</div>

<script>
const firebaseConfig={apiKey:"AIzaSyD4UK_j8UxMwOCtrtXlYftBe_wCLE7psMc",authDomain:"ventastelcel4029.firebaseapp.com",projectId:"ventastelcel4029"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();
let scanner, isScanning = false;

function formatFecha(f) {
    const d = f ? new Date(f) : new Date();
    return d.toLocaleDateString('es-MX', {day:'2-digit', month:'2-digit', year:'numeric'});
}

/* AUTH */
function login(){ auth.signInWithEmailAndPassword(u.value,p.value).catch(e=>alert(e.message)); }
function registrar(){ auth.createUserWithEmailAndPassword(u.value,p.value).catch(e=>alert(e.message)); }
function logout(){ auth.signOut(); }

auth.onAuthStateChanged(user=>{
    loginBox.classList.toggle("hidden", !!user);
    appBox.classList.toggle("hidden", !user);
    if(user) render();
});

/* SCANNER */
function iniciarScanner(){
    if(isScanning) return;
    scanner = new Html5Qrcode("reader");
    isScanning = true;
    scanner.start({facingMode:"environment"}, {fps:10, qrbox:250}, (code)=>{
        let limpio = code.replace(/\D/g,'');
        if(limpio.length === 15) { imei.value = limpio; toast("IMEI OK"); detenerScanner(); } 
        else if(limpio.length >= 18) { icc.value = limpio; toast("ICCID OK"); detenerScanner(); }
    }).catch(e => console.log(e));
}
function detenerScanner(){ if(scanner){ scanner.stop().then(()=>isScanning=false); } }

/* GUARDADO NUBE */
fReg.onsubmit = async e => {
    e.preventDefault();
    const data = {
        uid: auth.currentUser.uid,
        promotor: promotor.value,
        marca: marca.value,
        modelo: modelo.value,
        tipo: tipo.value,
        cel: tel.value,
        icc: icc.value,
        imei: imei.value,
        fecha: formatFecha(fechaInput.value)
    };
    await db.collection("ventas").add(data);
    fReg.reset();
    render();
};

/* GUARDADO LOCAL */
function guardarLocal(){
    if(!promotor.value) return alert("Escribe el nombre del promotor");
    const v = {
        promotor: promotor.value,
        marca: marca.value,
        modelo: modelo.value,
        tipo: tipo.value,
        cel: tel.value,
        fecha: formatFecha(fechaInput.value),
        icc: icc.value,
        imei: imei.value
    };
    let lista = JSON.parse(localStorage.getItem("ventas_excel") || "[]");
    lista.push(v);
    localStorage.setItem("ventas_excel", JSON.stringify(lista));
    toast("Guardado en Local");
    render();
}

/* RENDER */
async function render(){
    const snap = await db.collection("ventas").where("uid","==",auth.currentUser.uid).get();
    let html = snap.docs.map(d => {
        const v = d.data();
        return `<tr><td>${v.promotor}</td><td>${v.marca} ${v.modelo}</td><td>${v.cel}</td><td><span class="badge b-nube">NUBE</span></td><td><button onclick="delNube('${d.id}')">🗑️</button></td></tr>`;
    }).join('');

    let locales = JSON.parse(localStorage.getItem("ventas_excel") || "[]");
    let htmlL = locales.map((v, i) => {
        return `<tr><td>${v.promotor}</td><td>${v.marca} ${v.modelo}</td><td>${v.cel}</td><td><span class="badge b-local">LOCAL</span></td><td><button onclick="delLocal(${i})">✕</button></td></tr>`;
    }).reverse().join('');

    tabla.innerHTML = html + htmlL;
}

/* EXPORTAR A EXCEL (CSV) */
function descargarExcel(){
    let locales = JSON.parse(localStorage.getItem("ventas_excel") || "[]");
    if(locales.length === 0) return alert("No hay datos locales para descargar");
    
    let csv = "Fecha,Promotor,Marca,Modelo,Tipo,Telefono,ICCID,IMEI\n";
    locales.forEach(v => {
        csv += `${v.fecha},${v.promotor},${v.marca},${v.modelo},${v.tipo},${v.cel},${v.icc},${v.imei}\n`;
    });

    const blob = new Blob([csv], {type: 'text/csv'});
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `Ventas_${new Date().toLocaleDateString()}.csv`;
    a.click();
}

async function delNube(id){ if(confirm("¿Borrar?")) { await db.collection("ventas").doc(id).delete(); render(); } }
function delLocal(i){ 
    let lista = JSON.parse(localStorage.getItem("ventas_excel") || "[]");
    lista.splice(i,1); localStorage.setItem("ventas_excel", JSON.stringify(lista)); render(); 
}
function toast(m){ 
    const t = document.createElement("div"); t.innerText=m; 
    t.style="position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--neon); color:black; padding:10px 20px; border-radius:20px; z-index:100;";
    document.body.appendChild(t); setTimeout(()=>t.remove(), 2000);
}
</script>
</body>
</html>
