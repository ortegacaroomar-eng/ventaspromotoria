<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRIS IA EMPRESA</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/face-api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;background:#000814;color:white;font-family:'Segoe UI';}
.app{max-width:480px;margin:auto;padding:15px;}
.card{background:rgba(255,255,255,.08);padding:12px;border-radius:12px;margin-bottom:10px;text-align:center;}
#angel{width:140px;animation:float 4s infinite;}
@keyframes float{50%{transform:translateY(-10px);}}
.alerta{animation:pulse .5s infinite alternate;}
@keyframes pulse{0%{filter:drop-shadow(0 0 10px red);}100%{filter:drop-shadow(0 0 25px red);}}
input,select{width:100%;padding:10px;margin-top:5px;background:#111;color:white;border:none;border-radius:8px;}
button{width:100%;padding:10px;margin-top:8px;border:none;border-radius:8px;background:#ffc300;font-weight:bold;}
</style>
</head>

<body onload="inicio()">

<div id="loginBox" class="app">
<div class="card">
<h2>Acceso</h2>
<input id="u">
<input id="p" type="password">
<button onclick="entrar()">Entrar</button>
</div>
</div>

<div id="appBox" class="app hidden">

<div class="card">
<img id="angel" src="https://i.ibb.co/Xf8X0vV/angel-blue-animated.png">
</div>

<!-- IA CHAT -->
<div class="card">
<input id="iaInput" placeholder="Habla con IRIS..." onkeyup="if(event.key==='Enter') preguntarIA()">
</div>

<!-- GRAFICA -->
<div class="card">
<canvas id="graficaVentas"></canvas>
</div>

<!-- FORM -->
<form id="fReg" class="card">
<select id="iTipo">
<option>KIT</option>
<option>CHIP</option>
<option>PORTA</option>
<option>RENUEVATE</option>
</select>

<input id="iTel" placeholder="Teléfono">

<select id="imeiPendiente">
<option value="no">OK</option>
<option value="si">PENDIENTE</option>
</select>

<button>Guardar</button>
</form>

<div id="lista"></div>

</div>

<script>

// 🔥 CONFIG
const firebaseConfig={
apiKey:"TU_API_KEY",
authDomain:"ventastelcel4029.firebaseapp.com",
databaseURL:"https://ventastelcel4029-default-rtdb.firebaseio.com"
};

let db,auth,chart;

function inicio(){
firebase.initializeApp(firebaseConfig);
db=firebase.database();
auth=firebase.auth();

auth.onAuthStateChanged(u=>{
if(u){
loginBox.classList.add("hidden");
appBox.classList.remove("hidden");
cargar();
}
});
}

function entrar(){
auth.signInWithEmailAndPassword(u.value,p.value);
}

// 🎙️ VOZ MÁS HUMANA
function hablar(texto){
let msg=new SpeechSynthesisUtterance(texto);
msg.lang="es-MX";
msg.rate=0.9;
msg.pitch=1.2;

// intenta voz femenina
let voces=speechSynthesis.getVoices();
let voz=voces.find(v=>v.name.toLowerCase().includes("female"));
if(voz) msg.voice=voz;

speechSynthesis.speak(msg);
}

// 🤖 IA REAL (conectar API)
async function preguntarIA(){

let texto=iaInput.value;

hablar("Pensando...");

try{

let res=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer TU_API_KEY_AQUI"
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[{role:"user",content:texto}]
})
});

let data=await res.json();
let respuesta=data.choices[0].message.content;

hablar(respuesta);

}catch(e){
hablar("No tengo conexión con inteligencia avanzada");
}

iaInput.value="";
}

// 💾 GUARDAR
fReg.onsubmit=e=>{
e.preventDefault();

let v={
tel:iTel.value,
tipo:iTipo.value,
imei:imeiPendiente.value
};

let l=JSON.parse(localStorage.getItem("ventas")||"[]");
l.unshift(v);
localStorage.setItem("ventas",JSON.stringify(l));

cargar();

if(v.imei==="si"){
hablar("Tienes IMEI pendiente… actívalo hoy");
}
}

// 📊 GRAFICA
function crearGrafica(data){

let conteo={KIT:0,CHIP:0,PORTA:0,RENUEVATE:0};

data.forEach(v=>conteo[v.tipo]++);

let ctx=document.getElementById("graficaVentas");

if(chart) chart.destroy();

chart=new Chart(ctx,{
type:"bar",
data:{
labels:Object.keys(conteo),
datasets:[{
label:"Ventas",
data:Object.values(conteo)
}]
}
});
}

// 📊 CARGAR
function cargar(){

let l=JSON.parse(localStorage.getItem("ventas")||"[]");

lista.innerHTML=l.map(v=>`<div class="card">${v.tel} - ${v.tipo}</div>`).join("");

crearGrafica(l);
}

</script>
</body>
</html>
