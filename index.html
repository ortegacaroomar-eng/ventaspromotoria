<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventas Telcel PRO - v1.6.1</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <style>
        :root {--amarillo:#ffc300; --azul:#003566; --morado:#8338ec; --rojo:#d90429;}
        body { margin:0; font-family:'Segoe UI',sans-serif; background:#000814; color:white; }
        .app { max-width:600px; margin:auto; padding:15px; }
        .card { background:rgba(255,255,255,.08); border-radius:15px; padding:15px; margin-bottom:12px; border:1px solid rgba(255,255,255,0.1); }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .gps-badge { background: #000; border: 1px solid #00b4d8; padding: 5px 10px; border-radius: 20px; font-size: 11px; color: #00b4d8; }
        label { font-size:10px; font-weight:bold; color:var(--amarillo); display: block; margin-bottom: 4px; }
        input, select, textarea { width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:none; background:rgba(255,255,255,.12); color:white; box-sizing: border-box; }
        .btn { padding:12px; border:none; border-radius:10px; font-weight:bold; cursor:pointer; width:100%; display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom: 8px; }
        .btn-save { background:var(--amarillo); color:#001d3d; width: 100%; }
        .btn-ia { background:var(--morado); color:white; width: 100%; font-size: 14px; }
        .ia-resp { background:rgba(0,0,0,.4); padding:12px; border-radius:8px; border-left: 4px solid var(--morado); font-size:13px; min-height:40px; margin-top: 10px; color: #e0e0e0; }
        .hidden { display: none; }
        .online-tag { background: var(--amarillo); color: black; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body onload="inicio()">

    <div id="loginBox" class="app" style="text-align:center; margin-top:50px;">
        <h2 style="color:var(--amarillo)">Acceso Telcel PRO</h2>
        <input id="u" type="email" placeholder="Usuario">
        <input id="p" type="password" placeholder="Contraseña">
        <button class="btn btn-save" onclick="manejarAuth()">ENTRAR</button>
    </div>

    <div id="appBox" class="app hidden">
        <div class="top-bar">
            <div class="gps-badge" id="txtGps"><i class="fa-solid fa-location-dot"></i> Localizando...</div>
            <div style="color:var(--amarillo); font-weight:bold; font-size: 20px;" id="txtReloj">00:00</div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <span class="online-tag">Online</span>
                <button onclick="auth.signOut()" style="background:none; border:none; color:var(--rojo); font-size:24px"><i class="fa-solid fa-power-off"></i></button>
            </div>
        </div>

        <div class="card" style="border: 1px solid var(--morado)">
            <label><i class="fa-solid fa-robot"></i> ASISTENTE IA TELCEL</label>
            
            <button class="btn btn-ia" onclick="accionIA('escanear')"><i class="fa-solid fa-barcode"></i> Escanear IMEI</button>
            <button class="btn btn-ia" onclick="accionIA('resumen')"><i class="fa-solid fa-chart-line"></i> Resumen del día</button>
            <button class="btn btn-ia" onclick="accionIA('argumento')"><i class="fa-solid fa-lightbulb"></i> Sugerir argumento</button>
            <button class="btn btn-ia" onclick="accionIA('dictar')"><i class="fa-solid fa-microphone"></i> Dictar venta</button>
            <button class="btn btn-ia" onclick="duplicarUltima()"><i class="fa-solid fa-copy"></i> Duplicar última</button>

            <textarea id="iaPregunta" rows="2" placeholder="Haz una pregunta personalizada..."></textarea>
            <button class="btn btn-ia" style="background:#b5179e" onclick="iaChat()">Preguntar a IA</button>
            
            <div id="iaRespuesta" class="ia-resp">Listo para ayudarte...</div>
        </div>

        <form id="fReg">
            <div class="card">
                <label>TIPO DE OPERACIÓN</label>
                <select id="iTipo">
                    <option>KIT</option>
                    <option>CHIP</option>
                    <option>PORTA</option>
                    <option>RENUEVATE</option>
                    <option>AK</option>
                </select>
                
                <label>FECHA (DD/MM/YYYY)</label>
                <input id="iFec" readonly>
                
                <label>NÚMERO TELCEL</label>
                <input id="iTel" type="tel" maxlength="10" placeholder="10 dígitos" required>
                
                <label>ICCID</label>
                <input id="iIcc" placeholder="Últimos números del chip" required>
                
                <label>MARCA Y MODELO</label>
                <div style="display:flex; gap:5px">
                    <input id="iMarca" placeholder="Marca">
                    <input id="iMod" placeholder="Modelo">
                </div>
                
                <button type="submit" class="btn btn-save"><i class="fa-solid fa-floppy-disk"></i> GUARDAR REGISTRO</button>
            </div>
        </form>
    </div>

<script>
    // Configuración Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyD4UK_j8UxMwOCtrtXlYftBe_wCLE7psMc",
        authDomain: "ventastelcel4029.firebaseapp.com",
        databaseURL: "https://ventastelcel4029-default-rtdb.firebaseio.com",
        projectId: "ventastelcel4029",
        storageBucket: "ventastelcel4029.firebasestorage.app",
        appId: "1:480758010888:web:e948c54f0217536aa9adbd"
    };

    let db, auth;

    // SISTEMA DE BLINDAJE DE CLAVE
    const getApiKey = () => {
        let key = localStorage.getItem('gemini_key_secure');
        if (!key) {
            key = prompt("Se requiere clave de API. Por favor, pega la clave AIzaSy...:");
            if (key && key.startsWith("AIzaSy")) {
                localStorage.setItem('gemini_key_secure', key);
            } else {
                alert("Clave no válida.");
                return null;
            }
        }
        return key;
    };

    function inicio() {
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        db = firebase.database();
        auth = firebase.auth();

        // Reloj con formato AM/PM
        setInterval(() => {
            const now = new Date();
            document.getElementById('txtReloj').innerText = now.toLocaleTimeString('en-US', { 
                hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' 
            }).toLowerCase();
        }, 1000);

        // Fecha Formato DD/MM/YYYY
        const hoy = new Date();
        document.getElementById('iFec').value = `${String(hoy.getDate()).padStart(2,'0')}/${String(hoy.getMonth()+1).padStart(2,'0')}/${hoy.getFullYear()}`;

        // GPS
        navigator.geolocation.getCurrentPosition(p => {
            document.getElementById('txtGps').innerHTML = `<i class="fa-solid fa-location-dot"></i> ${p.coords.latitude.toFixed(6)}, ${p.coords.longitude.toFixed(6)}`;
        }, () => {
            document.getElementById('txtGps').innerText = "GPS no disponible";
        });

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('loginBox').classList.add("hidden");
                document.getElementById('appBox').classList.remove("hidden");
            } else {
                document.getElementById('loginBox').classList.remove("hidden");
                document.getElementById('appBox').classList.add("hidden");
            }
        });
    }

    function manejarAuth() {
        const u = document.getElementById('u').value, p = document.getElementById('p').value;
        auth.signInWithEmailAndPassword(u, p).catch(e => alert("Error de acceso: " + e.message));
    }

    // FUNCIÓN IA CORREGIDA PARA GEMINI 1.5 FLASH
    async function llamarIA(prompt) {
        const respDiv = document.getElementById('iaRespuesta');
        const API_KEY = getApiKey();
        if(!API_KEY) return;

        respDiv.innerText = "Consultando a Gemini...";
        try {
            // Usamos el endpoint v1beta con el modelo verificado
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
            
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            
            const data = await res.json();
            
            if (data.candidates && data.candidates[0].content) {
                respDiv.innerText = data.candidates[0].content.parts[0].text;
            } else {
                // Si la clave es rechazada por Google
                if(data.error?.message.includes("API key not valid")) {
                    localStorage.removeItem('gemini_key_secure');
                    respDiv.innerText = "Error: Clave inhabilitada por seguridad. Recarga para ingresar una nueva.";
                } else {
                    respDiv.innerText = "Error API: " + (data.error?.message || "Sin respuesta");
                }
            }
        } catch (e) { 
            respDiv.innerText = "Error de conexión. Revisa tus datos móviles."; 
        }
    }

    // LÓGICA DE HERRAMIENTAS IA
    function accionIA(tipo) {
        const ventaActual = document.getElementById('iTipo').value;
        const prompts = {
            escanear: "Actúa como un validador técnico de Telcel. Dime si un equipo con IMEI genérico es compatible con la red 5G y qué beneficios tiene el cliente.",
            resumen: "Genera un reporte corto y profesional de mis actividades de venta hoy. Sé motivador.",
            argumento: `Dame 3 puntos clave para cerrar una venta de ${ventaActual} resaltando los beneficios de la red Telcel.`,
            dictar: "Estoy listo para transcribir. Menciona el número telefónico y el tipo de plan para registrarlo."
        };
        llamarIA(prompts[tipo]);
    }

    function iaChat() {
        const q = document.getElementById('iaPregunta').value;
        if(q) llamarIA(q);
    }

    function duplicarUltima() {
        const ventas = JSON.parse(localStorage.getItem('ventas_omar') || "[]");
        if(ventas.length > 0) {
            const ultima = ventas[0];
            document.getElementById('iTipo').value = ultima.tipo;
            document.getElementById('iMarca').value = ultima.marca || "";
            document.getElementById('iMod').value = ultima.modelo || "";
            document.getElementById('iaRespuesta').innerText = "Datos de la última venta cargados correctamente.";
        } else {
            alert("No hay ventas previas en este dispositivo.");
        }
    }

    // REGISTRO DE VENTAS
    document.getElementById('fReg').onsubmit = e => {
        e.preventDefault();
        const venta = {
            tel: document.getElementById('iTel').value,
            iccid: document.getElementById('iIcc').value,
            tipo: document.getElementById('iTipo').value,
            marca: document.getElementById('iMarca').value,
            modelo: document.getElementById('iMod').value,
            fecha: document.getElementById('iFec').value,
            timestamp: Date.now()
        };

        // Persistencia Local
        let locales = JSON.parse(localStorage.getItem('ventas_omar') || "[]");
        locales.unshift(venta);
        localStorage.setItem('ventas_omar', JSON.stringify(locales));

        // Sincronización Firebase
        if(navigator.onLine) {
            db.ref("ventas/" + auth.currentUser.uid).push(venta)
              .then(() => alert("Venta sincronizada y guardada."))
              .catch(() => alert("Guardado localmente (sin internet)."));
        } else {
            alert("Venta guardada localmente. Se sincronizará al detectar conexión.");
        }

        e.target.reset();
        inicio(); // Reiniciar fecha y reloj
    };
</script>
</body>
</html>
