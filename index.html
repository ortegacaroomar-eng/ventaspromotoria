<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Ventas Pro - Omar Ortega</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body { margin:0; font-family:'Segoe UI'; background:linear-gradient(135deg,#001d3d,#003566,#000814); color:white; }
.app { max-width:1000px; margin:auto; padding:20px; }

.card { background:rgba(255,255,255,.08); padding:20px; border-radius:15px; margin-bottom:15px; }
label { font-size:10px; color:#ffc300; }

input, select { width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:none; background:rgba(255,255,255,.12); color:white; }

.btn-save { background:#ffc300; color:#001d3d; padding:15px; width:100%; border:none; border-radius:10px; }

table { width:100%; background:white; color:black; font-size:11px; }
td, th { padding:8px; }

canvas { background:white; border-radius:10px; }

.hidden { display:none; }
.login-box { max-width:300px; margin:100px auto; background:white; color:black; padding:20px; border-radius:15px; }
</style>
</head>

<body onload="inicio()">

<div id="loginBox" class="login-box">
<input id="u" placeholder="Correo">
<input id="p" type="password" placeholder="Password">
<button onclick="manejarAuth()">Entrar</button>
</div>

<div id="appBox" class="app hidden">

<form id="fReg">

<div class="card">
<label>TIPO</label>
<select id="iTipo">
<option>KIT</option>
<option>CHIP</option>
<option>PORTA</option>
<option>RENUEVATE</option>
</select>

<label>COMPAÑÍA</label>
<select id="iCompania">
<option value="TELCEL">TELCEL</option>
<option value="ATT">AT&T</option>
<option value="BAIT">BAIT</option>
</select>

<label>FECHA</label>
<input id="iFec">

<label>NUMERO</label>
<input id="iTel">

<label>ICCID</label>
<input id="iIcc">
</div>

<button class="btn-save">Guardar</button>

</form>

<div class="card">
<label>FILTRO</label>
<select id="filtroTiempo" onchange="actualizarGrafica()">
<option value="hoy">HOY</option>
<option value="semana">SEMANA</option>
<option value="todo">TODO</option>
</select>

<canvas id="graficaVentas"></canvas>
</div>

<table>
<thead>
<tr>
<th>NUM</th>
<th>TIPO</th>
<th>COMPAÑIA</th>
<th>FECHA</th>
<th>X</th>
</tr>
</thead>
<tbody id="bodyVentas"></tbody>
</table>

</div>

<script>

let auth;
let chart;

function inicio(){
firebase.initializeApp({
apiKey:"test",
authDomain:"test"
});

auth = firebase.auth();

auth.onAuthStateChanged(user=>{
if(user){
loginBox.classList.add("hidden");
appBox.classList.remove("hidden");
cargarLocal();
actualizarGrafica();
}
});
}

function manejarAuth(){
auth.signInAnonymously();
}

document.getElementById('fReg').onsubmit = e=>{
e.preventDefault();

let v = {
id: Date.now(),
"NUM": iTel.value,
"TIPO": iTipo.value,
"COMPAÑIA": iCompania.value,
"FECHA": iFec.value
};

let l = JSON.parse(localStorage.getItem("ventas_omar") || "[]");
l.unshift(v);

localStorage.setItem("ventas_omar", JSON.stringify(l));

cargarLocal();
actualizarGrafica();

e.target.reset();
};

function eliminar(id){
let l = JSON.parse(localStorage.getItem("ventas_omar") || "[]").filter(v=>v.id!==id);
localStorage.setItem("ventas_omar", JSON.stringify(l));
cargarLocal();
actualizarGrafica();
}

function cargarLocal(){
let l = JSON.parse(localStorage.getItem("ventas_omar") || "[]");

bodyVentas.innerHTML = l.map(v=>`
<tr>
<td>${v.NUM}</td>
<td>${v.TIPO}</td>
<td>${v.COMPAÑIA}</td>
<td>${v.FECHA}</td>
<td onclick="eliminar(${v.id})">❌</td>
</tr>
`).join("");
}

function actualizarGrafica(){

let l = JSON.parse(localStorage.getItem("ventas_omar") || "[]");
let filtro = filtroTiempo.value;

let hoy = new Date().toLocaleDateString('es-MX');

let telcel=0, att=0, bait=0;

l.forEach(v=>{

if(filtro==="hoy" && v.FECHA!==hoy) return;

if(v.COMPAÑIA==="TELCEL") telcel++;
if(v.COMPAÑIA==="ATT") att++;
if(v.COMPAÑIA==="BAIT") bait++;

});

let data = {
labels:["Telcel","AT&T","BAIT"],
datasets:[{data:[telcel,att,bait]}]
};

if(chart){
chart.data=data;
chart.update();
}else{
chart = new Chart(graficaVentas,{
type:'bar',
data:data
});
}

}

</script>

</body>
</html>
