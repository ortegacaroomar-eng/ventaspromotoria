<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Ventas PRO - Omar</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:'Segoe UI'; background:#001d3d; color:white; }
.app { max-width:1000px; margin:auto; padding:20px; }
.card { background:#003566; padding:15px; border-radius:10px; margin-bottom:10px; }

input, select {
width:100%; padding:10px; margin:5px 0;
}

button {
padding:12px; width:100%;
background:#ffc300; border:none;
margin-top:5px;
}

.hidden { display:none; }

table {
width:100%; background:white; color:black; font-size:12px;
}

td, th { padding:8px; border:1px solid #ddd; }

canvas { background:white; border-radius:10px; }
</style>
</head>

<body onload="inicio()">

<!-- LOGIN -->
<div id="loginBox">
<input id="u" placeholder="Correo">
<input id="p" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="appBox" class="app hidden">

<!-- COMPAÑIA -->
<div class="card">
<label>COMPAÑÍA</label>
<select id="tipoCompania" onchange="mostrarSeccion()">
<option value="TELCEL">TELCEL</option>
<option value="ATT">AT&T</option>
<option value="BAIT">BAIT</option>
</select>
</div>

<!-- TELCEL -->
<div id="secTelcel" class="card">
<select id="telcelTipo">
<option>RENUEVATE</option>
<option>CHIP</option>
<option>PORTA</option>
</select>
<input id="telcelNumero" placeholder="Número">
<input id="telcelICCID" placeholder="ICCID">
<input id="telcelIMEI" placeholder="IMEI">
<input id="telcelMarca" placeholder="Marca">
</div>

<!-- ATT -->
<div id="secATT" class="card hidden">
<select id="attChip">
<option value="NO">NO CHIP TELCEL</option>
<option value="SI">SI CHIP TELCEL</option>
</select>
<input id="attNumero" placeholder="Número">
<input id="attICCID" placeholder="ICCID">
<input id="attMarca" placeholder="Marca">
</div>

<!-- BAIT -->
<div id="secBAIT" class="card hidden">
<select id="baitChip">
<option value="NO">NO CHIP TELCEL</option>
<option value="SI">SI CHIP TELCEL</option>
</select>
<input id="baitNumero" placeholder="Número">
<input id="baitICCID" placeholder="ICCID">
<input id="baitMarca" placeholder="Marca">
</div>

<button onclick="guardar()">GUARDAR VENTA</button>

<!-- CALENDARIO + GRAFICA -->
<div class="card">
<label>CALENDARIO</label>
<input type="date" id="fechaFiltro" onchange="grafica()">
<canvas id="c"></canvas>
</div>

<button onclick="generarReporte()">📄 GENERAR REPORTE PRO</button>

<!-- TABLA -->
<table>
<thead>
<tr>
<th>COMP</th>
<th>NUM</th>
<th>MARCA</th>
<th>FECHA</th>
<th>X</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyD4UK_j8UxMwOCtrtXlYftBe_wCLE7psMc",
authDomain: "ventastelcel4029.firebaseapp.com"
};

let chart;

function inicio(){
firebase.initializeApp(firebaseConfig);

firebase.auth().onAuthStateChanged(u=>{
if(u){
loginBox.style.display="none";
appBox.classList.remove("hidden");
cargar();
grafica();
}
});
}

function login(){
firebase.auth().signInWithEmailAndPassword(u.value,p.value)
.catch(()=>alert("Error login"));
}

function mostrarSeccion(){
secTelcel.classList.add("hidden");
secATT.classList.add("hidden");
secBAIT.classList.add("hidden");

let t = tipoCompania.value;

if(t==="TELCEL") secTelcel.classList.remove("hidden");
if(t==="ATT") secATT.classList.remove("hidden");
if(t==="BAIT") secBAIT.classList.remove("hidden");
}

function guardar(){

let tipo = tipoCompania.value;

let v = {
id: Date.now(),
COMPANIA: tipo,
FECHA: new Date().toLocaleDateString('es-MX')
};

if(tipo==="TELCEL"){
v.NUM = telcelNumero.value;
v.ICCID = telcelICCID.value;
v.IMEI = telcelIMEI.value;
v.MARCA = telcelMarca.value;
}

if(tipo==="ATT"){
v.NUM = attNumero.value;
v.ICCID = attICCID.value;
v.CHIP = attChip.value;
v.MARCA = attMarca.value;
}

if(tipo==="BAIT"){
v.NUM = baitNumero.value;
v.ICCID = baitICCID.value;
v.CHIP = baitChip.value;
v.MARCA = baitMarca.value;
}

let l = JSON.parse(localStorage.getItem("ventas_omar") || "[]");
l.unshift(v);
localStorage.setItem("ventas_omar", JSON.stringify(l));

cargar();
grafica();
}

function cargar(){
let l = JSON.parse(localStorage.getItem("ventas_omar") || "[]");

body.innerHTML = l.map(v=>`
<tr>
<td>${v.COMPANIA}</td>
<td>${v.NUM}</td>
<td>${v.MARCA}</td>
<td>${v.FECHA}</td>
<td onclick="del(${v.id})" style="color:red;cursor:pointer;">X</td>
</tr>
`).join("");
}

function del(id){
let l = JSON.parse(localStorage.getItem("ventas_omar"));
l = l.filter(v=>v.id!==id);
localStorage.setItem("ventas_omar", JSON.stringify(l));
cargar();grafica();
}

function formatear(fecha){
let f=new Date(fecha);
let d=("0"+f.getDate()).slice(-2);
let m=("0"+(f.getMonth()+1)).slice(-2);
let y=f.getFullYear();
return `${d}/${m}/${y}`;
}

function grafica(){

let l = JSON.parse(localStorage.getItem("ventas_omar") || "[]");

let fecha = fechaFiltro.value ? formatear(fechaFiltro.value) : new Date().toLocaleDateString('es-MX');

let t=0,a=0,b=0;

l.forEach(v=>{
if(v.FECHA!==fecha) return;

if(v.COMPANIA==="TELCEL") t++;
if(v.COMPANIA==="ATT") a++;
if(v.COMPANIA==="BAIT") b++;
});

let data={
labels:["Telcel","AT&T","BAIT"],
datasets:[{
label:`Ventas ${fecha}`,
data:[t,a,b]
}]
};

if(chart){
chart.data=data;
chart.update();
}else{
chart=new Chart(c,{type:"bar",data:data});
}

}

/* REPORTE PRO WORD */
function generarReporte(){

let l = JSON.parse(localStorage.getItem("ventas_omar") || "[]");

let fecha = fechaFiltro.value 
? formatear(fechaFiltro.value)
: new Date().toLocaleDateString('es-MX');

let t=0,a=0,b=0;

l.forEach(v=>{
if(v.FECHA!==fecha) return;

if(v.COMPANIA==="TELCEL") t++;
if(v.COMPANIA==="ATT") a++;
if(v.COMPANIA==="BAIT") b++;
});

let total = t+a+b;

let contenido = `
<html><body>
<h1>REPORTE DE VENTAS</h1>
<p>Fecha: ${fecha}</p>
<p>Total: ${total}</p>
<p>Telcel: ${t}</p>
<p>AT&T: ${a}</p>
<p>BAIT: ${b}</p>
</body></html>
`;

let blob = new Blob(['\ufeff', contenido], {type:'application/msword'});
let url = URL.createObjectURL(blob);

let aTag = document.createElement("a");
aTag.href = url;
aTag.download = "Reporte.doc";
aTag.click();

}

</script>

</body>
</html>
