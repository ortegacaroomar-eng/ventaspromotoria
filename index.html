<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema Ventas PRO</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:'Segoe UI';
background:linear-gradient(135deg,#001d3d,#003566,#000814);
color:white;
}

.app{max-width:480px;margin:auto;padding:20px;}

.card{
background:rgba(255,255,255,.08);
border-radius:16px;
padding:15px;
margin-bottom:15px;
backdrop-filter:blur(10px);
}

input,select{
width:100%;
padding:12px;
margin-top:6px;
border-radius:10px;
border:none;
background:rgba(255,255,255,.1);
color:white;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
background:#ffc300;
font-weight:bold;
}

.header{text-align:center;font-weight:bold;color:#ffc300;margin-bottom:15px;}

#chatBox{max-height:120px;overflow:auto;font-size:12px;}
</style>
</head>

<body onload="inicio()">

<div id="loginBox" class="app">
<div class="card">
<h2>Acceso</h2>
<input id="u" placeholder="Correo">
<input id="p" type="password">
<button onclick="entrar()">Entrar</button>
</div>
</div>

<div id="appBox" class="app hidden">

<div class="header">CONTROL DE VENTAS</div>

<!-- BUSCADOR -->
<div class="card">
<input id="webInput" placeholder="Buscar en internet...">
<button onclick="buscarWeb()">Buscar</button>
</div>

<!-- DASHBOARD -->
<div class="card">
<div id="topProm"></div>
<div id="topMarca"></div>
</div>

<!-- GRAFICA -->
<div class="card">
<canvas id="grafica"></canvas>
</div>

<!-- CHAT -->
<div class="card">
<input id="chatMsg" placeholder="Mensaje..." onkeyup="if(event.key==='Enter') enviarChat()">
<div id="chatBox"></div>
</div>

<!-- FORM -->
<form id="fReg" class="card">

<select id="iTipo">
<option value="KIT">KIT</option>
<option value="CHIP">CHIP</option>
<option value="PORTA">PORTA</option>
<option value="RENUEVATE">RENUEVATE</option>
</select>

<input id="iTel" placeholder="Teléfono">

<select id="imeiPendiente">
<option value="no">IMEI OK</option>
<option value="si">IMEI PENDIENTE</option>
</select>

<button>Guardar Venta</button>
</form>

<div id="lista"></div>

</div>

<script>

// FIREBASE
const firebaseConfig={
apiKey:"AIzaSy...",
authDomain:"ventastelcel4029.firebaseapp.com",
databaseURL:"https://ventastelcel4029-default-rtdb.firebaseio.com"
};

let db,auth,chart;

function inicio(){
firebase.initializeApp(firebaseConfig);
db=firebase.database();
auth=firebase.auth();

auth.onAuthStateChanged(u=>{
if(u){
loginBox.classList.add("hidden");
appBox.classList.remove("hidden");

cargar();
escucharChat();

setInterval(consejoIA,90000);
}
});
}

function entrar(){
auth.signInWithEmailAndPassword(u.value,p.value);
}

// VOZ MEJORADA
function hablar(t,modo="normal"){

speechSynthesis.cancel();

let m=new SpeechSynthesisUtterance(t);
m.lang="es-MX";
m.rate=0.9;
m.pitch=modo==="serio"?0.9:1.2;

let voces=speechSynthesis.getVoices();
let voz=voces.find(v=>v.lang.includes("es"));

if(voz) m.voice=voz;

speechSynthesis.speak(m);
}

// BUSCADOR REAL
function buscarWeb(){
let q=webInput.value;
if(!q) return;

hablar("Buscando en internet");
window.open("https://www.google.com/search?q="+encodeURIComponent(q));
}

// GUARDAR
fReg.onsubmit=e=>{
e.preventDefault();

let v={
tel:iTel.value,
tipo:iTipo.value,
promotor:auth.currentUser.email,
marca:iTipo.value,
imeiPendiente:imeiPendiente.value
};

let l=JSON.parse(localStorage.getItem("ventas")||"[]");
l.unshift(v);
localStorage.setItem("ventas",JSON.stringify(l));

db.ref("ventas").push(v);

hablar("Venta registrada");

cargar();
}

// CARGAR
function cargar(){

let l=JSON.parse(localStorage.getItem("ventas")||"[]");

lista.innerHTML=l.map(v=>`
<div class="card">
${v.tel} - ${v.tipo}
</div>
`).join("");

dashboard(l);
pintarGrafica();
}

// DASHBOARD
function dashboard(l){

let prom={},marca={};

l.forEach(v=>{
prom[v.promotor]=(prom[v.promotor]||0)+1;
marca[v.marca]=(marca[v.marca]||0)+1;
});

function top(o){
return Object.entries(o).sort((a,b)=>b[1]-a[1])[0];
}

let t1=top(prom);
let t2=top(marca);

topProm.innerText=t1?`Top Promotor: ${t1[0]} (${t1[1]})`:"";
topMarca.innerText=t2?`Marca líder: ${t2[0]} (${t2[1]})`:"";
}

// GRAFICA
function pintarGrafica(){

let l=JSON.parse(localStorage.getItem("ventas")||"[]");

let conteo={KIT:0,CHIP:0,PORTA:0,RENUEVATE:0};

l.forEach(v=>{
conteo[v.tipo]=(conteo[v.tipo]||0)+1;
});

let ctx=document.getElementById("grafica");

if(chart) chart.destroy();

chart=new Chart(ctx,{
type:"bar",
data:{
labels:Object.keys(conteo),
datasets:[{
label:"Ventas",
data:Object.values(conteo)
}]
}
});
}

// IA CONSEJOS
function consejoIA(){

let l=JSON.parse(localStorage.getItem("ventas")||"[]");

if(l.length<3) return;

let portas=l.filter(v=>v.tipo==="PORTA").length;

if(portas<2){
hablar("Equipo, enfoquen ventas en portabilidad");
}else{
hablar("Buen trabajo, sigan así");
}
}

// CHAT
function enviarChat(){
db.ref("chat").push({u:auth.currentUser.email,m:chatMsg.value});
chatMsg.value="";
}

function escucharChat(){
db.ref("chat").limitToLast(10).on("child_added",s=>{
let d=s.val();
chatBox.innerHTML+=`<div><b>${d.u}:</b> ${d.m}</div>`;
});
}

</script>
</body>
</html>
