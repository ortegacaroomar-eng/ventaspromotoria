<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Ventas Telcel - Omar Ortega</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body { margin:0; font-family:'Segoe UI',sans-serif; background:linear-gradient(135deg,#001d3d,#003566,#000814); min-height:100vh; color:white; }
.app { max-width:1000px; margin:auto; padding:20px; }
.card { background:rgba(255,255,255,.08); border-radius:15px; padding:20px; margin-bottom:15px; }
label { font-size:10px; font-weight:bold; color:#ffc300; }
input, select { width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:none; background:rgba(255,255,255,.12); color:white; }
button { background:#ffc300; color:#001d3d; width:100%; padding:12px; border:none; border-radius:10px; font-weight:bold; cursor:pointer; }
.hidden { display:none; }
.login-box { max-width:350px; margin:100px auto; background:white; padding:25px; border-radius:15px; text-align:center; color:black; }
</style>
</head>

<body onload="inicio()">

<!-- LOGIN -->
<div id="loginBox" class="login-box">
<h3>Acceso Promotores</h3>
<input id="u" placeholder="Correo">
<input id="p" type="password" placeholder="Contraseña">
<button onclick="manejarAuth()">ENTRAR / REGISTRAR</button>
</div>

<!-- APP -->
<div id="appBox" class="app hidden">

<!-- 🌐 ESTADO INTERNET -->
<div class="card">
<div id="estadoRed">🌐 Conectando...</div>
</div>

<!-- 🤖 IA -->
<div class="card">
<h3>🤖 IRIS IA</h3>
<input id="iaInput" placeholder="Pregúntale algo..." onkeyup="if(event.key==='Enter')preguntarIA()">
<button onclick="preguntarIA()">Preguntar</button>
<div id="iaChat"></div>
</div>

<!-- 🔎 BUSCADOR -->
<div class="card">
<h3>🔎 Buscar en Internet</h3>
<input id="busqueda" placeholder="Buscar...">
<button onclick="buscarWeb()">Buscar</button>
</div>

<!-- FORM ORIGINAL -->
<form id="fReg" class="card">
<select id="iTipo">
<option>KIT</option>
<option>CHIP</option>
<option>PORTA</option>
<option>RENUEVATE</option>
</select>

<input id="iTel" placeholder="Teléfono">
<input id="iIcc" placeholder="ICCID">
<input id="iIme" placeholder="IMEI">
<input id="iProm" placeholder="Promotor">

<button>Guardar Venta</button>
</form>

<div id="lista"></div>

<button onclick="salir()">Cerrar sesión</button>

</div>

<script>

// 🔥 CONFIG ORIGINAL (NO TOCADO)
const firebaseConfig = {
apiKey:"AIzaSyD4UK_j8UxMwOCtrtXlYftBe_wCLE7psMc",
authDomain:"ventastelcel4029.firebaseapp.com",
databaseURL:"https://ventastelcel4029-default-rtdb.firebaseio.com"
};

let db, auth;

function inicio(){
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
db = firebase.database();
auth = firebase.auth();

auth.onAuthStateChanged(user=>{
if(user){
loginBox.classList.add("hidden");
appBox.classList.remove("hidden");
cargarLocal();
}else{
loginBox.classList.remove("hidden");
appBox.classList.add("hidden");
}
});

// activar detector internet SIN tocar lógica
setTimeout(detectarConexion,1000);
}

// LOGIN ORIGINAL
function manejarAuth(){
let email=u.value;
let pass=p.value;

auth.signInWithEmailAndPassword(email,pass)
.catch(err=>{
if(err.code==="auth/user-not-found"){
auth.createUserWithEmailAndPassword(email,pass);
}else{
alert(err.message);
}
});
}

function salir(){auth.signOut();}

// GUARDADO ORIGINAL
fReg.onsubmit=e=>{
e.preventDefault();

let v={
id:Date.now(),
tel:iTel.value,
tipo:iTipo.value,
imei:iIme.value||"N/A",
prom:iProm.value
};

let l=JSON.parse(localStorage.getItem("ventas_omar")||"[]");
l.unshift(v);
localStorage.setItem("ventas_omar",JSON.stringify(l));

cargarLocal();
};

// LISTA ORIGINAL
function cargarLocal(){
let l=JSON.parse(localStorage.getItem("ventas_omar")||"[]");

lista.innerHTML=l.map(v=>`
<div class="card">
${v.tel} - ${v.tipo} - ${v.prom}
</div>`).join("");
}

// =============================
// 🌐 INTERNET
// =============================
function detectarConexion(){
function actualizar(){
estadoRed.innerText = navigator.onLine ? "🟢 En línea" : "🔴 Sin internet";
}
window.addEventListener("online",actualizar);
window.addEventListener("offline",actualizar);
actualizar();
}

// =============================
// 🔎 BUSCADOR
// =============================
function buscarWeb(){
let q=busqueda.value;
if(!q) return;
window.open("https://www.google.com/search?q="+encodeURIComponent(q));
}

// =============================
// 🧠 IA
// =============================
function hablarIA(t){
let m=new SpeechSynthesisUtterance(t);
m.lang="es-MX";
m.rate=0.9;
m.pitch=1.2;
speechSynthesis.speak(m);
}

function respuestaIA(texto){

let ventas=JSON.parse(localStorage.getItem("ventas_omar")||"[]");

if(texto.includes("ventas")){
return `Llevan ${ventas.length} ventas registradas`;
}

if(texto.includes("imei")){
let p=ventas.filter(v=>v.imei==="N/A");
return p.length?`Hay ${p.length} IMEIs pendientes`:"Todo correcto";
}

if(texto.includes("mejorar")){
return "Ofrece beneficios claros y cierra rápido.";
}

if(texto.includes("hola")){
return "Hola, estoy lista para ayudarte.";
}

return "Sigan vendiendo, voy aprendiendo de ustedes.";
}

function preguntarIA(){

let texto=iaInput.value.toLowerCase();
if(!texto) return;

iaChat.innerHTML+=`<div><b>Tú:</b> ${texto}</div>`;

let r=respuestaIA(texto);

iaChat.innerHTML+=`<div style="color:#ffc300;"><b>IRIS:</b> ${r}</div>`;

hablarIA(r);

iaInput.value="";
}

</script>

</body>
</html>
