<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Ventas Telcel - Omar Ortega</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body { margin:0; font-family:'Segoe UI',sans-serif; background:linear-gradient(135deg,#001d3d,#003566,#000814); color:white; }
.app { max-width:1000px; margin:auto; padding:20px; }

.card { background:rgba(255,255,255,.08); backdrop-filter:blur(10px); border-radius:15px; padding:20px; margin-bottom:15px; }

label { font-size:10px; color:#ffc300; font-weight:bold; }

input, select {
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:none;
background:rgba(255,255,255,.12);
color:white;
}

.btn-save {
background:#ffc300;
color:#001d3d;
padding:15px;
border:none;
border-radius:10px;
width:100%;
font-weight:bold;
cursor:pointer;
}

.table-container {
overflow-x:auto;
background:white;
border-radius:10px;
margin-top:20px;
}

table { width:100%; border-collapse:collapse; color:black; font-size:11px; }

th { background:black; color:white; padding:10px; }

td { padding:8px; border:1px solid #ddd; }

.hidden { display:none; }

.login-box {
max-width:350px;
margin:100px auto;
background:white;
padding:30px;
border-radius:20px;
color:black;
text-align:center;
}

canvas {
background:white;
border-radius:10px;
}
</style>
</head>

<body onload="inicio()">

<div id="loginBox" class="login-box">
<h3>Acceso Promotores</h3>
<input id="u" placeholder="Correo">
<input id="p" type="password" placeholder="Contraseña">
<button class="btn-save" onclick="login()">Entrar</button>
</div>

<div id="appBox" class="app hidden">

<form id="fReg">

<div class="card">
<label>TIPO</label>
<select id="iTipo">
<option>KIT</option>
<option>CHIP</option>
<option>PORTA</option>
<option>RENUEVATE</option>
</select>

<label>COMPAÑÍA</label>
<select id="iCompania">
<option value="TELCEL">TELCEL</option>
<option value="ATT">AT&T</option>
<option value="BAIT">BAIT</option>
</select>

<label>FECHA DE ACTIVACIÓN</label>
<input id="iFec">

<label>NÚMERO</label>
<input id="iTel">

<label>ICCID</label>
<input id="iIcc">
</div>

<button class="btn-save">GUARDAR VENTA</button>

</form>

<!-- CALENDARIO + GRAFICA -->
<div class="card">
<label>SELECCIONA FECHA</label>
<input type="date" id="fechaFiltro" onchange="actualizarGrafica()">

<canvas id="graficaVentas"></canvas>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>NUM</th>
<th>TIPO</th>
<th>COMPAÑÍA</th>
<th>FECHA</th>
<th>X</th>
</tr>
</thead>
<tbody id="bodyVentas"></tbody>
</table>
</div>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyD4UK_j8UxMwOCtrtXlYftBe_wCLE7psMc",
authDomain: "ventastelcel4029.firebaseapp.com"
};

let chart;

function inicio(){
firebase.initializeApp(firebaseConfig);

firebase.auth().onAuthStateChanged(user=>{
if(user){
loginBox.classList.add("hidden");
appBox.classList.remove("hidden");
cargarLocal();
actualizarGrafica();
}
});

iFec.value = new Date().toLocaleDateString('es-MX');
}

function login(){
firebase.auth().signInWithEmailAndPassword(u.value,p.value)
.catch(()=>alert("Error en login"));
}

document.getElementById('fReg').onsubmit = e=>{
e.preventDefault();

const v = {
id: Date.now(),
NUM: iTel.value,
TIPO: iTipo.value,
COMPAÑIA: iCompania.value,
FECHA: iFec.value
};

let l = JSON.parse(localStorage.getItem("ventas_omar") || "[]");
l.unshift(v);
localStorage.setItem("ventas_omar", JSON.stringify(l));

cargarLocal();
actualizarGrafica();

e.target.reset();
iFec.value = new Date().toLocaleDateString('es-MX');
};

function eliminar(id){
let l = JSON.parse(localStorage.getItem("ventas_omar") || "[]");
l = l.filter(v => v.id !== id);
localStorage.setItem("ventas_omar", JSON.stringify(l));
cargarLocal();
actualizarGrafica();
}

function cargarLocal(){
let l = JSON.parse(localStorage.getItem("ventas_omar") || "[]");

bodyVentas.innerHTML = l.map(v=>`
<tr>
<td>${v.NUM}</td>
<td>${v.TIPO}</td>
<td>${v.COMPAÑIA}</td>
<td>${v.FECHA}</td>
<td onclick="eliminar(${v.id})" style="color:red;cursor:pointer;">X</td>
</tr>
`).join("");
}

/* FORMATO FECHA */
function formatearFecha(fechaInput) {
let f = new Date(fechaInput);
let d = ("0" + f.getDate()).slice(-2);
let m = ("0" + (f.getMonth()+1)).slice(-2);
let y = f.getFullYear();
return `${d}/${m}/${y}`;
}

/* GRAFICA POR CALENDARIO */
function actualizarGrafica(){

let l = JSON.parse(localStorage.getItem("ventas_omar") || "[]");

let fechaInput = document.getElementById("fechaFiltro").value;

let fechaSeleccionada = fechaInput 
? formatearFecha(fechaInput)
: new Date().toLocaleDateString('es-MX');

let telcel=0, att=0, bait=0;

l.forEach(v=>{
if(v.FECHA !== fechaSeleccionada) return;

if(v.COMPAÑIA==="TELCEL") telcel++;
if(v.COMPAÑIA==="ATT") att++;
if(v.COMPAÑIA==="BAIT") bait++;
});

const data = {
labels:["Telcel","AT&T","BAIT"],
datasets:[{
label:`Ventas del ${fechaSeleccionada}`,
data:[telcel,att,bait]
}]
};

if(chart){
chart.data=data;
chart.update();
}else{
chart = new Chart(document.getElementById("graficaVentas"),{
type:"bar",
data:data,
options:{
responsive:true,
scales:{ y:{ beginAtZero:true } }
}
});
}

}

</script>

</body>
</html>
