<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ventas PRO MAX</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

<style>
body { margin:0; font-family:sans-serif; background:#000814; color:white;}
.app { max-width:500px; margin:auto; padding:20px;}
.card { background:rgba(255,255,255,.08); padding:15px; border-radius:15px; margin-bottom:15px;}
input,select,button { width:100%; padding:10px; margin-top:5px; border-radius:10px; border:none;}
button { background:#ffc300; font-weight:bold;}
.header { text-align:center; font-size:22px; color:#ffc300;}
.login { max-width:300px; margin:100px auto; background:white; color:black; padding:20px; border-radius:15px;}
.hidden { display:none;}
</style>
</head>

<body onload="inicio()">

<div id="loginBox" class="login">
<h2>Login</h2>
<input id="u" placeholder="Correo">
<input id="p" type="password" placeholder="Contraseña">
<button onclick="entrar()">Entrar</button>
<button onclick="toggleRegistro()">Registro</button>
</div>

<div id="appBox" class="app hidden">

<div class="header">🔥 DASHBOARD PRO MAX</div>

<div class="card">
<input id="metaMensual" placeholder="Meta mensual ($)">
</div>

<div class="card" id="dashboard"></div>

<div class="card">
<canvas id="grafica"></canvas>
</div>

<div class="card">
<div id="ranking"></div>
</div>

<form id="fReg">
<div class="card">

<select id="iCompania">
<option>TELCEL</option>
<option>ATT</option>
<option>BAIT</option>
</select>

<select id="iTipo">
<option>KIT</option>
<option>CHIP</option>
<option>PORTA</option>
<option>RENUEVATE</option>
</select>

<input id="iFec">
<input id="iTel" placeholder="Teléfono">
<input id="iIcc" placeholder="ICCID">
<input id="iProm" placeholder="Promotor">

</div>

<button>Guardar</button>
</form>

<button onclick="exportarExcel()">Excel</button>

<div id="listaLocal"></div>

</div>

<script>

const firebaseConfig={
apiKey:"TU_API",
authDomain:"TU_AUTH",
databaseURL:"TU_DB",
projectId:"TU_ID"
};

let db,auth,grafica;

function inicio(){
firebase.initializeApp(firebaseConfig);
db=firebase.database();
auth=firebase.auth();

iFec.value=new Date().toLocaleDateString('es-MX');

auth.onAuthStateChanged(u=>{
if(u){ appBox.classList.remove("hidden"); loginBox.classList.add("hidden"); cargar();}
});
}

function entrar(){
auth.signInWithEmailAndPassword(u.value,p.value)
.catch(()=>auth.createUserWithEmailAndPassword(u.value,p.value));
}

fReg.onsubmit=e=>{
e.preventDefault();

let v={
id:Date.now(),
COMP:iCompania.value,
TIPO:iTipo.value,
FECHA:iFec.value,
TEL:iTel.value,
ICCID:iIcc.value,
PROM:iProm.value
};

let local=JSON.parse(localStorage.getItem("ventas")||"[]");
local.unshift(v);
localStorage.setItem("ventas",JSON.stringify(local));

db.ref("ventas").push(v);

cargar();
};

function cargar(){
let local=JSON.parse(localStorage.getItem("ventas")||"[]");

listaLocal.innerHTML=local.map(v=>`
<div class="card">${v.COMP} - ${v.TEL}</div>`).join("");

dashboardGen(local);
graficaGen(local);
rankingGen(local);
}

function dashboardGen(local){
let t=0,a=0,b=0;

local.forEach(v=>{
if(v.COMP==="TELCEL")t++;
if(v.COMP==="ATT")a++;
if(v.COMP==="BAIT")b++;
});

let meta=parseFloat(metaMensual.value)||0;
let ingreso=local.length*100;
let porc=meta?((ingreso/meta)*100).toFixed(1):0;

dashboard.innerHTML=`
Total:${local.length}<br>
Telcel:${t}<br>
ATT:${a}<br>
BAIT:${b}<br><br>
💰${ingreso}/${meta}<br>${porc}%
`;
}

function graficaGen(local){
let data={TELCEL:0,ATT:0,BAIT:0};

local.forEach(v=>data[v.COMP]++);

if(grafica) grafica.destroy();

grafica=new Chart(document.getElementById("grafica"),{
type:"bar",
data:{
labels:["Telcel","ATT","BAIT"],
datasets:[{data:[data.TELCEL,data.ATT,data.BAIT]}]
}
});
}

function rankingGen(local){
let map={};

local.forEach(v=>{
map[v.PROM]=(map[v.PROM]||0)+1;
});

let orden=Object.entries(map).sort((a,b)=>b[1]-a[1]);

ranking.innerHTML="<b>Ranking Promotores</b><br>"+
orden.map((p,i)=>`${i+1}. ${p[0]} (${p[1]})`).join("<br>");
}

function exportarExcel(){
let local=JSON.parse(localStorage.getItem("ventas")||"[]");
let ws=XLSX.utils.json_to_sheet(local);
let wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"Ventas");
XLSX.writeFile(wb,"ventas_pro.xlsx");
}

</script>

</body>
</html>
