<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teledata IA PRO</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body { margin:0; font-family:'Segoe UI'; background:linear-gradient(135deg,#001d3d,#003566,#000814); color:white; }

/* LOGIN */
.login-box {
display:flex; justify-content:center; align-items:center;
height:100vh;
}

.login-card {
background:rgba(255,255,255,.08);
padding:30px; border-radius:15px;
width:300px; text-align:center;
}

input,select {
width:100%; padding:10px;
margin-bottom:10px;
border-radius:8px;
border:none;
}

button {
width:100%; padding:12px;
border:none;
border-radius:10px;
background:#ffc300;
}

.card {
background:rgba(255,255,255,.08);
padding:15px; border-radius:12px;
margin:15px;
}

table {
width:100%; background:white; color:black;
border-collapse: collapse;
}

th { background:black; color:white; padding:8px; }
td { padding:8px; border:1px solid #ccc; }

.pendiente { color:red; font-weight:bold; }

.hidden { display:none; }
</style>
</head>

<body onload="inicio()">

<!-- LOGIN -->
<div id="loginBox" class="login-box">
<div class="login-card">
<h2>TELEDATA IA</h2>
<input id="u" placeholder="Correo">
<input id="p" type="password" placeholder="Contraseña">
<button onclick="manejarAuth()">Entrar</button>
</div>
</div>

<!-- APP -->
<div id="appBox" class="hidden">

<!-- IMEIs -->
<div class="card">
<h3>⚠️ IMEIs Pendientes</h3>
<div id="imeiPendientes"></div>
</div>

<!-- IA APRENDIZAJE -->
<div class="card">
<h3>🧠 IA Aprendizaje</h3>
<div id="iaAprendizaje"></div>
</div>

<!-- ASISTENTE -->
<div class="card">
<h3>🗣️ Asistente de Ventas</h3>
<button onclick="asistenteVenta()">Atender cliente</button>
<button onclick="explicarProducto('KIT')">KIT</button>
<button onclick="explicarProducto('CHIP')">CHIP</button>
<button onclick="explicarProducto('PORTA')">PORTA</button>
<button onclick="explicarProducto('RENUEVATE')">RENUEVATE</button>
</div>

<!-- FORM -->
<div class="card">
<select id="iTipo">
<option>KIT</option>
<option>CHIP</option>
<option>PORTA</option>
<option>RENUEVATE</option>
</select>

<input id="iTel" placeholder="Teléfono">
<input id="iIcc" placeholder="ICCID">
<input id="iIme" placeholder="IMEI">
<input id="iProm" placeholder="Promotor">

<button onclick="guardar()">Guardar Venta</button>
</div>

<!-- TABLA -->
<div class="card">
<table>
<thead>
<tr>
<th>Teléfono</th>
<th>Tipo</th>
<th>IMEI</th>
<th>Promotor</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<button onclick="salir()">Cerrar sesión</button>

</div>

<script>

// FIREBASE
const firebaseConfig={
apiKey:"AIzaSy...",
authDomain:"ventastelcel4029.firebaseapp.com"
};

let auth;

function inicio(){
firebase.initializeApp(firebaseConfig);
auth=firebase.auth();

auth.onAuthStateChanged(u=>{
if(u){
loginBox.classList.add("hidden");
appBox.classList.remove("hidden");
cargar();
}else{
loginBox.classList.remove("hidden");
appBox.classList.add("hidden");
}
});
}

// LOGIN
function manejarAuth(){
auth.signInWithEmailAndPassword(u.value,p.value)
.catch(()=>{
auth.createUserWithEmailAndPassword(u.value,p.value);
});
}

function salir(){auth.signOut();}

// GUARDAR
function guardar(){

let v={
id:Date.now(),
tel:iTel.value,
tipo:iTipo.value,
imei:iIme.value||"N/A",
prom:iProm.value
};

let l=JSON.parse(localStorage.getItem("ventas_omar")||"[]");
l.unshift(v);
localStorage.setItem("ventas_omar",JSON.stringify(l));

cargar();
}

// CARGAR
function cargar(){

let l=JSON.parse(localStorage.getItem("ventas_omar")||"[]");

// TABLA
tabla.innerHTML=l.map(v=>`
<tr>
<td>${v.tel}</td>
<td>${v.tipo}</td>
<td class="${v.imei==="N/A"?'pendiente':''}">${v.imei}</td>
<td>${v.prom}</td>
</tr>
`).join("");

// IMEIs
let pendientes=l.filter(v=>v.imei==="N/A");

imeiPendientes.innerHTML=pendientes.length
? pendientes.map(v=>`<div class="pendiente">${v.prom} - ${v.tel}</div>`).join("")
: "Sin pendientes";

if(pendientes.length){
hablar(`Hay ${pendientes.length} IMEIs pendientes`);
}

// IA
actualizarIA();
}

// VOZ
function hablar(t){
let m=new SpeechSynthesisUtterance(t);
m.lang="es-MX";
speechSynthesis.speak(m);
}

// ASISTENTE
function asistenteVenta(){
hablar("Hola, soy tu asistente. Te ayudo a elegir la mejor opción.");
}

function explicarProducto(t){
let m={
KIT:"Incluye línea nueva con beneficios.",
CHIP:"Activa rápido tu línea.",
PORTA:"Conserva tu número y mejora plan.",
RENUEVATE:"Cambia tu equipo con promo."
};
hablar(m[t]);
}

// =====================
// 🧠 IA APRENDIZAJE
// =====================
function entrenarIA(){

let v=JSON.parse(localStorage.getItem("ventas_omar")||"[]");

let data={
total:v.length,
productos:{},
promotores:{},
pendientes:0
};

v.forEach(x=>{
data.productos[x.tipo]=(data.productos[x.tipo]||0)+1;
data.promotores[x.prom]=(data.promotores[x.prom]||0)+1;
if(x.imei==="N/A") data.pendientes++;
});

localStorage.setItem("ia_data",JSON.stringify(data));
}

function actualizarIA(){

entrenarIA();

let d=JSON.parse(localStorage.getItem("ia_data")||"{}");

if(!d.total){
iaAprendizaje.innerHTML="Sin datos";
return;
}

iaAprendizaje.innerHTML=`
Ventas: ${d.total}<br>
IMEIs pendientes: ${d.pendientes}
`;
}

</script>

</body>
</html>
