<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRIS AI - Neural Premium V17</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root { --iris-blue: #28b8ff; --iris-soft: #a8dfff; --bg-dark: #010108; }
        body { margin:0; font-family:'Segoe UI', sans-serif; background: var(--bg-dark); color: white; }
        .app { max-width:480px; margin:auto; padding:15px; }

        /* NÚCLEO VISUAL IRIS */
        .header-ia { text-align: center; padding: 25px 0; background: radial-gradient(circle at top, #001a4d, transparent); border-radius: 0 0 50px 50px; }
        .orb { 
            width: 85px; height: 85px; margin: 0 auto; border-radius: 50%; 
            background: radial-gradient(circle, #001a2e 0%, #000 75%);
            box-shadow: 0 0 25px var(--iris-blue); transition: 0.8s ease-in-out;
            animation: breathe 5s infinite;
        }
        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.04); opacity: 1; } }

        /* CHAT REAL-TIME MAESTRO */
        .chat-card { background: rgba(255, 255, 255, 0.03); border: 1px solid #1a1a1a; border-radius: 20px; padding: 12px; margin-bottom: 15px; }
        #chatDisplay { height: 110px; overflow-y: auto; font-size: 12px; margin-bottom: 10px; padding-right: 5px; }
        .msg-entry { margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid #ffffff05; }
        .msg-entry b { color: var(--iris-blue); font-size: 10px; text-transform: uppercase; }

        /* FORMULARIO Y MENÚ INTERACTIVO */
        .card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; margin-bottom: 15px; backdrop-filter: blur(10px); }
        input, select { width:100%; padding:14px; margin-bottom:12px; border-radius:12px; border: 1px solid #222; background: #000; color:white; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--iris-blue); }
        .btn-action { background: linear-gradient(45deg, #0055ff, var(--iris-blue)); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; letter-spacing: 1px; }

        .ai-status-text { font-size: 13px; color: var(--iris-soft); text-align: center; margin-bottom: 15px; min-height: 38px; font-style: italic; line-height: 1.4; }
    </style>
</head>
<body onload="conectarSistemas()">

<div class="app">
    <div class="header-ia">
        <div class="orb" id="irisOrb"></div>
        <div id="aiSpeech" class="ai-status-text">"Hola Omar. Mis sistemas están listos para asistirte con una voz más cálida."</div>
    </div>

    <form id="fVenta" class="card">
        <label style="font-size: 11px; color: var(--iris-blue); display: block; margin-bottom: 8px;">MODALIDAD DE VENTA</label>
        <select id="iTipo" onchange="vozProducto(this.value)">
            <option value="">-- Selecciona producto --</option>
            <option value="PORTA">PORTABILIDAD (Doble GB)</option>
            <option value="CHIP">CHIP AMIGO KIT</option>
            <option value="KIT">EQUIPO AMIGO KIT</option>
            <option value="RENUEVATE">PLAN RENUÉVATE</option>
        </select>
        <input id="iTel" placeholder="Número (10 dígitos)" maxlength="10" required>
        <input id="iSuc" placeholder="Sucursal / Tienda">
        <input id="iProm" placeholder="Tu Nombre">
        <button type="submit" class="btn-action">FINALIZAR REGISTRO LIVE</button>
    </form>

    <div class="chat-card">
        <div id="chatDisplay"></div>
        <div style="display:flex; gap:8px;">
            <input id="chatInput" placeholder="Mensaje al equipo..." style="margin:0; font-size:12px; flex:1;">
            <button onclick="enviarChat()" style="background:var(--iris-blue); border:none; color:white; width:45px; border-radius:10px;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div class="card"><canvas id="liveChart" height="140"></canvas></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD4UK_j8UxMwOCtrtXlYftBe_wCLE7psMc", 
        databaseURL: "https://ventastelcel4029-default-rtdb.firebaseio.com",
        projectId: "ventastelcel4029"
    };

    let db, chart;

    function conectarSistemas() {
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        db = firebase.database();
        
        // Sincronización de Chat
        db.ref('chat_v17').limitToLast(15).on('value', snap => {
            let html = "";
            snap.forEach(m => { html += `<div class="msg-entry"><b>${m.val().user}:</b> ${m.val().msg}</div>`; });
            chatDisplay.innerHTML = html;
            chatDisplay.scrollTop = chatDisplay.scrollHeight;
        });

        // Gráfica Live
        db.ref('ventas_v17').on('value', snap => {
            actualizarGrafica(snap.val() || {});
        });
    }

    // --- CONFIGURACIÓN DE VOZ AGRADABLE ---
    function hablarPremium(texto) {
        window.speechSynthesis.cancel(); // Detener voces previas
        const msj = new SpeechSynthesisUtterance(texto);
        msj.lang = 'es-MX';
        msj.pitch = 0.95; // Tono ligeramente bajo para calidez
        msj.rate = 0.85;  // Velocidad elegante, no apresurada
        msj.volume = 1;
        
        window.speechSynthesis.speak(msj);
        aiSpeech.innerText = `"${texto}"`;
    }

    // INTERACCIÓN POR PRODUCTO
    function vozProducto(val) {
        if(!val) return;
        irisOrb.style.boxShadow = `0 0 45px var(--iris-blue)`;
        
        const guiones = {
            "PORTA": "Portabilidad detectada. Excelente, Omar. Recuerda decirle al cliente que Telcel le regala el doble de gigas.",
            "CHIP": "Activación de chip en proceso. Verifica que el ICCID esté completo antes de continuar.",
            "KIT": "Venta de equipo Amigo Kit. Es una gran oportunidad para ofrecer un seguro de protección móvil.",
            "RENUEVATE": "Renuévate seleccionado. Asegúrate de validar el historial del cliente para un mejor plan."
        };
        hablarPremium(guiones[val]);
    }

    function enviarChat() {
        if(!chatInput.value) return;
        db.ref('chat_v17').push({ user: iProm.value || "Promotor", msg: chatInput.value });
        chatInput.value = "";
    }

    fVenta.onsubmit = e => {
        e.preventDefault();
        const v = { tipo: iTipo.value, tel: iTel.value, tienda: iSuc.value, promotor: iProm.value, ts: Date.now() };
        db.ref('ventas_v17').push(v);
        
        hablarPremium("Venta registrada exitosamente. Has hecho un gran trabajo con este cliente.");
        fVenta.reset();
        irisOrb.style.boxShadow = `0 0 50px #00ff88`;
        setTimeout(() => irisOrb.style.boxShadow = `0 0 25px var(--iris-blue)`, 3500);
    };

    function actualizarGrafica(data) {
        let p = { PORTA:0, CHIP:0, KIT:0, RENUEVATE:0 };
        Object.values(data).forEach(v => { if(p[v.tipo] !== undefined) p[v.tipo]++; });
        if(chart) chart.destroy();
        chart = new Chart(document.getElementById('liveChart'), {
            type: 'doughnut',
            data: { labels: Object.keys(p), datasets: [{ data: Object.values(p), backgroundColor: ['#28b8ff','#00ff88','#ffa500','#ff4b2b'], borderWeight:0 }] },
            options: { legend: { labels: { fontColor: 'white', fontSize: 11 } }, maintainAspectRatio: false }
        });
    }
</script>
</body>
</html>
