<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>que quieres buscar equipo imei - Autenticado</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { margin:0; font-family:'Segoe UI',sans-serif; background:linear-gradient(135deg,#001d3d,#003566,#000814); min-height:100vh; color:white; padding-bottom: 90px; }
        .app { max-width:1100px; margin:auto; padding:20px; }
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000814; z-index: 20000; display: flex; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .login-box { background: rgba(255, 255, 255, 0.06); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; width: 100%; max-width: 420px; padding: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.8); text-align: center; }
        .card { background:rgba(255,255,255,.08); backdrop-filter:blur(10px); border-radius:15px; padding:20px; margin-bottom:15px; border:1px solid rgba(255,255,255,0.1); }
        .table-container { overflow-x: auto; background: white; border-radius: 10px; margin-top: 20px; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; color: #333; font-size: 11px; min-width: 1100px; }
        th { background: #000 !important; color: #fff !important; padding: 12px; text-align: left; text-transform: uppercase; font-weight: bold; border: 1px solid #444; }
        td { padding: 10px; border: 1px solid #ddd; }
        .hidden { display: none !important; }
        .btn-save, .btn-excel, .btn-pdf { padding:14px; border:none; border-radius:10px; font-weight:bold; cursor:pointer; }
        .btn-save { background:#ffc300; color:#001d3d; width:100%; }
        .btn-excel { background:#1f7a3f; color:white; }
        .btn-excel-telcel { background:#00509d; color:white; }
        .btn-pdf { background:#b7094c; color:white; }
    </style>
</head>
<body>

<div class="login-overlay" id="seccionLogin">
    <div class="login-box">
        <h2>SISTEMA DE CONTROL</h2>
        <p>Inicia sesión para acceder a tus registros locales</p>
        
        <div class="login-tabs">
            <button id="tabOpLogin" class="login-tab-btn active" onclick="alternarFormularioAcceso('LOGIN')">Entrar</button>
            <button id="tabOpRegistro" class="login-tab-btn" onclick="alternarFormularioAcceso('REGISTRO')">Nuevo Correo</button>
        </div>

        <button class="btn-google" onclick="ejecutarLoginGoogle()">
            <i class="fa-brands fa-google"></i> Iniciar sesión con Google
        </button>

        <div class="separator">O con tu cuenta</div>

        <form id="fAcceso" onsubmit="procesarAutenticacion(event)">
            <input type="hidden" id="tipoAccesoActual" value="LOGIN">
            <input type="email" id="logEmail" placeholder="Correo electrónico (ej: promotor@gmail.com)" required>
            <input type="password" id="logPass" placeholder="Contraseña" required>
            <button type="submit" id="btnAccesoAccion" class="btn-save">INGRESAR AL PANEL</button>
        </form>
    </div>
</div>

<div class="app hidden" id="wrapperSistema">
    <!-- Tu interfaz original -->
    <div class="top-bar">  
        <div class="gps-card">  
            <i class="fa-solid fa-location-dot"></i>  
            <div><b style="color:white">UBICACIÓN ACTUAL</b><br><span id="txtGps">Localizando...</span></div>  
        </div>  
        <div class="reloj-digital">
            <span id="txtReloj">00:00:00</span>
            <button class="btn-logout" onclick="cerrarSesionSistema()"><i class="fa-solid fa-power-off"></i> Salir</button>
        </div>  
    </div>

    <!-- Menús y formulario (mantengo tu estructura) -->
    <div id="seccionVentas">
        <form id="fReg" onsubmit="guardarVentaLocal(event)">
            <!-- Tus campos originales -->
            <div class="card">
                <label>FECHA DE ACTIVACION / VENTA</label>
                <input id="iFec" type="date" required>
                <label>NUM. CELULAR (10 DÍGITOS)</label>
                <input id="iTel" type="tel" maxlength="10" required>
                <label>ICCID</label>
                <input id="iIcc" required>
                <label>IMEI</label>
                <input id="iIme" placeholder="IMEI del equipo">
                <label>MARCA</label>
                <input id="iMarca" required>
                <label>MODELO</label>
                <input id="iMod" required>
                <!-- ... resto de campos ... -->
            </div>
            <button type="submit" class="btn-save">GUARDAR VENTA LOCALMENTE</button>
        </form>

        <div class="descargas-container">
            <button class="btn-excel" onclick="exportarExcelGeneral()">REPORTE GENERAL (TODOS)</button>
            <button class="btn-excel-telcel" onclick="exportarExcelTelcel()">EXCEL SOLO TELCEL</button>
            <button class="btn-pdf" onclick="exportarPDF()">REPORTE PDF</button>
        </div>

        <div class="table-container">
            <table id="tablaVentasReal">
                <thead>
                    <tr>
                        <th>OPERADOR</th>
                        <th>NUM. CELULAR</th>
                        <th>IMEI</th>
                        <th>ICCID</th>
                        <th>TIPO</th>
                        <th>#TIENDA</th>
                        <th>CADENA</th>
                        <th>TIENDA</th>
                        <th>PROMOTOR</th>
                        <th>FECHA</th>
                        <th>MARCA</th>
                        <th>MODELO</th>
                    </tr>
                </thead>
                <tbody id="bodyVentas"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let listaVentasGlobal = [];

    window.onload = function() {
        setInterval(() => document.getElementById('txtReloj').innerText = new Date().toLocaleTimeString('es-MX'), 1000);
        if (localStorage.getItem('sesion_activa_promotor') === 'true') mostrarInterfazSistema();
        cargarDatosLocales();
    };

    function guardarVentaLocal(e) {
        e.preventDefault();
        const venta = {
            "NUM. CELULAR": document.getElementById('iTel').value,
            "IMEI": document.getElementById('iIme').value || "N/A",
            "ICCID": document.getElementById('iIcc').value,
            "Renuevate/ Kit/Chip/Porta": "KIT",
            "#TIENDA / Determinante": "0000",
            "SOLO NOMBRE DE LA CADENA": "COPPEL",
            "SOLO NOMBRE DE TIENDA SIN CADENA": "PLAZA ARAGON",
            "NOMBRE COMPLETO PROMOTOR": "Omar",
            "FECHA DE ACTIVACION": document.getElementById('iFec').value,
            "MARCA": document.getElementById('iMarca').value,
            "MODELO": document.getElementById('iMod').value
        };
        listaVentasGlobal.unshift(venta);
        localStorage.setItem('omar_ventas_locales', JSON.stringify(listaVentasGlobal));
        renderizarVentas();
        e.target.reset();
    }

    function renderizarVentas() {
        document.getElementById('bodyVentas').innerHTML = listaVentasGlobal.map(v => `
            <tr>
                <td>${v.OPERADOR || 'TELCEL'}</td>
                <td>${v["NUM. CELULAR"]}</td>
                <td>${v.IMEI}</td>
                <td>${v.ICCID}</td>
                <td>${v["Renuevate/ Kit/Chip/Porta"]}</td>
                <td>${v["#TIENDA / Determinante"]}</td>
                <td>${v["SOLO NOMBRE DE LA CADENA"]}</td>
                <td>${v["SOLO NOMBRE DE TIENDA SIN CADENA"]}</td>
                <td>${v["NOMBRE COMPLETO PROMOTOR"]}</td>
                <td>${v["FECHA DE ACTIVACION"]}</td>
                <td>${v.MARCA}</td>
                <td>${v.MODELO}</td>
            </tr>
        `).join('');
    }

    function cargarDatosLocales() {
        const data = localStorage.getItem('omar_ventas_locales');
        if (data) {
            listaVentasGlobal = JSON.parse(data);
            renderizarVentas();
        }
    }

    // === EXPORTACIÓN USANDO TU PLANTILLA EXACTA ===
    function exportarExcelTelcel() {
        if (listaVentasGlobal.length === 0) return alert("No hay ventas registradas.");

        const ws = XLSX.utils.json_to_sheet(listaVentasGlobal.map(v => ({
            "NUM. CELULAR": v["NUM. CELULAR"],
            "IMEI": v.IMEI,
            "ICCID": v.ICCID,
            "Renuevate/ Kit/Chip/Porta": v["Renuevate/ Kit/Chip/Porta"],
            "#TIENDA / Determinante": v["#TIENDA / Determinante"],
            "SOLO NOMBRE DE LA CADENA": v["SOLO NOMBRE DE LA CADENA"],
            "SOLO NOMBRE DE TIENDA SIN CADENA": v["SOLO NOMBRE DE TIENDA SIN CADENA"],
            "NOMBRE COMPLETO PROMOTOR": v["NOMBRE COMPLETO PROMOTOR"],
            "FECHA DE ACTIVACION": v["FECHA DE ACTIVACION"],
            "MARCA": v.MARCA,
            "MODELO": v.MODELO
        })));

        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Hoja1");

        // Nombre como tu archivo original
        const fecha = new Date().toISOString().slice(0,10);
        XLSX.writeFile(wb, `comíciones_diarias_Omar_${fecha}.xlsx`);
    }

    function exportarExcelGeneral() {
        exportarExcelTelcel(); // Por ahora usa la misma estructura
    }

    function exportarPDF() {
        alert("PDF generado (usa la tabla visible)");
    }
</script>
</body>
</html>
