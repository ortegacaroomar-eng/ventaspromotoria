<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Ventas</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

<style>
:root{
--primary:#0a84ff;
--secondary:#30d158;
--danger:#ff453a;
--glass:rgba(255,255,255,.08);
}

/* ===== APP BASE ===== */
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#0b0f1a;
color:white;
overflow-x:hidden;
}

.hidden{display:none}
.app{max-width:480px;margin:auto;padding:16px}

/* ===== TRANSICIONES ENTRE PANTALLAS ===== */
.screen{
animation:screenIn .45s cubic-bezier(.22,1,.36,1);
}
@keyframes screenIn{
from{opacity:0;transform:translateX(40px)}
to{opacity:1;transform:none}
}

/* ===== TOPBAR ===== */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:16px;
animation:slideDown .5s ease;
}
@keyframes slideDown{
from{opacity:0;transform:translateY(-20px)}
to{opacity:1;transform:none}
}

/* ===== TARJETAS TIPO BANCA ===== */
.card{
background:var(--glass);
backdrop-filter:blur(20px);
border-radius:20px;
padding:16px;
margin-bottom:14px;
box-shadow:
0 4px 20px rgba(0,0,0,.25),
inset 0 1px 0 rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
animation:cardFloat .6s ease;
}
@keyframes cardFloat{
from{opacity:0;transform:translateY(15px)}
to{opacity:1;transform:none}
}

/* ===== INPUTS PREMIUM ===== */
input,select{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:12px;
border:1px solid rgba(255,255,255,.08);
background:rgba(255,255,255,.04);
color:white;
font-size:14px;
transition:.25s;
}
input:focus,select:focus{
outline:none;
border:1px solid var(--primary);
box-shadow:0 0 0 3px rgba(10,132,255,.15);
transform:scale(1.02);
}

/* ===== BOTONES APP BANCARIA ===== */
.btn{
width:100%;
padding:13px;
border:none;
border-radius:14px;
font-weight:600;
cursor:pointer;
margin-bottom:12px;
transition:all .15s ease;
letter-spacing:.3px;
}
.btn:active{
transform:scale(.96);
filter:brightness(.9);
}

.btn-primary{
background:var(--primary);
color:white;
box-shadow:0 6px 18px rgba(10,132,255,.35);
}
.btn-secondary{
background:var(--secondary);
color:white;
box-shadow:0 6px 18px rgba(48,209,88,.35);
}
.btn-danger{
background:var(--danger);
color:white;
}

/* ===== BOTONES PEQUEÑOS ===== */
.btn-sm{
width:auto;
padding:10px 14px;
border-radius:12px;
font-size:13px;
}

/* ===== GPS ===== */
.gps{
font-size:12px;
opacity:.85;
background:rgba(10,132,255,.08);
padding:10px;
border-radius:12px;
border:1px solid rgba(10,132,255,.25);
}

/* ===== TABLA ===== */
table{
width:100%;
border-collapse:collapse;
background:white;
color:black;
border-radius:14px;
overflow:hidden;
font-size:12px;
}
th{
background:#0a84ff;
color:white;
padding:10px;
}
td{
padding:8px;
border-bottom:1px solid #eee;
}
tr:hover td{background:#f2f8ff}

/* ===== LOGIN CARD ===== */
.login{
max-width:360px;
margin:70px auto;
background:white;
color:black;
padding:28px;
border-radius:26px;
box-shadow:0 25px 60px rgba(0,0,0,.45);
animation:loginPop .5s cubic-bezier(.22,1,.36,1);
}
@keyframes loginPop{
from{opacity:0;transform:scale(.9)}
to{opacity:1;transform:none}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginBox" class="login screen">
<h2 style="text-align:center;color:#0a84ff">Acceso</h2>
<input id="u" type="email" placeholder="Correo">
<input id="p" type="password" placeholder="Contraseña">
<button class="btn btn-primary" onclick="login()">
<i class="fa-solid fa-right-to-bracket"></i> Iniciar Sesión
</button>
<button class="btn btn-secondary" onclick="registrar()">
<i class="fa-solid fa-user-plus"></i> Crear Cuenta Nueva
</button>
</div>

<!-- APP -->
<div id="appBox" class="app hidden screen">

<div class="topbar">
<div class="gps">
<i class="fa-solid fa-location-dot"></i>
<span id="gpsTxt">Detectando ubicación...</span>
</div>
<div>
<button class="btn btn-danger btn-sm" onclick="logout()">⏻</button>
</div>
</div>

<div class="card">
<a href="https://app.payjoy.com/accounts/login?afterLogin=https://app.payjoy.com/merchant3?merchantId=199557" target="_blank">
<button class="btn btn-secondary">PayJoy</button>
</a>
<a href="https://registro.telcel.com/vinculatulinea/#/" target="_blank">
<button class="btn btn-primary">Vincular Línea</button>
</a>
</div>

<form id="fReg">
<div class="card">
<select id="tipo" required>
<option value="">Tipo de Venta</option>
<option>KIT</option>
<option>CHIP</option>
<option>PORTABILIDAD</option>
<option>RENUEVA</option>
</select>
<input id="tel" placeholder="Número Celular" required>
<input id="icc" placeholder="ICCID" required>
<input id="imei" placeholder="IMEI">
</div>

<div class="card">
<input id="marca" placeholder="Marca">
<input id="modelo" placeholder="Modelo">
</div>

<div class="card">
<input id="tienda" placeholder="# Tienda" required>
<input id="cadena" placeholder="Cadena" required>
<input id="tiendaNombre" placeholder="Nombre Tienda" required>
<input id="promotor" placeholder="Promotor" required>
</div>

<button class="btn btn-primary">Guardar Venta</button>
</form>

<div class="card">
<h3>Registros</h3>
<table>
<thead>
<tr>
<th>Cel</th><th>Tipo</th><th>ICCID</th>
<th>IMEI</th><th>Modelo</th>
<th>Tienda</th><th>Promotor</th><th></th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<button class="btn btn-secondary" onclick="excel()">
<i class="fa-solid fa-file-excel"></i> Exportar Excel
</button>

</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyD4UK_j8UxMwOCtrtXlYftBe_wCLE7psMc",
authDomain:"ventastelcel4029.firebaseapp.com",
projectId:"ventastelcel4029"
};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();

auth.onAuthStateChanged(user=>{
loginBox.classList.toggle("hidden",!!user);
appBox.classList.toggle("hidden",!user);
if(user) gps();
});

function login(){
auth.signInWithEmailAndPassword(u.value,p.value)
.catch(()=>alert("Datos incorrectos"));
}
function registrar(){
auth.createUserWithEmailAndPassword(u.value,p.value)
.then(()=>alert("Cuenta creada"))
.catch(e=>alert(e.message));
}
function logout(){auth.signOut()}

function gps(){
if(!navigator.geolocation) return;
navigator.geolocation.getCurrentPosition(async pos=>{
const {latitude,longitude}=pos.coords;
const r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
const d=await r.json();
gpsTxt.innerText=d.display_name;
});
}

fReg.onsubmit=e=>{
e.preventDefault();
const v={id:Date.now(),cel:tel.value,tipo:tipo.value,icc:icc.value,imei:imei.value,
marca:marca.value,modelo:modelo.value,tiendaNum:tienda.value,cadena:cadena.value,
tienda:tiendaNombre.value,promotor:promotor.value,fecha:new Date().toLocaleDateString()};
let l=JSON.parse(localStorage.ventas||"[]");
l.unshift(v);
localStorage.ventas=JSON.stringify(l);
render();
fReg.reset();
};

function render(){
let l=JSON.parse(localStorage.ventas||"[]");
tabla.innerHTML=l.map(v=>`
<tr>
<td>${v.cel}</td><td>${v.tipo}</td>
<td>${v.icc}</td><td>${v.imei||''}</td>
<td>${v.modelo||''}</td>
<td>${v.tienda}</td><td>${v.promotor}</td>
<td><button onclick="del(${v.id})">🗑️</button></td>
</tr>`).join('');
}
render();

function del(id){
let l=JSON.parse(localStorage.ventas||"[]").filter(x=>x.id!=id);
localStorage.ventas=JSON.stringify(l);
render();
}

function excel(){
let l = JSON.parse(localStorage.ventas || "[]");
if(!l.length) return alert("Sin datos");

const headers=[
"NUM. CELULAR","IMEI","ICCID","TIPO",
"#TIENDA","CADENA","TIENDA",
"PROMOTOR","FECHA","MARCA","MODELO"
];

let data=[headers];
for(let i=0;i<300;i++){
const v=l[i]||{};
data.push([v.cel||"",v.imei||"",v.icc||"",v.tipo||"",v.tiendaNum||"",
v.cadena||"",v.tienda||"",v.promotor||"",v.fecha||"",v.marca||"",v.modelo||""]);
}

const ws=XLSX.utils.aoa_to_sheet(data);
const wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"FORMATO DIARIO");
XLSX.writeFile(wb,"FORMATO_DIARIO_COMISIONES.xlsx");
}
</script>

</body>
</html>
