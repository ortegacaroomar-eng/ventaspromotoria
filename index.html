<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRIS AI - NEURAL NEXUS V30</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --iris: #00d4ff; --gold: #ffc300; --bg: #000814; }
        body { margin:0; font-family:'Segoe UI', sans-serif; background:var(--bg); color:white; }
        .app { max-width:480px; margin:auto; padding:20px; }
        .card { background:rgba(255,255,255,.05); backdrop-filter:blur(15px); border-radius:20px; padding:18px; margin-bottom:15px; border:1px solid rgba(0,212,255,0.2); }
        
        /* ORBE IRIS */
        .iris-head { text-align: center; margin-bottom: 20px; cursor: pointer; }
        .iris-orb { 
            width: 80px; height: 80px; margin: 0 auto 10px; border-radius: 50%; 
            background: radial-gradient(circle, var(--iris) 0%, #000 85%);
            box-shadow: 0 0 30px var(--iris); animation: pulse 3s infinite;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }
        .iris-status { font-size: 13px; color: var(--iris); font-style: italic; min-height: 40px; text-shadow: 0 0 5px #000; }

        input, select { width:100%; padding:14px; margin-bottom:10px; border-radius:12px; border:1px solid #222; background:#000; color:white; box-sizing: border-box; }
        button { width:100%; padding:15px; border:none; border-radius:12px; font-weight:bold; cursor:pointer; margin-bottom:10px; }
        .btn-main { background: var(--gold); color: #000; }
        .btn-ia { background: transparent; color: var(--iris); border: 1px solid var(--iris); font-size: 12px; }
        
        .venta-item { background: rgba(0,212,255,0.05); padding: 12px; border-radius: 12px; margin-bottom: 10px; border-left: 4px solid var(--gold); font-size: 11px; }
        .hidden { display:none !important; }
    </style>
</head>
<body onload="inicio()">

    <div id="loginBox" class="app" style="margin-top:100px; text-align:center;">
        <div class="card">
            <h2 style="color:var(--gold)">CONEXIÓN IRIS</h2>
            <input id="u" placeholder="Correo">
            <input id="p" type="password" placeholder="Password">
            <button class="btn-main" onclick="entrar()">ACTIVAR IA</button>
        </div>
    </div>

    <div id="appBox" class="app hidden">
        <div class="iris-head" onclick="hablarIA('Sistemas activos, Omar. ¿Qué quieres saber?')">
            <div class="iris-orb"></div>
            <div id="irisStatus" class="iris-status">"Conectada a la red global..."</div>
        </div>

        <div class="card">
            <label style="font-size:10px; color:var(--iris)">CONSULTA GLOBAL E INTERPROMOTOR</label>
            <input id="chatIA" placeholder="Pregunta sobre otros promotores o consejos...">
            <button class="btn-ia" onclick="procesarIA()"><i class="fas fa-brain"></i> CONSULTAR CEREBRO IRIS</button>
        </div>

        <form id="fReg">
            <div class="card">
                <select id="iTipo" required onchange="ajustarCampos()">
                    <option value="">Seleccionar Producto</option>
                    <option value="KIT">KIT</option>
                    <option value="CHIP">CHIP</option>
                    <option value="PORTA">PORTA</option>
                    <option value="RENUEVATE">RENUEVATE</option>
                </select>
                <input id="iFec" readonly>
                <input id="iTel" placeholder="Número Celular" maxlength="10" required>
                <input id="iIcc" placeholder="ICCID" required>
            </div>

            <div id="seccionEquipo" class="card hidden">
                <input id="iIme" placeholder="IMEI">
                <input id="iMarca" placeholder="Marca">
                <input id="iMod" placeholder="Modelo">
            </div>

            <div class="card">
                <input id="iTiendaNombre" placeholder="Tienda" required>
                <input id="iProm" placeholder="Nombre Promotor" required>
            </div>
            <button type="submit" class="btn-main">REGISTRAR VENTA</button>
        </form>

        <button onclick="exportarExcel()" style="background:#1f7a3f; color:white;">DESCARGAR EXCEL</button>
        
        <h3 style="font-size:14px; color:var(--gold)">HISTORIAL LOCAL RECIENTE</h3>
        <div id="listaLocal"></div>
        <button onclick="salir()" style="background:#ff4d4d; color:white; font-size:11px; margin-top:20px;">DESCONECTAR</button>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD4UK_j8UxMwOCtrtXlYftBe_wCLE7psMc", 
        authDomain: "ventastelcel4029.firebaseapp.com",
        databaseURL: "https://ventastelcel4029-default-rtdb.firebaseio.com",
        projectId: "ventastelcel4029"
    };

    let db, auth, nombreUser = "";

    function inicio() {
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        db = firebase.database(); auth = firebase.auth();
        iFec.value = new Date().toLocaleDateString('es-MX');

        auth.onAuthStateChanged(user => {
            if(user) {
                nombreUser = user.displayName || user.email.split('@')[0];
                iProm.value = nombreUser;
                mostrarApp();
                setTimeout(() => hablarIA(`Bienvenido Omar. He sincronizado la base de datos y la red global para ti.`), 1000);
            } else {
                loginBox.classList.remove("hidden"); appBox.classList.add("hidden");
            }
        });
    }

    // --- VOZ DE IRIS MEJORADA ---
    function hablarIA(texto) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(texto);
        msg.lang = 'es-MX'; msg.pitch = 1.1; msg.rate = 0.9;
        window.speechSynthesis.speak(msg);
        document.getElementById('irisStatus').innerText = `"${texto}"`;
    }

    // --- IA GENERATIVA: INTERNET + PROMOTORES ---
    function procesarIA() {
        const query = document.getElementById('chatIA').value.toLowerCase();
        if(!query) return;

        if(query.includes("promotor") || query.includes("vende") || query.includes("quién va")) {
            hablarIA("Escaneando registros en la nube... Dame un segundo.");
            db.ref('ventas').once('value', (snap) => {
                let reporte = {};
                snap.forEach(user => {
                    user.forEach(venta => {
                        let p = venta.val().PROMOTOR || "Desconocido";
                        reporte[p] = (reporte[p] || 0) + 1;
                    });
                });
                
                let resumen = "He encontrado los siguientes datos: ";
                for(let p in reporte) { resumen += `${p} lleva ${reporte[p]} ventas. `; }
                hablarIA(resumen);
            });
        } else {
            // IA GLOBAL (Simulada con base de conocimientos de Internet)
            const respuestasIA = [
                "Según las tendencias de psicología de ventas, el 70% de las personas compran por emoción. Enfócate en los beneficios, no solo en el precio.",
                "En internet se dice que la perseverancia supera al talento. Sigue ofreciendo ese Chip, Omar.",
                "Dato tecnológico: La red 5G que vendes es actualmente la más rápida de México. Úsalo como argumento de cierre.",
                "Consejo de vida: Un promotor exitoso no vende productos, vende soluciones de comunicación."
            ];
            hablarIA(respuestasIA[Math.floor(Math.random()*respuestasIA.length)]);
        }
        document.getElementById('chatIA').value = "";
    }

    function entrar() { auth.signInWithEmailAndPassword(u.value, p.value).catch(e => alert(e.message)); }

    function mostrarApp() {
        loginBox.classList.add("hidden"); appBox.classList.remove("hidden");
        renderLocal();
    }

    function ajustarCampos() {
        const t = iTipo.value;
        if(t) hablarIA(`Has seleccionado ${t}. Excelente elección.`);
        seccionEquipo.className = (t === "CHIP" || t === "PORTA") ? "card hidden" : "card";
    }

    fReg.onsubmit = e => {
        e.preventDefault();
        const v = {
            id: Date.now(),
            TEL: iTel.value,
            ICCID: iIcc.value,
            PRODUCTO: iTipo.value,
            PROMOTOR: iProm.value,
            FECHA: iFec.value,
            TIENDA: iTiendaNombre.value
        };

        // GUARDADO LOCAL REAL (Persistence Check)
        let local = JSON.parse(localStorage.getItem("ventas_omar") || "[]");
        local.unshift(v);
        localStorage.setItem("ventas_omar", JSON.stringify(local));

        // GUARDADO NUBE
        if(auth.currentUser) db.ref('ventas/' + auth.currentUser.uid).push(v);

        hablarIA(`Venta de ${v.PRODUCTO} guardada localmente y sincronizada. ¡Eres grande, ${nombreUser}!`);
        fReg.reset(); iProm.value = nombreUser;
        renderLocal();
    }

    function renderLocal() {
        const lista = document.getElementById("listaLocal");
        let local = JSON.parse(localStorage.getItem("ventas_omar") || "[]");
        lista.innerHTML = local.length === 0 ? "<p>No hay registros locales aún.</p>" : 
        local.slice(0, 5).map(v => `
            <div class="venta-item">
                <b>${v.TEL}</b> - ${v.PRODUCTO} <br>
                <small>${v.FECHA} | ${v.TIENDA}</small>
            </div>
        `).join("");
    }

    function exportarExcel() {
        let local = JSON.parse(localStorage.getItem("ventas_omar") || "[]");
        const ws = XLSX.utils.json_to_sheet(local);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Ventas");
        XLSX.writeFile(wb, `Ventas_${nombreUser}.xlsx`);
    }

    function salir() { auth.signOut(); }
</script>
</body>
</html>
