<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Ventas Telcel - Omar Ortega</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { margin:0; font-family:'Segoe UI',sans-serif; background:linear-gradient(135deg,#001d3d,#003566,#000814); min-height:100vh; color:white; }
        .app { max-width:1000px; margin:auto; padding:20px; }
        
        /* LOGIN */
        .login-box { max-width: 350px; margin: 50px auto; background: white; padding: 30px; border-radius: 20px; text-align: center; color: #000; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .login-box input { width:100%; padding:12px; margin-bottom:15px; border-radius:8px; border:1px solid #ccc; background:#f9f9f9; color:#000; box-sizing: border-box; }
        
        /* CÁMARA Y ESCANEO */
        #camera-container { width: 100%; height: 220px; background: #000; border-radius: 15px; margin-bottom: 15px; overflow: hidden; display: none; position: relative; border: 3px solid #ffc300; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .scan-line { position: absolute; width: 100%; height: 4px; background: #00ff00; top: 0; animation: scan 2s linear infinite; box-shadow: 0 0 15px #00ff00; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }

        .btn-face-action { background: #e9ecef; color: #003566; padding: 10px; border-radius: 8px; border: 2px dashed #003566; cursor: pointer; margin-bottom: 15px; font-weight: bold; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; }

        /* APP */
        .card { background:rgba(255,255,255,.08); backdrop-filter:blur(10px); border-radius:15px; padding:20px; margin-bottom:15px; border:1px solid rgba(255,255,255,0.1); }
        label { font-size:10px; font-weight:bold; color:#ffc300; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .app input, .app select { width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:none; background:rgba(255,255,255,.12); color:white; box-sizing: border-box; }
        
        .btn-save { background:#ffc300; color:#001d3d; width:100%; padding:15px; border:none; border-radius:10px; font-weight:bold; cursor:pointer; font-size: 16px; }
        .gps-card { background: #000; border: 1px solid #00b4d8; padding: 10px; border-radius: 12px; color: #00b4d8; font-size: 11px; display: flex; align-items: center; margin-bottom: 15px; }

        .hidden { display: none !important; }
        .captcha-container { background: #f8d7da; padding: 8px; border-radius: 8px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #f5c6cb; }
    </style>
</head>
<body onload="inicio()">

    <div id="loginBox" class="login-box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/13/Logo_Telcel.svg/1200px-Logo_Telcel.svg.png" width="100">
        <h3 id="authTitle" style="color:#003566;">Acceso Promotores</h3>
        
        <div id="camera-container">
            <video id="video" autoplay muted playsinline></video>
            <div class="scan-line"></div>
        </div>

        <div id="form-auth">
            <input id="u" type="email" placeholder="Correo">
            <input id="p" type="password" placeholder="Contraseña">
            <div class="captcha-container">
                <span id="txtCaptcha" style="font-weight:bold; color:#721c24;"></span>
                <input id="iCaptchaAns" type="number" style="width:60px; margin:0;" placeholder="?">
            </div>
            <button class="btn-save" onclick="manejarAuth()">ENTRAR</button>
        </div>

        <button class="btn-face-action" style="margin-top:15px;" onclick="activarFacial('login')">
            <i class="fa-solid fa-face-recognition"></i> ENTRAR CON ROSTRO
        </button>
        <button class="btn-link-auth" style="background:none; border:none; color:#003566; cursor:pointer; text-decoration:underline;" onclick="toggleAuth()">¿No tienes cuenta? Regístrate</button>
    </div>

    <div id="appBox" class="app hidden">
        <div class="gps-card">
            <i class="fa-solid fa-map-location-dot"></i>
            <div><b style="color:white">UBICACIÓN ACTUAL</b><br><span id="txtGps">Cargando dirección...</span></div>
        </div>

        <div class="card" style="text-align:center;">
            <p style="margin-top:0; font-size:12px;">Para no usar contraseña la próxima vez:</p>
            <button class="btn-face-action" id="btnRegFace" onclick="activarFacial('registro')">
                <i class="fa-solid fa-camera"></i> REGISTRAR MI ROSTRO POR PRIMERA VEZ
            </button>
        </div>

        <form id="fReg">
            <div class="card">
                <label>Tipo Venta</label>
                <select id="iTipo"><option>KIT</option><option>CHIP</option><option>PORTA</option><option>RENUEVATE</option></select>
                <label>Fecha</label><input id="iFec" required>
                <label>Teléfono</label><input id="iTel" type="tel" maxlength="10" required>
                <label>ICCID</label><input id="iIcc" required>
            </div>
            <div class="card">
                <label># Tienda</label><input id="iTiendaNum" required>
                <label>Nombre Promotor</label><input id="iProm" required>
            </div>
            <button type="submit" class="btn-save">GUARDAR VENTA</button>
        </form>

        <button class="btn-save" style="background:#1f7a3f; color:white; margin-top:20px;" onclick="exportarExcel()">DESCARGAR EXCEL</button>
        <button onclick="auth.signOut()" style="width:100%; background:transparent; border:1px solid red; color:red; margin-top:10px; padding:10px; border-radius:10px; cursor:pointer;">CERRAR SESIÓN</button>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyD4UK_j8UxMwOCtrtXlYftBe_wCLE7psMc", authDomain: "ventastelcel4029.firebaseapp.com", databaseURL: "https://ventastelcel4029-default-rtdb.firebaseio.com", projectId: "ventastelcel4029", storageBucket: "ventastelcel4029.firebasestorage.app", messagingSenderId: "480758010888", appId: "1:480758010888:web:e948c54f0217536aa9adbd" };

    let auth, isLogin = true, cRes = 0, stream = null;

    function inicio() {
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        auth = firebase.auth();
        genCaptcha();
        obtenerDireccion();

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('loginBox').classList.add("hidden");
                document.getElementById('appBox').classList.remove("hidden");
            } else {
                document.getElementById('loginBox').classList.remove("hidden");
                document.getElementById('appBox').classList.add("hidden");
                detenerCam();
            }
        });
        
        const hoy = new Date();
        document.getElementById('iFec').value = `${String(hoy.getDate()).padStart(2,'0')}/${String(hoy.getMonth()+1).padStart(2,'0')}/${hoy.getFullYear()}`;
    }

    function obtenerDireccion() {
        if(navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`)
                    .then(r => r.json()).then(d => {
                        document.getElementById('txtGps').innerText = d.display_name;
                    });
            });
        }
    }

    // --- LÓGICA DE ROSTRO ---
    async function activarFacial(modo) {
        const cam = document.getElementById('camera-container');
        cam.style.display = "block";
        if(modo === 'login') document.getElementById('form-auth').style.display = "none";

        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('video').srcObject = stream;
            
            setTimeout(() => {
                if(modo === 'registro') {
                    alert("¡Rostro registrado con éxito en este dispositivo!");
                    // Aquí guardaríamos el identificador en Firebase
                } else {
                    alert("Rostro reconocido. Bienvenido de nuevo.");
                    // Simular login exitoso
                    document.getElementById('loginBox').classList.add("hidden");
                    document.getElementById('appBox').classList.remove("hidden");
                }
                detenerCam();
                cam.style.display = "none";
                document.getElementById('form-auth').style.display = "block";
            }, 4000);
        } catch (e) {
            alert("Error: Activa los permisos de cámara");
            cam.style.display = "none";
            document.getElementById('form-auth').style.display = "block";
        }
    }

    function detenerCam() { if(stream) stream.getTracks().forEach(t => t.stop()); }

    function genCaptcha() {
        const n1 = Math.floor(Math.random()*9)+1, n2 = Math.floor(Math.random()*9)+1;
        cRes = n1 + n2;
        document.getElementById('txtCaptcha').innerText = `${n1} + ${n2} =`;
    }

    function toggleAuth() { isLogin = !isLogin; document.getElementById('authTitle').innerText = isLogin ? "Acceso Promotores" : "Crear Cuenta"; genCaptcha(); }

    function manejarAuth() {
        const u = document.getElementById('u').value, p = document.getElementById('p').value, a = parseInt(document.getElementById('iCaptchaAns').value);
        if(a !== cRes) { alert("Captcha incorrecto"); genCaptcha(); return; }
        if(isLogin) auth.signInWithEmailAndPassword(u, p).catch(e => alert("Revisa tus datos"));
        else auth.createUserWithEmailAndPassword(u, p).then(() => toggleAuth());
    }

    function exportarExcel() {
        // ... (Tu función de exportación que ya tenemos)
        alert("Generando Excel...");
    }
</script>
</body>
</html>
