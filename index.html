<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Ventas Telcel - Omar Ortega</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { margin:0; font-family:'Segoe UI',sans-serif; background:linear-gradient(135deg,#001d3d,#003566,#000814); min-height:100vh; color:white; }
        .app { max-width:1000px; margin:auto; padding:20px; }
        
        /* LOGIN */
        .login-box { max-width: 350px; margin: 40px auto; background: white; padding: 30px; border-radius: 20px; text-align: center; color: #000; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .login-box input { width:100%; padding:12px; margin-bottom:15px; border-radius:8px; border:1px solid #ccc; background:#f9f9f9; color:#000; box-sizing: border-box; }
        
        #camera-container { width: 100%; height: 200px; background: #000; border-radius: 15px; margin-bottom: 15px; overflow: hidden; display: none; position: relative; border: 3px solid #ffc300; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .scan-line { position: absolute; width: 100%; height: 4px; background: #00ff00; top: 0; animation: scan 2s linear infinite; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }

        /* INTERFAZ APP */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; gap: 10px; }
        .gps-card { background: #000; border: 1px solid #00b4d8; padding: 10px; border-radius: 12px; color: #00b4d8; font-size: 11px; flex: 1; display: flex; align-items: center; }
        .btn-exit-icon { background: #ff4d4d; color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .card { background:rgba(255,255,255,.08); backdrop-filter:blur(10px); border-radius:15px; padding:20px; margin-bottom:15px; border:1px solid rgba(255,255,255,0.1); }
        label { font-size:10px; font-weight:bold; color:#ffc300; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .app input, .app select { width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:none; background:rgba(255,255,255,.12); color:white; box-sizing: border-box; }
        
        .btn-save { background:#ffc300; color:#001d3d; width:100%; padding:15px; border:none; border-radius:10px; font-weight:bold; cursor:pointer; font-size: 16px; }
        .btn-payjoy { background: #6200ee; color: white; margin-bottom: 15px; }

        /* TABLA REGISTROS */
        .table-container { overflow-x: auto; background: white; border-radius: 10px; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; color: #333; font-size: 10px; min-width: 1000px; }
        th { background: #001d3d; color: white; padding: 10px; text-align: left; }
        td { padding: 8px; border: 1px solid #ddd; }

        .hidden { display: none !important; }
        .captcha-container { background: #f8d7da; padding: 8px; border-radius: 8px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #f5c6cb; }
    </style>
</head>
<body onload="inicio()">

    <div id="loginBox" class="login-box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/13/Logo_Telcel.svg/1200px-Logo_Telcel.svg.png" width="100">
        <h3 id="authTitle" style="color:#003566;">Acceso Seguro</h3>
        
        <div id="camera-container"><video id="video" autoplay muted playsinline></video><div class="scan-line"></div></div>

        <div id="form-auth">
            <input id="u" type="email" placeholder="Correo">
            <input id="p" type="password" placeholder="Contraseña">
            <div class="captcha-container">
                <span id="txtCaptcha" style="font-weight:bold; color:#721c24;"></span>
                <input id="iCaptchaAns" type="number" style="width:60px; margin:0;" placeholder="?">
            </div>
            <button class="btn-save" onclick="manejarAuth()">ENTRAR</button>
        </div>

        <button class="btn-save" style="background:#e9ecef; color:#003566; margin-top:15px; border:2px dashed #003566;" onclick="activarFacial('login')">
            <i class="fa-solid fa-face-viewfinder"></i> ACCESO FACIAL
        </button>
        <button style="background:none; border:none; color:#003566; cursor:pointer; text-decoration:underline; margin-top:10px;" onclick="toggleAuth()">Registrar nueva cuenta</button>
    </div>

    <div id="appBox" class="app hidden">
        <div class="top-bar">
            <div class="gps-card">
                <i class="fa-solid fa-location-dot" style="margin-right:10px; color:#ffc300;"></i>
                <div><b style="color:white">TIENDA:</b><br><span id="txtGps">Ubicando...</span></div>
            </div>
            <button class="btn-exit-icon" onclick="cerrarSesion()"><i class="fa-solid fa-power-off"></i></button>
        </div>

        <button class="btn-save btn-payjoy" onclick="window.open('https://www.payjoy.com', '_blank')">
            <i class="fa-solid fa-mobile-screen"></i> ABRIR PAYJOY
        </button>

        <form id="fReg">
            <div class="card">
                <label>Tipo de Venta</label>
                <select id="iTipo"><option>KIT</option>
