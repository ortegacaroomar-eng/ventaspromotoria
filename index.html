<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRIS AI - Red Neural Telcel (Cortana Mode)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { 
            --cyan-cortana: #00bfff; /* El azul distintivo de Cortana */
            --dark-blue: #020210;
            --glass: rgba(0, 191, 255, 0.05);
        }
        
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--dark-blue); color: white; overflow-x: hidden; }
        body::before { content: ""; position: fixed; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #0a0a20 0%, var(--dark-blue) 100%); z-index: -1; }

        .app { max-width: 1100px; margin: auto; padding: 20px; }
        .card { background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(0, 191, 255, 0.15); box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3); }

        /* NUEVO: AVATAR HOLOGRÁFICO ESTILO CORTANA */
        .cortana-halo-container { position: relative; width: 120px; height: 120px; margin: 0 auto; display: flex; align-items: center; justify-content: center; }
        .halo-visualizer { 
            position: absolute; width: 100%; height: 100%; border-radius: 50%;
            background: conic-gradient(from 0deg, transparent, var(--cyan-cortana), transparent 50%);
            animation: rotate-halo 4s linear infinite, pulse-halo 2s ease-in-out infinite;
            filter: blur(2px); opacity: 0.8;
        }
        .halo-inner { position: absolute; width: 90%; height: 90%; border-radius: 50%; background: var(--dark-blue); border: 1px solid rgba(0, 191, 255, 0.2); }
        .halo-data { font-size: 10px; color: var(--cyan-cortana); text-transform: uppercase; letter-spacing: 1px; }

        @keyframes rotate-halo { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse-halo { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(1); opacity: 0.8; } }

        .ia-speech- premium { font-size: 15px; font-style: italic; color: #b3f7ff; text-align: center; margin-top: 15px; min-height: 40px; }

        /* UI ELEMENTS */
        .btn-nav { padding: 10px 20px; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; background: transparent; color: var(--cyan-cortana); border: 1px solid var(--cyan-cortana); display: flex; align-items: center; gap: 8px; font-size: 12px; }
        .btn-nav:hover { background: var(--cyan-cortana); color: black; }

        input, select { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 10px; border: 1px solid #333; background: rgba(0,0,0,0.3); color: white; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--cyan-cortana); box-shadow: 0 0 10px var(--cyan-cortana); }

        .btn-sync { padding: 15px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; background: var(--cyan-cortana); color: black; font-size: 16px; text-transform: uppercase; }
        .btn-sync:active { transform: scale(0.97); }

        .chat-box { height: 200px; overflow-y: auto; background: rgba(0,0,0,0.5); border-radius: 15px; padding: 15px; font-size: 13px; border: 1px solid #222; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; margin-top: 15px; font-size: 13px; }
        th { color: var(--cyan-cortana); text-align:left; padding: 10px; }
        td { background: rgba(255, 255, 255, 0.03); padding: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="loginBox" class="app" style="max-width: 400px; margin-top: 100px;">
    <div class="card" style="text-align: center; border: 2px solid var(--cyan-cortana);">
        <h2 style="color: var(--cyan-cortana);">NÚCLEO NEURAL IRIS</h2>
        <input id="u" type="email" placeholder="Usuario Corporativo">
        <input id="p" type="password" placeholder="Pass-Key">
        <button class="btn-sync" onclick="login()"><i class="fas fa-satellite-dish"></i> Despertar Red</button>
    </div>
</div>

<div id="appBox" class="app hidden">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <span style="color:var(--cyan-cortana); font-size:11px;"><i class="fas fa-shield-halved"></i> Estatus: Sincronizado</span>
        <button class="btn-nav" onclick="logout()"><i class="fas fa-power-off"></i> Cerrar Sesión</button>
    </div>

    <div class="card" style="padding: 30px;">
        <div class="cortana-halo-container">
            <div id="glow" class="halo-visualizer"></div>
            <div class="halo-inner"></div>
            <div class="halo-data">ESCUCHANDO</div>
        </div>
        <div id="iaSpeech" class="ia-speech-premium">"Iniciando flujo de datos regionales..."</div>
    </div>

    <div style="display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px;">
        <form id="fReg" class="card">
            <h3 style="margin-top:0; color:var(--cyan-cortana)"><i class="fas fa-cloud-upload-alt"></i> Nueva Venta</h3>
            <select id="tipo" onchange="iaPayjoyCheck(this.value)">
                <option value="">Selecciona tipo...</option>
                <option>KIT</option><option>CHIP</option><option>PORTABILIDAD</option><option>RENUEVA</option><option value="PAYJOY">PAYJOY</option>
            </select>
            <input id="promotor" placeholder="Tu Nombre Real">
            <input id="tel" type="number" placeholder="Celular del Cliente">
            <input id="tienda" placeholder="ID Sucursal">
            <input id="imei" placeholder="IMEI / ICCID">
            <button type="submit" class="btn-sync">SUBIR REGISTRO</button>
        </form>

        <div class="card">
            <h3><i class="fas fa-comments"></i> Red de Promotores</h3>
            <div id="chatBox" class="chat-box"></div>
            <div style="display:flex; gap:5px; margin-top:10px;">
                <input id="chatMsg" placeholder="Dime algo o un tip de venta..." style="margin:0; font-size:12px;">
                <button class="btn-sync" style="padding:10px 15px; width:auto;" onclick="enviarChat()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <div class="card" style="overflow-x:auto;">
        <h3><i class="fas fa-history"></i> Historial Global</h3>
        <table>
            <thead><tr><th>Promotor</th><th>Sucursal</th><th>Producto</th><th>Estatus</th></tr></thead>
            <tbody id="tablaBody"></tbody>
        </table>
    </div>
</div>

<script>
const firebaseConfig={apiKey:"AIzaSyD4UK_j8UxMwOCtrtXlYftBe_wCLE7psMc",authDomain:"ventastelcel4029.firebaseapp.com",projectId:"ventastelcel4029"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

// --- SISTEMA DE VOZ NEURAL (CORTANA STYLE) ---
function hablar(texto) {
    const s = window.speechSynthesis;
    const u = new SpeechSynthesisUtterance(texto);
    u.lang = 'es-MX'; // Español de México
    // Cortana tiene un tono más profesional, pausado y ligeramente más bajo que el anime
    u.pitch = 0.95; 
    u.rate = 0.9;   // Un poco más lenta para sonar más "IA avanzada"
    s.speak(u);
}

// --- AUTH ---
function login(){ auth.signInWithEmailAndPassword(u.value,p.value); }
function logout(){ auth.signOut(); }

auth.onAuthStateChanged(user => {
    loginBox.classList.toggle("hidden", !!user);
    appBox.classList.toggle("hidden", !user);
    if(user) { 
        // Saludo oficial de Cortana
        hablar("Hola, Jefe. El núcleo Iris está sincronizado. Estoy lista para asistirte con las ventas regionales.");
        iniciarEcosistema();
    }
});

function iniciarEcosistema() {
    // 1. Detección Horaria Inteligente
    const h = new Date().getHours();
    let msg = "";
    if(h < 12) msg = "Buenos días, Jefe. He analizado el flujo matutino; recomiendo enfocar las portabilidades antes de mediodía.";
    else if(h < 19) msg = "Buenas tardes. El sistema está activo y monitoreando las ventas PayJoy de la región.";
    else msg = "Es tarde, pero aún detecto alto interés en KITs. Te sugiero un último esfuerzo.";
    
    iaSpeech.innerText = msg;
    hablar(msg);

    // 2. Escuchar Chat y Ventas
    db.collection("chat").orderBy("ts", "desc").limit(12).onSnapshot(snap => {
        chatBox.innerHTML = snap.docs.map(d => `<div><b style="color:var(--cyan-cortana)">${d.data().user}:</b> ${d.data().msg}</div>`).reverse().join('');
        chatBox.scrollTop = chatBox.scrollHeight;
    });

    db.collection("ventas").orderBy("ts", "desc").limit(10).onSnapshot(snap => {
        tablaBody.innerHTML = snap.docs.map(d => `<tr><td>${d.data().promotor}</td><td>${d.data().tienda}</td><td>${d.data().tipo}</td><td style="color:var(--cyan-cortana)">NUBE</td></tr>`).join('');
    });
}

function iaPayjoyCheck(v){
    if(v==="PAYJOY") {
        const c = "Alerta: Para PayJoy, asegúrate de que el IMEI capturado coincida con la etiqueta de la caja.";
        iaSpeech.innerText = `SOPORTE: ${c}`;
        hablar(c);
    }
}

/* --- REGISTRO --- */
fReg.onsubmit = async e => {
    e.preventDefault();
    const data = {
        uid: auth.currentUser.uid, promotor: promotor.value,
        tipo: tipo.value, cel: tel.value, tienda: tienda.value, 
        imei: imei.value, ts: Date.now()
    };
    await db.collection("ventas").add(data);
    
    db.collection("chat").add({ user: "IRIS", msg: `📢 Registro exitoso: ${promotor.value} subió un ${tipo.value}.`, ts: Date.now() });

    hablar(`Excelente trabajo, ${promotor.value}. He sincronizado tu venta exitosamente.`);
    fReg.reset();
};

function enviarChat(){
    if(!chatMsg.value) return;
    db.collection("chat").add({ user: promotor.value || 'Promotor', msg: chatMsg.value, ts: Date.now() });
    chatMsg.value = "";
}
</script>
</body>
</html>
