<script>
    // ... (Configuración de Firebase igual) ...

    let db, auth, chart;

    // --- CONFIGURACIÓN DEL NÚCLEO DE VOZ CORTANA ---
    function hablar(texto) {
        const synth = window.speechSynthesis;
        synth.cancel(); // Detener cualquier voz previa para no encimarse

        const utterance = new SpeechSynthesisUtterance(texto);
        
        // Buscamos la mejor voz disponible en español
        const voces = synth.getVoices();
        // Priorizamos voces femeninas y de calidad (como 'Google español' o 'Microsoft Sabina')
        const vozElegida = voces.find(v => v.lang.includes('es') && v.name.includes('México')) || 
                           voces.find(v => v.lang.includes('es')) || 
                           voces[0];

        utterance.voice = vozElegida;
        
        // Ajustes para sonar como Cortana:
        // Un poco más agudo (1.2) y una velocidad calmada pero eficiente (0.9 - 1.0)
        utterance.pitch = 1.2; 
        utterance.rate = 0.95; 
        utterance.volume = 1;

        // Efecto visual en el Orbe mientras habla
        const orbe = document.querySelector('.cortana-orb');
        utterance.onstart = () => {
            orbe.style.boxShadow = "0 0 50px #28b8ff, inset 0 0 30px #28b8ff";
            orbe.style.animationDuration = "0.5s"; // Vibra más rápido al hablar
        };
        utterance.onend = () => {
            orbe.style.boxShadow = "0 0 30px rgba(40, 184, 255, 0.4)";
            orbe.style.animationDuration = "4s"; // Vuelve a respirar normal
        };

        synth.speak(utterance);
    }

    function inicio() {
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        db = firebase.database(); auth = firebase.auth();
        
        // Necesario para cargar voces en algunos navegadores
        window.speechSynthesis.onvoiceschanged = () => {};

        auth.onAuthStateChanged(user => {
            if(user) {
                appBox.classList.remove("hidden");
                loginBox.classList.add("hidden");
                
                // Cortana te da la bienvenida
                setTimeout(() => {
                    hablar("Sistemas en línea. Hola de nuevo, Jefe. Estoy lista para procesar tus ventas de hoy.");
                }, 1000);
                
                iniciarSincronizacion();
            } else {
                loginBox.classList.remove("hidden");
                appBox.classList.add("hidden");
            }
        });
    }

    // --- ACTUALIZACIÓN EN EL BOTÓN DE GUARDAR ---
    fReg.onsubmit = e => {
        e.preventDefault();
        const v = {
            id: Date.now(), tipo: iTipo.value, tel: iTel.value, 
            icc: iIcc.value, promotor: iProm.value, fecha: iFec.value
        };

        // Guardado Local
        let l = JSON.parse(localStorage.getItem("ventas_save") || "[]");
        l.unshift(v); 
        localStorage.setItem("ventas_save", JSON.stringify(l));

        // Subida a Firebase
        db.ref('ventas_globales').push(v);

        // RESPUESTA DE VOZ PERSONALIZADA
        const primerNombre = iProm.value.split(' ')[0];
        const frases = [
            `Excelente movimiento, ${primerNombre}. Venta de ${iTipo.value} registrada.`,
            `Entendido. Sincronizando el número ${iTel.value.split('').join(' ')} en la base de datos.`,
            `Buen trabajo. He guardado la información localmente y en la nube.`
        ];
        const respuesta = frases[Math.floor(Math.random() * frases.length)];
        hablar(respuesta);

        fReg.reset(); 
        iFec.value = new Date().toLocaleDateString('es-MX');
        renderHistorialLocal();
    }

    // ... (El resto de las funciones: entrar, salir, chat, gráfico se mantienen igual) ...
</script>
