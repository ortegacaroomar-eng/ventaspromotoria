<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Auditoría Elite - Telcel</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --gold: #ffd60a;
            --blue-dark: #000814;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #001d3d, var(--blue-dark));
            color: white;
            min-height: 100vh;
        }

        .app { max-width: 1200px; margin: auto; padding: 20px; }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }

        label { color: var(--gold); font-size: 0.85em; font-weight: bold; margin-bottom: 5px; display: block; }

        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: white;
            margin-bottom: 12px;
            box-sizing: border-box;
        }

        button {
            background: linear-gradient(135deg, var(--gold), #ffc300);
            color: #000;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
        }

        .table-container { 
            background: white; 
            border-radius: 15px; 
            overflow: hidden; 
            margin-top: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        table { width: 100%; border-collapse: collapse; color: #222; font-size: 0.78em; }
        th { background: #f1f1f1; padding: 10px; text-align: left; border-bottom: 2px solid #ddd; }
        td { padding: 8px 10px; border-bottom: 1px solid #eee; }

        .hidden { display: none; }
    </style>
</head>
<body onload="inicio()">

<div class="app">
    <div class="grid">
        <div class="card">
            <h2 style="color:var(--gold); margin:0 0 15px 0;">📱 Nueva Entrada</h2>
            
            <label>Fecha de Operación</label>
            <input type="date" id="fechaIn">

            <label>Compañía</label>
            <select id="compIn" onchange="alternarCampos()">
                <option value="TELCEL">TELCEL</option>
                <option value="ATT">AT&T</option>
                <option value="BAIT">BAIT</option>
            </select>

            <input id="numIn" type="tel" placeholder="Número Telefónico">
            <input id="marcaIn" placeholder="Marca">
            <input id="modeloIn" placeholder="Modelo">

            <div id="boxTelcel">
                <label>Tipo Telcel</label>
                <select id="tipoTelcel">
                    <option value="PORTA">PORTA</option>
                    <option value="RENUEVATE">RENUEVATE</option>
                    <option value="CHIP">CHIP</option>
                </select>
                <input id="imeiIn" placeholder="IMEI (15 dígitos)">
                <input id="iccidIn" placeholder="ICCID">
            </div>

            <div id="boxOtras" class="hidden">
                <label>¿Se incluyó Chip Telcel?</label>
                <select id="chipTelcelPregunta">
                    <option value="NO">SIN CHIP TELCEL</option>
                    <option value="SI">CON CHIP TELCEL</option>
                </select>
            </div>

            <button onclick="guardar()">💾 Registrar Venta</button>
        </div>

        <div class="card">
            <h2 style="color:var(--gold); margin:0 0 10px 0;">📊 Detalle Visual</h2>
            <canvas id="chartDetallado"></canvas>
        </div>
    </div>

    <div class="card">
        <h3 style="color:var(--gold); margin-bottom:10px;">📋 Historial Detallado Telcel</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Tipo</th>
                        <th>Número</th>
                        <th>Marca</th>
                        <th>Modelo</th>
                        <th>IMEI</th>
                        <th>ICCID</th>
                    </tr>
                </thead>
                <tbody id="tablaTelcel"></tbody>
            </table>
        </div>
    </div>

    <div class="card">
        <h3 style="color:var(--gold); margin-bottom:10px;">📋 Historial Competencia (AT&T / BAIT)</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Comp.</th>
                        <th>Chip Tel.</th>
                        <th>Número</th>
                        <th>Marca</th>
                        <th>Modelo</th>
                    </tr>
                </thead>
                <tbody id="tablaOtras"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let chartObj;

    function inicio() {
        // Establecer fecha de hoy
        const hoy = new Date().toISOString().split('T')[0];
        document.getElementById('fechaIn').value = hoy;
        actualizarTodo();
    }

    function alternarCampos() {
        const c = document.getElementById('compIn').value;
        document.getElementById('boxTelcel').classList.toggle('hidden', c !== 'TELCEL');
        document.getElementById('boxOtras').classList.toggle('hidden', c === 'TELCEL');
    }

    function formatFecha(f) {
        if(!f) return "--/--/----";
        const [y, m, d] = f.split('-');
        return `${d}/${m}/${y}`;
    }

    function guardar() {
        const comp = document.getElementById('compIn').value;
        const num = document.getElementById('numIn').value;
        const fRaw = document.getElementById('fechaIn').value;
        const marca = document.getElementById('marcaIn').value || "N/A";
        const modelo = document.getElementById('modeloIn').value || "N/A";

        if(!num) return alert("Favor de ingresar el número.");

        const item = {
            fecha: formatFecha(fRaw),
            num, marca, modelo, comp,
            imei: document.getElementById('imeiIn').value || "S/N",
            iccid: document.getElementById('iccidIn').value || "S/N",
            tipo: comp === 'TELCEL' ? tipoTelcel.value : chipTelcelPregunta.value
        };

        // ALMACENAMIENTO LOCAL SEPARADO
        if(comp === 'TELCEL') {
            let db = JSON.parse(localStorage.getItem('historial_telcel') || '[]');
            db.unshift(item);
            localStorage.setItem('historial_telcel', JSON.stringify(db));
        } else {
            let db = JSON.parse(localStorage.getItem('historial_competencia') || '[]');
            db.unshift(item);
            localStorage.setItem('historial_competencia', JSON.stringify(db));
        }

        // Limpiar formulario
        document.querySelectorAll('input').forEach(i => { if(i.id !== 'fechaIn') i.value = ""; });
        actualizarTodo();
    }

    function actualizarTodo() {
        const dbTelcel = JSON.parse(localStorage.getItem('historial_telcel') || '[]');
        const dbOtras = JSON.parse(localStorage.getItem('historial_competencia') || '[]');

        // Llenar Historial Telcel
        document.getElementById('tablaTelcel').innerHTML = dbTelcel.map(i => `
            <tr>
                <td>${i.fecha}</td>
                <td><strong>${i.tipo}</strong></td>
                <td>${i.num}</td>
                <td>${i.marca}</td>
                <td>${i.modelo}</td>
                <td>${i.imei}</td>
                <td>${i.iccid}</td>
            </tr>
        `).join('');

        // Llenar Historial Otras
        document.getElementById('tablaOtras').innerHTML = dbOtras.map(i => `
            <tr>
                <td>${i.fecha}</td>
                <td>${i.comp}</td>
                <td><span style="color:${i.tipo==='SI'?'green':'red'}; font-weight:bold">${i.tipo}</span></td>
                <td>${i.num}</td>
                <td>${i.marca}</td>
                <td>${i.modelo}</td>
            </tr>
        `).join('');

        renderGrafica(dbTelcel, dbOtras);
    }

    function renderGrafica(tel, otr) {
        const ctx = document.getElementById('chartDetallado').getContext('2d');
        if(chartObj) chartObj.destroy();

        // Agrupamos todas para la gráfica de marcas
        const todas = [...tel, ...otr];
        const modelos = [...new Set(todas.map(d => d.modelo))].slice(0, 7);

        chartObj = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: modelos.length ? modelos : ['Sin datos'],
                datasets: [
                    { label: 'Telcel', data: modelos.map(m => tel.filter(x => x.modelo === m).length), backgroundColor: '#ffd60a' },
                    { label: 'Competencia', data: modelos.map(m => otr.filter(x => x.modelo === m).length), backgroundColor: '#00b4d8' }
                ]
            },
            options: {
                responsive: true,
                plugins: { legend: { labels: { color: 'white' } } },
                scales: {
                    x: { stacked: true, ticks: { color: 'white' } },
                    y: { stacked: true, ticks: { color: 'white' } }
                }
            }
        });
    }
</script>
</body>
</html>
