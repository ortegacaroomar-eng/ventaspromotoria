<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ventas PRO Dinámico</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
margin:0;
font-family:'Segoe UI';
background:linear-gradient(135deg,#001d3d,#003566,#000814);
color:white;
}

.app { max-width:480px; margin:auto; padding:20px; }

.card {
background:rgba(255,255,255,.08);
backdrop-filter:blur(12px);
border-radius:16px;
padding:15px;
margin-bottom:15px;
}

.tabs {
display:flex;
gap:10px;
margin-bottom:15px;
}

.tab {
flex:1;
padding:12px;
border-radius:10px;
background:rgba(255,255,255,.1);
text-align:center;
cursor:pointer;
}

.tab.active {
background:#ffc300;
color:#003566;
font-weight:bold;
}

select,input,button {
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:8px;
}

button {
background:#ffc300;
color:#003566;
font-weight:bold;
}

.fade { animation:fade .2s ease; }

@keyframes fade {
from {opacity:0; transform:translateY(10px);}
to {opacity:1;}
}
</style>
</head>

<body>

<div class="app">

<div class="tabs">
<div class="tab active" onclick="setComp('TELCEL',this)">TELCEL</div>
<div class="tab" onclick="setComp('ATT',this)">ATT</div>
<div class="tab" onclick="setComp('BAIT',this)">BAIT</div>
</div>

<div class="card">

<select id="tipo" onchange="renderForm()">
<option value="">Selecciona tipo</option>
<option value="PORTA">PORTA</option>
<option value="RENUEVATE">RENUEVATE</option>
<option value="CHIP0">CHIP0</option>
<option value="AK">AK</option>
</select>

<div id="form"></div>

</div>

<button onclick="guardar()">Guardar</button>

<div class="card">
<canvas id="grafica"></canvas>
</div>

<div id="lista"></div>

</div>

<script>

let comp="TELCEL";
let chart;

function setComp(c,el){
comp=c;
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
el.classList.add("active");
tipo.value="";
form.innerHTML="";
}

function renderForm(){

if(comp==="TELCEL"){

if(tipo.value==="PORTA"){
form.innerHTML=`
<div class="fade">
<input id="compa" placeholder="Compañía anterior">
<input id="numero" placeholder="Número">
<input id="icc" placeholder="ICCD">
<input id="fpro" placeholder="Fecha proceso">
<input id="fent" placeholder="Fecha entrega">
<input id="recarga" placeholder="Recarga">
</div>`;
}

if(tipo.value==="RENUEVATE"){
form.innerHTML=`
<div class="fade">
<input id="numero" placeholder="Número a renovar">
<input id="imei" placeholder="IMEI">
<input id="marca" placeholder="Marca">
<input id="modelo" placeholder="Modelo">
<input id="icc" placeholder="ICCD">
<input id="recarga" placeholder="Recarga">
</div>`;
}

if(tipo.value==="CHIP0"){
form.innerHTML=`
<div class="fade">
<input id="numero" placeholder="Número">
<input id="icc" placeholder="ICCD">
<input id="recarga" placeholder="Monto recarga">
</div>`;
}

if(tipo.value==="AK"){
form.innerHTML=`
<div class="fade">
<input id="numero" placeholder="Número">
<input id="marca" placeholder="Marca">
<input id="modelo" placeholder="Modelo">
<input id="imei" placeholder="IMEI">
<input id="icc" placeholder="ICCD">
<input id="recarga" placeholder="Monto recarga">
</div>`;
}

}

if(comp==="ATT" || comp==="BAIT"){
form.innerHTML=`
<div class="fade">
<input id="numero" placeholder="Número">
<input id="icc" placeholder="ICCD">
</div>`;
}

}

function guardar(){

let data={
comp,
tipo: tipo.value,

numero:document.getElementById("numero")?.value||"",
icc:document.getElementById("icc")?.value||"",
marca:document.getElementById("marca")?.value||"",
modelo:document.getElementById("modelo")?.value||"",
imei:document.getElementById("imei")?.value||"",
recarga:document.getElementById("recarga")?.value||"",
compa:document.getElementById("compa")?.value||"",
fpro:document.getElementById("fpro")?.value||"",
fent:document.getElementById("fent")?.value||""
};

let all=JSON.parse(localStorage.getItem("ventas_all")||"[]");
all.unshift(data);
localStorage.setItem("ventas_all",JSON.stringify(all));

cargar();
form.innerHTML="";
tipo.value="";
}

function cargar(){

let all=JSON.parse(localStorage.getItem("ventas_all")||"[]");

lista.innerHTML=all.map(v=>`
<div class="card">
<b>${v.comp} - ${v.tipo||"GENERAL"}</b><br>
📱 ${v.numero||"-"}<br>
ICCD: ${v.icc||"-"}<br>
${v.marca?`Marca: ${v.marca}<br>`:""}
${v.modelo?`Modelo: ${v.modelo}<br>`:""}
${v.imei?`IMEI: ${v.imei}<br>`:""}
${v.recarga?`💰 ${v.recarga}<br>`:""}
</div>
`).join("");

graficaGen(all);
}

function graficaGen(all){

let data={TELCEL:0,ATT:0,BAIT:0};

all.forEach(v=>{
data[v.comp]++;
});

if(chart)chart.destroy();

chart=new Chart(grafica,{
type:"bar",
data:{
labels:["TELCEL","ATT","BAIT"],
datasets:[{data:[data.TELCEL,data.ATT,data.BAIT]}]
}
});
}

cargar();

</script>

</body>
</html>
