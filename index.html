<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Ventas PRO IA - Premium</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{margin:0;font-family:'Segoe UI';background:#050505;color:white}
.app{max-width:1100px;margin:auto;padding:20px}
.card{background:rgba(255,255,255,.05);padding:20px;border-radius:15px;margin-bottom:15px}
input,select{width:100%;padding:10px;margin-bottom:10px;border-radius:8px;border:none;background:#111;color:white}
.btn{padding:10px;border:none;border-radius:10px;cursor:pointer}
.btn-primary{background:#00f2ff;color:#000}
.btn-secondary{background:#7000ff;color:#fff}
.btn-accent{background:#ff007a;color:#fff}
.hidden{display:none}
#reader{border:2px solid #00f2ff;border-radius:10px}
</style>
</head>
<body>

<div id="loginBox" class="card">
<h2>Acceso</h2>
<input id="u" type="email" placeholder="Correo">
<input id="p" type="password" placeholder="Password">
<button class="btn btn-primary" onclick="login()">Entrar</button>
<button class="btn btn-secondary" onclick="registrar()">Registro</button>
</div>

<div id="appBox" class="app hidden">

<div class="card">
📍 <span id="gpsTxt">GPS</span>
<br><br>
<button class="btn btn-secondary" onclick="sumarPayjoy()">PayJoy</button>
<button class="btn btn-primary" onclick="sumarRegistro()">Vincular</button>
<button class="btn btn-accent" onclick="logout()">Salir</button>
</div>

<div class="card">
Total: <span id="total">0</span><br>
PayJoy: <span id="totalPayjoy">0</span><br>
Reg: <span id="totalRegistro">0</span><br>
IA: <span id="prediccion">...</span>
</div>

<div class="card">
<canvas id="grafica"></canvas>
</div>

<!-- 🔥 SCANNER -->
<div class="card">
<h3>📷 Scanner Inteligente</h3>
<div id="reader"></div>
<button class="btn btn-secondary" onclick="iniciarScanner()">Escanear</button>
<button class="btn btn-accent" onclick="detenerScanner()">Detener</button>
</div>

<form id="fReg" class="card">
<select id="tipo">
<option>KIT</option>
<option>CHIP</option>
<option>PORTABILIDAD</option>
<option>RENUEVA</option>
</select>

<input id="tel" placeholder="Tel">
<input id="icc" placeholder="ICCID">
<input id="imei" placeholder="IMEI">
<input id="promotor" placeholder="Promotor">
<input id="fecha" type="datetime-local">

<button class="btn btn-primary">Guardar</button>
</form>

<table>
<thead><tr><th>Tel</th><th>Tipo</th><th>ICC</th><th>Fecha</th></tr></thead>
<tbody id="tabla"></tbody>
</table>

</div>

<script>
const firebaseConfig={apiKey:"AIzaSyD...",authDomain:"ventastelcel4029.firebaseapp.com",projectId:"ventastelcel4029"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

let scanner;

/* LOGIN */
function login(){auth.signInWithEmailAndPassword(u.value,p.value)}
function registrar(){auth.createUserWithEmailAndPassword(u.value,p.value)}
function logout(){auth.signOut()}

auth.onAuthStateChanged(user=>{
loginBox.classList.toggle("hidden",!!user);
appBox.classList.toggle("hidden",!user);
if(user){render();gps();}
});

/* GPS */
function gps(){
navigator.geolocation.getCurrentPosition(p=>gpsTxt.innerText="Activo");
}

/* SCANNER */
function iniciarScanner(){
scanner=new Html5Qrcode("reader");
scanner.start({facingMode:"environment"},{fps:10,qrbox:250},
(code)=>procesar(code));
}

function detenerScanner(){
if(scanner) scanner.stop();
}

function procesar(code){
let limpio=code.replace(/\D/g,'');

if(limpio.length>=19){
icc.value=limpio;
alerta("ICCID detectado");
}else{
imei.value=limpio;
alerta("IMEI detectado");
}

if(navigator.vibrate) navigator.vibrate(100);
}

/* ALERTA */
function alerta(msg){
let div=document.createElement("div");
div.innerText=msg;
div.style.position="fixed";
div.style.bottom="20px";
div.style.background="#00f2ff";
div.style.color="#000";
div.style.padding="10px";
document.body.appendChild(div);
setTimeout(()=>div.remove(),1500);
}

/* GUARDAR */
fReg.onsubmit=async e=>{
e.preventDefault();
await db.collection("ventas").add({
uid:auth.currentUser.uid,
tipo:tipo.value,
cel:tel.value,
icc:icc.value,
imei:imei.value,
fecha:fecha.value || new Date().toISOString()
});
fReg.reset();
render();
};

/* RENDER */
async function render(){
let snap=await db.collection("ventas").get();
tabla.innerHTML=snap.docs.map(d=>{
let v=d.data();
return `<tr>
<td>${v.cel}</td>
<td>${v.tipo}</td>
<td>${v.icc}</td>
<td>${new Date(v.fecha).toLocaleString()}</td>
</tr>`;
}).join('');
total.innerText=snap.size;
cargarContadores();
}

/* CONTADORES */
function sumarPayjoy(){localStorage.payjoy=(+localStorage.payjoy||0)+1;render();}
function sumarRegistro(){localStorage.registro=(+localStorage.registro||0)+1;render();}
function cargarContadores(){
totalPayjoy.innerText=localStorage.payjoy||0;
totalRegistro.innerText=localStorage.registro||0;
}
</script>

</body>
</html>
