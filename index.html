<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Ventas Telcel Pro</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <style>
        body{ margin:0; font-family:Arial, sans-serif; background:linear-gradient(135deg,#0033A0,#001f5c); display:flex; justify-content:center; align-items:center; height:100vh; color:white; }
        .card{ background:white; color:#333; padding:25px; border-radius:15px; width:350px; box-shadow:0 10px 30px rgba(0,0,0,.3); }
        h2{ text-align:center; margin-bottom:20px; color:#0033A0; }
        input, button{ width:100%; padding:10px; margin:8px 0; border-radius:8px; border:1px solid #ccc; box-sizing: border-box; }
        button{ background:#0033A0; color:white; border:none; font-weight:bold; cursor:pointer; }
        button:hover{ background:#001f5c; }
        .link{ text-align:center; margin-top:10px; cursor:pointer; color:#0033A0; font-size:14px; }
        .hidden{ display:none; }
        .header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
        .logout{ background:red; color:white; padding:5px 10px; border-radius:6px; cursor:pointer; font-size:12px; border:none; width: auto; }
        #historialLocales{ margin-top: 15px; font-size: 11px; color: #666; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>

    <div class="card" id="loginCard">
        <h2>Login Promotor</h2>
        <input type="email" id="email" placeholder="Correo">
        <input type="password" id="password" placeholder="Contraseña">
        <button onclick="login()">Entrar</button>
        <div class="link" onclick="toggleMode()">¿No tienes cuenta? Regístrate</div>
    </div>

    <div class="card hidden" id="appCard">
        <div class="header">
            <h3>Ventas</h3>
            <button class="logout" onclick="logout()">Salir</button>
        </div>
        <input type="text" id="cliente" placeholder="Nombre Cliente">
        <input type="text" id="producto" placeholder="Producto">
        <input type="number" id="monto" placeholder="Monto">
        <button onclick="guardarVenta()">Guardar Venta</button>
        
        <div id="historialLocales">
            <strong>Último registro local:</strong>
            <div id="statusLocal">Ninguno</div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN DE TU PROYECTO
        const firebaseConfig = {
            apiKey: "AQUÍ_PEGA_TU_NUEVA_CLAVE_API_1", //
            authDomain: "ventastelcel4029.firebaseapp.com",
            databaseURL: "https://ventastelcel4029-default-rtdb.firebaseio.com",
            projectId: "ventastelcel4029",
            storageBucket: "ventastelcel4029.appspot.com",
            messagingSenderId: "480758010888",
            appId: "1:480758010888:web:e948c54f051670989f660d"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();
        const auth = firebase.auth();

        let modoRegistro = false;
        let currentUID = null;

        // Formato DD/MM/YYYY
        function formatFecha() {
            const hoy = new Date();
            const d = String(hoy.getDate()).padStart(2, '0');
            const m = String(hoy.getMonth() + 1).padStart(2, '0');
            return d + "/" + m + "/" + hoy.getFullYear();
        }

        // Manejo de Sesión y Local Storage
        auth.onAuthStateChanged(user => {
            if(user){
                currentUID = user.uid;
                loginCard.classList.add("hidden");
                appCard.classList.remove("hidden");
                localStorage.setItem("user_email", user.email);
            } else {
                loginCard.classList.remove("hidden");
                appCard.classList.add("hidden");
            }
        });

        function login(){
            const email = document.getElementById("email").value;
            const pass = document.getElementById("password").value;
            if(!email || !pass) return alert("Llena los campos");

            if(modoRegistro){
                auth.createUserWithEmailAndPassword(email, pass)
                .then(()=> alert("Registrado"))
                .catch(e => alert(e.message));
            } else {
                auth.signInWithEmailAndPassword(email, pass)
                .catch(e => alert("Error: Verifica la Clave API en el código"));
            }
        }

        // GUARDAR VENTA (LOCAL Y NUBE)
        function guardarVenta(){
            const cliente = document.getElementById("cliente").value;
            const producto = document.getElementById("producto").value;
            const monto = document.getElementById("monto").value;
            const fecha = formatFecha();

            if(!cliente || !producto || !monto) return alert("Faltan datos");

            const datosVenta = { cliente, producto, monto, fecha };

            // Persistencia Local
            localStorage.setItem("ultima_venta", JSON.stringify(datosVenta));
            document.getElementById("statusLocal").innerText = cliente + " - " + fecha;

            // Guardar en Firebase
            db.ref("ventas/" + currentUID).push(datosVenta)
            .then(() => {
                alert("Venta guardada en el sistema (" + fecha + ")");
                limpiar();
            })
            .catch(e => alert("Error Nube: " + e.message));
        }

        function toggleMode(){
            modoRegistro = !modoRegistro;
            document.querySelector(".link").innerText = modoRegistro ? "Ya tengo cuenta" : "Crear cuenta";
        }

        function logout(){ auth.signOut(); localStorage.removeItem("user_email"); }
        function limpiar(){
            document.getElementById("cliente").value="";
            document.getElementById("producto").value="";
            document.getElementById("monto").value="";
        }
    </script>
</body>
</html>
