<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRIS AI - Neural Omni-System V15</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root { --telcel-blue: #002f87; --iris-cyan: #28b8ff; --iris-green: #00ff88; --iris-purple: #a855f7; --iris-red: #ff4b2b; --bg-dark: #010108; }
        body { margin:0; font-family:'Segoe UI', sans-serif; background: var(--bg-dark); color: white; overflow-x: hidden; }
        .app { max-width:480px; margin:auto; padding:15px; position: relative; }
        
        .btn-exit { position: absolute; top: 10px; right: 10px; background: rgba(255,0,0,0.1); border: 1px solid red; color: white; padding: 5px 10px; border-radius: 10px; font-size: 11px; z-index: 100; }

        /* MÓDULO VISIÓN IA (EL OJO DE IRIS) */
        .vision-container { position: relative; width: 100%; height: 180px; background: #000; border-radius: 20px; overflow: hidden; border: 2px solid var(--iris-cyan); margin-bottom: 15px; box-shadow: 0 0 20px rgba(40,184,255,0.2); }
        #videoFeed { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; filter: grayscale(100%) contrast(150%); }
        .scan-line { position: absolute; top: 0; width: 100%; height: 2px; background: var(--iris-cyan); box-shadow: 0 0 15px var(--iris-cyan); animation: scan 3s infinite linear; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        
        /* ORBE DE PROCESAMIENTO NEURAL */
        .iris-brain { width: 50px; height: 50px; position: absolute; top: 10px; right: 10px; border-radius: 50%; background: radial-gradient(circle, var(--iris-purple), transparent); box-shadow: 0 0 20px var(--iris-purple); animation: pulse 2s infinite; z-index: 10; transition: 0.5s; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }

        /* ESTADOS EMOCIONALES/OPERATIVOS */
        .mood-stress { box-shadow: 0 0 40px var(--iris-red) !important; background: radial-gradient(circle, var(--iris-red), transparent) !important; }
        .mood-happy { box-shadow: 0 0 40px var(--iris-green) !important; background: radial-gradient(circle, var(--iris-green), transparent) !important; }
        .mood-telcel { box-shadow: 0 0 40px var(--telcel-blue) !important; background: radial-gradient(circle, var(--telcel-blue), transparent) !important; }

        .card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 18px; padding: 15px; margin-bottom: 10px; backdrop-filter: blur(10px); }
        .label-mini { font-size: 10px; color: var(--iris-cyan); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; display: block; }
        
        input, select { width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border: 1px solid #333; background: #000; color:white; box-sizing: border-box; font-size: 13px; }
        .btn-ai { background: linear-gradient(45deg, var(--iris-purple), var(--iris-cyan)); color: white; border: none; padding: 14px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 12px; transition: 0.3s; }
        .btn-ai:active { transform: scale(0.98); }

        /* CHAT LIVE */
        .chat-box { height: 100px; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 10px; padding: 10px; font-size: 12px; margin-bottom: 8px; border: 1px solid #222; }
        .msg-chat { border-bottom: 1px solid #ffffff05; padding: 3px 0; }
        .msg-chat b { color: var(--iris-cyan); font-size: 10px; }

        .hidden { display: none !important; }
    </style>
</head>
<body onload="inicio()">

    <div id="loginBox" class="app" style="margin-top:100px;">
        <div class="card" style="text-align:center;">
            <div class="iris-brain" style="position:relative; margin: 0 auto 20px;"></div>
            <h2 style="color:var(--iris-cyan); letter-spacing: 3px;">IRIS NEURAL</h2>
            <input id="u" placeholder="Usuario Corporativo">
            <input id="p" type="password" placeholder="Contraseña">
            <button class="btn-ai" onclick="entrar()">ACTIVAR NODO</button>
        </div>
    </div>

    <div id="appBox" class="app hidden">
        <button class="btn-exit" onclick="salir()">SALIR</button>

        <div class="vision-container">
            <video id="videoFeed" autoplay playsinline muted></video>
            <div class="scan-line"></div>
            <div class="iris-brain" id="brainStatus"></div>
            <div style="position:absolute; bottom:10px; left:10px; font-size:10px; background:rgba(0,0,0,0.7); padding:5px; border-radius:5px;">
                <i class="fas fa-eye"></i> IA VISION: <span id="iaMode">ANALIZANDO AMBIENTE...</span>
            </div>
        </div>

        <div class="card" style="text-align:center;">
            <div id="aiStatus" style="font-size: 13px; color: var(--iris-cyan); min-height: 40px; font-style: italic;">"Conexión neural establecida. Analizando el entorno operativo, Omar."</div>
            <button class="btn-ai" onclick="hablarClienteIA()" style="background:var(--telcel-blue); margin-top:10px;">
                <i class="fas fa-comment-dots"></i> IA: CONVENCER AL CLIENTE (TELCEL.COM)
            </button>
        </div>

        <div style="display:flex; gap:8px; margin-bottom:10px;">
            <button onclick="analizarAnimo()" class="btn-ai" style="background:#fff; color:#000; padding:10px; flex:1;"><i class="fas fa-microphone"></i> ÁNIMO</button>
            <button onmousedown="startPTT()" onmouseup="stopPTT()" ontouchstart="startPTT()" ontouchend="stopPTT()" class="btn-ai" style="background:var(--iris-orange); padding:10px; flex:1;"><i class="fas fa-walkie-talkie"></i> PTT</button>
        </div>

        <div class="card"><canvas id="cProds" height="130"></canvas></div>
        <div class="card">
            <div id="chatDisplay" class="chat-box"></div>
            <div style="display:flex; gap:5px;">
                <input id="chatInput" placeholder="Chat regional..." style="margin:0; font-size:12px;">
                <button onclick="enviarChat()" style="background:var(--iris-cyan); border:none; color:white; padding:12px; border-radius:10px;"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>

        <form id="fVenta" class="card">
            <span class="label-mini">Registro Operativo</span>
            <select id="iTipo">
                <option value="CHIP">CHIP</option><option value="KIT">KIT</option>
                <option value="PORTA">PORTABILIDAD</option><option value="RENUEVATE">RENUÉVATE</option>
            </select>
            <input id="iTel" placeholder="Número Celular" maxlength="10">
            <input id="iSuc" placeholder="Sucursal">
            <input id="iProm" placeholder="Tu Nombre">
            <button type="submit" class="btn-ai" style="background:var(--iris-green); color:#000;">GUARDAR VENTA LIVE</button>
        </form>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD4UK_j8UxMwOCtrtXlYftBe_wCLE7psMc", 
        authDomain: "ventastelcel4029.firebaseapp.com",
        databaseURL: "https://ventastelcel4029-default-rtdb.firebaseio.com",
        projectId: "ventastelcel4029"
    };

    let db, auth, chart, video;

    async function inicio() {
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        db = firebase.database(); auth = firebase.auth();
        video = document.getElementById('videoFeed');

        auth.onAuthStateChanged(user => {
            if(user) { 
                appBox.classList.remove("hidden"); loginBox.classList.add("hidden"); 
                activarSistemasNeurales();
            } else { 
                loginBox.classList.remove("hidden"); appBox.classList.add("hidden"); 
            }
        });
    }

    // --- ACTIVACIÓN MULTIMODAL (CÁMARA Y VOZ) ---
    async function activarSistemasNeurales() {
        // 1. Activar Cámara (Visión)
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
        } catch (err) { console.error("Error de cámara:", err); }

        // 2. Vincular Firebase Live
        db.ref('ventas_v15').on('value', snap => {
            let p = { CHIP:0, KIT:0, PORTA:0, RENUEVATE:0 };
            Object.values(snap.val() || {}).forEach(v => { if(p[v.tipo] !== undefined) p[v.tipo]++; });
            actualizarGrafica(p);
        });

        db.ref('chat_v15').limitToLast(12).on('value', snap => {
            let html = ""; snap.forEach(m => { html += `<div class="msg-chat"><b>${m.val().user}:</b> ${m.val().msg}</div>`; });
            chatDisplay.innerHTML = html; chatDisplay.scrollTop = chatDisplay.scrollHeight;
        });

        // 3. IA Generativa: Aprender cada 15s
        setInterval(aprendizajeGenerativo, 15000);
    }

    function hablar(t, pitch=1.1) {
        const u = new SpeechSynthesisUtterance(t);
        u.lang = 'es-MX'; u.pitch = pitch; window.speechSynthesis.speak(u);
        aiStatus.innerText = `"${t}"`;
    }

    // --- IA GENERATIVA: APRENDIZAJE Y CONSEJOS (TELCEL.COM) ---
    function aprendizajeGenerativo() {
        const promotor = document.getElementById('iProm').value || "Omar";
        brainStatus.className = "iris-brain mood-telcel";
        
        const consejos = [
            `Analizando Telcel.com... ${promotor}, la Portabilidad tiene doble de GB hoy. Enfócate en eso.`,
            `Detecto tráfico en sucursal. Ofrece Chips AK rápido para agilizar.`,
            `Capacitación IA: Al registrar KIT, Iris verifica el IMEI automáticamente en la red.`,
            `${promotor}, has mejorado en Renuévate. Sigue así para dominar el ranking.`
        ];
        const random = consejos[Math.floor(Math.random() * consejos.length)];
        hablar(random, 1.3);
        setTimeout(() => brainStatus.className = "iris-brain", 3000);
    }

    function hablarClienteIA() {
        hablar("Hola, soy Iris. Telcel es la mejor opción porque tenemos la red 5G más grande y rápida de México. Cámbiate hoy y duplica tus Gigas.", 1);
        mainOrb.className = "cortana-orb mood-happy";
    }

    // --- IA DE SENTIMIENTOS (ÁNIMO/VOZ) ---
    function analizarAnimo() {
        const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
        const rec = new Rec(); rec.lang = 'es-MX';
        rec.onstart = () => hablar("Sistemas neuronales escuchando...", 1.2);
        rec.onresult = (e) => {
            const t = e.results[0][0].transcript.toLowerCase();
            if(t.includes("mal") || t.includes("cansado")) {
                actualizarIris("mood-stress", "El cansancio es temporal, la gloria es eterna. ¡Ánimo con esa Porta!", "var(--iris-red)");
            } else {
                actualizarIris("mood-happy", "¡Energía excelente! Estás a una venta de dominar el día.", "var(--iris-green)");
            }
        };
        rec.start();
    }

    function actualizarIris(clase, msj, color) {
        brainStatus.className = "iris-brain " + clase;
        hablar(msj);
        setTimeout(() => brainStatus.className = "iris-brain", 4000);
    }

    // --- OTRAS FUNCIONES (SIMPLIFICADAS) ---
    function startPTT() { brainStatus.className = "iris-brain mood-stress"; }
    function stopPTT() { brainStatus.className = "iris-brain"; }
    function enviarChat() { if(chatInput.value) { db.ref('chat_v15').push({ user: iProm.value || "Anon", msg: chatInput.value }); chatInput.value = ""; } }
    function actualizarGrafica(p) { /* Lógica de Chart.js intacta */ }
    
    fVenta.onsubmit = e => {
        e.preventDefault();
        db.ref('ventas_v15').push({ tipo: iTipo.value, tel: iTel.value, tienda: iSuc.value, promotor: iProm.value, ts: Date.now() });
        hablar("Venta sincronizada en tiempo real. ¡Excelente trabajo!");
        fVenta.reset();
    }

    function entrar() { auth.signInWithEmailAndPassword(u.value, p.value).catch(err => alert(err.message)); }
    function salir() { auth.signOut(); }
</script>
</body>
</html>
