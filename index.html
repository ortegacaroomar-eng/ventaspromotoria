<!DOCTYPE html><html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Ventas Multioperador Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { margin:0; font-family:'Segoe UI',system-ui; background:linear-gradient(135deg,#001d3d,#003566,#000814); min-height:100vh; color:white; }
        .app { max-width:480px; margin:auto; padding:20px; position:relative; }
        .card { background:rgba(255,255,255,.08); backdrop-filter:blur(12px); border-radius:18px; padding:18px; margin-bottom:16px; }
        .header { text-align:center; font-size:20px; font-weight:bold; color:#ffc300; margin-bottom:20px; }
        input, select { width:100%; padding:12px; margin-top:4px; margin-bottom:12px; border-radius:10px; border:none; background:rgba(255,255,255,.12); color:white; }
        button { width:100%; padding:14px; border:none; border-radius:12px; font-weight:bold; cursor:pointer; margin-bottom:10px; }
        .btn-main { background:#ffc300; color:#003566; }
        .hidden { display:none !important; }
    </style>
</head>
<body>
<div class="app">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
<div class="header" style="margin-bottom:0;">SISTEMA MULTIOPERADOR</div>
<button onclick="cerrarSesion()" style="width:auto;background:#ff4d4d;color:white;padding:10px 14px;border:none;border-radius:10px;">Salir</button>
</div><div class="card">
<label>COMPAÑÍA</label>
<select id="compania" onchange="cambiarCompania()">
<option value="TELCEL">TELCEL</option>
<option value="ATT">AT&T</option>
<option value="BAIT">BAIT</option>
</select><div id="campos"></div>
<button class="btn-main" onclick="guardarVenta()">GUARDAR</button>
<canvas id="grafica" style="margin-top:20px;max-height:250px;"></canvas>
</div>
</div><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><script>
function cambiarCompania(){
   const comp = document.getElementById('compania').value;
   let html='';

   if(comp==='TELCEL'){
      html=`
      <select id="tipo">
        <option value="KIT">KIT</option>
        <option value="CHIP">CHIP</option>
        <option value="PORTA">PORTA</option>
        <option value="RENUEVATE">RENUEVATE</option>
      </select>
      <input placeholder="Fecha activación" id="fecha">
      <input placeholder="Número celular" id="numero">
      <input placeholder="ICCID" id="iccid">
      <input placeholder="IMEI" id="imei">
      <input placeholder="Marca" id="marca">
      <input placeholder="Modelo" id="modelo">
      <input placeholder="Promotor" id="promotor">
      `;
   } else {
      html=`
      <input placeholder="Marca" id="marca">
      <input placeholder="Modelo" id="modelo">
      <input placeholder="ICCID" id="iccid">
      <input placeholder="Número" id="numero">
      `;
   }

   document.getElementById('campos').innerHTML = html;
}

let chart;
let ventasGuardadas = JSON.parse(localStorage.getItem('ventasMulti') || '[]');
let stats={TELCEL:0,ATT:0,BAIT:0};

function guardarVenta(){
   const comp=document.getElementById('compania').value;
   ventasGuardadas.push({comp:comp, fecha:Date.now()});
   localStorage.setItem('ventasMulti', JSON.stringify(ventasGuardadas));
   const comp=document.getElementById('compania').value;
   stats[comp]++; localStorage.setItem('statsMulti', JSON.stringify(stats));
   actualizarGrafica();
   alert('Venta guardada correctamente');
}

function actualizarGrafica(){
   const ctx=document.getElementById('grafica').getContext('2d');

   if(chart) chart.destroy();

   chart = new Chart(ctx,{ 
      type:'bar',
      data:{
         labels:['TELCEL','AT&T','BAIT'],
         datasets:[{
            label:'Ventas',
            data:[stats.TELCEL,stats.ATT,stats.BAIT]
         }]
      },
      options:{
         responsive:true,
         plugins:{
            legend:{labels:{color:'white'}}
         },
         scales:{
            y:{beginAtZero:true,ticks:{color:'white'}},
            x:{ticks:{color:'white'}}
         }
      }
   });
}

const savedStats = JSON.parse(localStorage.getItem('statsMulti') || '{}');
if(savedStats.TELCEL !== undefined){
   stats = savedStats;
}
actualizarGrafica();
function cerrarSesion(){
   alert('Aquí conecta tu lógica real de logout Firebase');
}

cambiarCompania();
</script></body>
</html>
