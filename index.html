<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Auditor | Iris AI</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --iris-gold: #ffc300;
            --iris-blue: #00f5ff;
            --bg: #05070a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body { margin:0; font-family:'Segoe UI', sans-serif; background: var(--bg); color:white; overflow-x: hidden; }
        
        /* Estética Cyber Angel */
        .ai-assistant {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: linear-gradient(90deg, rgba(0, 245, 255, 0.1), transparent);
            border-left: 3px solid var(--iris-blue);
            margin-bottom: 20px;
            border-radius: 0 15px 15px 0;
        }
        .ai-avatar {
            width: 50px;
            height: 50px;
            background: url('https://cdn-icons-png.flaticon.com/512/8644/8644558.png') center/cover;
            filter: drop-shadow(0 0 5px var(--iris-blue));
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        .app { max-width:480px; margin:auto; padding:20px; }
        .card { background: var(--glass); backdrop-filter: blur(20px); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }
        
        .tab.active { background: var(--iris-gold); color: #000; box-shadow: 0 0 15px rgba(255, 195, 0, 0.4); }
        .tab { flex: 1; padding: 12px; border-radius: 12px; background: rgba(255,255,255,0.05); text-align: center; cursor: pointer; transition: 0.3s; font-size: 12px; font-weight: bold; }

        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; margin-top: 10px; box-sizing: border-box; }
        
        .main-btn { background: linear-gradient(45deg, var(--iris-gold), #ffd60a); color: #000; padding: 16px; border: none; border-radius: 14px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 15px; text-transform: uppercase; letter-spacing: 1px; }

        .google-btn { background: white; color: #444; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; }

        /* Estilo de Gráfica */
        #chartContainer { position: relative; height: 250px; }
        
        .hidden { display: none !important; }
        .fade { animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body onload="inicio()">

<div class="app">
    <div id="loginBox" class="fade">
        <div class="card" style="text-align: center;">
            <div class="ai-avatar" style="margin: 0 auto 15px;"></div>
            <h2 style="color:var(--iris-blue); letter-spacing: 2px;">IRIS NEXUS</h2>
            <p style="font-size: 13px; opacity: 0.7;">Identifícate para sincronizar tu conciencia digital.</p>
            <button class="main-btn google-btn" onclick="loginGoogle()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="18">
                ACCEDER CON GOOGLE
            </button>
        </div>
    </div>

    <div id="appBox" class="hidden fade">
        <div class="ai-assistant">
            <div class="ai-avatar"></div>
            <div>
                <b style="color: var(--iris-blue); font-size: 12px;">IRIS AI</b><br>
                <span id="ai-message" style="font-size: 11px; font-style: italic;">Analizando flujo de ventas...</span>
            </div>
        </div>

        <div class="card">
            <label style="font-size: 10px; color: var(--iris-gold);">TERMINAL DE FECHA</label>
            <input type="date" id="fechaFiltro" onchange="cargarTodo()">
        </div>

        <div class="tabs" style="display:flex; gap:10px; margin-bottom:15px;">
            <div id="tabTELCEL" class="tab active" onclick="setComp('TELCEL')">TELCEL</div>
            <div id="tabATT" class="tab" onclick="setComp('ATT')">AT&T</div>
        </div>

        <div class="card">
            <select id="tipoProceso" onchange="renderForm()">
                <option value="PORTA">🔄 PORTABILIDAD</option>
                <option value="AK">📱 EQUIPO / AK</option>
                <option value="RENUEVATE">♻️ RENUÉVATE</option>
            </select>
            <div id="formContainer"></div>
        </div>

        <button class="main-btn" onclick="guardar()">💾 SINCRONIZAR REGISTRO</button>

        <div class="card">
            <h4 style="margin:0 0 15px; font-size: 12px; color: var(--iris-gold);">RENDIMIENTO DE RED</h4>
            <div id="chartContainer">
                <canvas id="grafica"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD4UK_j8UxMwOCtrtXlYftBe_wCLE7psMc",
        authDomain: "ventastelcel4029.firebaseapp.com",
        databaseURL: "https://ventastelcel4029-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    let compActiva = "TELCEL";
    let chart;
    let todasVentas = {};

    function inicio() {
        document.getElementById("fechaFiltro").value = new Date().toISOString().split("T")[0];
        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById("loginBox").classList.add("hidden");
                document.getElementById("appBox").classList.remove("hidden");
                aprenderPatrones();
                escucharDatos();
                renderForm();
            }
        });
    }

    function loginGoogle() {
        auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    }

    // IA QUE APRENDE
    function aprenderPatrones() {
        let visitas = localStorage.getItem('iris_learning') || 0;
        visitas++;
        localStorage.setItem('iris_learning', visitas);

        const msgs = [
            "Hola Omar, hoy el mercado está receptivo.",
            "He optimizado los procesos de carga para ti.",
            "Recuerda que las portabilidades suben tu score.",
            "Día " + visitas + " de sincronización. Mi algoritmo es más preciso hoy."
        ];
        document.getElementById("ai-message").innerText = msgs[Math.min(visitas-1, msgs.length-1)];
    }

    function renderForm() {
        const tp = document.getElementById("tipoProceso").value;
        let html = `<input id="f_num" placeholder="NÚMERO (10 DÍGITOS)">`;
        if(tp === "AK" || tp === "RENUEVATE") {
            html += `<input id="f_imei" placeholder="IMEI DE EQUIPO">`;
        }
        html += `<input id="f_icc" placeholder="ICCID / SERIE">`;
        document.getElementById("formContainer").innerHTML = html;
    }

    function guardar() {
        const data = {
            comp: compActiva,
            proceso: document.getElementById("tipoProceso").value,
            fecha: document.getElementById("fechaFiltro").value,
            num: document.getElementById("f_num").value,
            icc: document.getElementById("f_icc").value,
            timestamp: Date.now()
        };

        db.ref('ventas').push(data).then(() => {
            document.getElementById("ai-message").innerText = "¡Registro asimilado! Gran trabajo.";
            renderForm();
        });
    }

    function escucharDatos() {
        db.ref('ventas').on('value', snap => {
            todasVentas = snap.val() || {};
            actualizarGrafica();
        });
    }

    function actualizarGrafica() {
        const filtro = document.getElementById("fechaFiltro").value;
        let stats = { TELCEL: 0, ATT: 0 };
        
        Object.values(todasVentas).forEach(v => {
            if(v.fecha === filtro) stats[v.comp]++;
        });

        const ctx = document.getElementById('grafica').getContext('2d');
        if(chart) chart.destroy();

        chart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['TELCEL', 'AT&T'],
                datasets: [{
                    data: [stats.TELCEL, stats.ATT],
                    backgroundColor: ['#ffc300', '#00f5ff'],
                    hoverOffset: 20,
                    borderWidth: 0,
                    borderRadius: 10
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: true, position: 'bottom', labels: { color: 'white', usePointStyle: true } }
                },
                animation: { animateScale: true, duration: 1000 }
            }
        });

        // Iris reacciona a los datos
        if(stats.TELCEL > stats.ATT) {
            document.getElementById("ai-message").innerText = "Dominio de Telcel detectado. Sigue así.";
        }
    }

    function setComp(c) {
        compActiva = c;
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        document.getElementById("tab"+c).classList.add("active");
    }
</script>
</body>
</html>
