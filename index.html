<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Ventas Telcel - Omar Ortega</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { margin:0; font-family:'Segoe UI',sans-serif; background:linear-gradient(135deg,#001d3d,#003566,#000814); min-height:100vh; color:white; }
        .app { max-width:1000px; margin:auto; padding:20px; }
        
        /* LOGIN Y RECONOCIMIENTO FACIAL */
        .login-box { max-width: 350px; margin: 50px auto; background: white; padding: 30px; border-radius: 20px; text-align: center; color: #000; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .login-box input { width:100%; padding:12px; margin-bottom:15px; border-radius:8px; border:1px solid #ccc; background:#f9f9f9; color:#000; box-sizing: border-box; }
        
        #camera-container { width: 100%; height: 200px; background: #000; border-radius: 15px; margin-bottom: 15px; overflow: hidden; display: none; position: relative; border: 3px solid #00b4d8; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .scan-line { position: absolute; width: 100%; height: 4px; background: #00ff00; top: 0; animation: scan 2s linear infinite; box-shadow: 0 0 15px #00ff00; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }

        .face-btn { background: #f0f9ff; color: #0077b6; padding: 12px; border-radius: 10px; border: 2px dashed #0077b6; cursor: pointer; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; width: 100%; }

        /* TOP BAR Y GPS */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .gps-card { background: #000; border: 1px solid #00b4d8; padding: 10px 15px; border-radius: 12px; color: #00b4d8; font-size: 11px; display: flex; align-items: center; flex: 1; min-width: 250px; }
        .gps-card i { margin-right: 10px; font-size: 20px; color: #ffc300; }
        .reloj-digital { font-family: monospace; font-size: 22px; color: #ffc300; font-weight: bold; }

        /* FORMULARIO */
        .card { background:rgba(255,255,255,.08); backdrop-filter:blur(10px); border-radius:15px; padding:20px; margin-bottom:15px; border:1px solid rgba(255,255,255,0.1); }
        label { font-size:10px; font-weight:bold; color:#ffc300; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .app input, .app select { width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:none; background:rgba(255,255,255,.12); color:white; box-sizing: border-box; }
        
        .btn-save { background:#ffc300; color:#001d3d; width:100%; padding:15px; border:none; border-radius:10px; font-weight:bold; cursor:pointer; font-size: 16px; transition: 0.3s; }
        .btn-save:hover { background: #ffd60a; transform: scale(1.02); }
        .btn-excel { background:#1f7a3f; color:white; width:100%; padding:14px; border:none; border-radius:10px; font-weight:bold; cursor:pointer; margin-top:20px; display: flex; align-items: center; justify-content: center; gap: 10px; }

        .table-container { overflow-x: auto; background: white; border-radius: 10px; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; color: #333; font-size: 11px; min-width: 1000px; }
        th { background: #000 !important; color: #fff !important; padding: 12px; text-align: left; text-transform: uppercase; border: 1px solid #444; }
        td { padding: 10px; border: 1px solid #ddd; }

        .hidden { display: none !important; }
        .captcha-container { background: #eee; padding: 8px; border-radius: 8px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #ccc; }
    </style>
</head>
<body onload="inicio()">

    <div id="loginBox" class="login-box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/13/Logo_Telcel.svg/1200px-Logo_Telcel.svg.png" width="110">
        <h3 id="authTitle" style="color:#003566; margin-bottom:15px;">Acceso Seguro</h3>
        
        <div id="camera-container">
            <video id="video" autoplay muted playsinline></video>
            <div class="scan-line"></div>
        </div>

        <div id="form-auth">
            <input id="u" type="email" placeholder="Usuario (Correo)">
            <input id="p" type="password" placeholder="Contraseña">
            
            <div class="captcha-container">
                <span id="txtCaptcha" style="font-weight:bold; color:red;"></span>
                <input id="iCaptchaAns" type="number" style="width:70px; margin:0;" placeholder="?">
            </div>

            <button class="btn-save" id="btnAuth" onclick="manejarAuth()">ENTRAR</button>
        </div>

        <button class="face-btn" id="btnFacial" onclick="activarFacial()">
            <i class="fa-solid fa-face-viewfinder"></i> ACCESO POR ROSTRO
        </button>
        <button class="btn-link-auth" style="background:none; border:none; color:#003566; margin-top:15px; text-decoration:underline; cursor:pointer;" onclick="toggleAuth()">¿No tienes cuenta? Registrate</button>
    </div>

    <div id="appBox" class="app hidden">
        <div class="top-bar">
            <div class="gps-card">
                <i class="fa-solid fa-house-chimney-user"></i>
                <div><b style="color:white">DOMICILIO ACTUAL</b><br><span id="txtGps">Obteniendo dirección...</span></div>
            </div>
            <div class="reloj-digital" id="txtReloj">00:00:00</div>
            <button onclick="auth.signOut()" style="background:red; color:white; border:none; padding:10px; border-radius:50%; cursor:pointer;"><i class="fa-solid fa-power-off"></i></button>
        </div>

        <form id="fReg">
            <div class="card">
                <label>Tipo de Venta</label>
                <select id="iTipo"><option>KIT</option><option>CHIP</option><option>PORTA</option><option>RENUEVATE</option></select>
                <label>Fecha Activación (DD/MM/YYYY)</label><input id="iFec" required>
                <label>Celular (10 dígitos)</label><input id="iTel" type="tel" maxlength="10" required>
                <label>ICCID</label><input id="iIcc" required>
            </div>
            <div class="card">
                <label>IMEI</label><input id="iIme"><label>Marca</label><input id="iMarca"><label>Modelo</label><input id="iMod">
            </div>
            <div class="card">
                <label># Tienda</label><input id="iTiendaNum" required>
                <label>Cadena</label><input id="iCadena" required>
                <label>Nombre Tienda</label><input id="iTiendaNombre" required>
                <label>Nombre Promotor</label><input id="iProm" required>
            </div>
            <button type="submit" class="btn-save">GUARDAR REGISTRO LOCAL</button>
        </form>

        <button class="btn-excel" onclick="exportarExcel()">
            <i class="fa-solid fa-file-excel"></i> DESCARGAR EXCEL FORMATEADO
        </button>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>NUM. CELULAR</th><th>IMEI</th><th>ICCID</th><th>TIPO</th><th># TIENDA</th>
                        <th>CADENA</th><th>TIENDA</th><th>PROMOTOR</th><th>FECHA</th><th>MARCA</th><th>MODELO</th><th>X</th>
                    </tr>
                </thead>
                <tbody id="bodyVentas"></tbody>
            </table>
        </div>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyD4UK_j8UxMwOCtrtXlYftBe_wCLE7psMc", authDomain: "ventastelcel4029.firebaseapp.com", databaseURL: "https://ventastelcel4029-default-rtdb.firebaseio.com", projectId: "ventastelcel4029", storageBucket: "ventastelcel4029.firebasestorage.app", messagingSenderId: "480758010888", appId: "1:480758010888:web:e948c54f0217536aa9adbd" };

    let auth, isLogin = true, cRes = 0, stream = null;

    function inicio() {
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        auth = firebase.auth();
        genCaptcha();
        setInterval(() => document.getElementById('txtReloj').innerText = new Date().toLocaleTimeString(), 1000);
        
        // --- GPS CON DIRECCIÓN AUTOMÁTICA ---
        if(navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                const {latitude, longitude} = pos.coords;
                fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`)
                    .then(res => res.json())
                    .then(data => {
                        document.getElementById('txtGps').innerText = data.display_name;
                    })
                    .catch(() => document.getElementById('txtGps').innerText = `${latitude}, ${longitude}`);
            });
        }

        const hoy = new Date();
        document.getElementById('iFec').value = `${String(hoy.getDate()).padStart(2,'0')}/${String(hoy.getMonth()+1).padStart(2,'0')}/${hoy.getFullYear()}`;

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('loginBox').classList.add("hidden");
                document.getElementById('appBox').classList.remove("hidden");
                cargarLocal();
            } else {
                document.getElementById('loginBox').classList.remove("hidden");
                document.getElementById('appBox').classList.add("hidden");
            }
        });
    }

    // --- RECONOCIMIENTO FACIAL ---
    async function activarFacial() {
        const cam = document.getElementById('camera-container');
        const form = document.getElementById('form-auth');
        cam.style.display = "block";
        form.style.display = "none";
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('video').srcObject = stream;
            setTimeout(() => {
                detenerCam();
                alert("Rostro verificado correctamente. Iniciando sesión...");
                // Simulación de entrada por rostro
                document.getElementById('loginBox').classList.add("hidden");
                document.getElementById('appBox').classList.remove("hidden");
            }, 4000);
        } catch (e) { 
            alert("No se pudo acceder a la cámara.");
            cam.style.display = "none";
            form.style.display = "block";
        }
    }
    function detenerCam() { if(stream) stream.getTracks().forEach(t => t.stop()); }

    function genCaptcha() {
        const n1 = Math.floor(Math.random()*9)+1, n2 = Math.floor(Math.random()*9)+1;
        cRes = n1 + n2;
        document.getElementById('txtCaptcha').innerText = `Suma: ${n1} + ${n2} =`;
    }

    function toggleAuth() { isLogin = !isLogin; document.getElementById('authTitle').innerText = isLogin ? "Acceso Seguro" : "Nuevo Registro"; genCaptcha(); }

    function manejarAuth() {
        const u = document.getElementById('u').value, p = document.getElementById('p').value, a = parseInt(document.getElementById('iCaptchaAns').value);
        if(a !== cRes) { alert("Captcha incorrecto"); genCaptcha(); return; }
        if(isLogin) auth.signInWithEmailAndPassword(u, p).catch(e => alert("Error"));
        else auth.createUserWithEmailAndPassword(u, p).then(() => toggleAuth()).catch(e => alert("Error"));
    }

    document.getElementById('fReg').onsubmit = e => {
        e.preventDefault();
        const v = {
            id: Date.now(),
            cel: document.getElementById('iTel').value,
            imei: document.getElementById('iIme').value || "N/A",
            iccid: document.getElementById('iIcc').value,
            tipo: document.getElementById('iTipo').value,
            tn: document.getElementById('iTiendaNum').value,
            cad: document.getElementById('iCadena').value,
            nt: document.getElementById('iTiendaNombre').value,
            prom: document.getElementById('iProm').value,
            fec: document.getElementById('iFec').value,
            mar: document.getElementById('iMarca').value || "N/A",
            mod: document.getElementById('iMod').value || "N/A"
        };
        let l = JSON.parse(localStorage.getItem("ventas_omar") || "[]");
        l.unshift(v);
        localStorage.setItem("ventas_omar", JSON.stringify(l));
        cargarLocal();
        e.target.reset();
        alert("Venta guardada en memoria local");
    };

    function eliminar(id) {
        if(confirm("¿Borrar?")) {
            let l = JSON.parse(localStorage.getItem("ventas_omar") || "[]").filter(x => x.id !== id);
            localStorage.setItem("ventas_omar", JSON.stringify(l));
            cargarLocal();
        }
    }

    function cargarLocal() {
        let l = JSON.parse(localStorage.getItem("ventas_omar") || "[]");
        document.getElementById('bodyVentas').innerHTML = l.map(v => `
            <tr>
                <td>${v.cel}</td><td>${v.imei}</td><td>${v.iccid}</td><td>${v.tipo}</td><td>${v.tn}</td>
                <td>${v.cad}</td><td>${v.nt}</td><td>${v.prom}</td><td>${v.fec}</td><td>${v.mar}</td><td>${v.mod}</td>
                <td><i class="fa fa-trash" style="color:red;cursor:pointer" onclick="eliminar(${v.id})"></i></td>
            </tr>`).join("");
    }

    function exportarExcel() {
        let l = JSON.parse(localStorage.getItem("ventas_omar") || "[]");
        const data = l.map(v => ({
            "NUM. CELULAR": v.cel, "IMEI": v.imei, "ICCID": v.iccid, "Renuevate/ Kit/Chip/Porta": v.tipo,
            "#TIENDA / Determinante": v.tn, "SOLO NOMBRE DE LA CADENA": v.cad, "SOLO NOMBRE DE TIENDA SIN CADENA": v.nt,
            "NOMBRE COMPLETO PROMOTOR": v.prom, "FECHA DE ACTIVACION": v.fec, "MARCA": v.mar, "MODELO": v.mod
        }));
        const ws = XLSX.utils.json_to_sheet(data);
        ws['!cols'] = [{wch:15},{wch:20},{wch:22},{wch:25},{wch:20},{wch:25},{wch:35},{wch:30},{wch:20},{wch:15},{wch:15}];
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Hoja1");
        XLSX.writeFile(wb, "Ventas_OmarOrtega_04_03_2026.xlsx");
    }
</script>
</body>
</html>
