<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ventas Telcel PRO</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:sans-serif;background:#f4f7fb;margin:0}
.hidden{display:none}

header{
background:#002E6D;color:#fff;padding:20px;
display:flex;justify-content:space-between
}

main{padding:20px;max-width:800px;margin:auto}

.panel{
background:#fff;padding:20px;margin:10px 0;
border-radius:12px
}

input,button{
padding:10px;margin:5px 0;width:100%
}

button{background:#0055B8;color:#fff;border:none}

li{margin:10px 0}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="auth-container">
  <div class="panel">
    <h2>Login</h2>
    <input id="login-email" placeholder="Correo">
    <input id="login-password" type="password" placeholder="Contraseña">
    <button onclick="login()">Entrar</button>

    <h3>Registro</h3>
    <input id="reg-email" placeholder="Correo">
    <input id="reg-password" type="password" placeholder="Contraseña">
    <button onclick="registrar()">Crear cuenta</button>
  </div>
</div>

<!-- APP -->
<div id="app-container" class="hidden">
<header>
  <div>Ventas PRO</div>
  <button onclick="logout()">Salir</button>
</header>

<main>

<div class="panel">
  <h3>Hoy: <span id="total-hoy">$0</span></h3>
  <h3>Mes: <span id="total-mes">$0</span></h3>
</div>

<div class="panel">
  <h3>Nueva venta</h3>
  <input id="producto" placeholder="Producto">
  <input id="precio" type="number" placeholder="Precio">
  <button onclick="guardarVenta()">Guardar</button>
</div>

<div class="panel">
  <h3>Historial</h3>
  <ul id="lista-ventas"></ul>
</div>

<div class="panel">
  <h3>🏆 Ranking</h3>
  <ul id="ranking"></ul>
</div>

<div class="panel">
  <h3>📊 Ventas por día</h3>
  <canvas id="grafica"></canvas>
</div>

</main>
</div>

<script>
// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_DOMINIO",
  databaseURL: "TU_DB",
  projectId: "TU_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

const GERENTE_EMAIL = "tu_correo@ejemplo.com";

let ventasRef=null;
let ventasCache=[];
let chart=null;

// LOGIN
function login(){
  auth.signInWithEmailAndPassword(
    login-email.value,
    login-password.value
  ).catch(e=>alert(e.message));
}

function registrar(){
  auth.createUserWithEmailAndPassword(
    reg-email.value,
    reg-password.value
  ).catch(e=>alert(e.message));
}

function logout(){auth.signOut()}

// FECHA
function fechaHoy(){
  let d=new Date();
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}

// GUARDAR
function guardarVenta(){
  let prod=producto.value.trim();
  let prec=precio.value;
  let user=auth.currentUser;

  if(!prod||!prec)return alert("Datos");

  if(isNaN(prec)||prec<=0)return alert("Precio inválido");

  let venta={
    producto:prod,
    precio:prec,
    fecha:fechaHoy(),
    ts:Date.now()
  };

  db.ref('ventas/'+user.uid).push(venta);
  db.ref('backup/'+user.uid).push(venta);

  producto.value="";
  precio.value="";
}

// ELIMINAR
function eliminarVenta(id){
  let user=auth.currentUser;
  db.ref('ventas/'+user.uid+'/'+id).remove();
}

// USER NORMAL
function suscribirVentas(uid){
  if(ventasRef)ventasRef.off();

  ventasRef=db.ref('ventas/'+uid);

  ventasRef.on('value',snap=>{
    let data=snap.val()||{};

    ventasCache=Object.entries(data)
    .map(([id,v])=>({id,...v}))
    .sort((a,b)=>b.ts-a.ts);

    render();
  });
}

// GERENTE
function suscribirTodasVentas(){
  if(ventasRef)ventasRef.off();

  ventasRef=db.ref('ventas');

  ventasRef.on('value',snap=>{
    let data=snap.val()||{};
    let todas=[];

    Object.keys(data).forEach(uid=>{
      Object.entries(data[uid]).forEach(([id,v])=>{
        todas.push({id,uid,...v});
      });
    });

    ventasCache=todas.sort((a,b)=>b.ts-a.ts);

    render();
    renderRanking();
  });
}

// RENDER
function render(){
  lista-ventas.innerHTML="";

  ventasCache.forEach(v=>{
    let li=document.createElement('li');

    li.innerHTML=`
      ${v.producto} - $${Number(v.precio).toLocaleString('es-MX')} (${v.fecha})
      <button onclick="eliminarVenta('${v.id}')">❌</button>
    `;

    lista-ventas.appendChild(li);
  });

  calcularTotales();
  renderGrafica();
}

// TOTALES
function calcularTotales(){
  let hoy=fechaHoy();
  let mes=hoy.slice(3);

  let th=0, tm=0;

  ventasCache.forEach(v=>{
    if(v.fecha===hoy) th+=Number(v.precio);
    if(v.fecha.slice(3)===mes) tm+=Number(v.precio);
  });

  total-hoy.textContent="$"+th.toLocaleString('es-MX');
  total-mes.textContent="$"+tm.toLocaleString('es-MX');
}

// RANKING
function renderRanking(){
  ranking.innerHTML="";

  let totales={};

  ventasCache.forEach(v=>{
    if(!totales[v.uid])totales[v.uid]=0;
    totales[v.uid]+=Number(v.precio);
  });

  Object.entries(totales)
  .sort((a,b)=>b[1]-a[1])
  .forEach(([uid,total],i)=>{
    let li=document.createElement('li');
    li.textContent=`#${i+1} ${uid} → $${total.toLocaleString('es-MX')}`;
    ranking.appendChild(li);
  });
}

// GRÁFICA
function renderGrafica(){
  let dias={};

  ventasCache.forEach(v=>{
    if(!dias[v.fecha])dias[v.fecha]=0;
    dias[v.fecha]+=Number(v.precio);
  });

  if(chart)chart.destroy();

  chart=new Chart(grafica,{
    type:'line',
    data:{
      labels:Object.keys(dias),
      datasets:[{
        label:'Ventas',
        data:Object.values(dias),
        borderWidth:3
      }]
    }
  });
}

// SESIÓN
auth.onAuthStateChanged(user=>{
  if(user){
    auth-container.classList.add('hidden');
    app-container.classList.remove('hidden');

    if(user.email===GERENTE_EMAIL){
      suscribirTodasVentas();
    }else{
      suscribirVentas(user.uid);
    }

  }else{
    auth-container.classList.remove('hidden');
    app-container.classList.add('hidden');
  }
});
</script>

</body>
</html>
