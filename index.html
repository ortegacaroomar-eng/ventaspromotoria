<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ventas PRO Auditoría</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:sans-serif; background:#000814; color:white;}
.app { max-width:500px; margin:auto; padding:20px;}
.card { background:rgba(255,255,255,.08); padding:15px; border-radius:15px; margin-bottom:15px;}
input,select,button { width:100%; padding:10px; margin-top:5px; border-radius:10px; border:none;}
button { background:#ffc300; font-weight:bold;}
.login { max-width:300px; margin:100px auto; background:white; color:black; padding:20px; border-radius:15px;}
.hidden { display:none;}
</style>
</head>

<body onload="inicio()">

<div id="loginBox" class="login">
<h2>Acceso</h2>
<input id="u" placeholder="Correo">
<input id="p" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar / Crear</button>
<p id="estado"></p>
</div>

<div id="appBox" class="app hidden">

<div class="card">
<input id="meta" placeholder="Meta mensual">
</div>

<div class="card" id="dashboard"></div>

<div class="card">
<canvas id="grafica"></canvas>
</div>

<div class="card" id="ranking"></div>

<form id="fReg">
<div class="card">

<select id="comp">
<option>TELCEL</option>
<option>ATT</option>
<option>BAIT</option>
</select>

<select id="tipo" onchange="cambiarFormulario()">
<option value="">Tipo de venta</option>
<option value="PORTA">PORTA</option>
<option value="AK">AK</option>
<option value="CHIP">CHIP</option>
<option value="RENUEVATE">RENUEVATE</option>
</select>

<input id="fecha" placeholder="Fecha">
<input id="numero" placeholder="Número">

<div id="camposExtra"></div>

<input id="prom" placeholder="Promotor">

</div>

<button>Guardar</button>
</form>

<div id="lista"></div>

</div>

<script>

let db=null, auth=null, online=false, chart=null;

const firebaseConfig = {
apiKey: "TU_API",
authDomain: "TU_AUTH",
databaseURL: "TU_DB",
projectId: "TU_ID"
};

function inicio(){
try{
firebase.initializeApp(firebaseConfig);
auth = firebase.auth();
db = firebase.database();
online = true;

auth.onAuthStateChanged(user=>{
if(user){
estado.innerText="Conectado ☁️";
mostrarApp();
}else{
estado.innerText="No autenticado";
}
});
}catch(e){
estado.innerText="Modo offline ⚠️";
online=false;
}
}

function login(){
let email=u.value.trim();
let pass=p.value.trim();

if(!email || !pass){
alert("Llena campos");
return;
}

if(!online){
estado.innerText="Modo offline";
mostrarApp();
return;
}

auth.signInWithEmailAndPassword(email,pass)
.catch(err=>{
if(err.code==="auth/user-not-found"){
auth.createUserWithEmailAndPassword(email,pass)
.then(()=>alert("Usuario creado"))
.catch(e=>alert(e.message));
}else{
alert(err.message);
}
});
}

function mostrarApp(){
loginBox.classList.add("hidden");
appBox.classList.remove("hidden");
cargar();
}

function cambiarFormulario(){
let t = tipo.value;

if(t==="PORTA"){
camposExtra.innerHTML=`
<input id="cliente" placeholder="Nombre cliente">
<input id="nip" placeholder="NIP">
`;
}
else if(t==="AK"){
camposExtra.innerHTML=`
<input id="icc" placeholder="ICCID">
<input id="imei" placeholder="IMEI">
<input id="marca" placeholder="Marca">
<input id="modelo" placeholder="Modelo">
`;
}
else if(t==="CHIP"){
camposExtra.innerHTML=`
<input id="icc" placeholder="ICCID">
<input id="recarga" placeholder="Monto recarga">
`;
}
else if(t==="RENUEVATE"){
camposExtra.innerHTML=`
<input id="icc" placeholder="ICCID">
<input id="imei" placeholder="IMEI">
<input id="modelo" placeholder="Modelo">
`;
}
else{
camposExtra.innerHTML="";
}
}

fReg.onsubmit = e=>{
e.preventDefault();

let v = {
id: Date.now(),
comp: comp.value,
tipo: tipo.value,
fecha: fecha.value,
numero: numero.value,
prom: prom.value,

cliente: document.getElementById("cliente")?.value || "",
nip: document.getElementById("nip")?.value || "",
icc: document.getElementById("icc")?.value || "",
imei: document.getElementById("imei")?.value || "",
marca: document.getElementById("marca")?.value || "",
modelo: document.getElementById("modelo")?.value || "",
recarga: document.getElementById("recarga")?.value || ""
};

let local = JSON.parse(localStorage.getItem("ventas")||"[]");
local.unshift(v);
localStorage.setItem("ventas", JSON.stringify(local));

if(online && auth.currentUser){
db.ref("ventas").push(v);
}

cargar();
fReg.reset();
camposExtra.innerHTML="";
};

function cargar(){
let local=JSON.parse(localStorage.getItem("ventas")||"[]");

lista.innerHTML = local.map(v=>`
<div class="card">

<b>${v.comp} - ${v.tipo}</b><br>
📅 ${v.fecha}<br>
📱 ${v.numero}<br>

${v.cliente ? "👤 "+v.cliente+"<br>" : ""}
${v.nip ? "🔑 NIP: "+v.nip+"<br>" : ""}

${v.icc ? "ICCID: "+v.icc+"<br>" : ""}
${v.imei ? "IMEI: "+v.imei+"<br>" : ""}
${v.marca ? "Marca: "+v.marca+"<br>" : ""}
${v.modelo ? "Modelo: "+v.modelo+"<br>" : ""}

${v.recarga ? "💰 Recarga: "+v.recarga+"<br>" : ""}

👤 ${v.prom}

</div>
`).join("");

dashboardGen(local);
graficaGen(local);
rankingGen(local);
}

function dashboardGen(local){
let t=0,a=0,b=0;

local.forEach(v=>{
if(v.comp==="TELCEL")t++;
if(v.comp==="ATT")a++;
if(v.comp==="BAIT")b++;
});

let ingreso=local.length*100;
let metaVal=parseFloat(meta.value)||0;
let porc=metaVal?((ingreso/metaVal)*100).toFixed(1):0;

dashboard.innerHTML=`
Total: ${local.length}<br>
Telcel: ${t}<br>
ATT: ${a}<br>
BAIT: ${b}<br><br>
💰 ${ingreso} / ${metaVal}<br>${porc}%
`;
}

function graficaGen(local){
let data={TELCEL:0,ATT:0,BAIT:0};

local.forEach(v=>data[v.comp]++);

if(chart) chart.destroy();

chart=new Chart(grafica,{
type:"bar",
data:{
labels:["Telcel","ATT","BAIT"],
datasets:[{data:[data.TELCEL,data.ATT,data.BAIT]}]
}
});
}

function rankingGen(local){
let map={};

local.forEach(v=>{
map[v.prom]=(map[v.prom]||0)+1;
});

let orden=Object.entries(map).sort((a,b)=>b[1]-a[1]);

ranking.innerHTML="<b>Ranking Promotores</b><br>"+
orden.map((p,i)=>`${i+1}. ${p[0]} (${p[1]})`).join("<br>");
}

</script>

</body>
</html>
